<html lang="es">
<head>

<style>
:root{--accent:#FFD700;--cash:#4CAF50;--invest:#00BCD4;--danger:#FF5252;--lemon:#FDD835;--env:#26A69A}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;overflow:hidden;height:100vh;width:100vw;user-select:none;background:#87CEEB}
canvas#bg{position:fixed;inset:0;z-index:0;cursor:pointer}

#stats{position:fixed;top:6px;left:50%;transform:translateX(-50%);z-index:40;display:flex;gap:.4rem;pointer-events:none;flex-wrap:wrap;justify-content:center;align-items:center}
.si{text-align:center;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);border-radius:8px;padding:.2rem .5rem;border:1px solid rgba(255,255,255,.1)}
.sl{font-size:.28rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.4)}
.sv{font-family:'Fredoka One',cursive;font-size:.65rem;color:#fff}
.sv.big{font-size:1rem;color:var(--accent);text-shadow:0 0 8px rgba(255,215,0,.3)}
.sv.cash{color:#69F0AE}.sv.inv{color:var(--invest)}

#cloudStatus{font-size:.7rem;cursor:default;transition:color .3s;pointer-events:auto; background:rgba(0,0,0,.6); backdrop-filter:blur(8px); border-radius:8px; padding:.2rem .4rem; border:1px solid rgba(255,255,255,.1); display:flex; align-items:center; gap:4px}
.cloud-off{color:rgba(255,255,255,.3)}
.cloud-saving{color:#FFD700;animation:cpulse .8s infinite}
.cloud-saved{color:#69F0AE}
.cloud-error{color:#FF5252}
@keyframes cpulse{0%,100%{opacity:1}50%{opacity:.3}}

#comboWrap{position:fixed;left:50%;top:28%;transform:translateX(-50%);z-index:55;text-align:center;pointer-events:none;opacity:0;transition:opacity .3s}
#comboWrap.on{opacity:1}
#comboTxt{font-family:'Fredoka One',cursive;font-size:.9rem;color:#FF6D00;text-shadow:0 0 8px rgba(255,109,0,.4)}

#fx{position:fixed;inset:0;pointer-events:none;z-index:55;overflow:hidden}
.ftxt{position:absolute;font-family:'Fredoka One',cursive;pointer-events:none;animation:fUp 1s ease-out forwards;text-shadow:0 2px 6px rgba(0,0,0,.5)}
@keyframes fUp{0%{opacity:1;transform:translateY(0) scale(1.4)}100%{opacity:0;transform:translateY(-100px) scale(.5)}}
.particle{position:absolute;border-radius:50%;pointer-events:none}
#flash{position:fixed;inset:0;z-index:99;pointer-events:none;background:#fff;opacity:0;transition:opacity .15s}
#flash.on{opacity:.15;transition:opacity 0s}

#nameEditor{display:none;position:fixed;z-index:100;left:50%;top:35%;transform:translate(-50%,-50%);background:rgba(10,10,20,.95);border-radius:10px;border:3px solid var(--accent);padding:12px 18px;text-align:center;box-shadow:0 0 30px rgba(255,215,0,.3)}
#nameInput{width:150px;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.2);border-radius:5px;color:var(--accent);font-family:'Fredoka One',cursive;font-size:18px;text-align:center;outline:none;text-transform:uppercase;padding:5px}
#nameInput:focus{border-color:var(--accent)}
.name-title{font-family:'Fredoka One',cursive;font-size:10px;color:rgba(255,255,255,.5);margin-bottom:6px;letter-spacing:1px}
.name-hint{font-family:'Nunito',sans-serif;font-size:9px;color:rgba(255,255,255,.3);margin-top:6px}

#lbPopup{position:absolute;top:20px;left:20px;width:200px;min-width:160px;min-height:120px;background:rgba(20,20,30,.85);backdrop-filter:blur(4px);border:3px solid rgba(255,255,255,.2);border-radius:8px;z-index:60;display:flex;flex-direction:column;overflow:hidden}
#lbHeader{background:rgba(255,255,255,.1);color:#fff;font-family:'Fredoka One',cursive;font-size:.5rem;padding:5px 8px;cursor:grab;border-bottom:2px solid rgba(255,255,255,.1);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;text-transform:uppercase;letter-spacing:1px}
#lbHeader:active{cursor:grabbing}
#lbContent{padding:6px;flex-grow:1;overflow-y:auto}
.lb-tab-btn{font-family:'Fredoka One',cursive;font-size:.32rem;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);padding:2px 6px;border-radius:3px;cursor:pointer;margin-bottom:6px}
.lb-tab-btn.active{color:var(--accent);border-color:var(--accent);background:rgba(255,215,0,.1)}
.lb-row{display:flex;justify-content:space-between;font-size:.36rem;color:rgba(255,255,255,.7);margin-bottom:3px;border-bottom:1px solid rgba(255,255,255,.05);padding:2px 0}
.lb-row.me{color:var(--accent);font-weight:900;text-shadow:0 0 5px rgba(255,215,0,.4)}
.lb-rank{width:18px;color:rgba(255,255,255,.3);font-weight:bold}
#lbResize{position:absolute;bottom:0;right:0;width:12px;height:12px;cursor:nwse-resize;background:linear-gradient(135deg, transparent 50%, rgba(255,255,255,.3) 50%)}

#shopToggle{position:fixed;top:50%;right:290px;transform:translateY(-50%);z-index:45;width:22px;height:50px;background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.1);border-right:none;border-radius:5px 0 0 5px;color:var(--accent);font-size:.6rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .4s}
#shopToggle.shifted{right:0}

#shopPanel{position:fixed;top:0;right:0;width:290px;height:100vh;z-index:42;background:rgba(10,10,20,.94);backdrop-filter:blur(12px);border-left:1px solid rgba(255,255,255,.06);overflow-y:auto;transform:translateX(0);transition:transform .4s;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent}
#shopPanel.closed{transform:translateX(100%)}

.tabs{display:flex;position:sticky;top:0;z-index:2;background:rgba(10,10,20,.98);border-bottom:1px solid rgba(255,255,255,.05)}
.tab{flex:1;padding:.3rem .05rem;text-align:center;font-family:'Fredoka One',cursive;font-size:.32rem;color:rgba(255,255,255,.25);cursor:pointer;transition:all .2s;border-bottom:2px solid transparent;text-transform:uppercase}
.tab:hover{color:rgba(255,255,255,.5)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tc{display:none;padding:.4rem}.tc.active{display:block}

.uc{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:.4rem;margin-bottom:.25rem;transition:all .2s}
.uc:hover{border-color:rgba(255,215,0,.18);background:rgba(255,255,255,.06)}
.uc-t{display:flex;align-items:center;gap:.3rem;margin-bottom:.1rem}
.uc-i{width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:.55rem;flex-shrink:0}
.uc-n{font-family:'Fredoka One',cursive;font-size:.42rem;color:#eee}
.uc-d{font-size:.32rem;color:rgba(255,255,255,.25);line-height:1.2}
.uc-b{display:flex;align-items:center;justify-content:space-between;margin-top:.15rem}
.uc-e{font-family:'Fredoka One',cursive;font-size:.36rem;color:var(--cash)}
.uc-buy{font-family:'Fredoka One',cursive;font-size:.42rem;color:#fff;background:var(--cash);padding:.1rem .4rem;border-radius:4px;cursor:pointer;transition:all .15s;border:none}
.uc-buy:hover:not(.no){background:#1B5E20;transform:scale(1.05)}
.uc-buy:active:not(.no){transform:scale(0.95)}
.uc-buy.no{background:rgba(255,255,255,.1);cursor:not-allowed;color:rgba(255,255,255,.15)}

.pb{background:rgba(0,188,212,.04);border:1px solid rgba(0,188,212,.12);border-radius:8px;padding:.4rem;text-align:center;margin-top:.2rem}
.ps{font-size:.38rem;color:rgba(255,255,255,.3);margin:.04rem 0}.ps b{color:#ddd;font-family:'Fredoka One',cursive}.ps .hi{color:var(--invest);font-family:'Fredoka One',cursive}
.pbtn{width:100%;padding:.3rem;border:2px solid;border-radius:6px;font-family:'Fredoka One',cursive;font-size:.46rem;cursor:pointer;transition:all .3s;margin-top:.2rem;background:transparent;text-transform:uppercase}
.pbtn.avail{border-color:var(--invest);color:var(--invest);background:rgba(0,188,212,.06);animation:pp 2s infinite}
.pbtn.locked{border-color:rgba(255,255,255,.1);color:rgba(255,255,255,.1);cursor:not-allowed}
.pbtn.danger{border-color:var(--danger);color:var(--danger)}
@keyframes pp{0%,100%{box-shadow:0 0 3px rgba(0,188,212,.08)}50%{box-shadow:0 0 10px rgba(0,188,212,.15)}}

.color-btn{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid rgba(255,255,255,.1);transition:all .2s;display:inline-block;margin:2px}
.color-btn:hover{transform:scale(1.15);border-color:rgba(255,255,255,.4)}
.color-btn.owned{border-color:var(--accent)}
.color-btn.active{border-color:#fff;box-shadow:0 0 8px rgba(255,255,255,.3)}

.lore-box{background:rgba(0,0,0,.2);border-left:3px solid var(--accent);padding:.15rem;margin:.05rem 0;font-size:.3rem;color:rgba(255,255,255,.4);font-style:italic}

#toasts{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:70;display:flex;flex-direction:column-reverse;gap:.2rem;align-items:center;pointer-events:none}
.toast{background:rgba(10,10,25,.9);backdrop-filter:blur(6px);border:1px solid var(--cash);border-radius:5px;padding:.3rem .6rem;font-family:'Fredoka One',cursive;font-size:.45rem;color:#69F0AE;white-space:nowrap;animation:tI .3s ease-out,tO .3s 2.7s ease-in forwards;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.toast.gold{border-color:var(--accent);color:var(--accent)}.toast.cyan{border-color:var(--invest);color:var(--invest)}.toast.red{border-color:var(--danger);color:var(--danger)}
@keyframes tI{from{opacity:0;transform:translateY(8px) scale(.9)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes tO{from{opacity:1}to{opacity:0;transform:translateY(-4px)}}

@media(max-width:768px){#shopPanel{width:240px}#shopToggle{right:240px}}
@media(max-width:480px){#shopPanel{width:100vw}#shopToggle{display:none}}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div id="flash"></div>

<header id="stats">
  <div id="cloudStatus" class="cloud-off" title="Desconectado"><i class="fas fa-cloud"></i></div>
  <div class="si"><div class="sl">Dinero</div><div class="sv big" id="dCash">$0</div></div>
  <div class="si"><div class="sl">Por Click</div><div class="sv" id="dPC">$1</div></div>
  <div class="si"><div class="sl">Por Segundo</div><div class="sv cash" id="dPS">$0</div></div>
  <div class="si"><div class="sl">Rebirths</div><div class="sv inv" id="dReb">0</div></div>
</header>

<div id="comboWrap"><div id="comboTxt">COMBO x2</div></div>
<div id="fx"></div>
<div id="nameEditor">
  <div class="name-title">NOMBRE DEL STAND</div>
  <input type="text" id="nameInput" maxlength="14">
  <div class="name-hint">Enter para confirmar</div>
</div>

<div id="lbPopup">
  <div id="lbHeader"><span><i class="fas fa-trophy"></i> LEADERBOARD</span></div>
  <div id="lbContent">
    <div style="display:flex;gap:4px;margin-bottom:6px">
      <button class="lb-tab-btn active" onclick="setLbTab('cash', this)">Cash</button>
      <button class="lb-tab-btn" onclick="setLbTab('time', this)">Time</button>
      <button class="lb-tab-btn" onclick="setLbTab('rebirth', this)">Rebirths</button>
    </div>
    <div id="lbList"></div>
  </div>
  <div id="lbResize"></div>
</div>

<button id="shopToggle" aria-label="Tienda"><i class="fas fa-chevron-right" id="togI"></i></button>
<aside id="shopPanel" role="complementary" aria-label="Tienda">
  <div class="tabs">
    <div class="tab active" data-tab="upgrades">Mejoras</div>
    <div class="tab" data-tab="paint">Pintar</div>
    <div class="tab" data-tab="prestige">Rebirth</div>
  </div>
  <div class="tc active" id="tab-upgrades"></div>
  <div class="tc" id="tab-paint"></div>
  <div class="tc" id="tab-prestige"></div>
</aside>
<div id="toasts" aria-live="polite"></div>

<script>
/* ========== UTILIDADES ========== */
function lighter(hex,amt){if(!hex||hex[0]!=='#')return hex;var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);return'#'+r.toString(16).padStart(2,'0')+g.toString(16).padStart(2,'0')+b.toString(16).padStart(2,'0')}
function darker(hex,amt){return lighter(hex,-amt)}

/* ========== FILTRO DE PALABROTAS ========== */
var BAD_WORDS=['PUTA','PUTO','PENDEJO','CABRON','CABRÓN','MIERDA','COÑO','CONO','JODER','MARICA','MARICON','MARICÓN','ZORRA','PERRA','IDIOTA','ESTUPIDO','ESTÚPIDO','IMBECIL','IMBÉCIL','MALDITO','CARAJO','CHINGA','CHINGAR','CHINGADO','VERGA','BICHO','POLLA','TETA','CULO','HIJOPUTA','HIJAPUTA','NARCO','FOLLAR','COGER','COJER','MAMAWEBO','COMEMIERDA','MALPARIDO','SINGAO','PROSTITUTA','PEDOFILO','PEDÓFILO','VIOLADOR','PIROBO','GONORREA','CHUCHA','HP','CTM','TMR','CABRONA','PUTON','PUTONA','CABRONAZO','HIJOEPUTA','HIJAEPUTA','RECULIADO','RECULIADA','HPM','PTA','VRG','CGT','CPT','PENDEJA','PENDEJADA','MIERDITA','JODIDO','JODIDA','COÑAZO','CABREADO','CABREADA','HOSTIA','HIJUEPUTA','CHINGADA','CHINGADERA','VERGAS','VERGAZO','BICHOTE','BICHA','POLLÓN','TETAS','CULERO','CULERA','CULERADA','PUTAZO','PUTERÍO','MIERDERO','COJONES','CAGADA','CAGÓN','LAMECULOS','LAMECULO','CABRONEAR','ENCABRONAR','DESVERGADO','DESVERGADA','SINGAR','SINGADOR','FOLLÓN','FOLLADORA','FOLLADOR'];
function censorName(name){
  if(!name) return 'LIMONADA';
  var r=name.toUpperCase();
  for(var i=0;i<BAD_WORDS.length;i++){
    var w=BAD_WORDS[i];var idx;
    while((idx=r.indexOf(w))!==-1){r=r.substring(0,idx)+'#'.repeat(w.length)+r.substring(idx+w.length);}
  }
  return r||'LIMONADA';
}

/* ========== FIREBASE (AUTOMÁTICO) ========== */
var fbAvail=typeof firebase!=='undefined';
var auth2=null,db2=null,currentUser=null;

if(fbAvail){
  try{
    firebase.initializeApp({
      apiKey:"AIzaSyAsx2kPeIGGdgWB7NNTNsDdMKhD946R71A",
      authDomain:"inicio-sessio.firebaseapp.com",
      projectId:"inicio-sessio",
      storageBucket:"inicio-sessio.firebasestorage.app",
      messagingSenderId:"317240360522",
      appId:"1:317240360522:web:7308be4afe4b5d81d6b0b3"
    });
    auth2=firebase.auth();
    db2=firebase.firestore();
    auth2.signInAnonymously().catch(function(error){console.error("Error auth:",error);});
    auth2.onAuthStateChanged(function(user){
      if(user){currentUser=user;setCloudStatus('saved');loadFromCloud();}
      else{currentUser=null;setCloudStatus('off');}
    });
  }catch(e){console.error('Firebase init error:',e);fbAvail=false}
}

function setCloudStatus(state){
  var el=document.getElementById('cloudStatus');if(!el)return;el.className='';
  if(state==='saving'){el.className='cloud-saving';el.innerHTML='<i class="fas fa-cloud-arrow-up"></i>';el.title='Guardando...';}
  else if(state==='saved'){el.className='cloud-saved';el.innerHTML='<i class="fas fa-cloud"></i>';el.title='Guardado en la nube';}
  else if(state==='error'){el.className='cloud-error';el.innerHTML='<i class="fas fa-cloud-exclamation"></i>';el.title='Error de conexión';}
  else{el.className='cloud-off';el.innerHTML='<i class="fas fa-cloud"></i>';el.title='Sin conexión a la nube';}
}

var lastCloudSave=0;
function saveToCloud(force){
  if(!fbAvail||!db2||!currentUser)return;
  if(!force&&Date.now()-lastCloudSave<20000)return;
  setCloudStatus('saving');
  var data={c:G.cash,lt:G.lifetime,ss:G.session,cb:G.clickBonus,cm:G.clickMult,gm:G.globalMult,rm:G.rebirthMult,rb:G.rebirths,tc:G.totalClicks,tp:G.timePlayed,sn:censorName(G.standName),sl:STAND_UPS.map(function(u){return u.lvl}),el:EQUIP_UPS.map(function(u){return u.lvl}),pt:activePaint,po:PAINTS.map(function(p){return p.owned}),lastSaved:Date.now()};
  db2.collection('players').doc(currentUser.uid).set(data,{merge:true}).then(function(){lastCloudSave=Date.now();setCloudStatus('saved');}).catch(function(e){console.error('Cloud save error:',e);setCloudStatus('error');});
}

function loadFromCloud(){
  if(!fbAvail||!db2||!currentUser)return;
  db2.collection('players').doc(currentUser.uid).get().then(function(doc){
    if(doc.exists){var d=doc.data();var cloudLifetime=Number(d.lt||0);if(cloudLifetime>G.lifetime){applySaveData(d);showToast('Progreso sincronizado','cyan');updateUI();}else if(G.lifetime>cloudLifetime&&G.lifetime>0){saveToCloud(true);}}
    else{if(G.lifetime>0)saveToCloud(true);}
  }).catch(function(e){console.error('Cloud load error:',e);});
}

function applySaveData(d){
  G.cash=Number(d.c)||0;G.lifetime=Number(d.lt)||0;G.session=Number(d.ss)||0;G.clickBonus=Number(d.cb)||0;G.clickMult=Number(d.cm)||1;G.globalMult=Number(d.gm)||1;G.rebirthMult=Number(d.rm)||1;G.rebirths=Number(d.rb)||0;G.totalClicks=Number(d.tc)||0;G.timePlayed=Number(d.tp)||0;G.standName=d.sn||'LIMONADA';
  if(d.sl)for(var i=0;i<d.sl.length&&i<STAND_UPS.length;i++)STAND_UPS[i].lvl=d.sl[i];
  if(d.el)for(var i=0;i<d.el.length&&i<EQUIP_UPS.length;i++){EQUIP_UPS[i].lvl=d.el[i];var u=EQUIP_UPS[i];if(u.id==='juicer')G.clickBonus=u.levels[u.lvl].bonus;if(u.id==='register')G.clickMult=u.levels[u.lvl].clickMult;if(u.id==='lemons'){G.globalMult=1;for(var j=1;j<=u.lvl;j++)G.globalMult*=u.levels[j].mult;}}
  if(d.pt)activePaint=d.pt;if(d.po)for(var i=0;i<d.po.length&&i<PAINTS.length;i++)PAINTS[i].owned=d.po[i];
}

/* ========== DATOS DEL JUEGO ========== */
var STAND_UPS=[
  {id:'counter',name:'Mostrador',desc:'El corazon del puesto',icon:'fa-table',bg:'rgba(139,69,19,.15)',ic:'#8D6E63',levels:[{n:'Cajon',cost:0},{n:'Madera P.',cost:50},{n:'Baldosas',cost:2500},{n:'MaRMol',cost:200000},{n:'Oro',cost:15000000},{n:'Diamante',cost:2000000000}],lvl:0,lore:['Un humilde comienzo.','La madera cede, pero el espiritu no.','Los azulejos reflejan tu ascenso.','Frio al tacto, caliente de ambicion.','Oro codiciado por los reyes.','Eterno, inalcanzable para los mortales.']},
  {id:'roof',name:'Techo',desc:'Proteccion y estilo',icon:'fa-umbrella',bg:'rgba(255,112,67,.15)',ic:'#FF7043',levels:[{n:'Sin Techo',cost:0},{n:'Lona',cost:30},{n:'Madera',cost:4000},{n:'Chapa',cost:150000},{n:'Cristal',cost:10000000},{n:'HoLOGRaMa',cost:1200000000}],lvl:0,lore:['A cielo abierto, como los perros.','Protege del sol, no de la envidia.','Estilo rustico para almas nobles.','Industrial, frio, pero seguro.','Cupula elegante que oculta el cielo.','Tecnologia del futuro envuelta en luz.']},
  {id:'sign',name:'Letrero',desc:'Atrae mas clientes',icon:'fa-sign-hanging',bg:'rgba(255,215,0,.15)',ic:'#FFD700',levels:[{n:'Carton',cost:0},{n:'Pintado',cost:40},{n:'Madera',cost:6000},{n:'Neon',cost:300000},{n:'LED',cost:30000000},{n:'Holograma',cost:5000000000}],lvl:0,lore:['Manual y arrugado.','Arte callejero en su maximo.','Tallado a mano por artesanos.','Luz en la noche para los perdidos.','Pixeles mintiendo al ojo.','Flota en el aire, desafiando la gravedad.']},

var fxEl=document.getElementById('fx'),particles=[];
function fText(x,y,t,sz,col){var e=document.createElement('div');e.className='ftxt';e.textContent=t;e.style.left=x+'px';e.style.top=y+'px';e.style.fontSize=(sz||14)+'px';e.style.color=col||'#FDD835';fxEl.appendChild(e);setTimeout(function(){if(e.parentNode)e.parentNode.removeChild(e)},1050)}
function spawnPart(x,y,vx,vy,col,r){var e=document.createElement('div');e.className='particle';var sz=r*2;e.style.width=sz+'px';e.style.height=sz+'px';e.style.background=col||'#FDD835';e.style.left=x+'px';e.style.top=y+'px';fxEl.appendChild(e);particles.push({el:e,x:x,y:y,vx:vx,vy:vy,life:0,max:.5+Math.random()*.3,r:r})}
function updateParts(dt){for(var i=particles.length-1;i>=0;i--){var p=particles[i];p.life+=dt;if(p.life>=p.max){if(p.el.parentNode)p.el.parentNode.removeChild(p.el);particles.splice(i,1);continue}p.x+=p.vx;p.y+=p.vy;p.vy+=4*dt;var a=1-p.life/p.max;p.el.style.left=p.x+'px';p.el.style.top=p.y+'px';p.el.style.opacity=a;p.el.style.transform='scale('+(1-p.life/p.max*.4)+')'}}
function flash(){var f=document.getElementById('flash');f.classList.add('on');setTimeout(function(){f.classList.remove('on')},80)}

/* ========== CLICK ========== */
function doClick(){
  var isCrit=Math.random()<.06;var amt=eClick();if(isCrit)amt*=7;G.cash+=amt;G.lifetime+=amt;G.session+=amt;G.totalClicks++;
  var now=performance.now();if(now-G.lastClick<500)G.combo=Math.min(G.combo+1,30);else G.combo=1;G.lastClick=now;
  var fx2=standCX,fy2=standBY-40;fText(fx2+(Math.random()-0.5)*60,fy2,'+$'+fmt(amt),isCrit?22:14,isCrit?'#FF6D00':'#69F0AE');
  if(isCrit){fText(fx2+(Math.random()-0.5)*40,fy2-30,'MEGA!',16,'#FF6D00');flash()}
  var pCount=isCrit?12:5+Math.min(G.combo,8);for(var i=0;i<pCount;i++){var angle=Math.random()*6.28;var spd=isCrit?6:3+Math.random()*2;var col=isCrit?'#FF6D00':Math.random()>.5?'#FDD835':'#69F0AE';spawnPart(fx2,fy2,Math.cos(angle)*spd,Math.sin(angle)*spd-2,col,Math.random()*2+.8)}updateUI();
}

/* ========== COMPRAS (CORREGIDAS) ========== */
function buyUp(type,idx,lvlIdx){
  var list=type==='stand'?STAND_UPS:EQUIP_UPS;
  var u=list[idx];if(!u||lvlIdx!==u.lvl+1||lvlIdx>=u.levels.length)return;
  var cost=Number(u.levels[lvlIdx].cost)||0;
  
  // Mensaje de error si no tienes dinero
  if(Number(G.cash)<cost){
    showToast('Necesitas $'+fmt(cost)+' (te falta $'+fmt(cost-Number(G.cash))+')','red');
    return;
  }
  
  G.cash=Number(G.cash)-cost;u.lvl=lvlIdx;
  if(u.id==='juicer')G.clickBonus=u.levels[u.lvl].bonus;
  if(u.id==='register')G.clickMult=u.levels[u.lvl].clickMult;
  if(u.id==='lemons'){G.globalMult=1;for(var j=1;j<=u.lvl;j++)G.globalMult*=u.levels[j].mult;}
  var lore=u.lore?u.lore[u.lvl]:u.levels[u.lvl].n;
  showToast(u.name+': '+u.levels[u.lvl].n+' - "'+lore+'"','gold');
  updateUI();saveG();
}

function buyPaint(id){var p=PAINTS.find(function(x){return x.id===id});if(!p||p.owned)return;if(G.cash<p.cost){showToast('Necesitas $'+fmt(p.cost),'red');return;}G.cash-=p.cost;p.owned=true;activePaint=id;showToast('Pintura: '+p.name,'gold');updateUI();saveG()}
function setPaint(id){var p=PAINTS.find(function(x){return x.id===id});if(!p||!p.owned)return;activePaint=id;updateUI();saveG()}

function doRebirth(){
  var req=rebirthReq();if(G.lifetime<req){showToast('Necesitas $'+fmt(req)+' de ganancias totales','red');return;}
  G.rebirths++;G.rebirthMult=Math.pow(2,G.rebirths);G.cash=0;G.session=0;G.clickBase=1;G.clickBonus=0;G.clickMult=1;G.globalMult=1;G.combo=0;G.frenzyTime=0;G.frenzyMult=1;
  for(var i=0;i<STAND_UPS.length;i++)STAND_UPS[i].lvl=0;for(var i=0;i<EQUIP_UPS.length;i++)EQUIP_UPS[i].lvl=0;
  activePaint='wood';for(var i=0;i<PAINTS.length;i++){if(PAINTS[i].cost>0)PAINTS[i].owned=false;}
  customers=[];flash();showToast('REBIRTH! x'+G.rebirthMult+' Multiplier','cyan');updateUI();saveG();
}
function resetSave(){localStorage.removeItem('lemStand22');if(fbAvail&&db2&&currentUser){db2.collection('players').doc(currentUser.uid).delete().catch(function(){});}location.reload();}

/* ========== UI ========== */
var lbPopup=document.getElementById('lbPopup'),lbHeader=document.getElementById('lbHeader'),lbResize=document.getElementById('lbResize');
var isDragging=false,isResizing=false,startX,startY,startLeft,startTop,startW,startH;
lbHeader.addEventListener('mousedown',function(e){isDragging=true;startX=e.clientX;startY=e.clientY;startLeft=lbPopup.offsetLeft;startTop=lbPopup.offsetTop;lbPopup.style.transition='none';});
lbResize.addEventListener('mousedown',function(e){isResizing=true;startX=e.clientX;startY=e.clientY;startW=lbPopup.offsetWidth;startH=lbPopup.offsetHeight;lbPopup.style.transition='none';e.stopPropagation();});
document.addEventListener('mousemove',function(e){if(isDragging){lbPopup.style.left=(startLeft+e.clientX-startX)+'px';lbPopup.style.top=(startTop+e.clientY-startY)+'px';}if(isResizing){lbPopup.style.width=Math.max(160,startW+e.clientX-startX)+'px';lbPopup.style.height=Math.max(120,startH+e.clientY-startY)+'px';}});
document.addEventListener('mouseup',function(){isDragging=false;isResizing=false;lbPopup.style.transition='';});

var nameEditor=document.getElementById('nameEditor'),nameInput=document.getElementById('nameInput');
function showNameEditor(){nameEditor.style.display='block';nameInput.value=G.standName;nameInput.focus();nameInput.select();}
nameInput.addEventListener('keydown',function(e){if(e.key==='Enter'){G.standName=censorName(nameInput.value.toUpperCase())||'LIMONADA';nameEditor.style.display='none';saveG();updateUI();}else if(e.key==='Escape'){nameEditor.style.display='none';}e.stopPropagation();});
nameInput.addEventListener('blur',function(){G.standName=censorName(nameInput.value.toUpperCase())||'LIMONADA';nameEditor.style.display='none';saveG();updateUI();});

// Clic mejorado: Ahora todo el canvas es clickeable para ganar dinero
cv.addEventListener('click',function(e){
  var wasOpen=nameEditor.style.display==='block';if(wasOpen){nameInput.blur();return;}
  var rect=cv.getBoundingClientRect();var mx=e.clientX-rect.left,my=e.clientY-rect.top;
  // Solo el letrero abre el editor de nombre
  if(mx>currentSignRect.x&&mx<currentSignRect.x+currentSignRect.w&&my>currentSignRect.y&&my<currentSignRect.y+currentSignRect.h){showNameEditor();return;}
  // Cualquier otra parte del canvas da dinero
  doClick();
});
cv.addEventListener('touchstart',function(e){
  e.preventDefault();var wasOpen=nameEditor.style.display==='block';if(wasOpen){nameInput.blur();return;}
  var t=e.changedTouches[0];var rect=cv.getBoundingClientRect();var mx=t.clientX-rect.left,my=t.clientY-rect.top;
  if(mx>currentSignRect.x&&mx<currentSignRect.x+currentSignRect.w&&my>currentSignRect.y&&my<currentSignRect.y+currentSignRect.h){showNameEditor();return}
  doClick();
},{passive:false});
document.addEventListener('keydown',function(e){if(e.code==='Space'&&e.target===document.body){e.preventDefault();doClick()}});

var tabs=document.querySelectorAll('.tab');for(var i=0;i<tabs.length;i++){tabs[i].addEventListener('click',function(){for(var j=0;j<tabs.length;j++){tabs[j].classList.remove('active');document.getElementById('tab-'+tabs[j].dataset.tab).classList.remove('active')}this.classList.add('active');document.getElementById('tab-'+this.dataset.tab).classList.add('active')})}
var shopPanel=document.getElementById('shopPanel'),shopToggle=document.getElementById('shopToggle'),togI=document.getElementById('togI'),shopOpen=true;
shopToggle.addEventListener('click',function(){shopOpen=!shopOpen;shopPanel.classList.toggle('closed',!shopOpen);shopToggle.classList.toggle('shifted',!shopOpen);togI.className=shopOpen?'fas fa-chevron-right':'fas fa-chevron-left'});

/* ========== GAME TICK ========== */
var autoAcc=0;
function gameTick(dt){
  G.timePlayed+=dt;var bps=eBPS();
  if(bps>0){autoAcc+=bps*dt;if(autoAcc>=1){var g=Math.floor(autoAcc);autoAcc-=g;G.cash+=g;G.lifetime+=g;G.session+=g}}
  if(performance.now()-G.lastClick>800&&G.combo>0)G.combo=Math.max(0,G.combo-1);
  if(G.frenzyTime>0){G.frenzyTime-=dt;if(G.frenzyTime<=0){G.frenzyTime=0;G.frenzyMult=1}}
  if(G.frenzyTime<=0&&G.lifetime>10000&&Math.random()<dt*.0005){G.frenzyMult=5;G.frenzyTime=10;showToast('FIEBRE CITRICA x5!','gold')}
  updateUI();lbFetchTimer+=dt;if(lbFetchTimer>12){lbFetchTimer=0;fetchLB();}
}

function updateUI(){document.getElementById('dCash').textContent='$'+fmt(G.cash);document.getElementById('dPC').textContent='$'+fmt(eClick());document.getElementById('dPS').textContent='$'+fmt(eBPS())+'/s';document.getElementById('dReb').textContent=G.rebirths;var cw=document.getElementById('comboWrap');if(G.combo>1){cw.classList.add('on');document.getElementById('comboTxt').textContent='COMBO x'+G.combo}else cw.classList.remove('on');renderShop();renderLBCache();}

function renderShop(){
  var availableUpgrades=[];for(var i=0;i<STAND_UPS.length;i++){var u=STAND_UPS[i];if(u.lvl<u.levels.length-1)availableUpgrades.push({type:'stand',idx:i,cost:u.levels[u.lvl+1].cost,data:u})}
  for(var i=0;i<EQUIP_UPS.length;i++){var u=EQUIP_UPS[i];if(u.lvl<u.levels.length-1)availableUpgrades.push({type:'equip',idx:i,cost:u.levels[u.lvl+1].cost,data:u})}
  availableUpgrades.sort(function(a,b){return a.cost-b.cost});
  var con1=document.getElementById('tab-upgrades');var h1='';
  for(var i=0;i<availableUpgrades.length;i++){var up=availableUpgrades[i];var u=up.data;var li=u.lvl+1;var cost=u.levels[li].cost;var can=G.cash>=cost;
  var bonusTxt='';if(up.type==='equip'){var eq=u;bonusTxt=eq.id==='juicer'?'+'+eq.levels[li].bonus+'/click':eq.id==='seller'?'+'+eq.levels[li].bps+'/s':eq.id==='truck'?'+'+eq.levels[li].bps+'/s':eq.id==='register'?'x'+eq.levels[li].clickMult+' Click':eq.id==='lemons'?'x'+eq.levels[li].mult+' Valor':'';}else{bonusTxt=u.levels[li].n;}
  h1+='<div class="uc"><div class="uc-t"><div class="uc-i" style="background:'+u.bg+';color:'+u.ic+'"><i class="fas '+u.icon+'"></i></div><div><div class="uc-n">'+u.name+'</div><div class="uc-d">'+u.desc+'</div></div></div>';if(u.lore&&u.lore[li]){h1+='<div class="lore-box">'+u.lore[li]+'</div>';}h1+='<div class="uc-b"><span class="uc-e">'+bonusTxt+'</span><button class="uc-buy'+(can?'':' no')+'" onclick="buyUp(\''+up.type+'\','+up.idx+','+li+')">$'+fmt(cost)+'</button></div></div>';}con1.innerHTML=h1;
  var con2=document.getElementById('tab-paint');var h2='<div style="font-size:.4rem;color:rgba(255,255,255,.3);margin-bottom:.3rem;font-family:Fredoka One,cursive">PINTURA DEL PUESTO</div><div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:.3rem">';
  for(var i=0;i<PAINTS.length;i++){var p=PAINTS[i];var bgC=p.color==='rainbow'?'linear-gradient(135deg,#f00,#ff0,#0f0,#0ff,#00f,#f0f)':p.color;var cls='color-btn'+(p.owned?' owned':'')+(p.id===activePaint?' active':'');if(p.owned){h2+='<div class="'+cls+'" style="background:'+bgC+'" onclick="setPaint(\''+p.id+'\')" title="'+p.name+'"></div>'}else{h2+='<div class="'+cls+'" style="background:'+bgC+';opacity:.4" onclick="buyPaint(\''+p.id+'\')" title="'+p.name+' - $'+fmt(p.cost)+'"></div>'}}h2+='</div>';con2.innerHTML=h2;
  var con3=document.getElementById('tab-prestige');var req=rebirthReq();var can=G.lifetime>=req;
  con3.innerHTML='<div class="pb"><h3><i class="fas fa-sync-alt"></i> REBIRTH</h3><div class="ps">Rebirths: <b class="hi">'+G.rebirths+'</b></div><div class="ps">Multiplier: <b class="hi">x'+G.rebirthMult+'</b></div><div class="ps" style="margin-top:.2rem">Lifetime: <b>$'+fmt(G.lifetime)+'</b></div><div class="ps">Req: <b>$'+fmt(req)+'</b></div><div class="ps">Next: <b class="hi">x'+Math.pow(2,G.rebirths+1)+'</b></div><button class="pbtn '+(can?'avail':'locked')+'" onclick="doRebirth()"><i class="fas fa-rocket"></i> REBIRTH</button><button class="pbtn danger" onclick="resetSave()" style="margin-top:10px;font-size:.35rem"><i class="fas fa-trash"></i> RESET SAVE</button><div style="font-size:.3rem;color:rgba(255,100,100,.4);margin-top:.1rem">Reset everything for a permanent Multiplier!</div></div>';
}

function showToast(t,type){var c=document.getElementById('toasts'),e=document.createElement('div');e.className='toast'+(type==='gold'?' gold':type==='cyan'?' cyan':type==='red'?' red':'');e.textContent=t;c.appendChild(e);setTimeout(function(){if(e.parentNode)e.parentNode.removeChild(e)},3200)}

/* ========== GUARDADO ========== */
function saveG(){try{localStorage.setItem('lemStand22',JSON.stringify({c:G.cash,lt:G.lifetime,ss:G.session,cb:G.clickBonus,cm:G.clickMult,gm:G.globalMult,rm:G.rebirthMult,rb:G.rebirths,tc:G.totalClicks,tp:G.timePlayed,sn:G.standName,sl:STAND_UPS.map(function(u){return u.lvl}),el:EQUIP_UPS.map(function(u){return u.lvl}),pt:activePaint,po:PAINTS.map(function(p){return p.owned})}));}catch(e){}if(currentUser&&fbAvail){saveToCloud();}}
function loadG(){try{var r=localStorage.getItem('lemStand22');if(!r)return;var d=JSON.parse(r);applySaveData(d);}catch(e){console.error("Save corrupted",e)}}

/* ========== INICIALIZACION Y LOOP ========== */
loadG();buildFakeLB();renderLBCache();
var lastTick=performance.now(),saveT=0;

// Mensaje inicial de ayuda
if(G.totalClicks===0&&G.cash===0){setTimeout(function(){showToast('Haz clic en la pantalla para ganar dinero!','cyan');},1500);}

function loop(now){
  var dt=Math.min((now-lastTick)/1000,.1);lastTick=now;cx.clearRect(0,0,cW,cH);
  drawScene(dt);drawStand();drawCustomers(dt);gameTick(dt);updateParts(dt);
  saveT+=dt;if(saveT>15){saveT=0;saveG()}requestAnimationFrame(loop);
}
updateUI();fetchLB();requestAnimationFrame(loop);
</script>
