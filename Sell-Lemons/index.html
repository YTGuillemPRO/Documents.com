<style>
:root{--accent:#FFD700;--cash:#4CAF50;--invest:#00BCD4;--danger:#FF5252;--lemon:#FDD835}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;overflow:hidden;height:100vh;width:100vw;user-select:none;background:#87CEEB}
canvas#bg{position:fixed;inset:0;z-index:0}

#stats{position:fixed;top:6px;left:50%;transform:translateX(-50%);z-index:40;display:flex;gap:.4rem;pointer-events:none;flex-wrap:wrap;justify-content:center}
.si{text-align:center;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);border-radius:8px;padding:.2rem .5rem;border:1px solid rgba(255,255,255,.1)}
.sl{font-size:.28rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.4)}
.sv{font-family:'Fredoka One',cursive;font-size:.65rem;color:#fff}
.sv.big{font-size:1rem;color:var(--accent);text-shadow:0 0 8px rgba(255,215,0,.3)}
.sv.cash{color:#69F0AE}.sv.inv{color:var(--invest)}

#comboWrap{position:fixed;left:50%;top:28%;transform:translateX(-50%);z-index:55;text-align:center;pointer-events:none;opacity:0;transition:opacity .3s}
#comboWrap.on{opacity:1}
#comboTxt{font-family:'Fredoka One',cursive;font-size:.9rem;color:#FF6D00;text-shadow:0 0 8px rgba(255,109,0,.4)}

#fx{position:fixed;inset:0;pointer-events:none;z-index:55;overflow:hidden}
.ftxt{position:absolute;font-family:'Fredoka One',cursive;pointer-events:none;animation:fUp 1s ease-out forwards;text-shadow:0 2px 6px rgba(0,0,0,.5)}
@keyframes fUp{0%{opacity:1;transform:translateY(0) scale(1.4)}100%{opacity:0;transform:translateY(-100px) scale(.5)}}
.particle{position:absolute;border-radius:50%;pointer-events:none}
#flash{position:fixed;inset:0;z-index:99;pointer-events:none;background:#fff;opacity:0;transition:opacity .15s}
#flash.on{opacity:.15;transition:opacity 0s}

/* ROBLOX LEADERBOARD */
#lbPopup{position:absolute;top:20px;left:20px;width:200px;min-width:160px;min-height:120px;background:rgba(20,20,30,.85);backdrop-filter:blur(4px);border:3px solid rgba(255,255,255,.2);border-radius:8px;z-index:60;display:flex;flex-direction:column;overflow:hidden}
#lbHeader{background:rgba(255,255,255,.1);color:#fff;font-family:'Fredoka One',cursive;font-size:.5rem;padding:5px 8px;cursor:grab;border-bottom:2px solid rgba(255,255,255,.1);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;text-transform:uppercase;letter-spacing:1px}

#lbContent{padding:6px;flex-grow:1;overflow-y:auto}
.lb-tab-btn{font-family:'Fredoka One',cursive;font-size:.32rem;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);padding:2px 6px;border-radius:3px;cursor:pointer;margin-bottom:6px}
.lb-tab-btn.active{color:var(--accent);border-color:var(--accent);background:rgba(255,215,0,.1)}
.lb-row{display:flex;justify-content:space-between;font-size:.36rem;color:rgba(255,255,255,.7);margin-bottom:3px;border-bottom:1px solid rgba(255,255,255,.05);padding:2px 0}
.lb-row.me{color:var(--accent);font-weight:900;text-shadow:0 0 5px rgba(255,215,0,.4)}
.lb-rank{width:18px;color:rgba(255,255,255,.3);font-weight:bold}
#lbResize{position:absolute;bottom:0;right:0;width:12px;height:12px;cursor:nwse-resize;background:linear-gradient(135deg, transparent 50%, rgba(255,255,255,.3) 50%)}

#shopToggle{position:fixed;top:50%;right:290px;transform:translateY(-50%);z-index:45;width:22px;height:50px;background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.1);border-right:none;border-radius:5px 0 0 5px;color:var(--accent);font-size:.6rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .4s}
#shopToggle.shifted{right:0}

#shopPanel{position:fixed;top:0;right:0;width:290px;height:100vh;z-index:42;background:rgba(10,10,20,.94);backdrop-filter:blur(12px);border-left:1px solid rgba(255,255,255,.06);overflow-y:auto;transform:translateX(0);transition:transform .4s;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent}
#shopPanel.closed{transform:translateX(100%)}

.tabs{display:flex;position:sticky;top:0;z-index:2;background:rgba(10,10,20,.98);border-bottom:1px solid rgba(255,255,255,.05)}
.tab{flex:1;padding:.3rem .05rem;text-align:center;font-family:'Fredoka One',cursive;font-size:.34rem;color:rgba(255,255,255,.25);cursor:pointer;transition:all .2s;border-bottom:2px solid transparent;text-transform:uppercase}
.tab:hover{color:rgba(255,255,255,.5)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tc{display:none;padding:.4rem}.tc.active{display:block}

.uc{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:.4rem;margin-bottom:.25rem;transition:all .2s}
.uc:hover{border-color:rgba(255,215,0,.18);background:rgba(255,255,255,.06)}
.uc-t{display:flex;align-items:center;gap:.3rem;margin-bottom:.1rem}
.uc-i{width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:.55rem;flex-shrink:0}
.uc-n{font-family:'Fredoka One',cursive;font-size:.42rem;color:#eee}
.uc-d{font-size:.32rem;color:rgba(255,255,255,.25);line-height:1.2}
.uc-b{display:flex;align-items:center;justify-content:space-between;margin-top:.15rem}
.uc-e{font-family:'Fredoka One',cursive;font-size:.36rem;color:var(--cash)}
.uc-buy{font-family:'Fredoka One',cursive;font-size:.42rem;color:#fff;background:var(--cash);padding:.1rem .4rem;border-radius:4px;cursor:pointer;transition:all .15s;border:none}
.uc-buy:hover{background:#1B5E20;transform:scale(1.05)}
.uc-buy.no{background:rgba(255,255,255,.1);cursor:not-allowed;color:rgba(255,255,255,.15)}

.pb{background:rgba(0,188,212,.04);border:1px solid rgba(0,188,212,.12);border-radius:8px;padding:.4rem;text-align:center;margin-top:.2rem}
.ps{font-size:.38rem;color:rgba(255,255,255,.3);margin:.04rem 0}.ps b{color:#ddd;font-family:'Fredoka One',cursive}.ps .hi{color:var(--invest);font-family:'Fredoka One',cursive}
.pbtn{width:100%;padding:.3rem;border:2px solid;border-radius:6px;font-family:'Fredoka One',cursive;font-size:.46rem;cursor:pointer;transition:all .3s;margin-top:.2rem;background:transparent;text-transform:uppercase}
.pbtn.avail{border-color:var(--invest);color:var(--invest);background:rgba(0,188,212,.06);animation:pp 2s infinite}
.pbtn.locked{border-color:rgba(255,255,255,.1);color:rgba(255,255,255,.1);cursor:not-allowed}
@keyframes pp{0%,100%{box-shadow:0 0 3px rgba(0,188,212,.08)}50%{box-shadow:0 0 10px rgba(0,188,212,.15)}}

.color-btn{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid rgba(255,255,255,.1);transition:all .2s;display:inline-block;margin:2px}
.color-btn:hover{transform:scale(1.15);border-color:rgba(255,255,255,.4)}
.color-btn.owned{border-color:var(--accent)}
.color-btn.active{border-color:#fff;box-shadow:0 0 8px rgba(255,255,255,.3)}

.lore-box{background:rgba(0,0,0,.2);border-left:3px solid var(--accent);padding:.15rem;margin:.05rem 0;font-size:.3rem;color:rgba(255,255,255,.4);font-style:italic}

#toasts{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:70;display:flex;flex-direction:column-reverse;gap:.2rem;align-items:center;pointer-events:none}
.toast{background:rgba(10,10,25,.9);backdrop-filter:blur(6px);border:1px solid var(--cash);border-radius:5px;padding:.3rem .6rem;font-family:'Fredoka One',cursive;font-size:.45rem;color:#69F0AE;white-space:nowrap;animation:tI .3s ease-out,tO .3s 2.7s ease-in forwards;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.toast.gold{border-color:var(--accent);color:var(--accent)}.toast.cyan{border-color:var(--invest);color:var(--invest)}
@keyframes tI{from{opacity:0;transform:translateY(8px) scale(.9)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes tO{from{opacity:1}to{opacity:0;transform:translateY(-4px)}}

@media(max-width:768px){#shopPanel{width:240px}#shopToggle{right:240px}}
@media(max-width:480px){#shopPanel{width:100vw}#shopToggle{display:none}}
</style>
</head>

<script>
function lighter(hex,amt){if(!hex||hex[0]!=='#')return hex;var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);return'#'+r.toString(16).padStart(2,'0')+g.toString(16).padStart(2,'0')+b.toString(16).padStart(2,'0')}
function darker(hex,amt){return lighter(hex,-amt)}

// DATA: Unified structure for easier sorting
var STAND_UPS=[
  {id:'counter',name:'Mostrador',desc:'El corazon del puesto',icon:'fa-table',bg:'rgba(139,69,19,.15)',ic:'#8D6E63',

   lore:['Un humilde comienzo.','La madera cede.','Los azulejos reflejan ascenso.','Frio al tacto.','Oro codiciado.','Eterno.']},
  {id:'roof',name:'Techo',desc:'Proteccion y estilo',icon:'fa-umbrella',bg:'rgba(255,112,67,.15)',ic:'#FF7043',
   levels:[{n:'Sin Techo',cost:0},{n:'Lona',cost:250},{n:'Madera',cost:8000},{n:'Chapa',cost:300000},{n:'Cristal',cost:15000000},{n:'HoLOGRaMa',cost:1200000000}],lvl:0,
   lore:['A cielo abierto.','Protege del sol.','Estilo rustico.','Industrial.','Cupula elegante.','Tecnologia del futuro.']},
  {id:'sign',name:'Letrero',desc:'Atrae mas clientes',icon:'fa-sign-hanging',bg:'rgba(255,215,0,.15)',ic:'#FFD700',
   levels:[{n:'Carton',cost:0},{n:'Pintado',cost:500},{n:'Madera',cost:15000},{n:'Neon',cost:600000},{n:'LED',cost:50000000},{n:'Holograma',cost:5000000000}],lvl:0,
   lore:['Manual.','Arte callejero.','Tallado a mano.','Luz en la noche.','Pantalla HD.','Flota en el aire.']},
  {id:'size',name:'Tamano',desc:'Mas espacio',icon:'fa-expand',bg:'rgba(76,175,80,.15)',ic:'#4CAF50',
   levels:[{n:'Carrito',cost:0},{n:'Puesto',cost:1000},{n:'Stand',cost:40000},{n:'Tienda',cost:1500000},{n:'Local',cost:100000000},{n:'Centro',cost:10000000000}],lvl:0,
   lore:['Ruedas al viento.','Pequeño pero mio.','En crecimiento.','Paredes solidas.','Granfranquicia.','Un monopolio.']},
  {id:'umbrella',name:'Sombrillas',desc:'Estilo y confort',icon:'fa-chair-umbrella',bg:'rgba(233,30,99,.15)',ic:'#E91E63',
   levels:[{n:'Nada',cost:0},{n:'Plastico',cost:800},{n:'Tela',cost:20000},{n:'Premium',cost:800000},{n:'VIP',cost:40000000},{n:'Oasis',cost:3000000000}],lvl:0,
   lore:['Sol directo.','Colores vivos.','Sombra fresca.','Lujo estival.','Exclusividad.','Un paraiso citrico.']},
];

var EQUIP_UPS=[
  {id:'juicer',name:'Exprimidor',desc:'Jugo por click',icon:'fa-blender',bg:'rgba(255,152,0,.15)',ic:'#FF9800',
   levels:[{n:'Mano',cost:0,bonus:1},{n:'Manual',cost:200,bonus:5},{n:'Electrico',cost:5000,bonus:25},{n:'Industrial',cost:200000,bonus:200},{n:'Turbina',cost:10000000,bonus:1500},{n:'Cuantico',cost:1500000000,bonus:20000}],lvl:0},
  {id:'seller',name:'Vendedor',desc:'Venta auto /s',icon:'fa-person',bg:'rgba(33,150,243,.15)',ic:'#2196F3',
   levels:[{n:'Nadie',cost:0,bps:0},{n:'Ayudante',cost:500,bps:5},{n:'Dependiente',cost:12000,bps:50},{n:'Equipo',cost:400000,bps:400},{n:'Gerente',cost:20000000,bps:4000},{n:'Director',cost:3000000000,bps:60000}],lvl:0},
  {id:'lemons',name:'Limones',desc:'Mejor materia prima',icon:'fa-lemon',bg:'rgba(255,215,0,.15)',ic:'#FFD700',
   levels:[{n:'Normales',cost:0,mult:1},{n:'Organicos',cost:1500,mult:2},{n:'Premium',cost:100000,mult:4},{n:'Gourmet',cost:5000000,mult:8},{n:'Geneticos',cost:300000000,mult:20},{n:'Cosmicos',cost:50000000000,mult:50}],lvl:0},
  {id:'register',name:'Caja Registradora',desc:'Multiplicador de click',icon:'fa-cash-register',bg:'rgba(156,39,176,.15)',ic:'#9C27B0',
   levels:[{n:'Bolsillo',cost:0,clickMult:1},{n:'Caja Madera',cost:800,clickMult:2},{n:'Electrica',cost:25000,clickMult:5},{n:'Digital',cost:1000000,clickMult:15},{n:'Servidor',cost:50000000,clickMult:50},{n:'Blockchain',cost:8000000000,clickMult:200}],lvl:0},
  {id:'truck',name:'Camion de Reparto',desc:'Ventas pasivas masivas',icon:'fa-truck',bg:'rgba(0,150,136,.15)',ic:'#009688',
   levels:[{n:'Nada',cost:0,bps:0},{n:'Moto',cost:1500,bps:15},{n:'Furgoneta',cost:40000,bps:150},{n:'Camion',cost:1500000,bps:1500},{n:'Flota',cost:80000000,bps:15000},{n:'Logistica',cost:10000000000,bps:200000}],lvl:0},
];

var PAINTS=[
  {id:'wood',name:'Madera',color:'#8D6E63',cost:0,owned:true},{id:'red',name:'Rojo',color:'#D32F2F',cost:5000,owned:false},
  {id:'blue',name:'Azul',color:'#1565C0',cost:5000,owned:false},{id:'green',name:'Verde',color:'#2E7D32',cost:5000,owned:false},
  {id:'pink',name:'Rosa',color:'#E91E63',cost:15000,owned:false},{id:'purple',name:'Purpura',color:'#7B1FA2',cost:15000,owned:false},
  {id:'black',name:'Negro',color:'#212121',cost:100000,owned:false},{id:'gold',name:'Dorado',color:'#FFD700',cost:1000000,owned:false},
  {id:'rainbow',name:'ArcoIris',color:'rainbow',cost:10000000,owned:false},
];
var activePaint='wood';

var FAKE_LB = [
  {name:'xXProCitricoXx', cash:5e12, time:50000, reb:12},{name:'LimonBot_YT', cash:2e10, time:30000, reb:6},
  {name:'ZumoMaster99', cash:1e8, time:10000, reb:2},{name:'Vendedor777', cash:5e6, time:2000, reb:0},
  {name:'Novato123', cash:1e4, time:500, reb:0},{name:'MentaFresca', cash:500, time:100, reb:0}
];
var lbTab = 'cash';

var G={cash:0,lifetime:0,session:0,clickBase:1,clickBonus:0,clickMult:1,globalMult:1,rebirthMult:1,rebirths:0,totalClicks:0,combo:0,lastClick:0,frenzyTime:0,frenzyMult:1,customerTimer:0,timePlayed:0};

function eClick(){var cb=1+Math.min(G.combo,30)*.06;return Math.floor((G.clickBase+G.clickBonus)*G.clickMult*G.globalMult*G.rebirthMult*G.frenzyMult*cb)}
function eBPS(){var bps=0;var s=EQUIP_UPS[1];var t=EQUIP_UPS[4];if(s.lvl>0)bps+=s.levels[s.lvl].bps;if(t.lvl>0)bps+=t.levels[t.lvl].bps;return Math.floor(bps*G.globalMult*G.rebirthMult*G.frenzyMult)}
function rebirthReq(){return Math.pow(10, 7+G.rebirths*1.5)}
function fmt(n){if(n==null||isNaN(n))return'0';if(n<0)return'-'+fmt(-n);if(n<1000)return Math.floor(n).toString();var sx=['','K','M','B','T','Qa','Qi','Sx','Sp','Oc','No','Dc','UDc','DDc','TDc'];var tier=Math.min(Math.floor(Math.log10(Math.abs(n))/3),sx.length-1);if(tier<=0)return Math.floor(n).toLocaleString();var sc=Math.pow(10,tier*3),v=n/sc;return(v<10?v.toFixed(2):v<100?v.toFixed(1):v.toFixed(0))+sx[tier]}
function fmtTime(s){var h=Math.floor(s/3600);var m=Math.floor((s%3600)/60);if(h>0)return h+'h '+m+'m';return m+'m '+Math.floor(s%60)+'s'}

var cv=document.getElementById('bg'),cx=cv.getContext('2d'),cW,cH,groundY,standCX,standBY;
var customers=[],bgT=0,dialogues=["Que acido...", "Mi abuela lo hace mejor", "Sabor a victoria", "El universo es un limon", "Poder cosmico", "Solo queria agua"];
function resizeBg(){cW=innerWidth;cH=innerHeight;cv.width=cW;cv.height=cH;groundY=cH*.72;standCX=cW*.4;standBY=groundY}
resizeBg();addEventListener('resize',resizeBg);

function getPaintColor(){var p=PAINTS.find(function(x){return x.id===activePaint});if(!p)return'#8D6E63';if(p.color==='rainbow'){return'hsl('+Math.floor(bgT*60)%360+',70%,50%)'}return p.color}

function drawScene(dt){
  bgT+=dt;
  // Sky Gradient
  var sg=cx.createLinearGradient(0,0,0,groundY);sg.addColorStop(0,'#4FC3F7');sg.addColorStop(1,'#B3E5FC');cx.fillStyle=sg;cx.fillRect(0,0,cW,groundY);
  // Sun
  cx.fillStyle='#FFF9C4';cx.globalAlpha=.9;cx.beginPath();cx.arc(cW-90,70,35,0,6.28);cx.fill();cx.globalAlpha=.2;cx.beginPath();cx.arc(cW-90,70,55,0,6.28);cx.fill();cx.globalAlpha=1;
  // Mountains
  cx.fillStyle='#81C784';cx.beginPath();cx.moveTo(0,groundY);for(var x=0;x<=cW;x+=20)cx.lineTo(x,groundY-40-Math.sin(x*.003+1)*50-Math.cos(x*.006)*20);cx.lineTo(cW,groundY);cx.fill();
  cx.fillStyle='#66BB6A';cx.beginPath();cx.moveTo(0,groundY);for(var x=0;x<=cW;x+=20)cx.lineTo(x,groundY-15-Math.sin(x*.005+3)*25);cx.lineTo(cW,groundY);cx.fill();
  // Clouds
  cx.fillStyle='rgba(255,255,255,.6)';for(var i=0;i<4;i++){var cx2=((cW*(.1+i*.25)+bgT*8+i*150)%(cW+200))-100,cy2=30+i*18;cx.beginPath();cx.ellipse(cx2,cy2,50,18,0,0,6.28);cx.fill();cx.beginPath();cx.ellipse(cx2-25,cy2+5,30,12,0,0,6.28);cx.fill();cx.beginPath();cx.ellipse(cx2+20,cy2+5,35,14,0,0,6.28);cx.fill();}
  // Ground
  var gg=cx.createLinearGradient(0,groundY,0,cH);gg.addColorStop(0,'#4CAF50');gg.addColorStop(1,'#2E7D32');cx.fillStyle=gg;cx.fillRect(0,groundY,cW,cH-groundY);
  cx.fillStyle='#8D6E63';cx.fillRect(standCX-40,groundY,80,cH-groundY);cx.fillStyle='#A1887F';cx.fillRect(standCX-35,groundY,70,cH-groundY);
}

function drawStand(){
  var sLvl=STAND_UPS[3].lvl,cLvl=STAND_UPS[0].lvl,rLvl=STAND_UPS[1].lvl,sLvl2=STAND_UPS[2].lvl,uLvl=STAND_UPS[4].lvl;
  var paint=getPaintColor(),paintD=darker(paint,30),paintL=lighter(paint,20);
  var baseW=70+sLvl*30,baseH=45+sLvl*10;var bx=standCX-baseW/2,by=standBY-baseH;
  
  // Shadow
  cx.fillStyle='rgba(0,0,0,.15)';cx.beginPath();cx.ellipse(standCX,standBY+5,baseW*.8,10,0,0,6.28);cx.fill();
