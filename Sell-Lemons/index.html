<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lemon Stand Tycoon</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--accent:#FFD700;--cash:#4CAF50;--invest:#00BCD4;--danger:#FF5252;--lemon:#FDD835}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;overflow:hidden;height:100vh;width:100vw;user-select:none;background:#87CEEB}
canvas#bg{position:fixed;inset:0;z-index:0}

#stats{position:fixed;top:6px;left:50%;transform:translateX(-50%);z-index:40;display:flex;gap:.5rem;pointer-events:none}
.si{text-align:center;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);border-radius:8px;padding:.2rem .55rem;border:1px solid rgba(255,255,255,.08)}
.sl{font-size:.32rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.3)}
.sv{font-family:'Fredoka One',cursive;font-size:.7rem;color:#fff}
.sv.big{font-size:1.15rem;color:var(--accent);text-shadow:0 0 8px rgba(255,215,0,.3)}
.sv.cash{color:#69F0AE}.sv.inv{color:var(--invest)}

#progressWrap{position:fixed;top:0;left:0;right:0;z-index:50;height:3px;background:rgba(0,0,0,.15)}
#progressFill{height:100%;background:linear-gradient(90deg,var(--lemon),var(--accent));width:0%;transition:width .5s}

#fx{position:fixed;inset:0;pointer-events:none;z-index:55;overflow:hidden}
.ftxt{position:absolute;font-family:'Fredoka One',cursive;pointer-events:none;animation:fUp 1s ease-out forwards;text-shadow:0 2px 6px rgba(0,0,0,.5)}
@keyframes fUp{0%{opacity:1;transform:translateY(0) scale(1.4)}100%{opacity:0;transform:translateY(-100px) scale(.5)}}
.particle{position:absolute;border-radius:50%;pointer-events:none}
#flash{position:fixed;inset:0;z-index:99;pointer-events:none;background:#fff;opacity:0;transition:opacity .15s}
#flash.on{opacity:.15;transition:opacity 0s}

#comboWrap{position:fixed;left:50%;top:28%;transform:translateX(-50%);z-index:55;text-align:center;pointer-events:none;opacity:0;transition:opacity .3s}
#comboWrap.on{opacity:1}
#comboTxt{font-family:'Fredoka One',cursive;font-size:.95rem;color:#FF6D00;text-shadow:0 0 8px rgba(255,109,0,.4)}

#shopToggle{position:fixed;top:50%;right:290px;transform:translateY(-50%);z-index:45;width:22px;height:50px;background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.1);border-right:none;border-radius:5px 0 0 5px;color:var(--accent);font-size:.6rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .4s}
#shopToggle:hover{width:28px}
#shopToggle.shifted{right:0}

#shopPanel{position:fixed;top:0;right:0;width:290px;height:100vh;z-index:42;background:rgba(10,10,20,.94);backdrop-filter:blur(12px);border-left:1px solid rgba(255,255,255,.06);overflow-y:auto;transform:translateX(0);transition:transform .4s;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent}
#shopPanel.closed{transform:translateX(100%)}
#shopPanel::-webkit-scrollbar{width:4px}
#shopPanel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}

.tabs{display:flex;position:sticky;top:0;z-index:2;background:rgba(10,10,20,.98);border-bottom:1px solid rgba(255,255,255,.05)}
.tab{flex:1;padding:.35rem .05rem;text-align:center;font-family:'Fredoka One',cursive;font-size:.36rem;letter-spacing:.02em;color:rgba(255,255,255,.25);cursor:pointer;transition:all .2s;border-bottom:2px solid transparent;text-transform:uppercase}
.tab:hover{color:rgba(255,255,255,.5)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tc{display:none;padding:.4rem}.tc.active{display:block}

.uc{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:7px;padding:.45rem;margin-bottom:.3rem;transition:all .2s}
.uc:hover{border-color:rgba(255,215,0,.18);background:rgba(255,255,255,.06)}
.uc.maxed{opacity:.3}
.uc.maxed::after{content:'MAX';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-10deg);font-family:'Fredoka One',cursive;font-size:.8rem;color:var(--cash);opacity:.4}
.uc-t{display:flex;align-items:center;gap:.35rem;margin-bottom:.12rem}
.uc-i{width:26px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:.6rem;flex-shrink:0}
.uc-n{font-family:'Fredoka One',cursive;font-size:.48rem;color:#eee}
.uc-d{font-size:.38rem;color:rgba(255,255,255,.25);line-height:1.2}
.uc-vis{font-size:.34rem;color:var(--accent);opacity:.5;margin-top:.05rem}
.uc-b{display:flex;align-items:center;justify-content:space-between;margin-top:.2rem}
.uc-e{font-family:'Fredoka One',cursive;font-size:.4rem;color:var(--cash)}
.uc-buy{font-family:'Fredoka One',cursive;font-size:.46rem;color:#fff;background:var(--cash);padding:.12rem .45rem;border-radius:4px;cursor:pointer;transition:all .15s;border:none}
.uc-buy:hover{background:#1B5E20;transform:scale(1.05)}
.uc-buy.no{background:rgba(255,255,255,.1);cursor:not-allowed;color:rgba(255,255,255,.15)}

.pb{background:rgba(0,188,212,.04);border:1px solid rgba(0,188,212,.12);border-radius:8px;padding:.45rem;text-align:center;margin-top:.25rem}
.pb h3{font-family:'Fredoka One',cursive;font-size:.55rem;color:var(--invest);margin-bottom:.15rem}
.ps{font-size:.4rem;color:rgba(255,255,255,.3);margin:.06rem 0}.ps b{color:#ddd;font-family:'Fredoka One',cursive}.ps .hi{color:var(--invest);font-family:'Fredoka One',cursive}
.pbtn{width:100%;padding:.35rem;border:2px solid;border-radius:6px;font-family:'Fredoka One',cursive;font-size:.48rem;cursor:pointer;transition:all .3s;margin-top:.25rem;background:transparent;text-transform:uppercase}
.pbtn.avail{border-color:var(--invest);color:var(--invest);background:rgba(0,188,212,.06);animation:pp 2s infinite}
.pbtn.avail:hover{background:rgba(0,188,212,.15)}
.pbtn.locked{border-color:rgba(255,255,255,.1);color:rgba(255,255,255,.1);cursor:not-allowed}
@keyframes pp{0%,100%{box-shadow:0 0 3px rgba(0,188,212,.08)}50%{box-shadow:0 0 10px rgba(0,188,212,.15)}}

.color-btn{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid rgba(255,255,255,.1);transition:all .2s;display:inline-block;margin:2px}
.color-btn:hover{transform:scale(1.15);border-color:rgba(255,255,255,.4)}
.color-btn.owned{border-color:var(--accent)}
.color-btn.active{border-color:#fff;box-shadow:0 0 8px rgba(255,255,255,.3)}

#toasts{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:70;display:flex;flex-direction:column-reverse;gap:.2rem;align-items:center;pointer-events:none}
.toast{background:rgba(10,10,25,.9);backdrop-filter:blur(6px);border:1px solid var(--cash);border-radius:5px;padding:.3rem .7rem;font-family:'Fredoka One',cursive;font-size:.5rem;color:#69F0AE;white-space:nowrap;animation:tI .3s ease-out,tO .3s 2.7s ease-in forwards;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.toast.gold{border-color:var(--accent);color:var(--accent)}
.toast.cyan{border-color:var(--invest);color:var(--invest)}
@keyframes tI{from{opacity:0;transform:translateY(8px) scale(.9)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes tO{from{opacity:1}to{opacity:0;transform:translateY(-4px)}}

@media(max-width:768px){#shopPanel{width:240px}#shopToggle{right:240px}.sv.big{font-size:.95rem}}
@media(max-width:480px){#shopPanel{width:100vw}#shopToggle{display:none}}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div id="flash"></div>
<div id="progressWrap"><div id="progressFill"></div></div>
<header id="stats">
  <div class="si"><div class="sl">Dinero</div><div class="sv big" id="dCash">$0</div></div>
  <div class="si"><div class="sl">Por Click</div><div class="sv" id="dPC">$1</div></div>
  <div class="si"><div class="sl">Por Segundo</div><div class="sv cash" id="dPS">$0</div></div>
  <div class="si"><div class="sl">Inversores</div><div class="sv inv" id="dInv">0</div></div>
</header>
<div id="comboWrap"><div id="comboTxt">COMBO x2</div></div>
<div id="fx"></div>
<button id="shopToggle" aria-label="Tienda"><i class="fas fa-chevron-right" id="togI"></i></button>
<aside id="shopPanel" role="complementary" aria-label="Tienda">
  <div class="tabs">
    <div class="tab active" data-tab="stand">Puesto</div>
    <div class="tab" data-tab="equipo">Equipo</div>
    <div class="tab" data-tab="paint">Pintar</div>
    <div class="tab" data-tab="prestige">Prestige</div>
  </div>
  <div class="tc active" id="tab-stand"></div>
  <div class="tc" id="tab-equipo"></div>
  <div class="tc" id="tab-paint"></div>
  <div class="tc" id="tab-prestige"></div>
</aside>
<div id="toasts" aria-live="polite"></div>

<script>
/* ========== GAME DATA ========== */
var STAND_UPS=[
  {id:'counter',name:'Mostrador',desc:'El corazon de tu puesto',icon:'fa-table',bg:'rgba(139,69,19,.15)',ic:'#8D6E63',
   levels:[{n:'Cajon de Madera',cost:0},{n:'Madera Pulida',cost:80},{n:'Baldosas',cost:800},{n:'MaRMol',cost:8000},{n:'Oro',cost:80000},{n:'Diamante',cost:800000}],lvl:0,
   vis:['Cajon basico','Madera lisa','Baldosas coloridas','MaRMol elegante','Oro brillante','Diamante incrustado']},
  {id:'roof',name:'Techo',desc:'Proteccion y estilo',icon:'fa-umbrella',bg:'rgba(255,112,67,.15)',ic:'#FF7043',
   levels:[{n:'Sin Techo',cost:0},{n:'Lona',cost:60},{n:'Madera',cost:600},{n:'Chapa',cost:6000},{n:'Cristal',cost:60000},{n:'HoLOGRaMico',cost:600000}],lvl:0,
   vis:['A cielo abierto','Lona naranja','Techo de madera','Chapa metalica','Cupula de cristal','HoLOGRaMa futurista']},
  {id:'sign',name:'Letrero',desc:'Atrae mas clientes',icon:'fa-sign-hanging',bg:'rgba(255,215,0,.15)',ic:'#FFD700',
   levels:[{n:'Cartel de Carton',cost:0},{n:'Pintado a Mano',cost:100},{n:'Letras de Madera',cost:1000},{n:'Neon',cost:10000},{n:'Pantalla LED',cost:100000},{n:'HoLOGRaMico 3D',cost:1000000}],lvl:0,
   vis:['Carton manuscrito','Pintura vibrante','Madera tallada','Neon brillante','Pantalla LED','HoLOGRaMa 3D']},
  {id:'size',name:'Tamano',desc:'Mas espacio, mas ventas',icon:'fa-expand',bg:'rgba(76,175,80,.15)',ic:'#4CAF50',
   levels:[{n:'Carrito',cost:0},{n:'Puesto PequeNo',cost:200},{n:'Stand Mediano',cost:2000},{n:'Tienda',cost:20000},{n:'Gran Tienda',cost:200000},{n:'Centro Citrico',cost:2000000}],lvl:0,
   vis:['Carrito con ruedas','Puesto de madera','Stand amplio','Tienda con paredes','Gran tienda','Centro comercial']},
];

var EQUIP_UPS=[
  {id:'juicer',name:'Exprimidor',desc:'Mas jugo por click',icon:'fa-blender',bg:'rgba(255,152,0,.15)',ic:'#FF9800',
   levels:[{n:'Mano',cost:0,bonus:1},{n:'Manual',cost:40,bonus:3},{n:'Electrico',cost:400,bonus:15},{n:'Industrial',cost:4000,bonus:80},{n:'Turbina',cost:40000,bonus:500},{n:'Cuantico',cost:400000,bonus:3000}],lvl:0},
  {id:'seller',name:'Vendedor',desc:'Venta automatica',icon:'fa-person',bg:'rgba(33,150,243,.15)',ic:'#2196F3',
   levels:[{n:'Nadie',cost:0,bps:0},{n:'Ayudante',cost:120,bps:2},{n:'Dependiente',cost:1200,bps:12},{n:'Equipo',cost:12000,bps:80},{n:'Gerente',cost:120000,bps:500},{n:'Director',cost:1200000,bps:3500}],lvl:0},
  {id:'lemons',name:'Limones',desc:'Mejor materia prima',icon:'fa-lemon',bg:'rgba(255,215,0,.15)',ic:'#FFD700',
   levels:[{n:'Normales',cost:0,mult:1},{n:'Organicos',cost:300,mult:2},{n:'Premium',cost:3000,mult:3},{n:'Gourmet',cost:30000,mult:5},{n:'Geneticos',cost:300000,mult:10},{n:'Cosmicos',cost:3000000,mult:25}],lvl:0},
];

var PAINTS=[
  {id:'wood',name:'Madera Natural',color:'#8D6E63',cost:0,owned:true},
  {id:'red',name:'Rojo Pasión',color:'#D32F2F',cost:500,owned:false},
  {id:'blue',name:'Azul OceAno',color:'#1565C0',cost:500,owned:false},
  {id:'green',name:'Verde Bosque',color:'#2E7D32',cost:500,owned:false},
  {id:'pink',name:'Rosa Pastel',color:'#E91E63',cost:800,owned:false},
  {id:'purple',name:'Purpura Real',color:'#7B1FA2',cost:800,owned:false},
  {id:'orange',name:'Naranja Citrico',color:'#E65100',cost:600,owned:false},
  {id:'teal',name:'Turquesa',color:'#00838F',cost:600,owned:false},
  {id:'black',name:'Negro Elegante',color:'#212121',cost:2000,owned:false},
  {id:'gold',name:'Dorado',color:'#FFD700',cost:10000,owned:false},
  {id:'rainbow',name:'ArcoIris',color:'rainbow',cost:50000,owned:false},
];
var activePaint='wood';

/* ========== STATE ========== */
var G={cash:0,lifetime:0,session:0,clickBase:1,clickBonus:0,globalMult:1,investMult:1,investors:0,totalClicks:0,combo:0,lastClick:0,frenzyTime:0,frenzyMult:1,customerTimer:0};

function eClick(){var cb=1+Math.min(G.combo,30)*.06;return Math.floor((G.clickBase+G.clickBonus)*G.globalMult*G.investMult*G.frenzyMult*cb)}
function eBPS(){var bps=0;var s=EQUIP_UPS[1];if(s.lvl>0)bps+=s.levels[s.lvl].bps;return Math.floor(bps*G.globalMult*G.investMult*G.frenzyMult)}
function investGain(){if(G.session<1e6)return 0;return Math.max(0,Math.max(0,Math.floor(3*Math.log10(G.session/1e6)))-G.investors)}
function fmt(n){if(n==null||isNaN(n))return'0';if(n<0)return'-'+fmt(-n);if(n<1000)return Math.floor(n).toString();var sx=['','K','M','B','T','Qa','Qi','Sx','Sp','Oc','No','Dc'];var tier=Math.min(Math.floor(Math.log10(Math.abs(n))/3),sx.length-1);if(tier<=0)return Math.floor(n).toLocaleString();var sc=Math.pow(10,tier*3),v=n/sc;return(v<10?v.toFixed(2):v<100?v.toFixed(1):v.toFixed(0))+sx[tier]}

/* ========== CANVAS ========== */
var cv=document.getElementById('bg'),cx=cv.getContext('2d'),cW,cH,groundY,standCX,standBY;
var customers=[];
var smokeP=[];
var bgT=0;

function resizeBg(){cW=innerWidth;cH=innerHeight;cv.width=cW;cv.height=cH;groundY=cH*.72;standCX=cW*.4;standBY=groundY}
resizeBg();addEventListener('resize',resizeBg);

function getPaintColor(){
  var p=PAINTS.find(function(x){return x.id===activePaint});
  if(!p)return'#8D6E63';
  if(p.color==='rainbow'){var h=Math.floor(bgT*60)%360;return'hsl('+h+',70%,50%)'}
  return p.color;
}
function lighter(hex,amt){if(!hex||hex[0]!=='#')return hex;var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);return'#'+r.toString(16).padStart(2,'0')+g.toString(16).padStart(2,'0')+b.toString(16).padStart(2,'0')}
function darker(hex,amt){return lighter(hex,-amt)}

function drawScene(dt){
  bgT+=dt;
  // Sky
  var sg=cx.createLinearGradient(0,0,0,groundY);sg.addColorStop(0,'#64B5F6');sg.addColorStop(1,'#B3E5FC');cx.fillStyle=sg;cx.fillRect(0,0,cW,groundY);
  // Sun
  cx.fillStyle='#FFF9C4';cx.globalAlpha=.8;cx.beginPath();cx.arc(cW-90,70,30,0,6.28);cx.fill();cx.globalAlpha=.15;cx.beginPath();cx.arc(cW-90,70,50,0,6.28);cx.fill();cx.globalAlpha=1;
  // Clouds
  cx.fillStyle='rgba(255,255,255,.5)';for(var i=0;i<3;i++){var cx2=((cW*(.1+i*.3)+bgT*6+i*180)%(cW+200))-100,cy2=40+i*22;cx.beginPath();cx.ellipse(cx2,cy2,45,16,0,0,6.28);cx.fill();cx.beginPath();cx.ellipse(cx2-20,cy2+5,30,12,0,0,6.28);cx.fill()}
  // Hills
  cx.fillStyle='#81C784';cx.beginPath();cx.moveTo(0,groundY);for(var x=0;x<=cW;x+=40)cx.lineTo(x,groundY-15-Math.sin(x*.004+1)*20);cx.lineTo(cW,groundY);cx.fill();
  cx.fillStyle='#66BB6A';cx.beginPath();cx.moveTo(0,groundY);for(var x=0;x<=cW;x+=40)cx.lineTo(x,groundY-8-Math.sin(x*.007+3)*12);cx.lineTo(cW,groundY);cx.fill();
  // Ground
  var gg=cx.createLinearGradient(0,groundY,0,cH);gg.addColorStop(0,'#4CAF50');gg.addColorStop(1,'#2E7D32');cx.fillStyle=gg;cx.fillRect(0,groundY,cW,cH-groundY);
  // Path to stand
  cx.fillStyle='#8D6E63';cx.fillRect(standCX-40,groundY,80,cH-groundY);cx.fillStyle='#A1887F';cx.fillRect(standCX-35,groundY,70,cH-groundY);
  // Grass tufts
  cx.strokeStyle='rgba(46,125,50,.3)';cx.lineWidth=1.5;for(var i=0;i<30;i++){var gx=i*(cW/30)+8;cx.beginPath();cx.moveTo(gx,groundY);cx.lineTo(gx-2,groundY-7);cx.stroke()}
}

function drawStand(){
  var sLvl=STAND_UPS[3].lvl; // size
  var cLvl=STAND_UPS[0].lvl; // counter
  var rLvl=STAND_UPS[1].lvl; // roof
  var sLvl2=STAND_UPS[2].lvl; // sign
  var paint=getPaintColor();
  var paintL=lighter(paint,25),paintD=darker(paint,30);

  var baseW=60+sLvl*25;
  var baseH=35+sLvl*8;
  var bx=standCX-baseW/2,by=standBY-baseH;

  // Shadow
  cx.fillStyle='rgba(0,0,0,.1)';cx.beginPath();cx.ellipse(standCX,standBY+3,baseW*.7,8,0,0,6.28);cx.fill();

  // WHEELS for size 0 (cart)
  if(sLvl===0){
    cx.fillStyle='#333';cx.beginPath();cx.arc(bx+12,standBY-2,7,0,6.28);cx.fill();cx.beginPath();cx.arc(bx+baseW-12,standBY-2,7,0,6.28);cx.fill();
    cx.fillStyle='#666';cx.beginPath();cx.arc(bx+12,standBY-2,3,0,6.28);cx.fill();cx.beginPath();cx.arc(bx+baseW-12,standBY-2,3,0,6.28);cx.fill();
  }

  // COUNTER/BODY
  var counterColors=['#8D6E63','#A1887F','#E0E0E0','#B0BEC5','#FFD700','#00BCD4'];
  var cc=counterColors[cLvl];
  cx.fillStyle=paint;cx.fillRect(bx,by,baseW,baseH);
  cx.fillStyle=paintD;cx.fillRect(bx,by,baseW,5);
  // Counter top
  cx.fillStyle=cc;cx.fillRect(bx-3,by-4,baseW+6,8);
  cx.fillStyle=lighter(cc,20);cx.fillRect(bx-3,by-4,baseW+6,3);
  // Legs
  cx.fillStyle=paintD;cx.fillRect(bx+4,by+baseH,5,4);cx.fillRect(bx+baseW-9,by+baseH,5,4);
  // Side panels for bigger stands
  if(sLvl>=3){cx.fillStyle=paintL;cx.fillRect(bx-8,by-4,8,baseH+8);cx.fillRect(bx+baseW,by-4,8,baseH+8)}
  if(sLvl>=4){cx.fillStyle=paintD;cx.fillRect(bx-12,by-8,baseW+24,4)}
  if(sLvl>=5){cx.fillStyle=lighter(paint,40);cx.fillRect(bx-16,by-12,baseW+32,6)}

  // LEMONS ON COUNTER
  cx.fillStyle='#FDD835';
  var lemonCount=Math.min(3+EQUIP_UPS[2].lvl*2,12);
  for(var i=0;i<lemonCount;i++){
    var lx=bx+8+i*((baseW-16)/Math.max(lemonCount-1,1));
    cx.beginPath();cx.ellipse(lx,by-8,5,4,.15,0,6.28);cx.fill();
  }

  // JUICER ON COUNTER
  var jLvl=EQUIP_UPS[0].lvl;
  if(jLvl>=1){
    var jx=bx+baseW-15,jy=by-14;
    cx.fillStyle=jLvl>=4?'#607D8B':jLvl>=3?'#FF9800':jLvl>=2?'#9E9E9E':'#795548';
    cx.fillRect(jx,jy,12,10);
    cx.fillStyle=lighter(cx.fillStyle.replace('#','#'),20);
    cx.beginPath();cx.arc(jx+6,jy-3,5,0,6.28);cx.fill();
    if(jLvl>=5){cx.strokeStyle='#00E5FF';cx.lineWidth=1;cx.beginPath();cx.arc(jx+6,jy-3,8,bgT*3,bgT*3+3);cx.stroke()}
    if(jLvl>=6){cx.fillStyle='rgba(160,90,255,.3)';cx.beginPath();cx.arc(jx+6,jy-3,12+Math.sin(bgT*4)*3,0,6.28);cx.fill()}
  }

  // SELLER PERSON
  var slLvl=EQUIP_UPS[1].lvl;
  if(slLvl>=1){
    var px=bx-18,py=by-4;
    // Body
    cx.fillStyle='#1565C0';cx.fillRect(px-4,py-25,8,18);
    // Head
    cx.fillStyle='#FFCCBC';cx.beginPath();cx.arc(px,py-30,6,0,6.28);cx.fill();
    // Hat
    cx.fillStyle=slLvl>=4?'#FFD700':slLvl>=3?'#333':'#F44336';

function drawCustomers(dt){
  G.customerTimer+=dt;
  var maxCust=1+EQUIP_UPS[1].lvl;
  if(G.customerTimer>3/maxCust&&customers.length<maxCust){
    G.customerTimer=0;
    customers.push({x:cW+20,y:standBY-8+Math.random()*6,speed:30+Math.random()*20,state:'walk',timer:0});
  }
  for(var i=customers.length-1;i>=0;i--){
    var c=customers[i];
    if(c.state==='walk'){c.x-=c.speed*dt;if(c.x<=standCX+50){c.state='buy';c.timer=0}}
    else if(c.state==='buy'){c.timer+=dt;if(c.timer>1.5){c.state='leave';var earn=eBPS()>0?Math.floor(eBPS()*1.5):Math.floor(eClick()*.3);if(earn<1)earn=1;G.cash+=earn;G.lifetime+=earn;G.session+=earn;fText(c.x,c.y-30,'+$'+fmt(earn),12,'#69F0AE')}}
    else if(c.state==='leave'){c.x+=c.speed*1.5*dt;if(c.x>cW+30){customers.splice(i,1);continue}}
    // Draw person
    var alpha=c.state==='buy'?.9:1;cx.globalAlpha=alpha;
    cx.fillStyle='#42A5F5';cx.fillRect(c.x-3,c.y-20,6,14);
    cx.fillStyle='#FFCCBC';cx.beginPath();cx.arc(c.x,c.y-24,4,0,6.28);cx.fill();
    if(c.state==='buy'){cx.fillStyle='#FDD835';cx.beginPath();cx.arc(c.x+3,c.y-14,2,0,6.28);cx.fill()}
    cx.globalAlpha=1;
  }
  // Smoke
  for(var i=smokeP.length-1;i>=0;i--){var s=smokeP[i];s.x+=s.vx;s.y+=s.vy;s.r+=.05;s.a-=.005;if(s.a<=0){smokeP.splice(i,1);continue}cx.globalAlpha=s.a;cx.fillStyle='#9E9E9E';cx.beginPath();cx.arc(s.x,s.y,s.r,0,6.28);cx.fill()}
  cx.globalAlpha=1;
}

var fxEl=document.getElementById('fx'),particles=[];
function fText(x,y,t,sz,col){var e=document.createElement('div');e.className='ftxt';e.textContent=t;e.style.left=x+'px';e.style.top=y+'px';e.style.fontSize=(sz||14)+'px';e.style.color=col||'#FDD835';fxEl.appendChild(e);setTimeout(function(){if(e.parentNode)e.parentNode.removeChild(e)},1050)}
function spawnPart(x,y,vx,vy,col,r){var e=document.createElement('div');e.className='particle';var sz=r*2;e.style.width=sz+'px';e.style.height=sz+'px';e.style.background=col||'#FDD835';e.style.left=x+'px';e.style.top=y+'px';fxEl.appendChild(e);particles.push({el:e,x:x,y:y,vx:vx,vy:vy,life:0,max:.5+Math.random()*.3,r:r})}
function updateParts(dt){for(var i=particles.length-1;i>=0;i--){var p=particles[i];p.life+=dt;if(p.life>=p.max){if(p.el.parentNode)p.el.parentNode.removeChild(p.el);particles.splice(i,1);continue}p.x+=p.vx;p.y+=p.vy;p.vy+=4*dt;var a=1-p.life/p.max;p.el.style.left=p.x+'px';p.el.style.top=p.y+'px';p.el.style.opacity=a;p.el.style.transform='scale('+(1-p.life/p.max*.4)+')'}}
function flash(){var f=document.getElementById('flash');f.classList.add('on');setTimeout(function(){f.classList.remove('on')},80)}

/* ========== ACTIONS ========== */
function doClick(evt){
  var isCrit=Math.random()<.06;var amt=eClick();if(isCrit)amt*=7;
  G.cash+=amt;G.lifetime+=amt;G.session+=amt;G.totalClicks++;
  var now=performance.now();if(now-G.lastClick<500)G.combo=Math.min(G.combo+1,30);else G.combo=1;G.lastClick=now;
  var fx2=standCX,fy2=standBY-40;
  fText(fx2+(Math.random()-0.5)*60,fy2,'+$'+fmt(amt),isCrit?22:14,isCrit?'#FF6D00':'#69F0AE');
  if(isCrit){fText(fx2+(Math.random()-0.5)*40,fy2-30,'MEGA!',16,'#FF6D00');flash()}
  var pCount=isCrit?12:5+Math.min(G.combo,8);
  for(var i=0;i<pCount;i++){var angle=Math.random()*6.28;var spd=isCrit?6:3+Math.random()*2;var col=isCrit?'#FF6D00':Math.random()>.5?'#FDD835':'#69F0AE';spawnPart(fx2,fy2,Math.cos(angle)*spd,Math.sin(angle)*spd-2,col,Math.random()*2+.8)}
  updateUI();
}

function buyStandUp(si,li){var u=STAND_UPS[si];if(li!==u.lvl+1||li>=u.levels.length)return;var cost=u.levels[li].cost;if(G.cash<cost)return;G.cash-=cost;u.lvl=li;showToast(u.name+': '+u.levels[li].n,'gold');updateUI();saveG()}
function buyEquipUp(ei,li){var u=EQUIP_UPS[ei];if(li!==u.lvl+1||li>=u.levels.length)return;var cost=u.levels[li].cost;if(G.cash<cost)return;G.cash-=cost;u.lvl=li;if(u.id==='juicer')G.clickBonus=u.levels[li].bonus;if(u.id==='lemons'){G.globalMult=1;for(var i=0;i<EQUIP_UPS.length;i++){if(EQUIP_UPS[i].id==='lemons'){for(var j=1;j<=EQUIP_UPS[i].lvl;j++)G.globalMult*=EQUIP_UPS[i].levels[j].mult}}}updateUI();saveG()}
function buyPaint(id){var p=PAINTS.find(function(x){return x.id===id});if(!p||p.owned)return;if(G.cash<p.cost)return;G.cash-=p.cost;p.owned=true;activePaint=id;showToast('Pintura: '+p.name,'gold');updateUI();saveG()}
function setPaint(id){var p=PAINTS.find(function(x){return x.id===id});if(!p||!p.owned)return;activePaint=id;updateUI();saveG()}
function doPrestige(){var gain=investGain();if(gain<=0)return;G.investors+=gain;G.investMult=Math.pow(1.5,G.investors);G.cash=0;G.session=0;G.clickBase=1;G.clickBonus=0;G.globalMult=1;G.combo=0;G.frenzyTime=0;G.frenzyMult=1;for(var i=0;i<STAND_UPS.length;i++)STAND_UPS[i].lvl=0;for(var i=0;i<EQUIP_UPS.length;i++)EQUIP_UPS[i].lvl=0;activePaint='wood';document.getElementById('frenzyOv').classList.remove('on');flash();showToast('INVERSORES! +'+gain+' (x'+G.investMult.toFixed(2)+')','cyan');updateUI();saveG()}

/* ========== GAME TICK ========== */
var autoAcc=0;
function gameTick(dt){
  var bps=eBPS();if(bps>0){autoAcc+=bps*dt;if(autoAcc>=1){var g=Math.floor(autoAcc);autoAcc-=g;G.cash+=g;G.lifetime+=g;G.session+=g}}
  if(performance.now()-G.lastClick>800&&G.combo>0)G.combo=Math.max(0,G.combo-1);
  if(G.frenzyTime>0){G.frenzyTime-=dt;if(G.frenzyTime<=0){G.frenzyTime=0;G.frenzyMult=1;document.getElementById('frenzyOv').classList.remove('on');document.getElementById('frenzyTxt').classList.remove('on')}}
  if(G.frenzyTime<=0&&G.lifetime>5000&&Math.random()<dt*.002){G.frenzyMult=5;G.frenzyTime=10;showToast('FIEBRE x5 por 10s!','gold')}
  updateUI();
}

}

document.addEventListener('keydown',function(e){if(e.code==='Space'&&e.target===document.body){e.preventDefault();doClick(e)}});
var tabs=document.querySelectorAll('.tab');for(var i=0;i<tabs.length;i++){tabs[i].addEventListener('click',function(){for(var j=0;j<tabs.length;j++){tabs[j].classList.remove('active');document.getElementById('tab-'+tabs[j].dataset.tab).classList.remove('active')}this.classList.add('active');document.getElementById('tab-'+this.dataset.tab).classList.add('active')})}
var shopPanel=document.getElementById('shopPanel'),shopToggle=document.getElementById('shopToggle'),togI=document.getElementById('togI'),shopOpen=true;
shopToggle.addEventListener('click',function(){shopOpen=!shopOpen;shopPanel.classList.toggle('closed',!shopOpen);shopToggle.classList.toggle('shifted',!shopOpen);togI.className=shopOpen?'fas fa-chevron-right':'fas fa-chevron-left'});

/* ========== LOOP ========== */
var lastTick=performance.now(),saveT=0;
function loop(now){
  var dt=Math.min((now-lastTick)/1000,.1);lastTick=now;
  cx.clearRect(0,0,cW,cH);
  drawScene(dt);drawStand();drawCustomers(dt);
  gameTick(dt);updateParts(dt);checkAch();
  saveT+=dt;if(saveT>15){saveT=0;saveG()}
  requestAnimationFrame(loop);
}
loadG();updateUI();requestAnimationFrame(loop);
</script>
</body>
</html>
