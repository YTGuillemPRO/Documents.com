<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discord</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--bg-tertiary:#1e1f22;--bg-secondary:#2b2d31;--bg-primary:#313338;
--bg-modifier-hover:#35373c;--bg-modifier-active:#3f4147;--bg-modifier-selected:#404249;
--bg-floating:#2b2d31;--input-bg:#383a40;
--text-normal:#dbdee1;--text-muted:#949ba4;--text-link:#00a8fc;
--brand:#5865f2;--brand-hover:#4752c4;--green:#23a559;--yellow:#f0b232;--red:#f23f43;
--header-primary:#f2f3f5;--header-secondary:#b5bac1;--channel-icon:#80848e;
--scrollbar-thin-thumb:#1a1b1e;--scrollbar-thin-track:#2b2d31;--divider:#3f4147;
--status-online:#23a559;--status-idle:#f0b232;--status-dnd:#f23f43;--status-offline:#80848e;
--font:'Noto Sans',sans-serif;
}
html,body{height:100%;overflow:hidden;font-family:var(--font);background:var(--bg-tertiary);color:var(--text-normal);font-size:14px}
button{font-family:var(--font);border:none;background:none;color:var(--text-normal);cursor:pointer;outline:none}
input,textarea{font-family:var(--font);border:none;outline:none;background:none;color:var(--text-normal)}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:var(--scrollbar-thin-track);border-radius:4px}
::-webkit-scrollbar-thumb{background:var(--scrollbar-thin-thumb);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#111214}
.app{display:flex;height:100vh;width:100vw}
.server-bar{width:72px;min-width:72px;background:var(--bg-tertiary);display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:8px;overflow-y:auto;overflow-x:hidden;z-index:5}
.server-bar::-webkit-scrollbar{width:4px}
.server-icon{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-radius .2s,background .2s;position:relative;font-size:18px;font-weight:600;color:#fff;flex-shrink:0}
.server-icon:hover,.server-icon.active{border-radius:16px}
.server-icon.home{background:var(--bg-primary);color:var(--text-normal)}
.server-icon.home:hover,.server-icon.home.active{background:var(--brand);color:#fff}
.server-icon.add{background:var(--bg-primary);color:var(--green);font-size:24px}
.server-icon.add:hover{background:var(--green);color:#fff;border-radius:16px}
.server-icon.explore{background:var(--bg-primary);color:var(--green);font-size:20px}
.server-icon.explore:hover{background:var(--green);color:#fff;border-radius:16px}
.server-icon .pill{position:absolute;left:-16px;width:8px;border-radius:0 4px 4px 0;background:#fff;transition:height .2s;height:0}
.server-icon:hover .pill{height:20px}
.server-icon.active .pill{height:40px}
.server-separator{width:32px;height:2px;background:var(--divider);border-radius:1px;flex-shrink:0}
.channel-sidebar{width:240px;min-width:240px;background:var(--bg-secondary);display:flex;flex-direction:column}
.server-header{height:48px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(0,0,0,.24);cursor:pointer;font-weight:600;font-size:15px;color:var(--header-primary);flex-shrink:0}
.server-header:hover{background:var(--bg-modifier-hover)}
.channel-list{flex:1;overflow-y:auto;padding:0 8px}
.category-header{display:flex;align-items:center;padding:16px 0 4px 2px;cursor:pointer;font-size:12px;font-weight:700;color:var(--channel-icon);text-transform:uppercase;letter-spacing:.02em;gap:2px;user-select:none}
.category-header:hover{color:var(--header-secondary)}
.category-header i{font-size:8px;transition:transform .2s;margin-right:2px}
.category-header.collapsed i{transform:rotate(-90deg)}
.category-channels{overflow:hidden;transition:max-height .3s ease}
.category-channels.collapsed{max-height:0!important}
.channel-item{display:flex;align-items:center;padding:6px 8px;border-radius:4px;cursor:pointer;gap:6px;color:var(--channel-icon);font-size:15px;font-weight:500;margin:1px 0;user-select:none}
.channel-item:hover{background:var(--bg-modifier-hover);color:var(--text-muted)}
.channel-item.active{background:var(--bg-modifier-selected);color:var(--header-primary)}
.channel-item i{font-size:18px;width:20px;text-align:center;flex-shrink:0}
.channel-item .channel-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.channel-item .unread-badge{margin-left:auto;background:var(--red);color:#fff;font-size:11px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.voice-item{display:flex;align-items:center;padding:6px 8px;border-radius:4px;cursor:pointer;gap:6px;color:var(--channel-icon);font-size:15px;font-weight:500;margin:1px 0}
.voice-item:hover{background:var(--bg-modifier-hover);color:var(--text-muted)}
.voice-users{padding-left:34px}
.voice-user{display:flex;align-items:center;gap:8px;padding:3px 8px;font-size:13px;color:var(--text-muted)}
.voice-user-avatar{width:20px;height:20px;border-radius:50%}
.user-panel{height:52px;background:rgba(17,18,20,.3);display:flex;align-items:center;padding:0 8px;gap:8px;flex-shrink:0}
.user-panel-avatar{width:32px;height:32px;border-radius:50%;position:relative;flex-shrink:0}
.user-panel-avatar img{width:100%;height:100%;border-radius:50%}
.user-panel-avatar .status-dot{position:absolute;bottom:-1px;right:-1px;width:14px;height:14px;border-radius:50%;border:3px solid #232428}
.user-panel-info{flex:1;min-width:0;overflow:hidden}
.user-panel-name{font-size:13px;font-weight:600;color:var(--header-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-panel-tag{font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.sync-dot.synced{background:var(--green)}
.sync-dot.local{background:var(--text-muted)}
.sync-dot.saving{background:var(--yellow);animation:pulse 1s infinite}
.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.user-panel-buttons{display:flex;gap:4px}
.user-panel-btn{width:32px;height:32px;border-radius:4px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:16px}
.user-panel-btn:hover{background:var(--bg-modifier-hover);color:var(--text-normal)}
.user-panel-btn.muted{color:var(--red)}
.main-content{flex:1;display:flex;flex-direction:column;background:var(--bg-primary);min-width:0}
.chat-header{height:48px;padding:0 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(0,0,0,.24);flex-shrink:0}
.chat-header .hash{color:var(--channel-icon);font-size:22px}
.chat-header .channel-title{font-weight:700;color:var(--header-primary);font-size:15px}
.chat-header .divider-v{width:1px;height:24px;background:var(--divider);margin:0 8px}
.chat-header .channel-topic{font-size:13px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.chat-header .header-icons{display:flex;gap:4px;margin-left:auto;flex-shrink:0;align-items:center}
.chat-header .header-icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:18px;border-radius:4px}
.chat-header .header-icon:hover{color:var(--text-normal)}
.chat-header .header-icon.active{color:var(--text-normal)}
.chat-header .search-box{width:144px;height:24px;background:var(--bg-tertiary);border-radius:4px;display:flex;align-items:center;padding:0 6px;gap:4px;font-size:12px;cursor:text}
.chat-header .search-box input{flex:1;font-size:12px;color:var(--text-muted);pointer-events:none}
.chat-header .search-box i{color:var(--text-muted);font-size:11px}
.messages-area{flex:1;overflow-y:auto;padding:16px 16px 0;display:flex;flex-direction:column}
.messages-wrapper{flex:1;display:flex;flex-direction:column;justify-content:flex-end;min-height:0}
.messages-wrapper .messages-area{min-height:100%}
.welcome-section{padding:16px 0 16px;margin-bottom:8px}
.welcome-icon{width:68px;height:68px;border-radius:50%;background:var(--bg-modifier-hover);display:flex;align-items:center;justify-content:center;font-size:36px;color:var(--channel-icon);margin-bottom:8px}
.welcome-title{font-size:28px;font-weight:700;color:var(--header-primary);margin-bottom:8px}
.welcome-desc{color:var(--text-muted);font-size:14px;line-height:1.5}
.message-group{padding:2px 48px 2px 72px;position:relative;min-height:28px}
.message-group:hover{background:rgba(2,2,2,.06)}
.message-group.has-header{margin-top:17px;padding-top:2px}
.message-avatar{position:absolute;left:16px;top:2px;width:40px;height:40px;border-radius:50%;cursor:pointer}
.message-avatar:hover{opacity:.9}
.message-header{display:flex;align-items:baseline;gap:8px;margin-bottom:2px}
.message-author{font-weight:600;font-size:15px;cursor:pointer}
.message-author:hover{text-decoration:underline}
.message-timestamp{font-size:12px;color:var(--text-muted);font-weight:400}
.message-content{font-size:15px;line-height:1.375;color:var(--text-normal);word-wrap:break-word}
.message-actions{position:absolute;right:16px;top:-16px;background:var(--bg-primary);border:1px solid var(--divider);border-radius:4px;display:none;overflow:hidden;z-index:10}
.message-group:hover .message-actions{display:flex}
.message-action-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:16px}
.message-action-btn:hover{background:var(--bg-modifier-hover);color:var(--text-normal)}
.message-action-btn.react-btn:hover{color:var(--brand)}
.date-divider{display:flex;align-items:center;padding:16px 0;margin:8px 0;user-select:none}
.date-divider::before,.date-divider::after{content:'';flex:1;height:1px;background:var(--divider)}
.date-divider span{padding:0 8px;font-size:12px;font-weight:600;color:var(--text-muted)}
.chat-input-wrapper{padding:0 16px 24px;flex-shrink:0}
.chat-input-container{background:var(--input-bg);border-radius:8px;display:flex;align-items:flex-end;padding:2px}
.chat-input-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;color:var(--channel-icon);font-size:20px;border-radius:6px;flex-shrink:0}
.chat-input-btn:hover{color:var(--text-normal)}
.chat-input-container textarea{flex:1;background:transparent;color:var(--text-normal);font-size:15px;padding:10px 0;resize:none;max-height:200px;line-height:1.375}
.chat-input-container textarea::placeholder{color:var(--text-muted)}
.typing-indicator{font-size:12px;color:var(--text-muted);padding:4px 0 0 12px;height:20px}
.member-list{width:240px;min-width:240px;background:var(--bg-secondary);overflow-y:auto;padding:8px 8px 8px 0;flex-shrink:0}
.member-category{padding:16px 8px 4px 16px;font-size:12px;font-weight:600;color:var(--channel-icon);text-transform:uppercase;letter-spacing:.02em}
.member-item{display:flex;align-items:center;padding:6px 8px;border-radius:4px;cursor:pointer;gap:12px}
.member-item:hover{background:var(--bg-modifier-hover)}
.member-avatar{width:32px;height:32px;border-radius:50%;position:relative;flex-shrink:0}
.member-avatar img{width:100%;height:100%;border-radius:50%}
.member-avatar .status-dot{position:absolute;bottom:-1px;right:-1px;width:12px;height:12px;border-radius:50%;border:2.5px solid var(--bg-secondary)}
.member-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.member-item.offline .member-avatar{opacity:.4}
.member-item.offline .member-name{color:var(--text-muted)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000;animation:fadeIn .15s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg-primary);border-radius:8px;padding:24px;width:440px;max-width:90vw;animation:scaleIn .15s}
@keyframes scaleIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.modal h2{font-size:20px;font-weight:700;color:var(--header-primary);margin-bottom:8px;text-align:center}
.modal p{font-size:14px;color:var(--text-muted);text-align:center;margin-bottom:20px;line-height:1.4}
.modal-label{font-size:12px;font-weight:700;color:var(--header-secondary);text-transform:uppercase;letter-spacing:.02em;margin-bottom:8px}
.modal-input{width:100%;padding:10px 12px;background:var(--bg-tertiary);border:none;border-radius:4px;color:var(--text-normal);font-size:14px}
.modal-input::placeholder{color:var(--text-muted)}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}
.btn{padding:8px 24px;border-radius:4px;font-size:14px;font-weight:500;cursor:pointer;transition:background .17s}
.btn-primary{background:var(--brand);color:#fff}
.btn-primary:hover{background:var(--brand-hover)}
.btn-cancel{background:transparent;color:var(--text-muted)}
.btn-cancel:hover{text-decoration:underline}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#d83338}
.context-menu{position:fixed;background:var(--bg-floating);border-radius:4px;padding:6px 8px;min-width:188px;z-index:2000;animation:fadeIn .08s;box-shadow:0 8px 16px rgba(0,0,0,.24)}
.context-menu-item{padding:6px 8px;border-radius:2px;font-size:14px;color:var(--text-normal);cursor:pointer;display:flex;align-items:center;gap:8px}
.context-menu-item:hover{background:var(--brand);color:#fff}
.context-menu-item.danger{color:var(--red)}
.context-menu-item.danger:hover{background:var(--red);color:#fff}
.context-menu-sep{height:1px;background:var(--divider);margin:4px 0}
.context-menu-item i{width:18px;text-align:center;font-size:14px}
.toast-container{position:fixed;bottom:24px;right:24px;z-index:3000;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--bg-floating);padding:12px 16px;border-radius:4px;font-size:14px;color:var(--text-normal);box-shadow:0 4px 12px rgba(0,0,0,.24);animation:slideIn .2s;display:flex;align-items:center;gap:8px}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.toast i{color:var(--green)}
.toast.cloud i{color:var(--brand)}
.tooltip{position:fixed;background:var(--bg-floating);color:var(--text-normal);padding:8px 12px;border-radius:6px;font-size:13px;font-weight:500;pointer-events:none;z-index:5000;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.24);max-width:220px;text-align:center;line-height:1.4}
.tooltip::before{content:'';position:absolute;left:-6px;top:50%;transform:translateY(-50%);border:6px solid transparent;border-right-color:var(--bg-floating);border-left:none}
.no-server{flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg-primary)}
.no-server-content{text-align:center}
.no-server-content i{font-size:60px;color:var(--channel-icon);margin-bottom:16px}
.no-server-content h2{font-size:24px;font-weight:700;color:var(--header-primary);margin-bottom:8px}
.no-server-content p{color:var(--text-muted)}
.role-admin{color:#e0a82e}.role-mod{color:#2dc770}.role-member{color:#949ba4}
.reactions{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.reaction{display:flex;align-items:center;gap:4px;background:var(--bg-modifier-hover);border:1px solid transparent;border-radius:6px;padding:2px 6px;cursor:pointer;font-size:14px}
.reaction:hover{border-color:var(--brand);background:rgba(88,101,242,.15)}
.reaction.active{border-color:var(--brand);background:rgba(88,101,242,.15)}
.reaction-count{font-size:12px;font-weight:600;color:var(--text-muted)}
.reaction.active .reaction-count{color:var(--brand)}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>

<div class="app" id="app">
  <nav class="server-bar" id="serverBar"></nav>
  <aside class="channel-sidebar" id="channelSidebar" style="display:none">
    <div class="server-header" id="serverHeader"></div>
    <div class="channel-list" id="channelList"></div>
    <div class="user-panel" id="userPanel"></div>
  </aside>
  <main class="main-content" id="mainContent" style="display:none">
    <div class="chat-header" id="chatHeader"></div>
    <div class="messages-wrapper"><div class="messages-area" id="messagesArea"></div></div>
    <div class="typing-indicator" id="typingIndicator"></div>
    <div class="chat-input-wrapper">
      <div class="chat-input-container">
        <button class="chat-input-btn" aria-label="Adjuntar"><i class="fas fa-plus-circle"></i></button>
        <textarea id="messageInput" rows="1" placeholder="Enviar mensaje en #general"></textarea>
        <button class="chat-input-btn" aria-label="GIF"><i class="fas fa-image"></i></button>
        <button class="chat-input-btn" aria-label="Sticker"><i class="fas fa-sticky-note"></i></button>
        <button class="chat-input-btn" aria-label="Emoji"><i class="fas fa-smile"></i></button>
      </div>
    </div>
  </main>
  <aside class="member-list" id="memberList" style="display:none"></aside>
  <div class="no-server" id="noServer">
    <div class="no-server-content">
      <i class="fab fa-discord"></i>
      <h2>Bienvenido</h2>
      <p>Selecciona o crea un servidor para empezar</p>
    </div>
  </div>
</div>
<div class="toast-container" id="toastContainer"></div>

<script type="module">
  try {
    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js");
    const { getAuth, onAuthStateChanged } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js");
    const { getDatabase, ref, set, get } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js");

    const firebaseConfig = {
      apiKey: "AIzaSyDpmb0duQ3ZgjbipPWsMvpLx3d-vojQAxM",
      authDomain: "inici-de-sessio.firebaseapp.com",
      databaseURL: "https://inici-de-sessio-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "inici-de-sessio",
      storageBucket: "inici-de-sessio.firebasestorage.app",
      messagingSenderId: "106046428749",
      appId: "1:106046428749:web:c555c61ff94f5f5691ee04",
      measurementId: "G-CQRFD5Q0JT"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    window._fbSave = async function(data) {
      if (!window._fbUser) return false;
      try { await set(ref(db, 'users/' + window._fbUser.uid + '/discord'), data); return true; }
      catch(e) { return false; }
    };
    window._fbLoad = async function() {
      if (!window._fbUser) return null;
      try { const s = await get(ref(db, 'users/' + window._fbUser.uid + '/discord')); return s.exists() ? s.val() : null; }
      catch(e) { return null; }
    };

    onAuthStateChanged(auth, (user) => {
      window._fbUser = user;
      if (user) {
        window._fbLoad().then(cloudData => {
          if (cloudData && cloudData.servers && Array.isArray(cloudData.servers)) {
            window._appState = cloudData;
            window._saveLocal();
            window._renderAll();
            window._toast('Datos cargados desde la nube', 'cloud');
          } else {
            window._fbSave(window._appState).then(ok => {
              window._syncStatus = ok ? 'synced' : 'error';
              window._updateSyncUI();
            });
          }
          window._syncStatus = 'synced';
          window._updateSyncUI();
        });
      } else {
        window._syncStatus = 'local';
        window._updateSyncUI();
      }
    });
    window._fbReady = true;
  } catch(e) {
    window._fbReady = false;
    window._syncStatus = 'local';
  }
</script>

<script>

window._fbReady = false;

const NAMES = ['Carlos','Ana','Pedro','Lucía','Diego','Sofía','Miguel','Valentina','Andrés','Camila','Raúl','Isabella'];

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function rf(a){return a[Math.floor(Math.random()*a.length)]}
function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}
function fmtDate(ts){const d=new Date(ts);const m=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];return d.getDate()+' '+m[d.getMonth()]+' '+d.getFullYear()}
function fmtTime(ts){return new Date(ts).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})}
function fmtFull(ts){return fmtDate(ts)+' a las '+fmtTime(ts)}
function rc(r){return r==='admin'?'role-admin':r==='mod'?'role-mod':'role-member'}
function sc(s){return s==='online'?'var(--status-online)':s==='idle'?'var(--status-idle)':s==='dnd'?'var(--status-dnd)':'var(--status-offline)'}

function genMsgs(n){
  const ms=[];
  const au=[
    {n:'Carlos',a:AVATARS[0],r:'admin'},{n:'Ana',a:AVATARS[1],r:'mod'},
    {n:'Pedro',a:AVATARS[2],r:'member'},{n:'Lucía',a:AVATARS[3],r:'member'},
    {n:'Diego',a:AVATARS[4],r:'member'},{n:'Sofía',a:AVATARS[5],r:'member'},
    {n:'Miguel',a:AVATARS[6],r:'member'},{n:'Valentina',a:AVATARS[7],r:'member'},
  ];
  const tx=['Hola a todos! Alguien quiere jugar?','Buenas tardes','Acabo de llegar','Estoy programando un proyecto nuevo','Alguien tiene el enlace?','Genial, me apunto','No puedo ahora, luego sí','Acuérdate de hacer el deploy','El servidor se cae cada 5 minutos lol','Ya lo arreglé, era nginx','Buena idea, lo implemento','Necesito ayuda con CSS Grid','Usa flexbox que es mejor','Ambos sirven para cosas distintas','Que pro','jajaja','Voy a mandar un PR esta noche','Revisen el canal de anuncios','Gracias por la info!','Listo, ya quedó','Yo ya dormí, buenas noches','Mañana seguimos','Revisen mi diseño','Ok hecho','Alguien vio el partido?','Increíble lo que pasó','Les recomiendo esta película','Qué frío hace hoy','Alguien tiene tarea?','Acabo de terminar el diseño'];
  let la=null;
  for(let i=0;i<n;i++){
    const a=au[ri(0,au.length-1)];const sg=la&&la===a.n&&Math.random()>.4;
    ms.push({id:uid(),author:a.n,avatar:a.a,role:a.r,content:rf(tx),ts:Date.now()-(n-i)*ri(60000,600000),grouped:sg,reactions:Math.random()>.7?[{emoji:rf(['👍','❤️','😂','🎉','🔥','👀','💯','🤔']),count:ri(1,8),active:Math.random()>.6}]:[]});
    la=a.n;
  }
  return ms;
}

function genMembers(){
  const roles=['admin','mod','member','member','member','member','member','member'];
  const m=[];
  for(let i=0;i<8;i++) m.push({name:NAMES[i],avatar:AVATARS[i],role:roles[i],status:rf(['online','online','online','idle','dnd','offline'])});
  return m;
}

function loadLocal(){try{var r=localStorage.getItem(LS_KEY);if(r)return JSON.parse(r)}catch(e){}return null}
function saveLocal(){try{localStorage.setItem(LS_KEY,JSON.stringify(S))}catch(e){}}

window._appState = loadLocal() || defaultData();
window._saveLocal = saveLocal;
window._renderAll = renderAll;
window._toast = showToast;
window._updateSyncUI = updateSyncUI;

var S = window._appState;

function save(){
  saveLocal();
  if(window._saveTimer) clearTimeout(window._saveTimer);
  window._syncStatus = 'saving';
  updateSyncUI();
  window._saveTimer = setTimeout(async function(){
    var ok = await window._fbSave(S);
    window._syncStatus = ok ? 'synced' : (window._fbUser ? 'error' : 'local');
    updateSyncUI();
  }, 1500);
}

function updateSyncUI(){
  var tag = document.querySelector('.user-panel-tag');
  if(!tag) return;
  var labels={local:'Solo local',synced:'Sincronizado',saving:'Guardando...',error:'Error al guardar'};
  var email = window._fbUser ? window._fbUser.email : '';
  var extra = window._syncStatus==='synced' && email ? ' — '+email : '';
  tag.innerHTML = 'En línea <span class="sync-dot '+window._syncStatus+'"></span> <span style="font-size:10px;opacity:.7">'+labels[window._syncStatus]+extra+'</span>';
}

function getServer(id){return S.servers.find(function(s){return s.id===id})}
function getChannel(server,chId){for(var i=0;i<server.categories.length;i++){var ch=server.categories[i].channels.find(function(x){return x.id===chId});if(ch)return ch}return null}
function getMsgs(server,chId){return server.messages[chId]||[]}

      (sh?'<img class="message-avatar" src="'+m.avatar+'">':'')+
      (sh?'<div class="message-header"><span class="message-author '+rc(m.role)+'">'+m.author+'</span><span class="message-timestamp">'+fmtFull(m.ts)+'</span></div>':'')+
      '<div class="message-content">'+esc(m.content).replace(/\n/g,'<br>')+'</div>'+
      (m.reactions&&m.reactions.length?'<div class="reactions">'+m.reactions.map(function(r){return '<div class="reaction'+(r.active?' active':'')+'" onclick="event.stopPropagation();window._toggleReact(\''+m.id+'\',\''+r.emoji+'\')"><span>'+r.emoji+'</span><span class="reaction-count">'+r.count+'</span></div>'}).join('')+'</div>':'')+

// ===================== ACCIONES =====================

function selectServer(id){
  S.activeServer=id;
  var sv=getServer(id);
  if(sv){var f=sv.categories.reduce(function(a,c){return a.concat(c.channels)},[]).find(function(c){return c.type==='text'});if(f)S.activeChannel=f.id}
  renderAll();
}

function selectChannel(id){
  S.activeChannel=id;
  var sv=getServer(S.activeServer);
  if(sv) sv.categories.forEach(function(c){var ch=c.channels.find(function(x){return x.id===id});if(ch)ch.unread=0});
  renderAll();
}

function sendMessage(){
  var inp=$('messageInput');
  var txt=inp.value.trim();if(!txt)return;
  var sv=getServer(S.activeServer);if(!sv)return;
  var ch=getChannel(sv,S.activeChannel);if(!ch||ch.type!=='text')return;
  if(!sv.messages[ch.id])sv.messages[ch.id]=[];
  var last=sv.messages[ch.id][sv.messages[ch.id].length-1];
  var grouped=last&&last.author===S.user.name&&(Date.now()-last.ts<420000);
  sv.messages[ch.id].push({id:uid(),author:S.user.name,avatar:S.user.avatar,role:'admin',content:txt,ts:Date.now(),grouped:grouped,reactions:[]});
  inp.value='';inp.style.height='auto';
  renderMessages();save();
}

window._addReact=function(mid){
  var sv=getServer(S.activeServer);if(!sv)return;
  var msgs=sv.messages[S.activeChannel];if(!msgs)return;
  var m=msgs.find(function(x){return x.id===mid});if(!m)return;
  var emojis=['👍','❤️','😂','🎉','🔥','👀','💯','🤔','😮','👏'];
  var e=rf(emojis);if(!m.reactions)m.reactions=[];
  var ex=m.reactions.find(function(r){return r.emoji===e});
  if(ex){ex.count++;ex.active=true}else m.reactions.push({emoji:e,count:1,active:true});
  renderMessages();save();
};

window._toggleReact=function(mid,emoji){
  var sv=getServer(S.activeServer);if(!sv)return;
  var msgs=sv.messages[S.activeChannel];if(!msgs)return;
  var m=msgs.find(function(x){return x.id===mid});if(!m||!m.reactions)return;
  var r=m.reactions.find(function(x){return x.emoji===emoji});if(!r)return;
  if(r.active){r.active=false;r.count=Math.max(0,r.count-1)}else{r.active=true;r.count++}
  if(r.count<=0) m.reactions=m.reactions.filter(function(x){return x.count>0});
  renderMessages();save();
};

window._toggleMembers=function(){S.memberList=!S.memberList;renderAll()};

document.addEventListener('click',function(e){
  document.querySelectorAll('.context-menu').forEach(function(m){m.remove()});
  var el=e.target;
  while(el&&el!==document){
    if(el.dataset&&el.dataset.act) break;
    el=el.parentElement;
  }
  if(!el||!el.dataset||!el.dataset.act) return;
  var act=el.dataset.act;
  if(act==='home'){S.activeServer=null;renderAll()}
  else if(act==='server'){selectServer(el.dataset.sid)}
  else if(act==='add-server'){showModal(createServerHTML)}
  else if(act==='sel-ch'){selectChannel(el.dataset.chid)}
  else if(act==='toggle-cat'){
    var sv=getServer(S.activeServer);
    if(sv){var c=sv.categories.find(function(x){return x.id===el.dataset.cid});if(c)c.collapsed=!c.collapsed;renderSidebar();save()}
  }
});

  closeModal();

  o.innerHTML='<div class="modal">'+html+'</div>';
  o.addEventListener('click',function(e){if(e.target===o)closeModal()});
  document.body.appendChild(o);
  setTimeout(function(){var inp=o.querySelector('.modal-input');if(inp)inp.focus()},50);
}
function closeModal(){var m=$('modalOverlay');if(m)m.remove()}

window._doCreateChannel=function(catId){
  var name=$('mChName');if(!name)return;
  var n=name.value.trim().toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');if(!n)return;
  var type=document.querySelector('input[name="mChType"]:checked');type=type?type.value:'text';
  var sv=getServer(S.activeServer);if(!sv)return;
  var cat=sv.categories.find(function(c){return c.id===catId});if(!cat)return;
  var chId=uid();
  cat.channels.push({id:chId,name:n,type:type,topic:'',unread:0,users:type==='voice'?[]:undefined});
  if(type==='text'){sv.messages[chId]=[];S.activeChannel=chId}
  closeModal();renderAll();showToast('Canal creado correctamente');
};

document.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&$('mChName')===document.activeElement){
    var btn=document.querySelector('.modal .btn-primary');if(btn)btn.click();
  }
});

window._showSettings=function(){
  var email=window._fbUser?window._fbUser.email:'No conectado';
  var states=['online','idle','dnd','offline'].map(function(s){
    return '<button class="btn '+(S.user.status===s?'btn-primary':'btn-cancel')+'" onclick="window._setStatus(\''+s+'\')" style="display:flex;align-items:center;gap:6px"><span style="width:10px;height:10px;border-radius:50%;background:'+sc(s)+'"></span>'+{online:'En línea',idle:'Ausente',dnd:'No molestar',offline:'Invisible'}[s]+'</button>';
  }).join('');
  showModal(
    '<h2>Ajustes de usuario</h2>'+
    '<div class="modal-label">NOMBRE</div><input class="modal-input" id="mUserName" value="'+S.user.name+'" maxlength="32" style="margin-bottom:16px">'+
    '<div class="modal-label">ESTADO</div><div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">'+states+'</div>'+
    '<div style="background:var(--bg-modifier-hover);border-radius:4px;padding:12px;margin-bottom:16px"><div style="font-size:12px;font-weight:700;color:var(--header-secondary);margin-bottom:4px">SYNCRONIZACIÓN CON LA NUBE</div><div style="font-size:13px;color:var(--text-muted)"><i class="fas '+(window._fbUser?'fa-cloud':'fa-cloud-arrow-up')+'" style="color:'+(window._fbUser?'var(--green)':'var(--text-muted)')+';margin-right:6px"></i>'+(window._fbUser?'Conectado como <strong style="color:var(--text-normal)">'+email+'</strong>':'Sin sesión — datos guardados solo en este navegador')+'</div></div>'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:14px;color:var(--text-muted)">Restablecer todos los datos</span><button class="btn btn-danger" onclick="window._resetAll()" style="padding:6px 16px;font-size:13px">Borrar todo</button></div>'+
    '<div class="modal-actions"><button class="btn btn-primary" onclick="closeModal()">Listo</button></div>'
  );
  setTimeout(function(){
    var inp=$('mUserName');
    if(inp) inp.addEventListener('input',function(){S.user.name=this.value.trim()||'Tú';save();renderUserPanel()});
  },50);
};

window._setStatus=function(s){S.user.status=s;save();renderUserPanel();window._showSettings()};

window._resetAll=function(){
  if(window._fbUser) window._fbSave(null).catch(function(){});
  localStorage.removeItem(LS_KEY);
  var d=defaultData();
  Object.keys(d).forEach(function(k){S[k]=d[k]});
  closeModal();renderAll();showToast('Datos restablecidos');
};

// ===================== CONTEXT MENUS =====================

function ctxMenu(x,y,items){
  document.querySelectorAll('.context-menu').forEach(function(m){m.remove()});
  var menu=document.createElement('div');menu.className='context-menu';
  menu.style.left=Math.min(x,window.innerWidth-200)+'px';
  menu.style.top=Math.min(y,window.innerHeight-items.length*36)+'px';
  var h='';
  items.forEach(function(i){
    if(i==='sep') h+='<div class="context-menu-sep"></div>';
    else h+='<div class="context-menu-item'+(i.danger?' danger':'')+'" onclick="'+i.fn+';document.querySelectorAll(\'.context-menu\').forEach(function(m){m.remove()})">'+(i.icon?'<i class="'+i.icon+'"></i>':'')+i.label+'</div>';
  });
  menu.innerHTML=h;
  document.body.appendChild(menu);
}

window._ctxServer=function(e,sid){
  var sv=getServer(sid);
  var catId=sv&&sv.categories[0]?sv.categories[0].id:'';
  ctxMenu(e.clientX,e.clientY,[
    {label:'Crear canal',icon:'fas fa-plus',fn:"window._showCreateChannel('"+catId+"')"},
    'sep',
    {label:'Editar servidor',icon:'fas fa-pen',fn:"window._editServer('"+sid+"')"},
    'sep',
    {label:'Eliminar servidor',icon:'fas fa-trash',fn:"window._delServer('"+sid+"')",danger:true},
  ]);
};

window._ctxChannel=function(e,catId,chId){
  ctxMenu(e.clientX,e.clientY,[
    {label:'Editar canal',icon:'fas fa-pen',fn:"window._editChannel('"+catId+"','"+chId+"')"},
    {label:'Crear canal',icon:'fas fa-plus',fn:"window._showCreateChannel('"+catId+"')"},
    'sep',
    {label:'Eliminar canal',icon:'fas fa-trash',fn:"window._delChannel('"+catId+"','"+chId+"')",danger:true},
  ]);
};

window._ctxMsg=function(e,mid){
  ctxMenu(e.clientX,e.clientY,[
    {label:'Reaccionar',icon:'fas fa-face-smile',fn:"window._addReact('"+mid+"')"},
    'sep',
    {label:'Copiar texto',icon:'fas fa-copy',fn:"window._copyMsg('"+mid+"')"},
    'sep',
    {label:'Eliminar mensaje',icon:'fas fa-trash',fn:"window._delMsg('"+mid+"')",danger:true},
  ]);
};

window._delServer=function(id){
  S.servers=S.servers.filter(function(s){return s.id!==id});
  if(S.activeServer===id){
    S.activeServer=S.servers.length?S.servers[0].id:null;
    if(S.activeServer){var sv=getServer(S.activeServer);var f=sv.categories.reduce(function(a,c){return a.concat(c.channels)},[]).find(function(c){return c.type==='text'});if(f)S.activeChannel=f.id}
  }
  renderAll();showToast('Servidor eliminado');
};

window._editServer=function(id){
  var sv=getServer(id);if(!sv)return;
  showModal('<h2>Editar servidor</h2><div class="modal-label">NOMBRE</div><input class="modal-input" id="mEditSName" value="'+sv.name+'" maxlength="100"><div class="modal-actions"><button class="btn btn-cancel" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="window._doEditServer(\''+id+'\')">Guardar</button></div>');
};
window._doEditServer=function(id){
  var n=$('mEditSName');if(!n)return;var v=n.value.trim();if(!v)return;
  var sv=getServer(id);if(sv)sv.name=v;
  closeModal();renderAll();showToast('Nombre actualizado');
};
document.addEventListener('keydown',function(e){if(e.key==='Enter'&&$('mEditSName')===document.activeElement){var b=$('mEditSName').closest('.modal');if(b){var btn=b.querySelector('.btn-primary');if(btn)btn.click()}}});

window._delChannel=function(catId,chId){
  var sv=getServer(S.activeServer);if(!sv)return;
  var cat=sv.categories.find(function(c){return c.id===catId});if(!cat)return;
  cat.channels=cat.channels.filter(function(c){return c.id!==chId});
  delete sv.messages[chId];
  if(S.activeChannel===chId){var f=sv.categories.reduce(function(a,c){return a.concat(c.channels)},[]).find(function(c){return c.type==='text'});S.activeChannel=f?f.id:null}
  renderAll();showToast('Canal eliminado');
};

window._editChannel=function(catId,chId){
  var sv=getServer(S.activeServer);if(!sv)return;
  var ch=getChannel(sv,chId);if(!ch)return;
  showModal('<h2>Editar canal</h2><div class="modal-label">NOMBRE</div><input class="modal-input" id="mEditChName" value="'+ch.name+'" maxlength="100"><div class="modal-actions"><button class="btn btn-cancel" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="window._doEditChannel(\''+catId+'\',\''+chId+'\')">Guardar</button></div>');
};
window._doEditChannel=function(catId,chId){
  var n=$('mEditChName');if(!n)return;var v=n.value.trim().toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');if(!v)return;
  var sv=getServer(S.activeServer);if(!sv)return;var ch=getChannel(sv,chId);if(ch)ch.name=v;
  closeModal();renderAll();showToast('Canal actualizado');
};

window._copyMsg=function(mid){
  var sv=getServer(S.activeServer);if(!sv)return;
  var msgs=sv.messages[S.activeChannel];if(!msgs)return;
  var m=msgs.find(function(x){return x.id===mid});
  if(m) navigator.clipboard.writeText(m.content).then(function(){showToast('Texto copiado')}).catch(function(){showToast('No se pudo copiar')});
};

window._delMsg=function(mid){
  var sv=getServer(S.activeServer);if(!sv)return;
  var msgs=sv.messages[S.activeChannel];if(!msgs)return;
  var idx=-1;
  for(var i=0;i<msgs.length;i++){if(msgs[i].id===mid){idx=i;break}}
  if(idx>-1){
    msgs.splice(idx,1);
    for(var i=0;i<msgs.length;i++){
      msgs[i].grouped=i>0&&msgs[i-1].author===msgs[i].author&&(msgs[i].ts-msgs[i-1].ts<420000);
    }
    renderMessages();save();showToast('Mensaje eliminado');
  }
};

// ===================== TOAST =====================

function showToast(msg,type){
  var c=$('toastContainer');
  var t=document.createElement('div');
  t.className='toast'+(type==='cloud'?' cloud':'');
  t.innerHTML='<i class="fas '+(type==='cloud'?'fa-cloud':'fa-check-circle')+'"></i> '+msg;
  c.appendChild(t);
  setTimeout(function(){t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(function(){t.remove()},300)},2500);
}
window._toast=showToast;

// ===================== TOOLTIP =====================

var tipEl=null;
document.addEventListener('mouseover',function(e){
  var el=e.target.closest('.server-icon[data-sid]');
  if(el){
    if(tipEl)tipEl.remove();
    var name=getServer(el.dataset.sid);
    if(!name)return;
    tipEl=document.createElement('div');tipEl.className='tooltip';tipEl.textContent=name.name;
    var r=el.getBoundingClientRect();
    tipEl.style.left=(r.right+12)+'px';tipEl.style.top=(r.top+r.height/2-16)+'px';
    document.body.appendChild(tipEl);
  }
});
document.addEventListener('mouseout',function(e){if(e.target.closest('.server-icon[data-sid]')){if(tipEl){tipEl.remove();tipEl=null}}});

// ===================== MENSAJES AUTOMÁTICOS =====================

setInterval(function(){
  if(!S.activeServer)return;
  var sv=getServer(S.activeServer);if(!sv)return;
  var onlineMembers=sv.members.filter(function(m){return m.status==='online'});
  if(!onlineMembers.length)return;
  var ch=getChannel(sv,S.activeChannel);
  if(!ch||ch.type!=='text')return;
  if(Math.random()>.15)return;
  var member=rf(onlineMembers);
  var texts=['Alguien está online?','Qué tal la tarde','Alguien para una partida?','Recién llego','Buenas!','Qué están haciendo?','Les cuento algo...','Acabo de ver algo genial','Recomienden algo','jajaja buenísimo','Eso está increíble','Pura energía hoy','Alguien más tiene ese bug?','Ya probé la actualización','Se ve bien','Voy a salir un rato','Alguien vio el partido?','Les recomiendo esta serie','Qué frío hace','Acabo de terminar','Quién quiere un café virtual?','Me quedé dormido lol'];
  if(!sv.messages[ch.id])sv.messages[ch.id]=[];
  var last=sv.messages[ch.id][sv.messages[ch.id].length-1];
  sv.messages[ch.id].push({id:uid(),author:member.name,avatar:member.avatar,role:member.role,content:rf(texts),ts:Date.now(),grouped:last&&last.author===member.name&&(Date.now()-last.ts<420000),reactions:[]});
  if(S.activeChannel!==ch.id){ch.unread=(ch.unread||0)+1;renderSidebar()}
  else renderMessages();
  save();
},12000);

// ===================== INICIO =====================
renderAll();

})();
</script>

</html>
