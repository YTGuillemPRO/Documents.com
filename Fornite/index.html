<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortnite - Battle Royale</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            color: white;
            overflow-x: hidden;
        }

        .fortnite-gradient {
            background: linear-gradient(135deg, #00c8ff 0%, #7b2ff7 100%);
        }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 200, 255, 0.2);
        }

        .btn-fortnite {
            background: linear-gradient(135deg, #00c8ff, #7b2ff7);
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-fortnite:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 200, 255, 0.5);
        }

        .btn-fortnite:active {
            transform: scale(0.95);
        }

        .mode-card {
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .mode-card:hover {
            transform: scale(1.05) translateY(-5px);
            border-color: #00c8ff;
            box-shadow: 0 20px 50px rgba(0, 200, 255, 0.3);
        }

        .skin-card {
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .skin-card:hover {
            transform: translateY(-5px);
            border-color: rgba(123, 47, 247, 0.6);
            box-shadow: 0 15px 40px rgba(123, 47, 247, 0.4);
        }

        .skin-card.selected {
            border-color: #00c8ff !important;
            box-shadow: 0 0 30px rgba(0, 200, 255, 0.6) !important;
        }

        .tab-btn {
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .tab-btn:hover {
            background: rgba(0, 200, 255, 0.1);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #00c8ff, #7b2ff7);
        }

        .notification {
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(0, 200, 255, 0.2);
            border-top-color: #00c8ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        #lobby-3d {
            width: 100%;
            height: 500px;
            background: radial-gradient(circle at center, #1a1f35 0%, #0a0e1a 100%);
            border-radius: 16px;
            position: relative;
            overflow: hidden;
        }

        #game-3d {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1f2e; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #00c8ff, #7b2ff7); border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // SKINS DISPONIBLES
        const SKINS = [
            { id: 0, name: 'ASTRA COSMIC', rarity: 'LEGENDARIO', price: 2000, emoji: '🌟', color: '#9333ea', glowColor: '#c084fc' },
            { id: 1, name: 'SHADOW PHANTOM', rarity: 'ÉPICO', price: 1500, emoji: '🌑', color: '#374151', glowColor: '#6366f1' },
            { id: 2, name: 'NEXUS CYBER', rarity: 'RARO', price: 1200, emoji: '💎', color: '#06b6d4', glowColor: '#22d3ee' },
            { id: 3, name: 'INFERNO LORD', rarity: 'LEGENDARIO', price: 2000, emoji: '🔥', color: '#dc2626', glowColor: '#f97316' },
            { id: 4, name: 'FROST QUEEN', rarity: 'ÉPICO', price: 1500, emoji: '❄️', color: '#3b82f6', glowColor: '#93c5fd' },
            { id: 5, name: 'PHOENIX IMMORTAL', rarity: 'MÍTICO', price: 3000, emoji: '🦅', color: '#f59e0b', glowColor: '#fbbf24' },
        ];

        function App() {
            // Estados
            const [pantalla, setPantalla] = useState('lobby');
            const [jugando, setJugando] = useState(false);
            const [cargando, setCargando] = useState(true);
            
            const [vida, setVida] = useState(100);
            const [escudo, setEscudo] = useState(50);
            const [kills, setKills] = useState(0);
            const [municion, setMunicion] = useState(999);
            const [skinActivo, setSkinActivo] = useState(0);
            
            const [notificacion, setNotificacion] = useState(null);
            const [killFeed, setKillFeed] = useState([]);
            const [tiempo, setTiempo] = useState(0);
            const [vivos, setVivos] = useState(100);

            // Refs
            const lobbyRef = useRef(null);
            const gameRef = useRef(null);
            const escenaLobbyRef = useRef(null);
            const jugadorRef = useRef(null);
            const enemigosRef = useRef([]);
            const camaraRef = useRef(null);
            const teclasRef = useRef({});
            const posRef = useRef({ x: 0, y: 2, z: 0 });

            // Carga inicial
            useEffect(() => {
                console.log('🎮 Iniciando Fortnite...');
                setTimeout(() => {
                    setCargando(false);
                    console.log('✅ Listo');
                }, 1500);
            }, []);

            // Mostrar notificación
            const notif = (msg) => {
                setNotificacion(msg);
                setTimeout(() => setNotificacion(null), 2500);
            };

            // Iniciar juego
            const iniciar = (modo, num) => {
                console.log(`▶️ ${modo} iniciado`);
                setJugando(true);
                setVida(100);
                setEscudo(50);
                setKills(0);
                setMunicion(999);
                setTiempo(0);
                setVivos(num);
                setKillFeed([]);
                notif(`¡${modo} comenzado!`);
            };

            // Salir
            const salir = () => {
                console.log('🚪 Saliendo...');
                setJugando(false);
                setPantalla('lobby');
                setVida(100);
                enemigosRef.current = [];
                notif('Volviste al lobby');
            };

            // ============================================
            // ESCENA 3D DEL LOBBY (PERSONAJE)
            // ============================================
            useEffect(() => {
                if (!lobbyRef.current || jugando) return;

                console.log('🎨 Creando personaje 3D...');

                try {
                    // Limpiar
                    lobbyRef.current.innerHTML = '';

                    // Escena
                    const scene = new THREE.Scene();
                    scene.background = new THREE.Color(0x0a0e1a);
                    escenaLobbyRef.current = scene;

                    // Cámara
                    const camera = new THREE.PerspectiveCamera(
                        45,
                        lobbyRef.current.clientWidth / lobbyRef.current.clientHeight,
                        0.1,
                        1000
                    );
                    camera.position.set(0, 2, 6);
                    camera.lookAt(0, 1.5, 0);

                    // Renderer
                    const renderer = new THREE.WebGLRenderer({ 
                        antialias: true,
                        alpha: true 
                    });
                    renderer.setSize(
                        lobbyRef.current.clientWidth, 
                        lobbyRef.current.clientHeight
                    );
                    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                    lobbyRef.current.appendChild(renderer.domElement);
                    console.log('✅ Canvas creado');

                    // Luces
                    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
                    
                    const light1 = new THREE.DirectionalLight(0xffffff, 1);
                    light1.position.set(5, 10, 5);
                    scene.add(light1);

                    const light2 = new THREE.PointLight(0x00c8ff, 0.8, 20);
                    light2.position.set(-3, 3, 3);
                    scene.add(light2);

                    const light3 = new THREE.PointLight(0x7b2ff7, 0.6, 20);
                    light3.position.set(3, 2, -3);
                    scene.add(light3);

                    // Suelo
                    const floorGeo = new THREE.CircleGeometry(4, 64);
                    const floorMat = new THREE.MeshStandardMaterial({
                        color: 0x1a1f2e,
                        metalness: 0.9,
                        roughness: 0.1
                    });
                    const floor = new THREE.Mesh(floorGeo, floorMat);
                    floor.rotation.x = -Math.PI / 2;
                    scene.add(floor);

                    // === PERSONAJE 3D ===
                    const skin = SKINS[skinActivo];
                    const group = new THREE.Group();

                    // Color principal
                    const mainColor = new THREE.Color(skin.color);
                    const glowColor = new THREE.Color(skin.glowColor);

                    // Material principal
                    const bodyMat = new THREE.MeshStandardMaterial({
                        color: mainColor,
                        metalness: 0.4,
                        roughness: 0.3
                    });

                    // Material brillante (accesorios)
                    const glowMat = new THREE.MeshStandardMaterial({
                        color: glowColor,
                        emissive: glowColor,
                        emissiveIntensity: 0.5,
                        metalness: 0.8,
                        roughness: 0.1
                    });

                    // Material piel
                    const skinMat = new THREE.MeshStandardMaterial({
                        color: 0xffdbac,
                        roughness: 0.5
                    });

                    // Cabeza
                    const headGeo = new THREE.SphereGeometry(0.38, 32, 32);
                    const head = new THREE.Mesh(headGeo, bodyMat);
                    head.position.y = 2.15;
                    head.scale.y = 1.1;
                    group.add(head);

                    // Ojos
                    const eyeGeo = new THREE.SphereGeometry(0.07, 16, 16);
                    const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
                    
                    const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
                    eyeL.position.set(-0.12, 2.18, 0.32);
                    group.add(eyeL);

                    const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
                    eyeR.position.set(0.12, 2.18, 0.32);
                    group.add(eyeR);

                    // Pupilas
                    const pupilGeo = new THREE.SphereGeometry(0.03, 12, 12);
                    const pupilMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
                    
                    const pupilL = new THREE.Mesh(pupilGeo, pupilMat);
                    pupilL.position.set(-0.12, 2.18, 0.38);
                    group.add(pupilL);

                    const pupilR = new THREE.Mesh(pupilGeo, pupilMat);
                    pupilR.position.set(0.12, 2.18, 0.38);
                    group.add(pupilR);

                    // Accesorio cabeza según skin
                    if (skin.id === 0) { // Astra - Diadema
                        const diademGeo = new THREE.TorusGeometry(0.35, 0.04, 8, 32, Math.PI);
                        const diadem = new THREE.Mesh(diademGeo, glowMat);
                        diadem.position.y = 2.35;
                        diadem.rotation.x = Math.PI / 2;
                        group.add(diadem);

                        const gemGeo = new THREE.OctahedronGeometry(0.08);
                        const gem = new THREE.Mesh(gemGeo, glowMat);
                        gem.position.set(0, 2.35, 0.33);
                        group.add(gem);
                    } else if (skin.id === 3) { // Inferno - Cuernos
                        const hornGeo = new THREE.ConeGeometry(0.06, 0.35, 8);
                        
                        const hornL = new THREE.Mesh(hornGeo, glowMat);
                        hornL.position.set(-0.2, 2.5, 0);
                        hornL.rotation.z = 0.3;
                        group.add(hornL);

                        const hornR = new THREE.Mesh(hornGeo, glowMat);
                        hornR.position.set(0.2, 2.5, 0);
                        hornR.rotation.z = -0.3;
                        group.add(hornR);
                    } else if (skin.id === 5) { // Phoenix - Corona
                        for (let i = 0; i < 8; i++) {
                            const featherGeo = new THREE.ConeGeometry(0.04, 0.2, 4);
                            const feather = new THREE.Mesh(featherGeo, glowMat);
                            const angle = (i / 8) * Math.PI * 2;
                            feather.position.set(
                                Math.cos(angle) * 0.38,
                                2.42,
                                Math.sin(angle) * 0.38
                            );
                            feather.rotation.x = -Math.PI / 4;
                            feather.rotation.z = angle;
                            group.add(feather);
                        }
                    }

                    // Torso
                    const torsoGeo = new THREE.CapsuleGeometry(0.42, 0.9, 12, 24);
                    const torso = new THREE.Mesh(torsoGeo, bodyMat);
                    torso.position.y = 1.25;
                    group.add(torso);

                    // Brazos
                    const armGeo = new THREE.CapsuleGeometry(0.13, 0.55, 8, 16);
                    
                    const armL = new THREE.Mesh(armGeo, bodyMat);
                    armL.position.set(-0.58, 1.25, 0);
                    armL.rotation.z = 0.2;
                    group.add(armL);

                    const armR = new THREE.Mesh(armGeo, bodyMat);
                    armR.position.set(0.58, 1.25, 0);
                    armR.rotation.z = -0.2;
                    group.add(armR);

                    // Manos
                    const handGeo = new THREE.SphereGeometry(0.11, 16, 16);
                    
                    const handL = new THREE.Mesh(handGeo, skinMat);
                    handL.position.set(-0.72, 0.82, 0);
                    group.add(handL);

                    const handR = new THREE.Mesh(handGeo, skinMat);
                    handR.position.set(0.72, 0.82, 0);
                    group.add(handR);

                    // Piernas
                    const legGeo = new THREE.CapsuleGeometry(0.16, 0.55, 10, 16);
                    
                    const legL = new THREE.Mesh(legGeo, bodyMat);
                    legL.position.set(-0.2, 0.4, 0);
                    group.add(legL);

                    const legR = new THREE.Mesh(legGeo, bodyMat);
                    legR.position.set(0.2, 0.4, 0);
                    group.add(legR);

                    // Botas
                    const bootGeo = new THREE.BoxGeometry(0.17, 0.2, 0.25);
                    const bootMat = new THREE.MeshStandardMaterial({ 
                        color: 0x1f2937,
                        roughness: 0.4 
                    });
                    
                    const bootL = new THREE.Mesh(bootGeo, bootMat);
                    bootL.position.set(-0.2, -0.08, 0.04);
                    group.add(bootL);

                    const bootR = new THREE.Mesh(bootGeo, bootMat);
                    bootR.position.set(0.2, -0.08, 0.04);
                    group.add(bootR);

                    // Mochila/Accesorio espalda
                    const backGeo = new THREE.BoxGeometry(0.48, 0.58, 0.28);
                    const back = new THREE.Mesh(backGeo, glowMat);
                    back.position.set(0, 1.35, -0.44);
                    group.add(back);

                    // Partículas alrededor
                    for (let i = 0; i < 40; i++) {
                        const pGeo = new THREE.SphereGeometry(0.04 + Math.random() * 0.03, 8, 8);
                        const pMat = new THREE.MeshBasicMaterial({
                            color: glowColor,
                            transparent: true,
                            opacity: 0.6
                        });
                        const particle = new THREE.Mesh(pGeo, pMat);
                        
                        const radius = 1.5 + Math.random() * 2.5;
                        const angle = Math.random() * Math.PI * 2;
                        particle.position.set(
                            Math.cos(angle) * radius,
                            Math.random() * 5,
                            Math.sin(angle) * radius
                        );
                        particle.userData = {
                            speedY: 0.005 + Math.random() * 0.01,
                            baseY: particle.position.y,
                            angle: angle,
                            radius: radius
                        };
                        scene.add(particle);
                        group.userData.particles = group.userData.particles || [];
                        group.userData.particles.push(particle);
                    }

                    scene.add(group);

                    // Animación
                    let time = 0;
                    const animate = () => {
                        if (jugando) return;
                        requestAnimationFrame(animate);
                        time += 0.016;

                        // Rotación suave
                        group.rotation.y = Math.sin(time * 0.5) * 0.4;

                        // Respiración
                        group.position.y = Math.sin(time * 2) * 0.04;

                        // Partículas
                        if (group.userData.particles) {
                            group.userData.particles.forEach(p => {
                                p.position.y += p.userData.speedY;
                                p.rotation.x += 0.02;
                                p.rotation.y += 0.02;

                                if (p.position.y > p.userData.baseY + 2.5) {
                                    p.position.y = p.userData.baseY - 1.5;
                                }
                            });
                        }

                        renderer.render(scene, camera);
                    };
                    animate();

                    // Resize
                    const handleResize = () => {
                        if (lobbyRef.current) {
                            camera.aspect = lobbyRef.current.clientWidth / lobbyRef.current.clientHeight;
                            camera.updateProjectionMatrix();
                            renderer.setSize(
                                lobbyRef.current.clientWidth,
                                lobbyRef.current.clientHeight
                            );
                        }
                    };
                    window.addEventListener('resize', handleResize);

                    return () => {
                        window.removeEventListener('resize', handleResize);
                        renderer.dispose();
                        scene.traverse(obj => {
                            if (obj.geometry) obj.geometry.dispose();
                            if (obj.material) obj.material.dispose();
                        });
                    };

                } catch (error) {
                    console.error('❌ Error creando escena 3D:', error);
                }
            }, [jugando, skinActivo]);

            // ============================================
            // ESCENA DEL JUEGO
            // ============================================
            useEffect(() => {
                if (!jugando || !gameRef.current) return;

                console.log('🎮 Iniciando partida...');

                try {
                    gameRef.current.innerHTML = '';

                    // Escena
                    const scene = new THREE.Scene();
                    scene.background = new THREE.Color(0x87ceeb);
                    scene.fog = new THREE.Fog(0x87ceeb, 50, 300);

                    // Cámara
                    const camera = new THREE.PerspectiveCamera(
                        75,
                        window.innerWidth / window.innerHeight,
                        0.1,
                        1000
                    );
                    camera.position.set(0, 8, 12);
                    camaraRef.current = camera;

                    // Renderer
                    const renderer = new THREE.WebGLRenderer({ antialias: true });
                    renderer.setSize(window.innerWidth, window.innerHeight);
                    renderer.shadowMap.enabled = true;
                    gameRef.current.appendChild(renderer.domElement);
                    console.log('✅ Canvas de juego creado');

                    // Luces
                    scene.add(new THREE.AmbientLight(0xffffff, 0.5));
                    
                    const sun = new THREE.DirectionalLight(0xffffff, 1);
                    sun.position.set(50, 100, 50);
                    sun.castShadow = true;
                    scene.add(sun);

                    // Terreno
                    const groundGeo = new THREE.ConeGeometry(120, 15, 32);
                    const groundMat = new THREE.MeshStandardMaterial({ color: 0x4ade80 });
                    const ground = new THREE.Mesh(groundGeo, groundMat);
                    ground.position.y = -7.5;
                    ground.receiveShadow = true;
                    scene.add(ground);

                    // Agua
                    const waterGeo = new THREE.PlaneGeometry(400, 400);
                    const waterMat = new THREE.MeshStandardMaterial({ 
                        color: 0x0077be, 
                        transparent: true, 
                        opacity: 0.7 
                    });
                    const water = new THREE.Mesh(waterGeo, waterMat);
                    water.rotation.x = -Math.PI / 2;
                    water.position.y = -8;
                    scene.add(water);

                    // Edificios
                    for (let i = 0; i < 15; i++) {
                        const w = 8 + Math.random() * 12;
                        const h = 10 + Math.random() * 25;
                        const bldgGeo = new THREE.BoxGeometry(w, h, w);
                        const bldgMat = new THREE.MeshStandardMaterial({ 
                            color: new THREE.Color().setHSL(Math.random(), 0.3, 0.4)
                        });
                        const building = new THREE.Mesh(bldgGeo, bldgMat);
                        const a = Math.random() * Math.PI * 2;
                        const r = 25 + Math.random() * 80;
                        building.position.set(Math.cos(a)*r, h/2-7.5, Math.sin(a)*r);
                        building.castShadow = true;
                        scene.add(building);
                    }

                    // Jugador
                    const playerGeo = new THREE.CapsuleGeometry(0.6, 1.2, 8, 16);
                    const playerMat = new THREE.MeshStandardMaterial({ 
                        color: SKINS[skinActivo].color 
                    });
                    const player = new THREE.Mesh(playerGeo, playerMat);
                    player.position.set(0, 2, 0);
                    player.castShadow = true;
                    scene.add(player);
                    jugadorRef.current = player;

                    // Enemigos
                    enemigosRef.current = [];
                    const names = ['SOMBRA', 'FANTASMA', 'HIELO', 'FUEGO', 'VACÍO'];
                    for (let i = 0; i < 5; i++) {
                        const enemyGeo = new THREE.CapsuleGeometry(0.6, 1.2, 8, 16);
                        const enemyMat = new THREE.MeshStandardMaterial({ color: 0xef4444 });
                        const enemy = new THREE.Mesh(enemyGeo, enemyMat);
                        const a = (i/5) * Math.PI * 2;
                        const r = 30 + Math.random() * 40;
                        enemy.position.set(Math.cos(a)*r, 2, Math.sin(a)*r);
                        enemy.castShadow = true;
                        enemy.userData = { vida: 100, nombre: names[i] };
                        scene.add(enemy);
                        enemigosRef.current.push(enemy);
                    }

                    console.log(`✅ Mapa listo con ${enemigosRef.current.length} enemigos`);

                    // Controles
                    const keyDown = (e) => { teclasRef.current[e.key.toLowerCase()] = true; if(e.key===' ') e.preventDefault(); };
                    const keyUp = (e) => { teclasRef.current[e.key.toLowerCase()] = false; };
                    window.addEventListener('keydown', keyDown);
                    window.addEventListener('keyup', keyUp);

                    // Disparo
                    const shoot = () => {
                        if (municion > 0 && vida > 0) {
                            setMunicion(m => m - 1);
                            
                            const dir = new THREE.Vector3(0, 0, -1);
                            dir.applyQuaternion(camera.quaternion);
                            
                            const raycaster = new THREE.Raycaster(camera.position, dir);
                            const hits = raycaster.intersectObjects(enemigosRef.current);
                            
                            if (hits.length > 0) {
                                const target = hits[0].object;
                                target.userData.vida -= 30;
                                
                                const orig = target.material.color.getHex();
                                target.material.color.setHex(0xffffff);
                                setTimeout(() => {
                                    if (target.material) target.material.color.setHex(orig);
                                }, 100);

                                if (target.userData.vida <= 0) {
                                    setKillFeed(kf => [...kf.slice(-3), { killer: 'Tú', victim: target.userData.nombre }]);
                                    setKills(k => k + 1);
                                    setVivos(v => v - 1);
                                    
                                    scene.remove(target);
                                    enemigosRef.current = enemigosRef.current.filter(e => e !== target);
                                    
                                    notif(`¡Eliminaste a ${target.userData.nombre}!`);
                                }
                            }
                        }
                    };

                    const handleClick = () => {
                        if (document.pointerLockElement === renderer.domElement) {
                            shoot();
                        } else {
                            renderer.domElement.requestPointerLock();
                        }
                    };
                    renderer.domElement.addEventListener('click', handleClick);

                    // Game Loop
                    let lastTime = performance.now();
                    const gameLoop = (now) => {
                        if (!jugando) return;
                        requestAnimationFrame(gameLoop);
                        
                        const dt = (now - lastTime) / 1000;
                        lastTime = now;

                        setTiempo(t => t + dt);

                        const pos = posRef.current;
                        const spd = 12 * dt;

                        if (teclasRef.current['w']) pos.z -= spd;
                        if (teclasRef.current['s']) pos.z += spd;
                        if (teclasRef.current['a']) pos.x -= spd;
                        if (teclasRef.current['d']) pos.x += spd;

                        // Gravedad
                        if (pos.y > 2) pos.y -= 12 * dt;
                        else pos.y = 2;

                        // Salto
                        if (teclasRef.current[' '] && pos.y <= 2.1) pos.y += 7;

                        // Límites isla
                        const dist = Math.sqrt(pos.x**2 + pos.z**2);
                        if (dist > 110) {
                            const ang = Math.atan2(pos.z, pos.x);
                            pos.x = Math.cos(ang) * 110;
                            pos.z = Math.sin(ang) * 110;
                            setVida(v => Math.max(0, v - 8*dt));
                        }

                        // Actualizar jugador
                        if (jugadorRef.current) {
                            jugadorRef.current.position.set(pos.x, pos.y, pos.z);
                        }

                        // Cámara sigue
                        const camTarget = new THREE.Vector3(pos.x, pos.y+6, pos.z+10);
                        camera.position.lerp(camTarget, 0.08);
                        camera.lookAt(pos.x, pos.y+1.5, pos.z);

                        // IA Enemigos
                        enemigosRef.current.forEach(enemy => {
                            const dx = pos.x - enemy.position.x;
                            const dz = pos.z - enemy.position.z;
                            const d = Math.sqrt(dx*dx + dz*dz);
                            
                            if (d < 70 && d > 2.5) {
                                enemy.position.x += (dx/d) * 3 * dt;
                                enemy.position.z += (dz/d) * 3 * dt;
                            }
                            
                            if (enemy.position.y > 2) enemy.position.y -= 12 * dt;
                        });

                        // Agua animada
                        water.position.y = -8 + Math.sin(now * 0.001) * 0.2;

                        renderer.render(scene, camera);
                    };

                    gameLoop(performance.now());

                    // Resize
                    const resize = () => {
                        camera.aspect = window.innerWidth / window.innerHeight;
                        camera.updateProjectionMatrix();
                        renderer.setSize(window.innerWidth, window.innerHeight);
                    };
                    window.addEventListener('resize', resize);

                    // Cleanup
                    return () => {
                        window.removeEventListener('keydown', keyDown);
                        window.removeEventListener('keyup', keyUp);
                        window.removeEventListener('resize', resize);
                        renderer.domElement.removeEventListener('click', handleClick);
                        
                        if (gameRef.current && renderer.domElement.parentNode === gameRef.current) {
                            gameRef.current.removeChild(renderer.domElement);
                        }
                        
                        renderer.dispose();
                        scene.traverse(o => {
                            if (o.geometry) o.geometry.dispose();
                            if (o.material) o.material.dispose();
                        });
                    };

                } catch (error) {
                    console.error('❌ Error en juego:', error);
                }
            }, [jugando, skinActivo]);

            // Pantalla de carga
            if (cargando) {
                return (
                    <div className="w-full h-screen bg-black flex items-center justify-center flex-col gap-6">
                        <div className="loading-spinner"></div>
                        <h1 className="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500">
                            FORTNITE
                        </h1>
                        <p className="text-gray-400">Cargando...</p>
                    </div>
                );
            }

            // Vista del juego
            if (jugando) {
                return (
                    <div className="relative w-full h-screen bg-black overflow-hidden">
                        <div ref={gameRef} id="game-3d" />

                        {/* HUD */}
                        <div className="absolute inset-0 pointer-events-none">
                            {/* Vida/Escudo */}
                            <div className="absolute top-6 left-6 glass-panel rounded-xl p-5 w-72 pointer-events-auto">
                                <div className="flex justify-between mb-1">
                                    <span className="text-xs font-bold text-cyan-400">VIDA</span>
                                    <span className="font-bold">{Math.floor(vida)}</span>
                                </div>
                                <div className="h-6 bg-gray-900 rounded-lg overflow-hidden border-2 border-red-500/50 mb-3">
                                    <div className="h-full bg-gradient-to-r from-red-700 to-red-400 transition-all" style={{width:`${Math.max(0,vida)}%`}}/>
                                </div>

                                <div className="flex justify-between mb-1">
                                    <span className="text-xs font-bold text-blue-400">ESCUDO</span>
                                    <span className="font-bold">{Math.floor(escudo)}</span>
                                </div>
                                <div className="h-5 bg-gray-900 rounded-lg overflow-hidden border-2 border-blue-500/50">
                                    <div className="h-full bg-gradient-to-r from-blue-600 to-cyan-400 transition-all" style={{width:`${escudo}%`}}/>
                                </div>
                            </div>

                            {/* Info */}
                            <div className="absolute top-6 left-1/2 -translate-x-1/2 glass-panel rounded-full px-6 py-3 flex gap-6">
                                <div><i className="fas fa-users text-purple-400 mr-2"></i><span className="font-bold">{vivos}</span></div>
                                <div className="w-px h-6 bg-gray-600"></div>
                                <div><i className="fas fa-clock text-yellow-400 mr-2"></i><span className="font-bold">{Math.floor(tiempo/60)}:{String(Math.floor(tiempo%60)).padStart(2,'0')}</span></div>
                                <div className="w-px h-6 bg-gray-600"></div>
                                <div><i className="fas fa-skull text-red-400 mr-2"></i><span className="font-bold">{kills}</span></div>
                            </div>

                            {/* Munición */}
                            <div className="absolute top-6 right-6 glass-panel rounded-xl p-4 text-right w-44">
                                <div className="text-5xl font-black text-yellow-400">{municion}</div>
                                <div className="text-xs font-bold text-yellow-300">MUNICIÓN</div>
                            </div>

                            {/* Mira */}
                            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-auto">
                                <svg width="40" height="40" viewBox="0 0 40 40">
                                    <circle cx="20" cy="20" r="3" fill="#00c8ff"/>
                                    <line x1="20" y1="8" x2="20" y2="14" stroke="#00c8ff" strokeWidth="2"/>
                                    <line x1="20" y1="26" x2="20" y2="32" stroke="#00c8ff" strokeWidth="2"/>
                                    <line x1="8" y1="20" x2="14" y2="20" stroke="#00c8ff" strokeWidth="2"/>
                                    <line x1="26" y1="20" x2="32" y2="20" stroke="#00c8ff" strokeWidth="2"/>
                                </svg>
                            </div>

                            {/* Kill Feed */}
                            <div className="absolute top-28 right-6 space-y-2 w-64">
                                {killFeed.map((k,i) => (
                                    <div key={i} className="glass-panel rounded-lg px-4 py-2 text-sm flex justify-between notification">
                                        <span className="font-bold text-cyan-400">{k.killer}</span>
                                        <span className="text-red-400 mx-2">×</span>
                                        <span className="font-bold text-red-400">{k.victim}</span>
                                    </div>
                                ))}
                            </div>

                            {/* Controles */}
                            <div className="absolute bottom-6 left-6 glass-panel rounded-xl p-4 pointer-events-auto">
                                <div className="text-xs font-bold text-cyan-400 mb-2">CONTROLES</div>
                                <div className="grid grid-cols-2 gap-2 text-xs text-gray-300">
                                    <div><kbd className="px-1.5 py-0.5 bg-gray-700 rounded text-cyan-300">WASD</kbd> Mover</div>
                                    <div><kbd className="px-1.5 py-0.5 bg-gray-700 rounded text-cyan-300">CLIC</kbd> Disparar</div>
                                    <div><kbd className="px-1.5 py-0.5 bg-gray-700 rounded text-cyan-300">ESP</kbd> Saltar</div>
                                </div>
                            </div>

                            {/* Salir */}
                            <button onClick={salir} className="absolute bottom-6 right-6 px-6 py-3 bg-red-600 hover:bg-red-700 rounded-xl font-bold pointer-events-auto hover:scale-105">
                                <i className="fas fa-door-open mr-2"/>SALIR
                            </button>

                            {/* Muerte */}
                            {vida <= 0 && (

                                        <h1 className="text-8xl font-black text-red-500 mb-6 animate-pulse">ELIMINADO</h1>
                                        <p className="text-2xl text-gray-300 mb-2">Posición #{vivos}</p>
                                        <p className="text-xl text-cyan-400 mb-8">{kills} Eliminaciones</p>
                                        <div className="flex gap-4 justify-center">
                                            <button onClick={() => { salir(); setTimeout(() => iniciar('SOLO', 100), 100); }} className="btn-fortnite px-8 py-4 rounded-xl text-lg">

                                        <div className="relative z-10">

                                                {SKINS[skinActivo].name}

                                            <p className="text-gray-400 mb-4">
                                                {SKINS[skinActivo].rarity} • {SKINS[skinActivo].price.toLocaleString()} V-Bucks
                                            </p>
                                            
                                            <div className="flex gap-3">

                                            </div>
                                        </div>
                                    </div>

                                    {/* Modos de Juego */}

                                        </h3>
                                        <div className="grid grid-cols-3 gap-4">

                                                <i className="fas fa-user-ninja text-3xl mb-2 block"/>
                                                <div className="text-xl font-black">SOLO</div>
                                                <div className="text-sm opacity-90">100 jugadores</div>
                                            </button>
                                            <button onClick={() => iniciar('DÚO', 50)} className="mode-card bg-gradient-to-br from-purple-500 to-pink-600 p-6 rounded-xl text-white text-center">
                                                <i className="fas fa-user-friends text-3xl mb-2 block"/>
                                                <div className="text-xl font-black">DÚO</div>
                                                <div className="text-sm opacity-90">50 dúos</div>
                                            </button>
                                            <button onClick={() => iniciar('ESCUADRÓN', 25)} className="mode-card bg-gradient-to-br from-orange-500 to-red-600 p-6 rounded-xl text-white text-center">
                                                <i className="fas fa-users text-3xl mb-2 block"/>
                                                <div className="text-xl font-black">ESCUADRÓN</div>
                                                <div className="text-sm opacity-90">25 equipos</div>
                                            </button>
                                        </div>
                                    </div>

                                    {/* Stats */}
                                    <div className="grid grid-cols-3 gap-4">
                                        {[
                                            {l:'NIVEL', v:'45', i:'fa-shield-alt', c:'text-cyan-400'},
                                            {l:'PARTIDAS', v:'147', i:'fa-gamepad', c:'text-purple-400'},
                                            {l:'WINS', v:'12%', i:'fa-trophy', c:'text-yellow-400'},
                                        ].map((s,i) => (
                                            <div key={i} className="glass-panel rounded-xl p-4 text-center">
                                                <i className={`fas ${s.i} text-xl ${s.c} mb-2 block`}/>
                                                <div className="text-2xl font-black">{s.v}</div>
                                                <div className="text-xs text-gray-400">{s.l}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* Derecha: Personaje 3D */}
                                <div className="glass-panel rounded-2xl overflow-hidden relative">
                                    <div className="absolute top-4 left-4 z-10 glass-panel px-3 py-1 rounded-lg text-xs font-bold text-cyan-400">
                                        TU PERSONAJE 3D
                                    </div>
                                    
                                    <div ref={lobbyRef} id="lobby-3d"/>

                                    {/* Selector de Skins */}
                                    <div className="absolute bottom-4 left-4 right-4 z-10 glass-panel rounded-xl p-4">
                                        <div className="text-xs font-bold text-gray-400 mb-3">CAMBIAR TRAJE:</div>
                                        <div className="flex gap-3 overflow-x-auto pb-2">
                                            {SKINS.map((skin, idx) => (
                                                <button
                                                    key={skin.id}
                                                    onClick={() => { setSkinActivo(idx); notif(`${skin.name} equipado`); }}
                                                    className={`flex-shrink-0 w-14 h-18 rounded-xl flex flex-col items-center justify-center transition-all ${
                                                        skinActivo===idx ? 'ring-2 ring-cyan-400 scale-110' : 'opacity-70 hover:opacity-100'
                                                    }`}
                                                    style={{background: `linear-gradient(135deg, ${skin.color}44, ${skin.glowColor}88)`}}
                                                    title={skin.name}
                                                >
                                                    <span className="text-2xl mb-1">{skin.emoji}</span>
                                                    <span className="text-[9px] font-bold text-white truncate w-full text-center px-1">
                                                        {skin.name.split(' ')[0]}
                                                    </span>
                                                </button>

                                        </div>
                                    </div>
                                </div>

                        )}

                        {pantalla === 'tienda' && (
                            <div className="space-y-6">
                                <h2 className="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500">
                                    <i className="fas fa-shopping-cart text-cyan-400 mr-3"/>TIENDA DE OBJETOS
                                </h2>
                                
                                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-5">
                                    {SKINS.map(skin => (
                                        <div
                                            key={skin.id}
                                            onClick={() => { setSkinActivo(skin.id); notif(`${skin.name} seleccionado`); }}
                                            className={`skin-card glass-panel rounded-2xl overflow-hidden ${skinActivo===skin.id ? 'selected' : ''}`}
                                        >
                                            <div 
                                                className="aspect-square flex items-center justify-center text-6xl relative"
                                                style={{background: `linear-gradient(135deg, ${skin.color}, ${skin.glowColor})`}}
                                            >
                                                <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"/>
                                                <span className="relative z-10">{skin.emoji}</span>
                                                
                                                <div className={`absolute top-3 left-3 px-2 py-1 rounded text-[10px] font-bold ${
                                                    skin.rarity==='MÍTICO'?'bg-red-600':
                                                    skin.rarity==='LEGENDARIO'?'bg-yellow-600':
                                                    skin.rarity==='ÉPICO'?'bg-purple-600':'bg-blue-600'
                                                }`}>
                                                    {skin.rarity}
                                                </div>

                                                {skinActivo===skin.id && (
                                                    <div className="absolute top-3 right-3 w-7 h-7 bg-cyan-500 rounded-full flex items-center justify-center">
                                                        <i className="fas fa-check text-white text-xs"/>
                                                    </div>
                                                )}
                                            </div>
                                            
                                            <div className="p-4 border-t border-slate-700/50">
                                                <div className="font-bold text-sm mb-1">{skin.name}</div>
                                                <div className="flex justify-between items-center mt-2">
                                                    <span className="text-yellow-400 font-bold text-sm">
                                                        <i className="fas fa-bolt text-xs mr-1"/>{skin.price.toLocaleString()}
                                                    </span>
                                                    <button 
                                                        onClick={(e) => { e.stopPropagation(); notif(`¡${skin.name} comprado!`); }}
                                                        className="px-3 py-1.5 bg-cyan-500 hover:bg-cyan-600 rounded-lg text-xs font-bold"
                                                    >
                                                        COMPRAR
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {pantalla === 'pase' && (
                            <div className="space-y-6 max-w-2xl">
                                <h2 className="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500">
                                    <i className="fas fa-crown text-yellow-400 mr-3"/>PASE DE BATALLA
                                </h2>
                                
                                <div className="glass-panel rounded-2xl p-8">
                                    <h3 className="text-xl font-bold mb-4">TU PROGRESO</h3>
                                    <div className="mb-6">
                                        <div className="flex justify-between mb-2">
                                            <span className="text-3xl font-black text-cyan-400">NIVEL 27</span>
                                            <span className="text-gray-400">/ 100</span>
                                        </div>
                                        <div className="h-10 bg-slate-800 rounded-xl overflow-hidden">
                                            <div className="h-full fortnite-gradient" style={{width:'27%'}}/>
                                        </div>
                                    </div>
                                    <button 
                                        onClick={() => notif('¡Nivel aumentado!')}
                                        className="btn-fortnite w-full py-3 rounded-xl"
                                    >
                                        <i className="fas fa-arrow-up mr-2"/>SUBIR NIVEL (+5)
                                    </button>
                                </div>
                            </div>
                        )}

                        {pantalla === 'escuadron' && (
                            <div className="space-y-6">
                                <h2 className="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500">
                                    <i className="fas fa-users text-cyan-400 mr-3"/>TU ESCUADRÓN
                                </h2>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                    {[
                                        {name:'Tú', level:45, status:'Listo', isYou:true},
                                        {name:'ShadowKnight', level:52, status:'En partida', isYou:false},
                                        {name:'NovaGhost', level:38, status:'Ausente', isYou:false},
                                        {name:'FrostKing', level:41, status:'Desconectado', isYou:false},
                                    ].map((m,i) => (
                                        <div key={i} className="glass-panel rounded-2xl p-6 text-center">
                                            <div className="w-20 h-20 mx-auto mb-3 rounded-full bg-gradient-to-br from-cyan-500/30 to-purple-500/30 flex items-center justify-center text-4xl">
                                                👤
                                            </div>
                                            <div className="font-bold text-lg mb-1">{m.name}</div>
                                            <div className="text-sm text-gray-400 mb-3">Nv.{m.level}</div>
                                            <div className={`text-sm font-bold mb-4 pb-4 border-b border-slate-700 ${
                                                m.status==='Listo'?'text-green-400':
                                                m.status==='En partida'?'text-yellow-400':
                                                m.status==='Ausente'?'text-gray-400':'text-red-400'
                                            }`}>
                                                {m.status.toUpperCase()}
                                            </div>
                                            <button 
                                                disabled={m.isYou}
                                                onClick={() => notif('Invitación enviada')}
                                                className={`w-full py-2 rounded-lg font-bold text-sm ${
                                                    m.isYou ? 'bg-gray-700 text-gray-400 cursor-not-allowed' : 'btn-fortnite'
                                                }`}
                                            >
                                                {m.isYou ? 'TÚ' : 'INVITAR'}
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="mt-12 py-6 text-center text-gray-500 text-sm border-t border-cyan-500/10">
                        © 2024 FORTNITE | Demo Oficial
                    </footer>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
