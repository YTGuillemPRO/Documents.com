<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortnite - Battle Royale</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            color: white;
            overflow-x: hidden;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 200, 255, 0.5), 0 0 40px rgba(123, 47, 247, 0.3); }
            50% { box-shadow: 0 0 40px rgba(0, 200, 255, 0.8), 0 0 80px rgba(123, 47, 247, 0.5); }
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }

        .fortnite-gradient { background: linear-gradient(135deg, #00c8ff 0%, #7b2ff7 100%); }
        
        .glass-panel {
            background: linear-gradient(135deg, rgba(20, 25, 40, 0.9), rgba(10, 15, 25, 0.95));
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 200, 255, 0.15);
        }

        .btn-fortnite {
            background: linear-gradient(135deg, #00c8ff, #7b2ff7);
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-fortnite:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 200, 255, 0.5);
        }

        .btn-fortnite:active { transform: scale(0.95); }

        .btn-fortnite::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn-fortnite:hover::before { left: 100%; }

        .mode-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: 2px solid transparent;
        }

        .mode-card:hover {
            transform: scale(1.08) translateY(-10px);
            border-color: #00c8ff;
            box-shadow: 0 20px 60px rgba(0, 200, 255, 0.3);
        }

        .skin-card {
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .skin-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 50px rgba(123, 47, 247, 0.4);
            border-color: rgba(123, 47, 247, 0.5);
        }

        .skin-card.selected {
            border-color: #00c8ff !important;
            box-shadow: 0 0 30px rgba(0, 200, 255, 0.6), inset 0 0 30px rgba(0, 200, 255, 0.1) !important;
        }

        .tab-item {
            transition: all 0.2s ease;
            cursor: pointer;
            user-select: none;
        }

        .tab-item:hover { background: rgba(0, 200, 255, 0.1); }
        .tab-item.active { background: linear-gradient(135deg, #00c8ff, #7b2ff7); }

        .notification-toast { animation: slideInRight 0.4s ease-out; }

        #lobby-canvas, #game-canvas { display: block; }

        .health-bar-fill { transition: width 0.3s ease; box-shadow: 0 0 10px currentColor; }

        .loading-ring {
            width: 80px; height: 80px;
            border: 4px solid rgba(0, 200, 255, 0.2);
            border-top-color: #00c8ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1f2e; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #00c8ff, #7b2ff7); border-radius: 4px; }

        .legendary-glow { animation: legendaryPulse 2s infinite; }
        @keyframes legendaryPulse {
            0%, 100% { filter: drop-shadow(0 0 10px #f59e0b) drop-shadow(0 0 20px #f59e0b); }
            50% { filter: drop-shadow(0 0 20px #f59e0b) drop-shadow(0 0 40px #f59e0b); }
        }

        .mythic-glow { animation: mythicPulse 1.5s infinite; }
        @keyframes mythicPulse {
            0%, 100% { filter: drop-shadow(0 0 15px #ef4444) drop-shadow(0 0 30px #ef4444) drop-shadow(0 0 45px #fbbf24); }
            50% { filter: drop-shadow(0 0 25px #ef4444) drop-shadow(0 0 50px #ef4444) drop-shadow(0 0 75px #fbbf24); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ============================================
        // SKINS ÉPICAS 3D ULTRA DETALLADAS
        // ============================================
        const SKINS_EPICAS = [
            {
                id: 0,
                name: 'ASTRA COSMIC',
                rarity: 'LEGENDARIO',
                price: 2000,
                emoji: '🌟',
                colorPrimary: 0x9333ea,
                colorSecondary: 0xc084fc,
                colorAccent: 0xfbbf24,
                effectType: 'cosmic',
                description: 'Guardiana del cosmos con poderes estelares',
                abilities: ['Campo estelar', 'Teleportación', 'Nova explosión']
            },
            {
                id: 1,
                name: 'SHADOW PHANTOM',
                rarity: 'ÉPICO',
                price: 1500,
                emoji: '🌑',
                colorPrimary: 0x1f2937,
                colorSecondary: 0x374151,
                colorAccent: 0x6366f1,
                effectType: 'shadow',
                description: 'Espíritu de las sombras, amo de la oscuridad',
                abilities: ['Invisibilidad', 'Sombra portál', 'Devorar luz']
            },
            {
                id: 2,
                name: 'NEXUS CYBER',
                rarity: 'RARO',
                price: 1200,
                emoji: '💎',
                colorPrimary: 0x06b6d4,
                colorSecondary: 0x22d3ee,
                colorAccent: 0xa855f7,
                effectType: 'cyber',
                description: 'Guerrero cibernético del futuro digital',
                abilities: ['Hackeo mental', 'Escudo digital', 'Rayo láser']
            },
            {
                id: 3,
                name: 'INFERNO LORD',
                rarity: 'LEGENDARIO',
                price: 2000,
                emoji: '🔥',
                colorPrimary: 0xdc2626,
                colorSecondary: 0xf97316,
                colorAccent: 0xfbbf24,
                effectType: 'fire',
                description: 'Señor supremo de los infiernos ardientes',
                abilities: ['Llameada eterna', 'Meteoro devastador', 'Aura ígnea']
            },
            {
                id: 4,
                name: 'FROST QUEEN',
                rarity: 'ÉPICO',
                price: 1500,
                emoji: '❄️',
                colorPrimary: 0x3b82f6,
                colorSecondary: 0x93c5fd,
                colorAccent: 0xe0f2fe,
                effectType: 'ice',
                description: 'Reina absoluta del invierno eterno',
                ['Congelamiento total', 'Tormenta de nieve', 'Muro de hielo']: []
            },
            {
                id: 5,
                name: 'PHOENIX IMMORTAL',
                rarity: 'MÍTICO',
                price: 3000,
                emoji: '🦅',
                colorPrimary: 0xf59e0b,
                colorSecondary: 0xfbbf24,
                colorAccent: 0xef4444,
                effectType: 'phoenix',
                description: 'Fénix renacido, ser de fuego inmortal',
                abilities: ['Renacimiento', 'Lluvia de fuego', 'Alas de furia']
            }
        ];

        // COMPONENTE PRINCIPAL
        function FortniteApp() {
            // Estados
            const [pantallaActual, setPantallaActual] = useState('lobby');
            const [enPartida, setEnPartida] = useState(false);
            const [cargando, setCargando] = useState(true);
            
            const [vida, setVida] = useState(100);
            const [escudo, setEscudo] = useState(50);
            const [kills, setKills] = useState(0);
            const [municion, setMunicion] = useState(999);
            const [skinActivo, setSkinActivo] = useState(0);
            const [nivelJugador, setNivelJugador] = useState(45);
            const [nivelPase, setNivelPase] = useState(27);
            
            const [mostrarConfig, setMostrarConfig] = useState(false);
            const [notificacion, setNotificacion] = useState(null);
            const [killFeed, setKillFeed] = useState([]);
            const [tiempoPartida, setTiempoPartida] = useState(0);
            const [jugadoresVivos, setJugadoresVivos] = useState(100);

            // Refs
            const lobbyCanvasRef = useRef(null);
            const gameCanvasRef = useRef(null);
            const escenaLobbyRef = useRef(null);
            const jugadorRef = useRef(null);
            const enemigosRef = useRef([]);
            const camaraRef = useRef(null);
            const teclasPulsadas = useRef({});
            const estadoJuegoRef = useRef({ posicion: { x: 0, y: 5, z: 0 } });
            const particulasRef = useRef([]);
            const grupoPersonajeRef = useRef(null);

            // Carga inicial
            useEffect(() => {
                setTimeout(() => setCargando(false), 2500);
            }, []);

            // Notificación
            const mostrarNotif = (msg, tipo = 'exito') => {
                setNotificacion({ mensaje: msg, tipo });
                setTimeout(() => setNotificacion(null), 3000);
            };

            // Cambiar pantalla
            const cambiarPantalla = (p) => setPantallaActual(p);

            // Iniciar partida
            const iniciarPartida = (modo, num) => {
                setEnPartida(true);
                setVida(100); setEscudo(50); setKills(0); setMunicion(999);
                setTiempoPartida(0); setJugadoresVivos(num); setKillFeed([]);
                mostrarNotif(`¡${modo} iniciado!`, 'exito');
            };

            // Salir partida
            const salirDePartida = () => {
                setEnPartida(false);
                setVida(100); setEscudo(50); setKills(0); setMunicion(999);
                setPantallaActual('lobby');
                enemigosRef.current = [];
                mostrarNotif('Volviste al lobby', 'info');
            };

            // Comprar skin
            const comprarSkin = (skin) => mostrarNotif(`¡${skin.name} tuyo!`, 'exito');

            // Subir nivel pase
            const subirNivelPase = () => {
                const nuevo = Math.min(100, nivelPase + 5);
                setNivelPase(nuevo);
                mostrarNotif(`¡Nivel ${nuevo}!`, 'exito');
            };

            // ============================================
            // CREAR PERSONAJE 3D ULTRA DETALLADO
            // ============================================
            const crearPersonajeEpico = (grupo, skin) => {
                // Limpiar grupo anterior
                while(grupo.children.length > 0) {
                    const child = grupo.children[0];
                    if(child.geometry) child.geometry.dispose();
                    if(child.material) {
                        if(Array.isArray(child.material)) child.material.forEach(m => m.dispose());
                        else child.material.dispose();
                    }
                    grupo.remove(child);
                }

                const { colorPrimary, colorSecondary, colorAccent, effectType } = skin;

                // Material principal con propiedades avanzadas
                const materialPrincipal = new THREE.MeshPhysicalMaterial({
                    color: colorPrimary,
                    metalness: 0.4,
                    roughness: 0.3,
                    clearcoat: 0.3,
                    clearcoatRoughness: 0.2,
                    envMapIntensity: 1
                });

                const materialSecundario = new THREE.MeshPhysicalMaterial({
                    color: colorSecondary,
                    metalness: 0.6,
                    roughness: 0.2,
                    clearcoat: 0.5,
                    emissive: colorSecondary,
                    emissiveIntensity: 0.2
                });

                const materialAcento = new THREE.MeshStandardMaterial({
                    color: colorAccent,
                    emissive: colorAccent,
                    emissiveIntensity: 0.5,
                    metalness: 0.8,
                    roughness: 0.1
                });

                // ======== CABEZA DETALLADA ========
                const cabezaGrupo = new THREE.Group();

                // Cráneo principal
                const geoCabeza = new THREE.SphereGeometry(0.38, 32, 32);
                const cabeza = new THREE.Mesh(geoCabeza, materialPrincipal);
                cabeza.scale.set(1, 1.1, 1);
                cabezaGrupo.add(cabeza);

                // Ojos brillantes
                const geoOjo = new THREE.SphereGeometry(0.08, 16, 16);
                const matOjo = new THREE.MeshBasicMaterial({ 
                    color: effectType === 'fire' ? 0xff4500 : 
                          effectType === 'ice' ? 0x00ffff :
                          effectType === 'phoenix' ? 0xffd700 : 0xffffff 
                });
                
                const ojoIzq = new THREE.Mesh(geoOjo, matOjo);
                ojoIzq.position.set(-0.13, 0.05, 0.32);
                cabezaGrupo.add(ojoIzq);

                const ojoDer = new THREE.Mesh(geoOjo, matOjo);
                ojoDer.position.set(0.13, 0.05, 0.32);
                cabezaGrupo.add(ojoDer);

                // Brillo en ojos (point lights)
                const luzOjoIzq = new THREE.PointLight(colorAccent, 0.5, 1);
                luzOjoIzq.position.copy(ojoIzq.position);
                cabezaGrupo.add(luzOjoIzq);

                const luzOjoDer = new THREE.PointLight(colorAccent, 0.5, 1);
                luzOjoDer.position.copy(ojoDer.position);
                cabezaGrupo.add(luzOjoDer);

                // Casco/Accesorio según skin
                if(effectType === 'cosmic') {
                    // Diadema cósmica
                    const geoDiadema = new THREE.TorusGeometry(0.35, 0.04, 8, 32, Math.PI);
                    const diadema = new THREE.Mesh(geoDiadema, materialAcento);
                    diadema.position.y = 0.2;
                    diadema.rotation.x = Math.PI / 2;
                    cabezaGrupo.add(diadema);

                    // Gema central
                    const geoGema = new THREE.OctahedronGeometry(0.08);
                    const gema = new THREE.Mesh(geoGema, materialAcento);
                    gema.position.set(0, 0.2, 0.33);
                    cabezaGrupo.add(gema);
                } else if(effectType === 'shadow') {
                    // Capucha oscura
                    const geoCapucha = new THREE.ConeGeometry(0.42, 0.35, 8);
                    const capucha = new THREE.Mesh(geoCapucha, new THREE.MeshBasicMaterial({
                        color: 0x000000,
                        transparent: true,
                        opacity: 0.8
                    }));
                    capucha.position.y = 0.25;
                    capucha.rotation.x = Math.PI;
                    cabezaGrupo.add(capucha);
                } else if(effectType === 'cyber') {
                    // Visor tecnológico
                    const geoVisor = new THREE.BoxGeometry(0.45, 0.12, 0.08);
                    const visor = new THREE.Mesh(geoVisor, materialSecundario);
                    visor.position.set(0, 0.02, 0.34);
                    cabezaGrupo.add(visor);

                    // Líneas de circuitos
                    for(let i = 0; i < 5; i++) {
                        const linea = new THREE.Mesh(
                            new THREE.BoxGeometry(0.01, 0.15, 0.01),
                            materialAcento
                        );
                        linea.position.set(-0.18 + i * 0.09, -0.15, 0.33);
                        cabezaGrupo.add(linea);
                    }
                } else if(effectType === 'fire') {
                    // Cuernos de fuego
                    const geoCuerno = new THREE.ConeGeometry(0.06, 0.35, 8);
                    const cuernoIzq = new THREE.Mesh(geoCuerno, materialAcento);
                    cuernoIzq.position.set(-0.2, 0.35, 0);
                    cuernoIzq.rotation.z = 0.3;
                    cabezaGrupo.add(cuernoIzq);

                    const cuernoDer = new THREE.Mesh(geoCuerno, materialAcento);
                    cuernoDer.position.set(0.2, 0.35, 0);
                    cuernoDer.rotation.z = -0.3;
                    cabezaGrupo.add(cuernoDer);
                } else if(effectType === 'ice') {
                    // Corona de cristal
                    const geoCorona = new THREE.TorusGeometry(0.38, 0.03, 8, 6);
                    const corona = new THREE.Mesh(geoCorona, materialSecundario);
                    corona.position.y = 0.28;
                    corona.rotation.x = Math.PI / 2;
                    cabezaGrupo.add(corona);

                    // Picos de hielo
                    for(let i = 0; i < 8; i++) {
                        const pico = new THREE.Mesh(
                            new THREE.ConeGeometry(0.03, 0.12, 4),
                            materialSecundario
                        );
                        const angulo = (i / 8) * Math.PI * 2;
                        pico.position.set(
                            Math.cos(angulo) * 0.35,
                            0.3,
                            Math.sin(angulo) * 0.35
                        );
                        pico.lookAt(0, 0.5, 0);
                        cabezaGrupo.add(pico);
                    }
                } else if(effectType === 'phoenix') {
                    // Corona de plumas doradas
                    for(let i = 0; i < 12; i++) {
                        const pluma = new THREE.Mesh(
                            new THREE.ConeGeometry(0.04, 0.2, 4),
                            materialAcento
                        );
                        const angulo = (i / 12) * Math.PI * 2;
                        pluma.position.set(
                            Math.cos(angulo) * 0.38,
                            0.25 + Math.random() * 0.1,
                            Math.sin(angulo) * 0.38
                        );
                        pluma.rotation.x = -Math.PI / 4 + Math.random() * 0.3;
                        pluma.rotation.z = angulo;
                        cabezaGrupo.add(pluma);
                    }
                }

                cabezaGrupo.position.y = 2.15;
                grupo.add(cabezaGrupo);

                // ======== TORSO DETALLADO ========
                const torsoGrupo = new THREE.Group();

                // Pecho principal
                const geoTorso = new THREE.CapsuleGeometry(0.42, 0.9, 12, 24);
                const torso = new THREE.Mesh(geoTorso, materialPrincipal);
                torso.position.y = 1.25;
                torsoGrupo.add(torso);

                // Pectorales destacados
                const geoPectoral = new THREE.SphereGeometry(0.15, 16, 16);
                const pectoralIzq = new THREE.Mesh(geoPectoral, materialSecundario);
                pectoralIzq.position.set(-0.18, 1.45, 0.28);
                pectoralIzq.scale.set(1, 0.8, 0.6);
                torsoGrupo.add(pectoralIzq);

                const pectoralDer = new THREE.Mesh(geoPectoral, materialSecundario);
                pectoralDer.position.set(0.18, 1.45, 0.28);
                pectoralDer.scale.set(1, 0.8, 0.6);
                torsoGrupo.add(pectoralDer);

                // Cinturón/cintura
                const geoCinturon = new THREE.CylinderGeometry(0.44, 0.42, 0.15, 24);
                const cinturon = new THREE.Mesh(geoCinturon, materialAcento);
                cinturon.position.y = 0.72;
                torsoGrupo.add(cinturon);

                // Hebilla del cinturón
                const geoHebilla = new THREE.BoxGeometry(0.15, 0.12, 0.05);
                const hebilla = new THREE.Mesh(geoHebrella, materialAcento);
                hebilla.position.set(0, 0.72, 0.43);
                torsoGrupo.add(heblla);

                // Diseño en pecho según skin
                if(effectType === 'cosmic') {
                    // Símbolo estelar
                    const geoEstrella = new THREE.OctahedronGeometry(0.15);
                    const estrella = new THREE.Mesh(geoEstrella, materialAcento);
                    estrella.position.set(0, 1.4, 0.35);
                    estrella.scale.set(1, 1, 0.5);
                    torsoGrupo.add(estrella);
                } else if(effectType === 'fire') {
                    // Llamas en pecho
                    for(let i = 0; i < 3; i++) {
                        const llama = new THREE.Mesh(
                            new THREE.ConeGeometry(0.06, 0.2 + Math.random() * 0.1, 6),
                            materialAcento
                        );
                        llama.position.set(-0.1 + i * 0.1, 1.5, 0.34);
                        torsoGrupo.add(llama);
                    }
                } else if(effectType === 'phoenix') {
                    // Símbolo de fénix
                    const alasShape = new THREE.Shape();
                    alasShape.moveTo(0, 0);
                    alasShape.lineTo(-0.2, -0.15);
                    alasShape.lineTo(-0.15, 0.05);
                    alasShape.lineTo(0, 0.1);
                    alasShape.lineTo(0.15, 0.05);
                    alasShape.lineTo(0.2, -0.15);
                    alasShape.lineTo(0, 0);

                    const alasGeo = new THREE.ExtrudeGeometry(alasShape, { depth: 0.03, bevelEnabled: false });
                    const alasMesh = new THREE.Mesh(alasGeo, materialAcento);
                    alasMesh.position.set(0, 1.35, 0.33);
                    alasMesh.scale.set(1.2, 1.2, 1);
                    torsoGrupo.add(alasMesh);
                }

                grupo.add(torsoGrupo);

                // ======== BRAZOS DETALLADOS ========
                const crearBrazo = (lado) => {
                    const brazoGrupo = new THREE.Group();
                    const dir = lado === 'izq' ? -1 : 1;

                    // Hombro
                    const geoHombro = new THREE.SphereGeometry(0.14, 16, 16);
                    const hombro = new THREE.Mesh(geoHombro, materialSecundario);
                    hombro.position.set(dir * 0.55, 1.65, 0);
                    brazoGrupo.add(hombro);

                    // Brazo superior
                    const geoBrazoSup = new THREE.CapsuleGeometry(0.12, 0.45, 8, 16);
                    const brazoSup = new THREE.Mesh(geoBrazoSup, materialPrincipal);
                    brazoSup.position.set(dir * 0.58, 1.25, 0);
                    brazoSup.rotation.z = dir * 0.2;
                    brazoGrupo.add(brazoSup);

                    // Codo
                    const geoCodo = new THREE.SphereGeometry(0.11, 12, 12);
                    const codo = new THREE.Mesh(geoCodo, materialSecundario);
                    codo.position.set(dir * 0.68, 0.95, 0);
                    brazoGrupo.add(codo);

                    // Antebrazo
                    const geoAntebrazo = new THREE.CapsuleGeometry(0.1, 0.45, 8, 16);
                    const antebrazo = new THREE.Mesh(geoAntebrazo, materialPrincipal);
                    antebrazo.position.set(dir * 0.72, 0.65, 0);
                    brazoGrupo.add(antebrazo);

                    // Mano
                    const geoMano = new THREE.SphereGeometry(0.1, 12, 12);
                    const mano = new THREE.Mesh(geoMano, new THREE.MeshStandardMaterial({ 
                        color: 0xffdbac, roughness: 0.5 
                    }));
                    mano.position.set(dir * 0.74, 0.35, 0);
                    mano.scale.set(1, 0.85, 0.85);
                    brazoGrupo.add(mano);

                    // Guantelete/brazalete
                    const geoGuante = new THREE.CylinderGeometry(0.11, 0.11, 0.08, 16);
                    const guante = new THREE.Mesh(geoGuante, materialAcento);
                    guante.position.set(dir * 0.73, 0.52, 0);
                    brazoGrupo.add(guante);

                    return brazoGrupo;
                };

                grupo.add(crearBrazo('izq'));
                grupo.add(crearBrazo('der'));

                // ======== PIERNAS DETALLADAS ========
                const crearPierna = (lado) => {
                    const piernaGrupo = new THREE.Group();
                    const dir = lado === 'izq' ? -1 : 1;

                    // Cadera/muslo superior
                    const geoMuslo = new THREE.CapsuleGeometry(0.15, 0.5, 10, 16);
                    const muslo = new new THREE.Mesh(geoMuslo, materialPrincipal);
                    muslo.position.set(dir * 0.18, 0.45, 0);
                    piernaGrupo.add(muslo);

                    // Rodilla
                    const geoRodilla = new THREE.SphereGeometry(0.13, 12, 12);
                    const rodilla = new THREE.Mesh(geoRodilla, materialSecundario);
                    rodilla.position.set(dir * 0.18, 0.12, 0);

                    // Pantorrilla

                grupo.add(crearPierna('izq'));

                // ======== MOCHILA/ALAS ESPECIALES ========
                if(effectType === 'cosmic') {
                    // Mochila cósmica con orbe flotante

                        alaShape.moveTo(0, 0);
                        alaShape.quadraticCurveTo(dir * 0.8, 0.3, dir * 1.2, 0);

                            color: 0x000000,
                            transparent: true,
                            opacity: 0.6,
                            side: THREE.DoubleSide
                        });
                        const ala = new THREE.Mesh(alaGeo, alaMat);

                        ala.rotation.y = lado === 'izq' ? -0.3 : 0.3;
                        alaGrupo.add(ala);

                        return alaGrupo;
                    };

                    grupo.add(crearAlaSombra('izq'));
                    grupo.add(crearAlaSombra('der'));
                } else if(effectType === 'cyber') {
                    // Mochila tecnológica con antenas
                    const mochilaCyber = new THREE.Group();

                    const cuerpoMochila = new THREE.Mesh(
                        new THREE.BoxGeometry(0.4, 0.5, 0.2),

                    );
                    cuerpoMochila.position.set(0, 1.35, -0.4);
                    mochilaCyber.add(cuerpoMochila);

                    // Antenas
                    for(let i = 0; i < 2; i++) {
                        const antena = new THREE.Mesh(
                            new THREE.CylinderGeometry(0.015, 0.015, 0.25, 8),
                            materialPrincipal
                        );
                        antena.position.set(-0.12 + i * 0.24, 1.62, -0.4);
                        mochilaCyber.add(antena);

                        const punta = new THREE.Mesh(
                            new THREE.SphereGeometry(0.03, 8, 8),
                            materialAcento
                        );
                        punta.position.set(-0.12 + i * 0.24, 1.75, -0.4);
                        mochilaCyber.add(punta);
                    }

                    grupo.add(mochilaCyber);
                } else if(effectType === 'fire') {
                    // Llamas en espalda
                    for(let i = 0; i < 7; i++) {
                        const llama = new THREE.Mesh(
                            new THREE.ConeGeometry(0.08 + Math.random() * 0.04, 0.4 + Math.random() * 0.2, 6),
                            materialAcento
                        );
                        llama.position.set(
                            -0.2 + i * 0.07 + Math.random() * 0.05,
                            1.2 + Math.random() * 0.3,
                            -0.35
                        );
                        llama.userData.esLlama = true;
                        llama.userData.velocidadEscalado = 0.5 + Math.random();
                        grupo.add(llama);
                    }
                } else if(effectType === 'ice') {
                    // Alas de cristal de hielo
                    const crearAlaHielo = (lado) => {
                        const alaGrupo = new THREE.Group();
                        const dir = lado === 'izq' ? -1 : 1;

                        // Ala principal
                        const alaGeo = new THREE.BufferGeometry();
                        const vertices = new Float32Array([
                            0, 0, 0,
                            dir * 0.3, 0.5, 0,
                            dir * 0.8, 0.3, 0,
                            dir * 1.0, -0.1, 0,
                            dir * 0.7, -0.4, 0,
                            dir * 0.2, -0.3, 0
                        ]);
                        alaGeo.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
                        alaGeo.computeVertexNormals();

                        const ala = new THREE.Mesh(alaGeo, materialSecundario);
                        ala.position.set(dir * 0.25, 1.3, -0.15);
                        alaGrupo.add(ala);

                        // Cristales adicionales
                        for(let j = 0; j < 3; j++) {
                            const cristal = new THREE.Mesh(
                                new THREE.OctahedronGeometry(0.08 + Math.random() * 0.05),
                                materialAcento
                            );
                            cristal.position.set(
                                dir * (0.4 + j * 0.2 + Math.random() * 0.1),
                                1.0 + Math.random() * 0.4,
                                -0.2 + Math.random() * 0.1
                            );
                            cristal.rotation.set(Math.random(), Math.random(), Math.random());

                    grupo.add(crearAlaHielo('izq'));
                    grupo.add(crearAlaHielo('der'));
                } else if(effectType === 'phoenix') {
                    // ALAS DE FÉNIX GRANDES Y DETALLADAS
                    const crearAlaPhoenix = (lado) => {
                        const alaGrupo = new THREE.Group();

                        // Estructura principal del ala
                        for(let fila = 0; fila < 5; fila++) {

                                pluma.rotation.set(
                                    -Math.PI / 3 + Math.random() * 0.3,
                                    dir * (Math.PI / 6 + Math.random() * 0.2),
                                    dir * (Math.random() * 0.3)

                                pluma.userData.esPluma = true;
                                pluma.userData.velocidadAleteo = 0.05 + Math.random() * 0.05;
                                alaGrupo.add(pluma);
                            }

                        // Plumas largas principales
                        for(let i = 0; i < 3; i++) {
                            const plumaPrincipal = new THREE.Mesh(
                                new THREE.ConeGeometry(0.08, 1.2 - i * 0.2, 4),

                            );
                            plumaPrincipal.position.set(
                                dir * (0.5 + i * 0.3),
                                1.3 - i * 0.15,
                                -0.15
                            );
                            plumaPrincipal.rotation.set(
                                -Math.PI / 4,
                                dir * Math.PI / 8,
                                dir * 0.2
                            );
                            plumaPrincipal.userData.esPluma = true;
                            plumaPrincipal.userData.velocidadAleteo = 0.03;
                            alaGrupo.add(plumaPrincipal);
                        }

                        alaGrupo.position.set(dir * 0.2, 0, 0);
                        return alaGrupo;
                    };

                    const alaIzq = crearAlaPhoenix('izq');
                    const alaDer = crearAlaPhoenix('der');
                    alaIzq.userData.esAlaPhoenix = true;
                    alaDer.userData.esAlaPhoenix = true;
                    grupo.add(alaIzq);
                    grupo.add(alaDer);
                }

                return grupo;
            };

            // ============================================
            // ESCENA 3D DEL LOBBY (PERSONAJE ÉPICO)
            // ============================================
            useEffect(() => {
                if(!lobbyCanvasRef.current || enPartida) return;

                lobbyCanvasRef.current.innerHTML = '';

                const escena = new THREE.Scene();
                escena.background = new THREE.Color(0x050810);
                escenaLobbyRef.current = escena;

                const camara = new THREE.PerspectiveCamera(
                    45,
                    lobbyCanvasRef.current.clientWidth / lobbyCanvasRef.current.clientHeight,

                    1000
                );
                camara.position.set(0, 2.5, 7);
                camara.lookAt(0, 1.5, 0);

                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(lobbyCanvasRef.current.clientWidth, lobbyCanvasRef.current.clientHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                renderer.shadowMap.enabled = true;
                renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                renderer.toneMapping = THREE.ACESFilmicToneMapping;
                renderer.toneMappingExposure = 1.2;
                lobbyCanvasRef.current.appendChild(renderer.domElement);

                // Iluminación épica
                const ambiente = new THREE.AmbientLight(0xffffff, 0.4);
                escena.add(ambiente);

                const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
                keyLight.position.set(5, 10, 5);
                keyLight.castShadow = true;
                keyLight.shadow.mapSize.width = 2048;
                keyLight.shadow.mapSize.height = 2048;
                escena.add(keyLight);

                const fillLight = new THREE.PointLight(0x00c8ff, 0.6, 20);
                fillLight.position.set(-4, 3, 3);
                escena.add(fillLight);

                const rimLight = new THREE.PointLight(0x7b2ff7, 0.5, 20);
                rimLight.position.set(4, 2, -3);
                escena.add(rimLight);

                // Suelo reflectante
                const sueloGeo = new THREE.CircleGeometry(6, 64);
                const sueloMat = new THREE.MeshStandardMaterial({
                    color: 0x0a0e1a,
                    metalness: 0.95,
                    roughness: 0.1
                });
                const suelo = new THREE.Mesh(sueloGeo, sueloMat);
                suelo.rotation.x = -Math.PI / 2;
                suelo.receiveShadow = true;
                escena.add(suello);

                // Anillo de energía bajo el personaje
                const anilloGeo = new THREE.RingGeometry(1.2, 1.4, 64);
                const anilloMat = new THREE.MeshBasicMaterial({
                    color: SKINS_EPICAS[skinActivo].colorAccent,
                    transparent: true,
                    opacity: 0.6,
                    side: THREE.DoubleSide
                });
                const anillo = new THREE.Mesh(anilloGeo, anilloMat);
                anillo.rotation.x = -Math.PI / 2;
                anillo.position.y = 0.01;
                escena.add(anillo);

                // Grupo del personaje
                const grupoPersonaje = new THREE.Group();
                crearPersonajeEpico(grupoPersonaje, SKINS_EPICAS[skinActivo]);
                grupoPersonaje.position.y = 0;
                escena.add(grupoPersonaje);
                grupoPersonajeRef.current = grupoPersonaje;

                // Partículas ambientales según skin
                const particulasAmbiente = [];
                const skin = SKINS_EPICAS[skinActivo];

                for(let i = 0; i < 60; i++) {
                    let particulaGeo, particulaMat;

                    if(skin.effectType === 'cosmic') {
                        particulaGeo = new THREE.OctahedronGeometry(0.04 + Math.random() * 0.04);
                        particulaMat = new THREE.MeshBasicMaterial({
                            color: Math.random() > 0.5 ? skin.colorAccent : skin.colorPrimary,
                            transparent: true,
                            opacity: 0.7
                        });
                    } else if(skin.effectType === 'fire') {
                        particulaGeo = new THREE.SphereGeometry(0.03 + Math.random() * 0.03, 8, 8);
                        particulaMat = new THREE.MeshBasicMaterial({
                            color: new THREE.Color().lerpColors(
                                new THREE.Color(skin.colorPrimary),
                                new THREE.Color(skin.colorAccent),
                                Math.random()
                            ),
                            transparent: true,
                            opacity: 0.8
                        });
                    } else if(skin.effectType === 'ice') {
                        particulaGeo = new THREE.OctahedronGeometry(0.03 + Math.random() * 0.03);
                        particulaMat = new THREE.MeshBasicMaterial({
                            color: 0xffffff,
                            transparent: true,
                            opacity: 0.9
                        });
                    } else if(skin.effectType === 'phoenix') {
                        particulaGeo = new THREE.TetrahedronGeometry(0.04 + Math.random() * 0.03);
                        particulaMat = new THREE.MeshBasicMaterial({
                            color: skin.colorAccent,
                            transparent: true,
                            opacity: 0.8
                        });
                    } else {
                        particulaGeo = new THREE.SphereGeometry(0.025 + Math.random() * 0.025, 8, 8);
                        particulaMat = new THREE.MeshBasicMaterial({
                            color: skin.colorSecondary,
                            transparent: true,
                            opacity: 0.6
                        });
                    }

                    const particula = new THREE.Mesh(particulaGeo, particulaMat);
                    
                    const radio = 2 + Math.random() * 4;
                    const angulo = Math.random() * Math.PI * 2;
                    particula.position.set(
                        Math.cos(angulo) * radio,
                        Math.random() * 6,
                        Math.sin(angulo) * radio
                    );

                    particula.userData = {
                        velocidadY: 0.008 + Math.random() * 0.015,
                        velocidadRotacion: 0.01 + Math.random() * 0.02,
                        inicioY: particula.position.y,
                        anguloBase: angulo,
                        radioBase: radio,
                        offsetPhase: Math.random() * Math.PI * 2
                    };

                    escena.add(particula);
                    particulasAmbiente.push(particula);
                }
                particulasRef.current = particulasAmbiente;

                // Animación
                let tiempo = 0;
                const animar = () => {
                    if(enPartida) return;
                    requestAnimationFrame(animar);
                    tiempo += 0.016;

                    // Rotación suave del personaje
                    grupoPersonaje.rotation.y = Math.sin(tiempo * 0.5) * 0.4;

                    // Respiración
                    grupoPersonaje.position.y = Math.sin(tiempo * 2) * 0.05;

                    // Animar elementos especiales del personaje
                    grupoPersonaje.traverse(child => {
                        if(child.userData.esOrbe) {
                            child.rotation.x += child.userData.velocidadRotacion;
                            child.rotation.y += child.userData.velocidadRotacion;
                            child.position.y = 1.8 + Math.sin(tiempo * 3) * 0.1;
                        }
                        if(child.userData.esLlama) {
                            child.scale.y = 0.8 + Math.sin(tiempo * 8 + child.position.x) * 0.3;
                            child.rotation.y += 0.05;
                        }
                        if(child.userData.esPluma) {
                            child.rotation.z = Math.sin(tiempo * child.userData.velocidadAleteo * 60) * 0.3;
                        }
                        if(child.userData.esAlaPhoenix) {
                            child.rotation.z = Math.sin(tiempo * 2) * 0.15;
                        }
                    });

                    // Anillo de energía pulsante
                    anillo.material.opacity = 0.4 + Math.sin(tiempo * 3) * 0.2;
                    anillo.rotation.z += 0.005;

                    // Partículas animadas
                    particulasAmbiente.forEach(p => {
                        p.position.y += p.userData.velocidadY;
                        p.rotation.x += p.userData.velocidadRotacion;
                        p.rotation.y += p.userData.velocidadRotacion;

                        if(p.position.y > p.userData.inicioY + 3) {
                            p.position.y = p.userData.inicioY - 2;
                        }

                        // Movimiento orbital sutil
                        const offset = Math.sin(tiempo * 0.5 + p.userData.offsetPhase) * 0.3;
                        p.position.x = Math.cos(p.userData.anguloBase) * (p.userData.radioBase + offset);
                        p.position.z = Math.sin(p.userData.anguloBase) * (p.userData.radioBase + offset);
                    });

                    renderer.render(escena, camara);
                };
                animar();

                // Actualizar skin
                const intervalo = setInterval(() => {
                    if(!enPartida && grupoPersonajeRef.current) {
                        crearPersonajeEpico(grupoPersonajeRef.current, SKINS_EPICAS[skinActivo]);
                        
                        // Actualizar partículas
                        particulasAmbiente.forEach(p => escena.remove(p));
                        particulasAmbiente.length = 0;
                        // Recrear partículas...
                    }
                }, 100);

                const handleResize = () => {
                    if(lobbyCanvasRef.current) {
                        camara.aspect = lobbyCanvasRef.current.clientWidth / lobbyCanvasRef.current.clientHeight;
                        camara.updateProjectionMatrix();
                        renderer.setSize(lobbyCanvasRef.current.clientWidth, lobbyCanvasRef.current.clientHeight);
                    }
                };
                window.addEventListener('resize', handleResize);

                return () => {
                    clearInterval(intervalo);
                    window.removeEventListener('resize', handleResize);
                    renderer.dispose();
                    escena.traverse(obj => {
                        if(obj.geometry) obj.geometry.dispose();
                        if(obj.material) obj.material.dispose();
                    });
                };
            }, [enPartida, skinActivo]);

            // ============================================
            // ESCENA DEL JUEGO
            // ============================================
            useEffect(() => {
                if(!enPartida || !gameCanvasRef.current) return;

                gameCanvasRef.current.innerHTML = '';

                const escena = new THREE.Scene();
                escena.background = new THREE.Color(0x87ceeb);
                escena.fog = new THREE.Fog(0x87ceeb, 50, 300);

                const camara = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camara.position.set(0, 8, 12);
                camaraRef.current = camara;

                const renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.shadowMap.enabled = true;
                gameCanvasRef.current.appendChild(renderer.domElement);

                // Luces
                escena.add(new THREE.AmbientLight(0xffffff, 0.5));
                const sol = new THREE.DirectionalLight(0xffffff, 1);
                sol.position.set(50, 100, 50);
                sol.castShadow = true;
                escena.add(sol);

                // Terreno
                const terreno = new THREE.Mesh(
                    new THREE.ConeGeometry(120, 15, 32),
                    new THREE.MeshStandardMaterial({ color: 0x4ade80 })
                );
                terreno.position.y = -7.5;
                terreno.receiveShadow = true;
                escena.add(terreno);

                // Agua
                const agua = new THREE.Mesh(
                    new THREE.PlaneGeometry(400, 400),
                    new THREE.MeshStandardMaterial({ color: 0x0077be, transparent: true, opacity: 0.7 })
                );
                agua.rotation.x = -Math.PI / 2;
                agua.position.y = -8;
                escena.add(agua);

                // Edificios
                for(let i = 0; i < 15; i++) {
                    const edificio = new THREE.Mesh(
                        new THREE.BoxGeometry(8+Math.random()*12, 10+Math.random()*25, 8+Math.random()*12),
                        new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff })
                    );
                    const a = Math.random() * Math.PI * 2;
                    const r = 25 + Math.random() * 80;
                    edificio.position.set(Math.cos(a)*r, 10+Math.random()*12, Math.sin(a)*r);
                    edificio.castShadow = true;
                    escena.add(edificio);
                }

                // Jugador (versión simplificada para rendimiento)
                const jugador = new THREE.Mesh(
                    new THREE.CapsuleGeometry(0.6, 1.2, 8, 16),
                    new THREE.MeshStandardMaterial({ color: SKINS_EPICAS[skinActivo].colorPrimary })
                );
                jugador.position.set(0, 2, 0);
                jugador.castShadow = true;
                escena.add(jugador);
                jugadorRef.current = jugador;

                // Enemigos
                enemigosRef.current = [];
                const nombres = ['SOMBRA', 'FANTASMA', 'HIELO', 'FUEGO', 'VACÍO'];
                for(let i = 0; i < 5; i++) {
                    const enemigo = new THREE.Mesh(
                        new THREE.CapsuleGeometry(0.6, 1.2, 8, 16),
                        new THREE.MeshStandardMaterial({ color: 0xef4444 })
                    );
                    const a = (i/5)*Math.PI*2;
                    const r = 30+Math.random()*40;
                    enemigo.position.set(Math.cos(a)*r, 2, Math.sin(a)*r);
                    enemigo.castShadow = true;
                    enemigo.userData = { vida: 100, nombre: nombres[i] };
                    escena.add(enemigo);
                    enemigosRef.current.push(enemigo);
                }

                // Controles
                const onKeyDown = e => { teclasPulsadas.current[e.key.toLowerCase()] = true; if(e.key===' ')e.preventDefault(); };
                const onKeyUp = e => { teclasPulsadas.current[e.key.toLowerCase()] = false; };
                window.addEventListener('keydown', onKeyDown);
                window.addEventListener('keyup', onKeyUp);

                const disparar = () => {
                    if(municion > 0 && vida > 0) {
                        setMunicion(prev=>prev-1);
                        const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camara.quaternion);
                        const hits = new THREE.Raycaster(camara.position, dir).intersectObjects(enemigosRef.current);
                        if(hits.length > 0) {
                            const obj = hits[0].object;
                            obj.userData.vida -= 30;
                            const c = obj.material.color.getHex();
                            obj.material.color.setHex(0xffffff);
                            setTimeout(()=>{if(obj.material)obj.material.color.setHex(c);},100);
                            if(obj.userData.vida <= 0) {
                                setKillFeed(prev=>[...prev.slice(-3),{killer:'Tú',victim:obj.userData.nombre}]);
                                setKills(prev=>prev+1);
                                setJugadoresVivos(prev=>prev-1);
                                escena.remove(obj);
                                enemigosRef.current=enemigosRef.current.filter(e=>e!==obj);
                                mostrarNotif(`¡Eliminaste a ${obj.userData.nombre}!`,'exito');
                            }
                        }
                    }
                };

                const handleClick = () => {
                    if(document.pointerLockElement===renderer.domElement) disparar();
                    else renderer.domElement.requestPointerLock();
                };
                renderer.domElement.addEventListener('click',handleClick);

                let ultTiempo = performance.now();
                const loop = (t) => {
                    if(!enPartida)return;
                    requestAnimationFrame(loop);
                    const dt=(t-ultTiempo)/1000;
                    ultTiempo=t;
                    setTiempoPartida(prev=>prev+dt);

                    const pos=estadoJuegoRef.current.posicion;
                    const vel=12*dt;
                    if(teclasPulsadas.current['w'])pos.z-=vel;
                    if(teclasPulsadas.current['s'])pos.z+=vel;
                    if(teclasPulsadas.current['a'])pos.x-=vel;
                    if(teclasPulsadas.current['d'])pos.x+=vel;
                    if(pos.y>2)pos.y-=12*dt;
                    else pos.y=2;
                    if(teclasPulsadas.current[' ']&&pos.y<=2.1)pos.y+=7;
                    if(Math.sqrt(pos.x**2+pos.z**2)>110){
                        const a=Math.atan2(pos.z,pos.x);
                        pos.x=Math.cos(a)*110;
                        pos.z=Math.sin(a)*110;
                        setVida(prev=>Math.max(0,prev-8*dt));
                    }
                    if(jugadorRef.current)jugadorRef.current.position.set(pos.x,pos.y,pos.z);
                    camara.position.lerp(new THREE.Vector3(pos.x,pos.y+6,pos.z+10),0.08);
                    camara.lookAt(pos.x,pos.y+1.5,pos.z);

                    enemigosRef.current.forEach(e=>{
                        const dx=pos.x-e.position.x,dz=pos.z-e.position.z,d=Math.sqrt(dx*dx+dz*dz);
                        if(d<70&&d>2.5){e.position.x+=(dx/d)*3*dt;e.position.z+=(dz/d)*3*dt;}
                        if(e.position.y>2)e.position.y-=12*dt;
                    });

                    agua.position.y=-8+Math.sin(t*0.001)*0.2;
                    renderer.render(escena,camara);
                };
                loop(performance.now());

                const resize = ()=>{camara.aspect=window.innerWidth/window.innerHeight;camara.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);};
                window.addEventListener('resize',resize);

                return()=>{
                    window.removeEventListener('keydown',onKeyDown);
                    window.removeEventListener('keyup',onKeyUp);
                    window.removeEventListener('resize',resize);
                    renderer.domElement.removeEventListener('click',handleClick);
                    if(gameCanvasRef.current&&renderer.domElement.parentNode===gameCanvasRef.current)gameCanvasRef.current.removeChild(renderer.domElement);
                    renderer.dispose();
                    escena.traverse(o=>{if(o.geometry)o.geometry.dispose();if(o.material)o.material.dispose();});

                    {mostrarConfig&&(<div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4"><div className="glass-panel rounded-2xl p-8 w-full max-w-md relative"><button onClick={()=>setMostrarConfig(false)} className="absolute top-4 right-4 text-gray-400 hover:text-white text-2xl">×</button><h3 className="text-2xl font-bold mb-6"><i className="fas fa-cog text-cyan-400 mr-2"></i>CONFIGURACIÓN</h3><div className="space-y-6"><div><label className="block text-sm font-bold mb-2 text-gray-300">Volumen</label><input type="range" min="0" max="100" defaultValue="70" className="w-full accent-cyan-500"/></div><div><label className="block text-sm font-bold mb-2 text-gray-300">Sensibilidad</label><input type="range" min="1" max="10" defaultValue="5" className="w-full accent-purple-500"/></div><div><label className="block text-sm font-bold mb-2 text-gray-300">Calidad Gráfica</label><select className="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-3 focus:border-cyan-500 outline-none"><option>Baja</option><option selected>Media</option><option>Alta</option><option>Ultra</option></select></div></div><button onClick={()=>{setMostrarConfig(false);mostrarNotif('Cambios guardados','exito')}} className="btn-fortnite w-full mt-8 py-3 rounded-xl">GUARDAR CAMBIOS</button></div></div>)}
                </div>
            );
        }

        ReactDOM.render(<FortniteApp />, document.getElementById('root'));
    </script>
