<style>

  .sbh { padding:16px; border-bottom:1px solid var(--bd); }
  .logo { font-family:var(--fm); font-size:20px; font-weight:700; color:var(--bm); letter-spacing:3px; }

  .cmv { flex:1; min-width:0; }

  .cpv { font-size:10px; color:var(--tm); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }
  .cdl { opacity:0; background:none; border:none; cursor:pointer; padding:4px; transition:.15s; }
  .civ:hover .cdl { opacity:.6; }
  .cdl:hover { opacity:1!important; }
  .cdl svg { width:14px; height:14px; stroke:var(--pk); }
  .sbf { padding:12px; border-top:1px solid var(--bd); display:flex; gap:6px; flex-wrap:wrap; }

  .mdrop { position:absolute; top:calc(100% + 6px); right:0; background:var(--bg2); border:1px solid var(--bd); border-radius:10px; padding:6px; min-width:200px; z-index:99; display:none; box-shadow:0 8px 32px rgba(0,0,0,.5); }

  .ai .mav { background:linear-gradient(135deg,var(--bm),#7c3aed); color:#fff; }
  .mbd { flex:1; min-width:0; }
  .mmeta { font-family:var(--fm); font-size:10px; color:var(--tm); margin-bottom:6px; letter-spacing:.5px; }
  .bbl { padding:14px 18px; border-radius:14px; font-size:14px; line-height:1.7; }
  .usr .bbl { background:linear-gradient(135deg,rgba(6,182,212,.1),rgba(6,182,212,.05)); border:1px solid rgba(6,182,212,.15); }
  .ai .bbl { background:var(--bg3); border:1px solid var(--bd); }
  .ai .bbl h2 { font-size:16px; color:var(--bl); margin:16px 0 8px; border-bottom:1px solid var(--bd); padding-bottom:6px; }
  .ai .bbl h3 { font-size:14px; color:var(--pb); margin:14px 0 6px; }

  .errbbl { padding:14px 18px; border-radius:14px; background:rgba(239,68,68,.08); border:1px solid rgba(239,68,68,.2); color:#fca5a5; font-family:var(--fm); font-size:12px; }

  /* CODE BLOCKS */

  .clng { font-family:var(--fm); font-size:10px; color:var(--tm); text-transform:uppercase; letter-spacing:1px; }
  .cpb { display:flex; align-items:center; gap:5px; background:none; border:1px solid var(--bd); color:var(--t2); padding:4px 10px; border-radius:5px; font-family:var(--fm); font-size:10px; cursor:pointer; transition:.15s; }

  .cw code { font-family:var(--fm)!important; font-size:12px!important; line-height:1.6!important; }

  /* TYPING */
  .typbbl { display:flex; align-items:center; gap:5px; padding:18px 22px; }
  .tdot { width:7px; height:7px; border-radius:50%; background:var(--bl); animation:tbounce 1.4s infinite; }

  #ccnt { font-family:var(--fm); font-size:9px; color:var(--tm); }
  #sbtn { width:36px; height:36px; border-radius:10px; border:none; background:linear-gradient(135deg,var(--bm),#7c3aed); color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:.2s; flex-shrink:0; }

  .ih { display:flex; justify-content:space-between; align-items:center; margin-top:8px; }
  .ihint { font-family:var(--fm); font-size:9px; color:var(--tm); }

  .mo { position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; z-index:999; }

  .md { background:var(--bg2); border:1px solid var(--bd); border-radius:16px; padding:28px; width:380px; }
  .md h3 { font-family:var(--fm); font-size:14px; color:var(--bl); margin-bottom:16px; }
  .md input { width:100%; padding:10px 14px; background:var(--bg3); border:1px solid var(--bd); border-radius:8px; color:var(--tx); font-family:var(--fm); font-size:12px; outline:none; }
  .md input:focus { border-color:var(--bm); }
  .mda { display:flex; gap:8px; margin-top:16px; }
  .mda button { flex:1; padding:9px; border-radius:8px; font-family:var(--fm); font-size:11px; cursor:pointer; border:1px solid var(--bd); transition:.15s; }
  .mda .mp { background:linear-gradient(135deg,var(--bm),#7c3aed); color:#fff; border-color:transparent; }
  .mda .mp:hover { filter:brightness(1.2); }
  .mda .ms { background:var(--bg3); color:var(--t2); }
  .mda .ms:hover { border-color:var(--bd); }

  /* TOAST */
  #toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--bg2); border:1px solid var(--bm); padding:8px 20px; border-radius:8px; font-family:var(--fm); font-size:11px; color:var(--pb); opacity:0; transition:.3s; z-index:999; pointer-events:none; }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* MODEL TAG */
  #modelTag { display:inline-block; padding:1px 6px; border-radius:3px; font-size:8px; font-family:var(--fm); letter-spacing:1px; text-transform:uppercase; margin-left:4px; }

  /* RESPONSIVE */
  @media(max-width:768px) {
    .sb { display:none; }
    .wch { grid-template-columns:1fr; }
  }
</style>

<script>
// ═══════════════════════════════════════════

// ── KNOWLEDGE BASE ──
const KB = {
  recursion: "## Recursividad\n\nLa recursividad es una técnica donde una función se llama a sí misma para resolver un problema dividiéndolo en subproblemas más pequeños.\n\n### Elementos clave\n- **Caso base**: condición de parada que evita llamadas infinitas\n- **Caso recursivo**: la función se llama a sí misma con un problema menor\n- **Pila de llamadas**: cada llamada se apila hasta llegar al caso base\n\n### Factorial\n\n```python\ndef factorial(n):\n    \"\"\"Calcula n! de forma recursiva.\"\"\"\n    if n <= 1:           # caso base\n        return 1\n    return n * factorial(n - 1)  # caso recursivo\n\nprint(factorial(5))  # 120\nprint(factorial(0))  # 1\n```\n\n### Fibonacci con memoización\n\n```python\nfrom functools import lru_cache\n\n@lru_cache(maxsize=None)\ndef fibonacci(n):\n    if n <= 1:\n        return n\n    return fibonacci(n - 1) + fibonacci(n - 2)\n\nprint(fibonacci(50))  # 12586269025 (instantáneo)\n```\n\n### Torres de Hanoi\n\n```python\ndef hanoi(n, origen, destino, auxiliar):\n    if n == 1:\n        print(f\"Mover disco de {origen} a {destino}\")\n        return\n    hanoi(n - 1, origen, auxiliar, destino)\n    print(f\"Mover disco de {origen} a {destino}\")\n    hanoi(n - 1, auxiliar, destino, origen)\n\nhanoi(3, 'A', 'C', 'B')\n```\n\n### Búsqueda binaria recursiva\n\n```python\ndef busqueda_binaria(arr, objetivo, izq=0, der=None):\n    if der is None:\n        der = len(arr) - 1\n    if izq > der:\n        return -1\n    medio = (izq + der) // 2\n    if arr[medio] == objetivo:\n        return medio\n    elif arr[medio] < objetivo:\n        return busqueda_binaria(arr, objetivo, medio + 1, der)\n    else:\n        return busqueda_binaria(arr, objetivo, izq, medio - 1)\n\nprint(busqueda_binaria([1,3,5,7,9,11], 7))  # 3\n```\n\n### Permutaciones\n\n```python\ndef permutaciones(arr):\n    if len(arr) <= 1:\n        return [arr]\n    resultado = []\n    for i, elem in enumerate(arr):\n        resto = arr[:i] + arr[i+1:]\n        for p in permutaciones(resto):\n            resultado.append([elem] + p)\n    return resultado\n\nprint(permutaciones([1, 2, 3]))\n```\n\n### Cuidado con la recursividad\n\n- Sin caso base correcto → **Stack Overflow**\n- Fibonacci recursivo simple: O(2^n) → siempre usar memoización\n- Python tiene límite de recursividad (default 1000), ajustable con `sys.setrecursionlimit()`\n- Siempre preferir iteración cuando la profundidad puede ser grande\n- La recursividad de cola (tail recursion) puede optimizarse en algunos lenguajes, pero **no en Python**",

  http_server: "## Servidor HTTP en Python\n\n### Opción 1: http.server (sin dependencias)\n\n```python\nfrom http.server import HTTPServer, SimpleHTTPRequestHandler\nimport json\n\nclass APIHandler(SimpleHTTPRequestHandler):\n    def do_GET(self):\n        if self.path == '/':\n            self.send_json({'mensaje': 'Hola Mundo', 'version': '1.0'})\n        elif self.path == '/api/users':\n            self.send_json([{'id': 1, 'nombre': 'Ana'}, {'id': 2, 'nombre': 'Luis'}])\n        else:\n            self.send_error(404)\n\n    def do_POST(self):\n        if self.path == '/api/users':\n            length = int(self.headers['Content-Length'])\n            data = json.loads(self.rfile.read(length))\n            self.send_json({'creado': data}, 201)\n        else:\n            self.send_error(404)\n\n    def send_json(self, data, code=200):\n        self.send_response(code)\n        self.send_header('Content-Type', 'application/json')\n        self.send_header('Access-Control-Allow-Origin', '*')\n        self.end_headers()\n        self.wfile.write(json.dumps(data).encode())\n\nserver = HTTPServer(('localhost', 8000), APIHandler)\nprint('Servidor en http://localhost:8000')\nserver.serve_forever()\n```\n\n### Opción 2: Flask (más potente)\n\n```python\nfrom flask import Flask, jsonify, request\nfrom functools import wraps\n\napp = Flask(__name__)\ntodos = []\n\ndef require_api_key(f):\n    @wraps(f)\n    def decorated(*args, **kwargs):\n        if request.headers.get('X-API-Key') != 'mi-clave-secreta':\n            return jsonify({'error': 'No autorizado'}), 401\n        return f(*args, **kwargs)\n    return decorated\n\n@app.route('/api/todos', methods=['GET'])\ndef get_todos():\n    return jsonify(todos)\n\n@app.route('/api/todos', methods=['POST'])\n@require_api_key\ndef add_todo():\n    data = request.json\n    if not data or 'texto' not in data:\n        return jsonify({'error': 'Campo \"texto\" requerido'}), 400\n    todo = {'id': len(todos) + 1, 'texto': data['texto'], 'hecho': False}\n    todos.append(todo)\n    return jsonify(todo), 201\n\nif __name__ == '__main__':\n    app.run(debug=True, port=8000)\n```\n\n### Opción 3: FastAPI (moderno y rápido)\n\n```python\nfrom fastapi import FastAPI, HTTPException\nfrom pydantic import BaseModel\nfrom typing import Optional\nfrom datetime import datetime\n\napp = FastAPI(title='Mi API', version='1.0')\n\nclass ItemCreate(BaseModel):\n    nombre: str\n    precio: float\n    descripcion: Optional[str] = None\n\nitems_db = []\ncounter = 0\n\n@app.post('/items', status_code=201)\ndef crear(item: ItemCreate):\n    global counter\n    counter += 1\n    nuevo = {'id': counter, 'creado': str(datetime.now()), **item.dict()}\n    items_db.append(nuevo)\n    return nuevo\n\n@app.get('/items')\ndef listar(skip: int = 0, limit: int = 10):\n    return items_db[skip:skip+limit]\n\n@app.get('/items/{item_id}')\ndef obtener(item_id: int):\n    for i in items_db:\n        if i['id'] == item_id:\n            return i\n    raise HTTPException(404, 'Item no encontrado')\n```\n\nEjecuta con: `uvicorn main:app --reload`",

  async_await: "## Async/Await — Guía Completa\n\n### JavaScript — Promesas\n\n```javascript\nconst esperar = ms => new Promise(resolve => setTimeout(resolve, ms));\n\nasync function obtenerUsuario(id) {\n    try {\n        const response = await fetch('/api/users/' + id);\n        if (!response.ok) throw new Error('HTTP ' + response.status);\n        const user = await response.json();\n        return user;\n    } catch (err) {\n        console.error('Error:', err.message);\n        return null;\n    }\n}\n\n// Ejecutar en paralelo\nasync function obtenerVarios(ids) {\n    const promesas = ids.map(id => obtenerUsuario(id));\n    return Promise.all(promesas);\n}\n```\n\n### JavaScript — Semáforo de concurrencia\n\n```javascript\nclass Semaphore {\n    constructor(max) {\n        this.max = max;\n        this.current = 0;\n        this.queue = [];\n    }\n    async acquire() {\n        if (this.current < this.max) {\n            this.current++;\n            return;\n        }\n        await new Promise(resolve => this.queue.push(resolve));\n    }\n    release() {\n        this.current--;\n        if (this.queue.length > 0) {\n            this.current++;\n            this.queue.shift()();\n        }\n    }\n}\n```\n\n### Python — asyncio\n\n```python\nimport asyncio\nimport aiohttp\n\nasync def obtener(url):\n    async with aiohttp.ClientSession() as session:\n        async with session.get(url) as resp:\n            return await resp.json()\n\nasync def main():\n    urls = ['https://api.example.com/1', 'https://api.example.com/2']\n    async with aiohttp.ClientSession() as session:\n        resultados = await asyncio.gather(\n            *[obtener(url, session) for url in urls],\n            return_exceptions=True\n        )\n\nasyncio.run(main())\n```\n\n### Cuándo usar async\n\n- Llamadas HTTP / fetch\n- Lectura/escritura de archivos\n- Consultas a bases de datos\n- WebSockets\n- Cualquier I/O\n\n### Cuándo NO usar async\n\n- Cálculos intensivos en CPU → usar multiprocessing/workers\n- Operaciones puramente síncronas\n- Lógica simple sin I/O",

  merge_sort: "## Merge Sort\n\nMerge Sort es un algoritmo de ordenamiento divide y vencerás con complejidad **O(n log n)** en todos los casos.\n\n### Funcionamiento\n\n1. Dividir el array en dos mitades\n2. Ordenar cada mitad recursivamente\n3. Combinar (merge) las dos mitades ordenadas\n\n### Implementación en Python\n\n```python\ndef merge_sort(arr):\n    if len(arr) <= 1:\n        return arr\n    mid = len(arr) // 2\n    izquierda = merge_sort(arr[:mid])\n    derecha = merge_sort(arr[mid:])\n    return merge(izquierda, derecha)\n\ndef merge(izq, der):\n    resultado = []\n    i = j = 0\n    while i < len(izq) and j < len(der):\n        if izq[i] <= der[j]:\n            resultado.append(izq[i])\n            i += 1\n        else:\n            resultado.append(der[j])\n            j += 1\n    resultado.extend(izq[i:])\n    resultado.extend(der[j:])\n    return resultado\n\ndatos = [38, 27, 43, 3, 9, 82, 10]\nprint(merge_sort(datos))  # [3, 9, 10, 27, 38, 43, 82]\n```\n\n### Complejidad\n\n| Caso  | Tiempo    | Espacio |\n|-------|-----------|---------|\n| Mejor | O(n log n)| O(n)    |\n| Medio | O(n log n)| O(n)    |\n| Peor  | O(n log n)| O(n)    |\n\nEs **estable** (mantiene el orden de elementos iguales) y predecible, pero usa memoria adicional O(n).",

  solid: "## Principios SOLID\n\n### S — Single Responsibility Principle\n\nUna clase debe tener una sola razón para cambiar.\n\n```python\n# MAL: una clase hace todo\nclass Usuario:\n    def guardar_db(self): ...\n    def enviar_email(self): ...\n    def generar_reporte(self): ...\n\n# BIEN: separar responsabilidades\nclass Usuario:\n    def __init__(self, nombre, email):\n        self.nombre = nombre\n        self.email = email\n\nclass UsuarioRepository:\n    def guardar(self, usuario): ...\n    def buscar(self, id): ...\n\nclass EmailService:\n    def enviar(self, destino, mensaje): ...\n```\n\n### O — Open/Closed Principle\n\nAbierto para extensión, cerrado para modificación.\n\n```python\nfrom abc import ABC, abstractmethod\n\nclass Descuento(ABC):\n    @abstractmethod\n    def calcular(self, precio): pass\n\nclass DescuentoNormal(Descuento):\n    def calcular(self, precio): return precio * 0.9\n\nclass DescuentoPremium(Descuento):\n    def calcular(self, precio): return precio * 0.8\n\nclass CalculadoraPrecio:\n    def __init__(self, descuento: Descuento):\n        self.descuento = descuento\n    def calcular(self, precio):\n        return self.descuento.calcular(precio)\n```\n\n### L — Liskov Substitution Principle\n\nLas subclases deben ser sustituibles por sus clases base.\n\n### I — Interface Segregation Principle\n\nMejor muchas interfaces específicas que una general.\n\n### D — Dependency Inversion Principle\n\nDepender de abstracciones, no de implementaciones.",

  sql_nosql: "## SQL vs NoSQL\n\n### SQL (Relacional)\n\n- Estructura fija con tablas, filas y columnas\n- Esquema definido previamente\n- Relaciones entre tablas (JOINs)\n- ACID\n- Escalado vertical\n\n**Ejemplos**: PostgreSQL, MySQL, SQLite\n\n```sql\nCREATE TABLE usuarios (\n    id SERIAL PRIMARY KEY,\n    nombre VARCHAR(100) NOT NULL,\n    email VARCHAR(255) UNIQUE NOT NULL\n);\n\nSELECT u.nombre, COUNT(p.id) as total_posts\nFROM usuarios u\nLEFT JOIN posts p ON u.id = p.usuario_id\nGROUP BY u.nombre\nHAVING COUNT(p.id) > 5;\n```\n\n### NoSQL (No Relacional)\n\n- Esquema flexible\n- Sin JOINs nativos\n- Escalado horizontal\n\n**Ejemplos**: MongoDB, Redis, Cassandra\n\n### Cuándo usar cada uno\n\n| Criterio        | SQL              | NoSQL            |\n|-----------------|------------------|------------------|\n| Datos estructurados | Si           | No               |\n| Esquema variable | No            | Si               |\n| Transacciones ACID | Si          | Parcial          |\n| Escalar horizontal | Difícil     | Fácil            |",

  neural_network: "## Redes Neuronales\n\n### La neurona (perceptrón)\n\n`salida = activación(w1*x1 + w2*x2 + ... + wn*xn + bias)`\n\n### Implementación con backpropagation\n\n```python\nimport numpy as np\n\nclass RedNeuronal:\n    def __init__(self, capas):\n        self.pesos = []\n        self.bias = []\n        for i in range(len(capas) - 1):\n            w = np.random.randn(capas[i], capas[i+1]) * np.sqrt(2.0 / capas[i])\n            b = np.zeros((1, capas[i+1]))\n            self.pesos.append(w)\n            self.bias.append(b)\n\n    def sigmoid(self, x):\n        return 1 / (1 + np.exp(-np.clip(x, -500, 500)))\n\n    def forward(self, X):\n        self.z = []\n        self.a = [X]\n        for i, (w, b) in enumerate(zip(self.pesos, self.bias)):\n            z = X @ w + b\n            self.z.append(z)\n            X = self.sigmoid(z)\n            self.a.append(X)\n        return X\n\n    def backward(self, y, lr=0.01):\n        m = y.shape[0]\n        dz = self.a[-1] - y\n        for i in range(len(self.pesos) - 1, -1, -1):\n            dw = (self.a[i].T @ dz) / m\n            db = np.sum(dz, axis=0, keepdims=True) / m\n            if i > 0:\n                dz = (dz @ self.pesos[i].T) * (self.a[i] * (1 - self.a[i]))\n            self.pesos[i] -= lr * dw\n            self.bias[i] -= lr * db\n\n# XOR\nX = np.array([[0,0],[0,1],[1,0],[1,1]])\ny = np.array([[0],[1],[1],[0]])\nnn = RedNeuronal([2, 8, 4, 1])\n```\n\n### Funciones de activación\n\n| Función  | Fórmula                  | Uso               |\n|----------|--------------------------|-------------------|\n| ReLU     | max(0, x)               | Capas ocultas     |\n| Sigmoid  | 1/(1+e^-x)             | Salida binaria    |\n| Tanh     | (e^x-e^-x)/(e^x+e^-x) | Ocultas (-1 a 1)  |\n| Softmax  | e^xj / sum(e^xi)       | Multiclase        |",

  design_patterns: "## Patrones de Diseño Más Usados\n\n### Singleton — una sola instancia global\n\n```python\nclass Database:\n    _instance = None\n    _initialized = False\n    def __new__(cls):\n        if cls._instance is None:\n            cls._instance = super().__new__(cls)\n        return cls._instance\n    def __init__(self):\n        if not self._initialized:\n            self.connection = 'conectado'\n            self._initialized = True\n```\n\n### Factory — crear objetos sin especificar clase exacta\n\n```python\nfrom abc import ABC, abstractmethod\n\nclass Notificacion(ABC):\n    @abstractmethod\n    def enviar(self, msg): pass\n\nclass EmailNotif(Notificacion):\n    def enviar(self, msg): print(f'Email: {msg}')\n\nclass NotifFactory:\n    _tipos = {'email': EmailNotif}\n    @classmethod\n    def crear(cls, tipo):\n        return cls._tipos[tipo]()\n```\n\n### Observer — notificar cambios a suscriptores\n\n```javascript\nclass EventEmitter {\n    constructor() { this.events = {}; }\n    on(event, fn) {\n        (this.events[event] ??= []).push(fn);\n        return () => this.off(event, fn);\n    }\n    emit(event, data) {\n        this.events[event]?.forEach(fn => fn(data));\n    }\n}\n```\n\n### Strategy — intercambiar algoritmos\n\n```python\nclass Ordenador:\n    def __init__(self, estrategia):\n        self.estrategia = estrategia\n    def ordenar(self, datos):\n        return self.estrategia(datos)\n```",

  python_basics: "## Python — Guía Completa\n\n### Variables y tipos\n\n```python\nnombre = 'Ana'           # str\nedad = 25                # int\nprecio = 19.99           # float\nactivo = True            # bool\nlista = [1, 2, 3]       # list\ndicc = {'k': 'v'}       # dict\n```\n\n### Estructuras de control\n\n```python\nfor i, elemento in enumerate(lista):\n    print(f'{i}: {elemento}')\n\n# Dict comprehension\ncuadrados = {x: x**2 for x in range(6)}\n\n# Walrus operator (Python 3.8+)\nif (n := len(datos)) > 10:\n    print(f'Demasiados datos: {n}')\n```\n\n### Funciones\n\n```python\nimport functools\n\ndef timer(func):\n    @functools.wraps(func)\n    def wrapper(*args, **kwargs):\n        import time\n        inicio = time.perf_counter()\n        resultado = func(*args, **kwargs)\n        print(f'{func.__name__}: {time.perf_counter()-inicio:.4f}s')\n        return resultado\n    return wrapper\n\n@timer\ndef calcular():\n    return sum(range(10**6))\n```\n\n### Clases\n\n```python\nfrom dataclasses import dataclass\n\n@dataclass\nclass Usuario:\n    nombre: str\n    email: str\n    activo: bool = True\n```",

  react_basics: "## React — Guía Completa\n\n### useState\n\n```jsx\nimport { useState } from 'react';\n\nfunction Contador() {\n    const [count, setCount] = useState(0);\n    return (\n        <div>\n            <p>{count}</p>\n            <button onClick={() => setCount(c => c + 1)}>+1</button>\n        </div>\n    );\n}\n```\n\n### useEffect\n\n```jsx\nimport { useState, useEffect } from 'react';\n\nfunction Perfil({ userId }) {\n    const [user, setUser] = useState(null);\n    useEffect(() => {\n        let cancelado = false;\n        fetch('/api/users/' + userId)\n            .then(r => r.json())\n            .then(data => { if (!cancelado) setUser(data); });\n        return () => { cancelado = true; };\n    }, [userId]);\n    return <h1>{user?.nombre}</h1>;\n}\n```\n\n### Custom Hooks\n\n```jsx\nfunction useDebounce(valor, delay = 300) {\n    const [debounced, setDebounced] = useState(valor);\n    useEffect(() => {\n        const timer = setTimeout(() => setDebounced(valor), delay);\n        return () => clearTimeout(timer);\n    }, [valor, delay]);\n    return debounced;\n}\n```",

  algorithms: "## Algoritmos — Complejidades y Ejemplos\n\n### Ordenamiento\n\n| Algoritmo    | Mejor      | Medio      | Peor       | Espacio  |\n|-------------|------------|------------|------------|----------|\n| Bubble Sort | O(n)       | O(n²)     | O(n²)     | O(1)     |\n| Merge Sort  | O(n log n) | O(n log n) | O(n log n) | O(n)   |\n| Quick Sort  | O(n log n) | O(n log n) | O(n²)     | O(log n) |\n| Heap Sort   | O(n log n) | O(n log n) | O(n log n) | O(1)   |\n\n### Búsqueda binaria\n\n```python\ndef busqueda_binaria(arr, objetivo):\n    izq, der = 0, len(arr) - 1\n    while izq <= der:\n        medio = (izq + der) // 2\n        if arr[medio] == objetivo:\n            return medio\n        elif arr[medio] < objetivo:\n            izq = medio + 1\n        else:\n            der = medio - 1\n    return -1\n```\n\n### Big O de menor a mayor\n\nO(1) < O(log n) < O(n) < O(n log n) < O(n²) < O(2^n) < O(n!)",

  docker: "## Docker — Guía Completa\n\n### Comandos esenciales\n\n```bash\ndocker pull nginx:latest\ndocker run -d -p 8080:80 --name web nginx\ndocker ps\ndocker logs -f web\ndocker exec -it web bash\ndocker volume create mi_data\ndocker network create mi-red\n```\n\n### Dockerfile optimizado (multi-stage)\n\n```dockerfile\nFROM python:3.11-slim AS builder\nWORKDIR /app\nCOPY requirements.txt .\nRUN pip install --no-cache-dir --user -r requirements.txt\n\nFROM python:3.11-slim\nWORKDIR /app\nCOPY --from=builder /root/.local /root/.local\nCOPY . .\nENV PATH=/root/.local/bin:$PATH\nEXPOSE 8000\nCMD ['uvicorn', 'main:app', '--host', '0.0.0.0', '--port', '8000']\n```\n\n### Docker Compose\n\n```yaml\nversion: '3.8'\nservices:\n  web:\n    build: .\n    ports:\n      - '8000:8000'\n    depends_on:\n      - db\n  db:\n    image: postgres:15-alpine\n    environment:\n      POSTGRES_DB: miapp\n```",

// ── FIND RESPONSE ──
function findResponse(input) {
  const q = input.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
  const t = [
    { k: ['recursi', 'recursion', 'recursive'], i: 'recursion' },
    { k: ['servidor http', 'flask', 'fastapi', 'http server', 'servidor web', 'api python'], i: 'http_server' },
    { k: ['async', 'await', 'asincron', 'promise', 'promesa', 'asyncio'], i: 'async_await' },
    { k: ['merge sort', 'mergesort'], i: 'merge_sort' },
    { k: ['solid', 'single responsibility', 'liskov'], i: 'solid' },
    { k: ['sql', 'nosql', 'relacional', 'base de dato', 'postgresql', 'mongodb', 'mysql'], i: 'sql_nosql' },
    { k: ['red neuronal', 'neural network', 'perceptron', 'deep learning', 'machine learning', 'ia ', 'inteligencia artificial'], i: 'neural_network' },
    { k: ['snake', 'juego snake'], i: 'snake_game' },
    { k: ['patron de diseno', 'design pattern', 'singleton', 'factory', 'observer', 'decorator', 'strategy', 'builder'], i: 'design_patterns' },
    { k: ['python basico', 'aprender python', 'fundamento python', 'python como', 'python empezar'], i: 'python_basics' },
    { k: ['javascript basico', 'js concept', 'aprender javascript', 'fundamento js', 'es6'], i: 'javascript_basics' },
    { k: ['flexbox', 'css grid', 'css layout', 'css posicion', 'css centrar', 'css responsive'], i: 'css_flexbox' },
    { k: ['git', 'github', 'commit', 'branch', 'rama', 'merge git', 'rebase'], i: 'git_basics' },
    { k: ['react', 'componente react', 'usestate', 'useeffect', 'hook', 'jsx'], i: 'react_basics' },
    { k: ['algoritmo', 'complejidad', 'big o', 'ordenamiento', 'busqueda binaria', 'bubble sort', 'quick sort'], i: 'algorithms' },
    { k: ['docker', 'contenedor', 'dockerfile', 'docker compose'], i: 'docker' },
    { k: ['typescript', 'tipo typescript', 'interface ts', 'generic typescript'], i: 'typescript' },
    { k: ['linux', 'bash', 'terminal', 'comando linux', 'shell', 'consola'], i: 'linux' },
    { k: ['rest', 'api rest', 'endpoint', 'metodo http', 'get post put delete', 'express'], i: 'rest_api' },
    { k: ['regex', 'expresion regular', 'regular expression'], i: 'regex' },
    { k: ['seguridad', 'security', 'xss', 'injection', 'sql injection', 'csrf', 'owasp', 'bcrypt', 'jwt'], i: 'security' },
    { k: ['test', 'testing', 'pytest', 'jest', 'unit test'], i: 'testing' }
  ];
  let bm = null, bs = 0;
  for (const x of t) {
    let s = 0;
    for (const k of x.k) {
      if (q.includes(k)) s += k.length;
    }
    if (s > bs) { bs = s; bm = x.i; }
  }
  if (bm && bs >= 3) return KB[bm];
  if (q.match(/python|py\b/)) return KB.python_basics;
  if (q.match(/javascript|js\b|node/)) return KB.javascript_basics;
  if (q.match(/html|css|web|pagina/)) return KB.css_flexbox;
  if (q.match(/ordenar|sort|bubble|quick|heap/)) return KB.algorithms;
  if (q.match(/base de dato|database|consulta|query/)) return KB.sql_nosql;
  if (q.match(/hola|hey|buenas|que tal|saludo|quien eres|que eres/)) return KB.intro;
  return "## No tengo una respuesta específica\n\nIntenta preguntar sobre: Python, JavaScript, TypeScript, algoritmos, Git, Docker, Linux, React, SQL, APIs REST, seguridad, regex, testing, redes neuronales, patrones de diseño...";
}

var SYSTEM_PROMPT = 'Eres N0VA AI, un asistente de IA altamente capaz. Responde siempre en el mismo idioma que el usuario. Para codigo, usa bloques con el lenguaje especificado. Se preciso, directo y detallado. Usa markdown para estructurar respuestas largas.';

async function callClaude(messages) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 4096,
      system: SYSTEM_PROMPT,
      messages: messages.map(function(m) {
        return { role: m.role === 'assistant' ? 'assistant' : 'user', content: m.content };
      })
    })
  });
  if (!res.ok) {
    var e = await res.json().catch(function() { return {}; });
    throw new Error(e.error?.message || 'HTTP ' + res.status);
  }
  var data = await res.json();
  return data.content?.[0]?.text || '';
}

// ── UI UPDATES ──
function updateBtn() {

function gid() {

// ── CONVERSATIONS ──
function newConv() {
  var id = gid();
  convs.unshift({ id: id, title: 'Nueva sesion', messages: [], created: Date.now() });

  loadConv(id);
  renderList();
  showToast('// nuevo chat');

function loadConv(id) {
  curId = id;
  var c = convs.find(function(x) { return x.id === id; });
  if (!c) return;
  var el = document.getElementById('msgs');

  document.getElementById('ttitle').textContent = '// ' + c.title;

    el.innerHTML = buildW();
  } else {
    c.messages.forEach(function(m) {
      appendMsg(m.role, m.content, false);
    });
  }
  renderList();
}

function buildW() {
  return '<div class="wc" id="wscreen"><div class="wl">N0VA</div><div class="ws">inteligencia artificial avanzada</div><div class="wli"></div><div class="wch"><button class="wcp" onclick="useP(this)">Explica la recursividad con ejemplos</button><button class="wcp" onclick="useP(this)">Escribe un servidor HTTP en Python</button><button class="wcp" onclick="useP(this)">Como funciona async/await</button><button class="wcp" onclick="useP(this)">Crea una funcion de merge sort</button><button class="wcp" onclick="useP(this)">Explica los principios SOLID</button><button class="wcp" onclick="useP(this)">Diferencias entre SQL y NoSQL</button><button class="wcp" onclick="useP(this)">Como funciona una red neuronal</button><button class="wcp" onclick="useP(this)">Patrones de diseño mas usados</button><button class="wcp" onclick="useP(this)">Docker desde cero</button><button class="wcp" onclick="useP(this)">Seguridad web imprescindible</button><button class="wcp" onclick="useP(this)">TypeScript vs JavaScript</button><button class="wcp" onclick="useP(this)">Git desde cero</button></div></div>';
}

function renderList() {
  var l = document.getElementById('clist');
  l.innerHTML = '';

    l.innerHTML = '<div style="padding:14px;font-family:var(--fm);font-size:11px;color:var(--tm);text-align:center">// sin historial</div>';

function delConv(id) {
  convs = convs.filter(function(c) { return c.id !== id; });
  save();
  if (curId === id) {
    curId = null;
    if (convs.length) {
      loadConv(convs[0].id);
    } else {
      document.getElementById('msgs').innerHTML = buildW();
      document.getElementById('ttitle').textContent = '// nueva sesion';
    }

  renderList();
}

function save() {
  localStorage.setItem('nova_c3', JSON.stringify(convs));

function getC() {
  return convs.find(function(c) { return c.id === curId; });
}

// ═══════════════════════════════════════════
// SEND — FUNCIÓN PRINCIPAL
// ═══════════════════════════════════════════
async function doSend() {
  var inp = document.getElementById('ci');
  var text = inp.value.trim();

  if (!text) return;
  if (busy) return;

  if (MODELS[currentModel].type === 'api' && !apiKey) {
    openKeyModal();
    return;
  }

  if (!curId) newConv();
  var conv = getC();
  if (!conv) return;

  // Quitar welcome
  var w = document.getElementById('wscreen');
  if (w) w.remove();

  // Bloquear
  busy = true;
  inp.value = '';
  updateBtn();

  // Guardar msg usuario
  conv.messages.push({ role: 'user', content: text });
  if (conv.messages.length === 1) {
    conv.title = text.slice(0, 42) + (text.length > 42 ? '...' : '');
    document.getElementById('ttitle').textContent = '// ' + conv.title;
  }
  save();
  appendMsg('user', text, true);
  renderList();

  var tid = addTyping();

  try {
    var reply;
    if (MODELS[currentModel].type === 'api') {
      reply = await callClaude(conv.messages);
    } else {
      await new Promise(function(r) { setTimeout(r, 250 + Math.random() * 600); });
      reply = findResponse(text);
    }
    removeTyping(tid);
    conv.messages.push({ role: 'assistant', content: reply });
    save();
    appendMsg('assistant', reply, true);
    renderList();
  } catch (err) {
    removeTyping(tid);
    appendError(err.message);
  } finally {
    busy = false;
    updateBtn();
    try { inp.focus(); } catch (e) {}
  }
}

// ── RENDER ──
function appendMsg(role, content, scroll) {
  var feed = document.getElementById('msgs');
  var row = document.createElement('div');
  row.className = 'mr ' + (role === 'user' ? 'usr' : 'ai');

  var now = new Date().toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' });
  var av = document.createElement('div');
  av.className = 'mav';
  av.textContent = role === 'user' ? 'USR' : 'AI';

  var body = document.createElement('div');
  body.className = 'mbd';

  var meta = document.createElement('div');
  meta.className = 'mmeta';
  meta.textContent = (role === 'user' ? 'tu' : 'n0va · ' + MODELS[currentModel].name) + '  ' + now;

  var bubble = document.createElement('div');
  bubble.className = 'bbl';

  if (role === 'user') {
    bubble.textContent = content;
  } else {
    bubble.innerHTML = renderMD(content);
    bubble.querySelectorAll('pre code').forEach(function(el) {
      hljs.highlightElement(el);
      wrapCode(el);
    });
  }

  body.appendChild(meta);
  body.appendChild(bubble);
  row.appendChild(av);
  row.appendChild(body);
  feed.appendChild(row);

  if (scroll) feed.scrollTop = feed.scrollHeight;
}

function appendError(msg) {
  var feed = document.getElementById('msgs');
  var row = document.createElement('div');
  row.className = 'mr ai';
  row.innerHTML = '<div class="mav">AI</div><div class="mbd"><div class="mmeta">error</div><div class="errbbl"><b>ERROR:</b> ' + esc(msg) + '</div></div>';
  feed.appendChild(row);
  feed.scrollTop = feed.scrollHeight;
}

function renderMD(t) {
  marked.setOptions({ breaks: true, gfm: true });
  return marked.parse(t);
}

function wrapCode(el) {
  var pre = el.parentElement;
  if (pre.parentElement && pre.parentElement.classList.contains('cw')) return;
  var langClass = [].slice.call(el.classList).find(function(c) { return c.startsWith('language-'); });
  var lang = langClass ? langClass.replace('language-', '') : 'code';
  var w = document.createElement('div');
  w.className = 'cw';
  var h = document.createElement('div');
  h.className = 'chead';
  h.innerHTML = '<span class="clng">' + esc(lang) + '</span><button class="cpb" onclick="copyC(this)"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>copiar</button>';
  pre.parentNode.insertBefore(w, pre);
  w.appendChild(h);
  w.appendChild(pre);
}

function copyC(btn) {
  var code = btn.closest('.cw').querySelector('code');
  navigator.clipboard.writeText(code.textContent).then(function() {
    btn.classList.add('ok');
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>copiado';
    setTimeout(function() {
      btn.classList.remove('ok');
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>copiar';
    }, 2000);
  });
}

function addTyping() {
  var id = 't' + gid();
  var feed = document.getElementById('msgs');
  var row = document.createElement('div');
  row.className = 'mr ai';
  row.id = id;
  row.innerHTML = '<div class="mav">AI</div><div class="mbd"><div class="mmeta">n0va · ' + MODELS[currentModel].name + '  ...</div><div class="bbl typbbl"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div></div>';
  feed.appendChild(row);
  feed.scrollTop = feed.scrollHeight;
  return id;
}

function removeTyping(id) {
  var el = document.getElementById(id);
  if (el) el.remove();
}

function esc(t) {
  return String(t).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function clearChat() {
  var c = getC();
  if (!c) return;
  c.messages = [];
  c.title = 'Nueva sesion';
  save();
  loadConv(c.id);
  showToast('// limpiado');
}

function exportChat() {
  var c = getC();
  if (!c || !c.messages.length) { showToast('// vacio', 1); return; }
  var md = c.messages.map(function(m) {
    return '## ' + (m.role === 'user' ? 'Usuario' : 'N0VA') + '\n\n' + m.content;
  }).join('\n\n---\n\n');
  var a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([md], { type: 'text/markdown' }));
  a.download = 'nova-' + Date.now() + '.md';
  a.click();
  showToast('// exportado');
}

function showToast(msg, err) {

  el.style.borderColor = err ? 'rgba(244,114,182,.3)' : 'var(--bm)';
  el.classList.add('show');
  clearTimeout(tt);
  tt = setTimeout(function() { el.classList.remove('show'); }, 2800);
}
