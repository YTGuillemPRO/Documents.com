<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NΞON AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  :root {
    --neon-cyan: #00fff5;
    --neon-pink: #ff00a8;
    --neon-purple: #bf00ff;
    --neon-green: #00ff88;
    --neon-yellow: #ffe600;
    --bg-void: #050508;
    --bg-deep: #080b12;
    --bg-panel: #0c1018;
    --bg-card: #101620;
    --bg-hover: #161e2e;
    --bg-active: #1a2535;
    --border-dim: rgba(0,255,245,0.08);
    --border-mid: rgba(0,255,245,0.18);
    --border-bright: rgba(0,255,245,0.45);
    --text-primary: #e8f4ff;
    --text-secondary: #7a96b8;
    --text-muted: #3d5470;
    --font-display: 'Orbitron', monospace;
    --font-body: 'Rajdhani', sans-serif;
    --font-mono: 'Share Tech Mono', monospace;
    --glow-cyan: 0 0 8px rgba(0,255,245,0.6), 0 0 20px rgba(0,255,245,0.2);
    --glow-pink: 0 0 8px rgba(255,0,168,0.6), 0 0 20px rgba(255,0,168,0.2);
    --glow-purple: 0 0 8px rgba(191,0,255,0.6);
    --sidebar-w: 260px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg-void);
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 16px;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,255,245,0.2); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(0,255,245,0.4); }

  /* ── SCANLINE OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,255,245,0.012) 2px,
      rgba(0,255,245,0.012) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ── LAYOUT ── */
  .app {
    display: flex;
    height: 100vh;
    position: relative;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--bg-panel);
    border-right: 1px solid var(--border-dim);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }

  .sidebar::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 1px; height: 100%;
    background: linear-gradient(180deg, transparent, var(--neon-cyan), transparent);
    opacity: 0.3;
    animation: scanV 4s ease-in-out infinite;
  }
  @keyframes scanV {
    0%,100% { transform: translateY(-100%); }
    50% { transform: translateY(100%); }
  }

  .sidebar-logo {
    padding: 20px 18px 16px;
    border-bottom: 1px solid var(--border-dim);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 32px; height: 32px;
    border: 1px solid var(--neon-cyan);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--glow-cyan);
    flex-shrink: 0;
  }
  .logo-icon svg { width: 18px; height: 18px; fill: var(--neon-cyan); }

  .logo-text {
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 700;
    color: var(--neon-cyan);
    text-shadow: var(--glow-cyan);
    letter-spacing: 3px;
  }

  .new-chat-btn {
    margin: 14px 12px;
    padding: 10px 14px;
    background: transparent;
    border: 1px solid var(--border-mid);
    border-radius: 6px;
    color: var(--neon-cyan);
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .new-chat-btn:hover {
    background: rgba(0,255,245,0.06);
    border-color: var(--neon-cyan);
    box-shadow: var(--glow-cyan);
  }
  .new-chat-btn svg { width: 14px; height: 14px; stroke: var(--neon-cyan); }

  .sidebar-section-label {
    padding: 8px 14px 4px;
    font-size: 10px;
    font-family: var(--font-mono);
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .conv-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 8px 8px;
  }

  .conv-item {
    padding: 9px 10px;
    border-radius: 5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.15s;
    border: 1px solid transparent;
    margin-bottom: 2px;
    position: relative;
  }
  .conv-item:hover {
    background: var(--bg-hover);
    border-color: var(--border-dim);
  }
  .conv-item.active {
    background: var(--bg-active);
    border-color: var(--border-mid);
  }
  .conv-item.active::before {
    content: '';
    position: absolute;
    left: 0; top: 20%; height: 60%;
    width: 2px;
    background: var(--neon-cyan);
    border-radius: 2px;
    box-shadow: var(--glow-cyan);
  }

  .conv-icon {
    width: 26px; height: 26px;
    border-radius: 4px;
    background: rgba(0,255,245,0.06);
    border: 1px solid var(--border-dim);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .conv-icon svg { width: 12px; height: 12px; stroke: var(--neon-cyan); opacity: 0.7; }
  .conv-item.active .conv-icon {
    background: rgba(0,255,245,0.12);
    border-color: rgba(0,255,245,0.3);
  }
  .conv-item.active .conv-icon svg { opacity: 1; }

  .conv-meta { flex: 1; min-width: 0; }
  .conv-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }
  .conv-item.active .conv-title { color: var(--text-primary); }
  .conv-preview {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 1px;
    font-family: var(--font-mono);
  }

  .conv-delete {
    opacity: 0;
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px;
    display: flex; align-items: center;
    transition: opacity 0.15s;
  }
  .conv-delete svg { width: 12px; height: 12px; stroke: var(--neon-pink); }
  .conv-item:hover .conv-delete { opacity: 1; }

  .sidebar-footer {
    padding: 12px 14px;
    border-top: 1px solid var(--border-dim);
  }
  .api-key-section { }
  .api-label {
    font-size: 10px;
    font-family: var(--font-mono);
    color: var(--text-muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .api-input-wrap {
    position: relative;
    display: flex; align-items: center;
  }
  #api-key-input {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border-dim);
    border-radius: 5px;
    padding: 7px 32px 7px 10px;
    color: var(--text-primary);
    font-family: var(--font-mono);
    font-size: 11px;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 1px;
  }
  #api-key-input:focus { border-color: rgba(0,255,245,0.35); }
  #api-key-input::placeholder { color: var(--text-muted); letter-spacing: 1px; }
  .key-toggle {
    position: absolute; right: 8px;
    background: none; border: none; cursor: pointer;
    padding: 0; display: flex;
  }
  .key-toggle svg { width: 14px; height: 14px; stroke: var(--text-muted); }
  .key-status {
    font-size: 10px;
    margin-top: 5px;
    font-family: var(--font-mono);
    display: flex; align-items: center; gap: 5px;
  }
  .key-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-muted);
  }
  .key-dot.ok { background: var(--neon-green); box-shadow: 0 0 6px var(--neon-green); }
  .key-dot.err { background: var(--neon-pink); box-shadow: 0 0 6px var(--neon-pink); }

  /* ── MAIN ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg-deep);
    overflow: hidden;
    position: relative;
  }

  /* Grid background */
  .main::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,245,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,245,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* ── TOP BAR ── */
  .topbar {
    display: flex;
    align-items: center;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border-dim);
    background: rgba(8,11,18,0.8);
    backdrop-filter: blur(10px);
    z-index: 10;
    flex-shrink: 0;
    gap: 12px;
  }

  .model-badge {
    display: flex; align-items: center; gap: 7px;
    padding: 5px 12px;
    border: 1px solid var(--border-mid);
    border-radius: 4px;
    background: rgba(0,255,245,0.04);
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--neon-cyan);
    letter-spacing: 1px;
  }
  .pulse-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--neon-cyan);
    box-shadow: var(--glow-cyan);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  .topbar-title {
    flex: 1;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    font-family: var(--font-mono);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .topbar-actions { display: flex; gap: 8px; margin-left: auto; }
  .topbar-btn {
    background: none; border: 1px solid var(--border-dim);
    border-radius: 4px; padding: 5px 8px;
    cursor: pointer; display: flex; align-items: center;
    transition: all 0.15s;
    color: var(--text-muted);
  }
  .topbar-btn:hover {
    border-color: var(--border-mid);
    color: var(--neon-cyan);
    background: rgba(0,255,245,0.04);
  }
  .topbar-btn svg { width: 14px; height: 14px; stroke: currentColor; }

  /* ── MESSAGES ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    position: relative;
    z-index: 1;
  }

  /* ── WELCOME ── */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    padding: 40px 20px;
    gap: 20px;
    animation: fadeIn 0.6s ease;
  }
  .welcome-logo {
    font-family: var(--font-display);
    font-size: 42px;
    font-weight: 900;
    color: var(--neon-cyan);
    text-shadow: var(--glow-cyan);
    letter-spacing: 8px;
    line-height: 1;
  }
  .welcome-sub {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .welcome-line {
    width: 120px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
  }
  .welcome-chips {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center;
    max-width: 560px;
  }
  .w-chip {
    padding: 8px 16px;
    border: 1px solid var(--border-mid);
    border-radius: 20px;
    font-size: 13px;
    font-family: var(--font-body);
    font-weight: 500;
    color: var(--text-secondary);
    background: rgba(0,255,245,0.03);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .w-chip:hover {
    border-color: var(--neon-cyan);
    color: var(--neon-cyan);
    background: rgba(0,255,245,0.07);
    box-shadow: var(--glow-cyan);
    transform: translateY(-1px);
  }

  @keyframes fadeIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: none; } }

  /* ── MESSAGE ROWS ── */
  .msg-row {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    animation: msgIn 0.25s ease;
  }
  .msg-row.user { flex-direction: row-reverse; }
  @keyframes msgIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: none; } }

  .msg-av {
    width: 32px; height: 32px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-family: var(--font-display);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .msg-row.ai .msg-av {
    background: rgba(0,255,245,0.08);
    border: 1px solid rgba(0,255,245,0.25);
    color: var(--neon-cyan);
    box-shadow: var(--glow-cyan);
    text-shadow: var(--glow-cyan);
  }
  .msg-row.user .msg-av {
    background: rgba(255,0,168,0.08);
    border: 1px solid rgba(255,0,168,0.25);
    color: var(--neon-pink);
    box-shadow: var(--glow-pink);
  }

  .msg-body { max-width: 76%; display: flex; flex-direction: column; gap: 4px; }

  .msg-meta {
    font-size: 10px;
    font-family: var(--font-mono);
    color: var(--text-muted);
    letter-spacing: 1px;
  }
  .msg-row.user .msg-meta { text-align: right; }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 15px;
    line-height: 1.7;
    font-family: var(--font-body);
    font-weight: 400;
    position: relative;
  }

  .msg-row.ai .msg-bubble {
    background: var(--bg-card);
    border: 1px solid var(--border-dim);
    color: var(--text-primary);
    border-top-left-radius: 2px;
  }
  .msg-row.ai .msg-bubble::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, var(--neon-cyan), transparent);
    border-radius: 8px 8px 0 0;
    opacity: 0.4;
  }

  .msg-row.user .msg-bubble {
    background: rgba(255,0,168,0.08);
    border: 1px solid rgba(255,0,168,0.2);
    color: var(--text-primary);
    border-top-right-radius: 2px;
    box-shadow: inset 0 0 20px rgba(255,0,168,0.04);
  }

  /* Markdown inside bubbles */
  .msg-bubble p { margin: 0 0 8px; }
  .msg-bubble p:last-child { margin-bottom: 0; }
  .msg-bubble strong { color: var(--neon-cyan); font-weight: 600; }
  .msg-bubble em { color: var(--neon-yellow); font-style: italic; }
  .msg-bubble a { color: var(--neon-purple); text-decoration: underline; }

  .msg-bubble h1,.msg-bubble h2,.msg-bubble h3 {
    font-family: var(--font-display);
    color: var(--neon-cyan);
    margin: 12px 0 8px;
    text-shadow: var(--glow-cyan);
    letter-spacing: 1px;
  }
  .msg-bubble h1 { font-size: 18px; }
  .msg-bubble h2 { font-size: 15px; }
  .msg-bubble h3 { font-size: 13px; }

  .msg-bubble ul, .msg-bubble ol {
    padding-left: 20px;
    margin: 8px 0;
  }
  .msg-bubble li { margin: 4px 0; }
  .msg-bubble li::marker { color: var(--neon-cyan); }

  .msg-bubble hr {
    border: none;
    border-top: 1px solid var(--border-dim);
    margin: 12px 0;
  }

  .msg-bubble blockquote {
    border-left: 2px solid var(--neon-purple);
    padding-left: 12px;
    margin: 8px 0;
    color: var(--text-secondary);
    font-style: italic;
  }

  .msg-bubble table {
    border-collapse: collapse;
    width: 100%;
    margin: 10px 0;
    font-size: 13px;
    font-family: var(--font-mono);
  }
  .msg-bubble th {
    background: rgba(0,255,245,0.08);
    color: var(--neon-cyan);
    padding: 6px 10px;
    border: 1px solid var(--border-dim);
    text-align: left;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-size: 11px;
  }
  .msg-bubble td {
    padding: 6px 10px;
    border: 1px solid var(--border-dim);
    color: var(--text-secondary);
  }
  .msg-bubble tr:hover td { background: rgba(0,255,245,0.02); }

  /* CODE BLOCKS */
  .code-block-wrap {
    margin: 10px 0;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid rgba(0,255,245,0.15);
    box-shadow: 0 0 20px rgba(0,255,245,0.05);
  }
  .code-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 14px;
    background: rgba(0,255,245,0.06);
    border-bottom: 1px solid rgba(0,255,245,0.1);
  }
  .code-lang {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--neon-cyan);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .copy-btn {
    background: none; border: 1px solid var(--border-dim);
    border-radius: 3px; padding: 3px 8px;
    cursor: pointer; font-family: var(--font-mono);
    font-size: 10px; color: var(--text-muted);
    letter-spacing: 1px; transition: all 0.15s;
    display: flex; align-items: center; gap: 5px;
  }
  .copy-btn:hover { border-color: var(--neon-cyan); color: var(--neon-cyan); }
  .copy-btn.copied { color: var(--neon-green); border-color: var(--neon-green); }
  .copy-btn svg { width: 10px; height: 10px; stroke: currentColor; }

  .msg-bubble pre { margin: 0 !important; }
  .msg-bubble pre code.hljs {
    padding: 14px 16px !important;
    font-family: var(--font-mono) !important;
    font-size: 13px !important;
    background: #0d1117 !important;
    line-height: 1.6 !important;
  }
  .msg-bubble :not(pre) > code {
    font-family: var(--font-mono);
    font-size: 13px;
    background: rgba(0,255,245,0.08);
    color: var(--neon-cyan);
    padding: 2px 7px;
    border-radius: 3px;
    border: 1px solid rgba(0,255,245,0.15);
  }

  /* ── TYPING ── */
  .typing-bbl {
    padding: 14px 18px;
    display: flex; align-items: center; gap: 6px;
  }
  .t-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--neon-cyan);
    animation: tdot 1.2s infinite ease-in-out;
    box-shadow: var(--glow-cyan);
  }
  .t-dot:nth-child(2) { animation-delay: 0.2s; background: var(--neon-purple); box-shadow: var(--glow-purple); }
  .t-dot:nth-child(3) { animation-delay: 0.4s; background: var(--neon-pink); box-shadow: var(--glow-pink); }
  @keyframes tdot {
    0%,60%,100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* ── ERROR MSG ── */
  .error-msg {
    padding: 10px 14px;
    background: rgba(255,0,168,0.06);
    border: 1px solid rgba(255,0,168,0.25);
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: #ff6ec7;
    letter-spacing: 0.5px;
  }
  .error-msg span { color: var(--neon-pink); font-weight: bold; }

  /* ── INPUT ZONE ── */
  .input-zone {
    padding: 16px 20px 20px;
    border-top: 1px solid var(--border-dim);
    background: rgba(8,11,18,0.9);
    backdrop-filter: blur(10px);
    z-index: 10;
    flex-shrink: 0;
  }

  .input-wrap {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--bg-card);
    border: 1px solid var(--border-mid);
    border-radius: 10px;
    padding: 10px 12px;
    transition: border-color 0.2s, box-shadow 0.2s;
    position: relative;
  }
  .input-wrap:focus-within {
    border-color: rgba(0,255,245,0.4);
    box-shadow: 0 0 0 3px rgba(0,255,245,0.07), var(--glow-cyan);
  }

  #chat-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 400;
    resize: none;
    max-height: 140px;
    line-height: 1.6;
    padding: 2px 0;
  }
  #chat-input::placeholder {
    color: var(--text-muted);
    font-style: italic;
  }

  .input-actions {
    display: flex; align-items: flex-end; gap: 6px;
  }

  .char-count {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    align-self: flex-end;
    padding-bottom: 3px;
    min-width: 30px;
    text-align: right;
  }

  .send-btn {
    width: 36px; height: 36px;
    background: rgba(0,255,245,0.1);
    border: 1px solid rgba(0,255,245,0.35);
    border-radius: 7px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    box-shadow: inset 0 0 12px rgba(0,255,245,0.05);
  }
  .send-btn:hover {
    background: rgba(0,255,245,0.18);
    box-shadow: var(--glow-cyan);
    transform: translateY(-1px);
  }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled {
    opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none;
  }
  .send-btn svg { width: 16px; height: 16px; stroke: var(--neon-cyan); }

  .input-hint {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    text-align: center;
    margin-top: 8px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .input-hint span { color: rgba(0,255,245,0.4); }

  /* NOTIFICATIONS */
  #toast {
    position: fixed;
    bottom: 90px; right: 24px;
    padding: 10px 18px;
    background: var(--bg-card);
    border: 1px solid var(--border-mid);
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--neon-cyan);
    z-index: 9998;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.25s;
    letter-spacing: 1px;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateY(0); }

  /* ── RESPONSIVE: mobile sidebar toggle ── */
  .sidebar-toggle {
    display: none;
    background: none; border: 1px solid var(--border-dim);
    border-radius: 4px; padding: 5px 7px;
    cursor: pointer; color: var(--neon-cyan);
  }
  .sidebar-toggle svg { width: 16px; height: 16px; stroke: currentColor; display: block; }

  @media (max-width: 680px) {
    .sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-toggle { display: flex; }
    .messages { padding: 16px 14px; }
    .input-zone { padding: 10px 12px 14px; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <span class="logo-text">NΞON</span>
    </div>

    <button class="new-chat-btn" onclick="newConversation()">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nueva conversación
    </button>

    <div class="sidebar-section-label">// historial</div>
    <div class="conv-list" id="conv-list"></div>

    <div class="sidebar-footer">
      <div class="api-label">// API Key</div>
      <div class="api-input-wrap">
        <input type="password" id="api-key-input" placeholder="sk-ant-api03-..." autocomplete="off" oninput="onApiKeyChange()">
        <button class="key-toggle" onclick="toggleKeyVisibility()" title="Toggle visibility">
          <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div class="key-status">
        <div class="key-dot" id="key-dot"></div>
        <span id="key-status-text" style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);letter-spacing:1px;">sin clave</span>
      </div>
    </div>
  </aside>

  <!-- MAIN AREA -->
  <main class="main">
    <div class="topbar">
      <button class="sidebar-toggle" onclick="toggleSidebar()" title="Toggle sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="model-badge">
        <div class="pulse-dot"></div>
        claude-sonnet-4
      </div>
      <div class="topbar-title" id="topbar-title">// nueva sesión</div>
      <div class="topbar-actions">
        <button class="topbar-btn" onclick="clearCurrentChat()" title="Limpiar chat">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></svg>
        </button>
        <button class="topbar-btn" onclick="exportChat()" title="Exportar">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="welcome" id="welcome-screen">
        <div class="welcome-logo">NΞON AI</div>
        <div class="welcome-sub">powered by claude · v4 sonnet</div>
        <div class="welcome-line"></div>
        <div class="welcome-chips">
          <button class="w-chip" onclick="usePrompt(this)">Explica la recursión con ejemplos</button>
          <button class="w-chip" onclick="usePrompt(this)">Escribe un servidor HTTP en Python</button>
          <button class="w-chip" onclick="usePrompt(this)">¿Cómo funciona async/await?</button>
          <button class="w-chip" onclick="usePrompt(this)">Crea una función de merge sort</button>
          <button class="w-chip" onclick="usePrompt(this)">Explica los patrones de diseño SOLID</button>
          <button class="w-chip" onclick="usePrompt(this)">Debug este código: [pega tu código]</button>
          <button class="w-chip" onclick="usePrompt(this)">Diferencias entre SQL y NoSQL</button>
          <button class="w-chip" onclick="usePrompt(this)">Explica cómo funciona una red neuronal</button>
        </div>
      </div>
    </div>

    <div class="input-zone">
      <div class="input-wrap">
        <textarea
          id="chat-input"
          placeholder="Pregunta algo... (código, conceptos, debugging, lo que sea)"
          rows="1"
          onkeydown="handleInputKey(event)"
          oninput="handleInputChange(this)"
        ></textarea>
        <div class="input-actions">
          <div class="char-count" id="char-count">0</div>
          <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled title="Enviar (Enter)">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="input-hint">
        <span>Enter</span> enviar &nbsp;·&nbsp; <span>Shift+Enter</span> nueva línea &nbsp;·&nbsp; <span>Ctrl+K</span> nuevo chat
      </div>
    </div>
  </main>
</div>

<div id="toast"></div>

<script>
// ── STATE ──
let conversations = JSON.parse(localStorage.getItem('neon_convs') || '[]');
let currentConvId = null;
let isLoading = false;
let apiKey = localStorage.getItem('neon_api_key') || '';

const SYSTEM_PROMPT = `Eres NΞON AI, un asistente de inteligencia artificial altamente capaz, especializado en programación y resolución de problemas técnicos y conceptuales.

CAPACIDADES PRINCIPALES:
- Programación en cualquier lenguaje (Python, JavaScript, TypeScript, Rust, Go, C++, Java, SQL, Shell, etc.)
- Debugging y análisis de código
- Diseño de arquitectura de software
- Algoritmos y estructuras de datos
- Explicaciones técnicas detalladas
- Matemáticas, ciencias, y conceptos generales
- Escritura y análisis

ESTILO:
- Responde siempre en el mismo idioma que el usuario
- Para código, usa siempre bloques de código con el lenguaje especificado (\`\`\`python, \`\`\`javascript, etc.)
- Sé preciso, directo y detallado cuando sea necesario
- Cuando expliques código, incluye comentarios y ejemplos de uso
- Para problemas complejos, divide la solución en pasos claros
- Usa markdown para estructurar respuestas largas (headers, listas, tablas)
- Cuando detectes errores en código del usuario, explica el problema Y da la solución corregida

Eres poderoso, eficiente y estás aquí para ayudar con cualquier desafío técnico o conceptual.`;

// ── INIT ──
document.addEventListener('DOMContentLoaded', () => {
  if (apiKey) {
    document.getElementById('api-key-input').value = apiKey;
    updateKeyStatus(true);
  }
  renderConvList();
  if (conversations.length > 0) {
    loadConversation(conversations[0].id);
  }
  document.addEventListener('keydown', handleGlobal);
});

function handleGlobal(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    newConversation();
  }
}

// ── API KEY ──
function onApiKeyChange() {
  const val = document.getElementById('api-key-input').value.trim();
  apiKey = val;
  localStorage.setItem('neon_api_key', val);
  updateKeyStatus(val.startsWith('sk-ant'));
}

function updateKeyStatus(ok) {
  const dot = document.getElementById('key-dot');
  const txt = document.getElementById('key-status-text');
  if (!apiKey) {
    dot.className = 'key-dot';
    txt.textContent = 'sin clave';
  } else if (ok) {
    dot.className = 'key-dot ok';
    txt.textContent = 'clave lista';
    txt.style.color = 'var(--neon-green)';
  } else {
    dot.className = 'key-dot err';
    txt.textContent = 'formato inválido';
    txt.style.color = 'var(--neon-pink)';
  }
}

let keyVisible = false;
function toggleKeyVisibility() {
  keyVisible = !keyVisible;
  const input = document.getElementById('api-key-input');
  input.type = keyVisible ? 'text' : 'password';
}

// ── CONVERSATIONS ──
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function newConversation() {
  const id = genId();
  const conv = { id, title: 'Nueva sesión', messages: [], created: Date.now() };
  conversations.unshift(conv);
  saveConvs();
  loadConversation(id);
  renderConvList();
  showToast('// nuevo chat iniciado');
  document.getElementById('chat-input').focus();
}

function loadConversation(id) {
  currentConvId = id;
  const conv = conversations.find(c => c.id === id);
  if (!conv) return;
  const messagesEl = document.getElementById('messages');
  messagesEl.innerHTML = '';
  document.getElementById('topbar-title').textContent = '// ' + conv.title;
  if (conv.messages.length === 0) {
    messagesEl.innerHTML = document.getElementById('welcome-screen')?.outerHTML || buildWelcome();
    if (!document.getElementById('welcome-screen')) {
      const w = document.createElement('div');
      w.id = 'welcome-screen';
      w.className = 'welcome';
      w.innerHTML = welcomeInner();
      messagesEl.appendChild(w);
    }
  } else {
    conv.messages.forEach(m => appendMessage(m.role, m.content, false));
  }
  renderConvList();
}

function welcomeInner() {
  return `<div class="welcome-logo">NΞON AI</div>
  <div class="welcome-sub">powered by claude · v4 sonnet</div>
  <div class="welcome-line"></div>
  <div class="welcome-chips">
    <button class="w-chip" onclick="usePrompt(this)">Explica la recursión con ejemplos</button>
    <button class="w-chip" onclick="usePrompt(this)">Escribe un servidor HTTP en Python</button>
    <button class="w-chip" onclick="usePrompt(this)">¿Cómo funciona async/await?</button>
    <button class="w-chip" onclick="usePrompt(this)">Crea una función de merge sort</button>
    <button class="w-chip" onclick="usePrompt(this)">Explica los patrones de diseño SOLID</button>
    <button class="w-chip" onclick="usePrompt(this)">Debug este código: [pega tu código]</button>
    <button class="w-chip" onclick="usePrompt(this)">Diferencias entre SQL y NoSQL</button>
    <button class="w-chip" onclick="usePrompt(this)">Explica cómo funciona una red neuronal</button>
  </div>`;
}

function buildWelcome() {
  return `<div class="welcome" id="welcome-screen">${welcomeInner()}</div>`;
}

function renderConvList() {
  const list = document.getElementById('conv-list');
  list.innerHTML = '';
  if (conversations.length === 0) {
    list.innerHTML = `<div style="padding:12px;font-family:var(--font-mono);font-size:11px;color:var(--text-muted);text-align:center;letter-spacing:1px;">// sin historial</div>`;
    return;
  }
  conversations.forEach(conv => {
    const item = document.createElement('div');
    item.className = 'conv-item' + (conv.id === currentConvId ? ' active' : '');
    item.onclick = (e) => { if (!e.target.closest('.conv-delete')) loadConversation(conv.id); };
    const preview = conv.messages.length > 0
      ? (conv.messages[conv.messages.length-1].content.slice(0,38) + '...')
      : '// vacío';
    item.innerHTML = `
      <div class="conv-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <div class="conv-meta">
        <div class="conv-title">${escHtml(conv.title)}</div>
        <div class="conv-preview">${escHtml(preview)}</div>
      </div>
      <button class="conv-delete" onclick="deleteConv('${conv.id}')" title="Eliminar">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      </button>`;
    list.appendChild(item);
  });
}

function deleteConv(id) {
  conversations = conversations.filter(c => c.id !== id);
  saveConvs();
  if (currentConvId === id) {
    currentConvId = null;
    if (conversations.length > 0) loadConversation(conversations[0].id);
    else {
      document.getElementById('messages').innerHTML = buildWelcome();
      document.getElementById('topbar-title').textContent = '// nueva sesión';
    }
  }
  renderConvList();
  showToast('// conversación eliminada');
}

function saveConvs() { localStorage.setItem('neon_convs', JSON.stringify(conversations)); }

function getConv() { return conversations.find(c => c.id === currentConvId); }

// ── INPUT HANDLING ──
function handleInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function handleInputChange(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  const len = el.value.length;
  document.getElementById('char-count').textContent = len > 0 ? len : '0';
  document.getElementById('send-btn').disabled = len === 0 || isLoading;
}

function usePrompt(btn) {
  const input = document.getElementById('chat-input');
  input.value = btn.textContent;
  handleInputChange(input);
  input.focus();
}

// ── SEND MESSAGE ──
async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || isLoading) return;

  if (!apiKey) {
    showToast('// introduce tu API key en el panel izquierdo', true);
    document.getElementById('api-key-input').focus();
    return;
  }

  if (!currentConvId) newConversation();

  const conv = getConv();
  if (!conv) return;

  const welcome = document.getElementById('welcome-screen');
  if (welcome) welcome.remove();

  isLoading = true;
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('char-count').textContent = '0';
  document.getElementById('send-btn').disabled = true;

  conv.messages.push({ role: 'user', content: text });
  if (conv.messages.length === 1) {
    conv.title = text.slice(0, 42) + (text.length > 42 ? '…' : '');
    document.getElementById('topbar-title').textContent = '// ' + conv.title;
  }
  saveConvs();
  appendMessage('user', text, true);
  renderConvList();

  const typingId = addTypingIndicator();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2048,
        system: SYSTEM_PROMPT,
        messages: conv.messages.map(m => ({ role: m.role, content: m.content }))
      })
    });

    removeTypingIndicator(typingId);

    if (!response.ok) {
      const errData = await response.json().catch(() => ({}));
      const errMsg = errData.error?.message || `HTTP ${response.status}`;
      showErrorBubble(errMsg);
    } else {
      const data = await response.json();
      const reply = data.content?.[0]?.text;
      if (reply) {
        conv.messages.push({ role: 'assistant', content: reply });
        saveConvs();
        appendMessage('assistant', reply, true);
        renderConvList();
      }
    }
  } catch (err) {
    removeTypingIndicator(typingId);
    showErrorBubble(err.message);
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

// ── RENDER MESSAGES ──
function appendMessage(role, content, scroll) {
  const feed = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row ' + (role === 'user' ? 'user' : 'ai');

  const now = new Date().toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' });
  const label = role === 'user' ? 'USR' : 'AI';

  const avEl = document.createElement('div');
  avEl.className = 'msg-av';
  avEl.textContent = label;

  const body = document.createElement('div');
  body.className = 'msg-body';

  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  meta.textContent = (role === 'user' ? 'tú' : 'neon_ai') + '  ' + now;

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  if (role === 'user') {
    bubble.textContent = content;
  } else {
    bubble.innerHTML = renderMarkdown(content);
    bubble.querySelectorAll('pre code').forEach(el => {
      hljs.highlightElement(el);
      wrapCodeBlock(el);
    });
  }

  body.appendChild(meta);
  body.appendChild(bubble);
  row.appendChild(avEl);
  row.appendChild(body);
  feed.appendChild(row);

  if (scroll) feed.scrollTop = feed.scrollHeight;
}

function renderMarkdown(text) {
  marked.setOptions({
    breaks: true,
    gfm: true
  });
  return marked.parse(text);
}

function wrapCodeBlock(codeEl) {
  const pre = codeEl.parentElement;
  if (pre.parentElement?.classList.contains('code-block-wrap')) return;
  const lang = [...codeEl.classList]
    .find(c => c.startsWith('language-'))
    ?.replace('language-', '') || 'code';
  const wrap = document.createElement('div');
  wrap.className = 'code-block-wrap';
  const header = document.createElement('div');
  header.className = 'code-header';
  header.innerHTML = `
    <span class="code-lang">${escHtml(lang)}</span>
    <button class="copy-btn" onclick="copyCode(this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      copiar
    </button>`;
  pre.parentNode.insertBefore(wrap, pre);
  wrap.appendChild(header);
  wrap.appendChild(pre);
}

function copyCode(btn) {
  const code = btn.closest('.code-block-wrap').querySelector('code');
  navigator.clipboard.writeText(code.textContent).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>copiado`;
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>copiar`;
    }, 2000);
  });
}

function addTypingIndicator() {
  const id = 'typing-' + genId();
  const feed = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.id = id;
  row.innerHTML = `
    <div class="msg-av">AI</div>
    <div class="msg-body">
      <div class="msg-meta">neon_ai  procesando...</div>
      <div class="msg-bubble typing-bbl">
        <div class="t-dot"></div>
        <div class="t-dot"></div>
        <div class="t-dot"></div>
      </div>
    </div>`;
  feed.appendChild(row);
  feed.scrollTop = feed.scrollHeight;
  return id;
}

function removeTypingIndicator(id) {
  document.getElementById(id)?.remove();
}

function showErrorBubble(msg) {
  const feed = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.innerHTML = `
    <div class="msg-av">AI</div>
    <div class="msg-body">
      <div class="msg-meta">error del sistema</div>
      <div class="error-msg"><span>ERROR:</span> ${escHtml(msg)}</div>
    </div>`;
  feed.appendChild(row);
  feed.scrollTop = feed.scrollHeight;
}

// ── UTIL ──
function escHtml(t) {
  return String(t)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function clearCurrentChat() {
  const conv = getConv();
  if (!conv) return;
  conv.messages = [];
  conv.title = 'Nueva sesión';
  saveConvs();
  loadConversation(conv.id);
  showToast('// chat limpiado');
}

function exportChat() {
  const conv = getConv();
  if (!conv || conv.messages.length === 0) {
    showToast('// nada que exportar', true);
    return;
  }
  const md = conv.messages.map(m =>
    `## ${m.role === 'user' ? 'Usuario' : 'NΞON AI'}\n\n${m.content}`
  ).join('\n\n---\n\n');
  const blob = new Blob([md], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `neon-chat-${Date.now()}.md`;
  a.click();
  showToast('// exportado como markdown');
}

let toastTimer = null;
function showToast(msg, isErr = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.color = isErr ? 'var(--neon-pink)' : 'var(--neon-cyan)';
  el.style.borderColor = isErr ? 'rgba(255,0,168,0.3)' : 'var(--border-mid)';
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}
</script>
</body>
</html>
