<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pet Simulator Ultra</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Plus Jakarta Sans',sans-serif;height:100vh;overflow:hidden;background:#060e1a;display:flex;justify-content:center;align-items:center;user-select:none}
#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
#game{position:relative;z-index:1;width:390px;height:90vh;max-height:800px;background:rgba(8,16,35,.88);border:1.5px solid rgba(255,255,255,.08);border-radius:28px;box-shadow:0 0 80px var(--wg,rgba(16,185,129,.1)),0 30px 70px rgba(0,0,0,.6);padding:14px 14px 10px;display:flex;flex-direction:column;overflow:hidden;backdrop-filter:blur(16px);transition:box-shadow .8s}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
h1{font-family:'Russo One',sans-serif;font-size:15px;letter-spacing:.5px;background:linear-gradient(135deg,var(--wa,#fbbf24),var(--wa2,#f59e0b));-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer}
.world-badge{font-size:8px;font-weight:900;padding:2px 7px;border-radius:6px;background:var(--wabg,rgba(16,185,129,.12));color:var(--wa,#10b981);border:1px solid var(--wbd,rgba(16,185,129,.2));letter-spacing:.4px;text-transform:uppercase;margin-left:6px;animation:wbP 2s ease-in-out infinite}
@keyframes wbP{0%,100%{opacity:1}50%{opacity:.7}}
.hdr-btns{display:flex;gap:6px}
.hdr-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:#7a8ba8;width:30px;height:30px;border-radius:9px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.hdr-btn:hover{background:rgba(255,255,255,.12);color:#f1f5f9;transform:scale(1.1)}
#habitat{width:100%;height:100px;border-radius:16px;margin-bottom:8px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.05);overflow:hidden;position:relative}
#habCanvas{width:100%;height:100%;display:block}
.habitat-label{position:absolute;bottom:4px;left:8px;font-size:7px;font-weight:800;color:rgba(255,255,255,.2);text-transform:uppercase;letter-spacing:.5px;pointer-events:none}
.stats{display:flex;gap:4px;margin-bottom:6px}
.st{flex:1;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:10px;padding:5px 3px;text-align:center}
.st i{font-size:10px;margin-bottom:1px;display:block}
.st-money i{color:#10b981}.st-inc i{color:#fbbf24}.st-pets i{color:#c084fc}.st-wb i{color:var(--wa,#06b6d4)}
.st-v{display:block;font-size:12px;font-weight:900;color:#f1f5f9}
.st-l{display:block;font-size:6px;font-weight:700;color:#7a8ba8;text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
.tabs{display:flex;gap:2px;margin-bottom:8px}
.tab{flex:1;padding:6px 1px;font-family:inherit;font-size:8.5px;font-weight:800;letter-spacing:.3px;border:1.5px solid rgba(255,255,255,.06);border-radius:9px;cursor:pointer;background:rgba(255,255,255,.03);color:#7a8ba8;transition:all .2s}
.tab.on{background:linear-gradient(135deg,var(--wa,#059669),var(--wa2,#10b981));border-color:transparent;color:#fff;box-shadow:0 3px 15px var(--wsh,rgba(16,185,129,.4))}
.panel{display:none;flex:1;overflow:hidden;flex-direction:column}
.panel.on{display:flex;animation:pIn .4s cubic-bezier(.175,.885,.32,1.275)}
@keyframes pIn{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.eggs{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px}
.egg{flex:1 1 28%;min-width:0;padding:5px 2px 4px;border-radius:10px;border:2px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);cursor:pointer;text-align:center;transition:all .2s;color:#f1f5f9;position:relative;overflow:hidden}
.egg.on{border-color:var(--wa,#fbbf24);background:rgba(251,191,36,.06);box-shadow:0 0 15px var(--wsh,rgba(251,191,36,.15))}
.egg:hover{transform:translateY(-2px)}
.egg-shape{width:22px;height:28px;border-radius:50% 50% 42% 42%;margin:0 auto 3px}
.es-bas{background:linear-gradient(145deg,#f8fafc,#cbd5e1);border:2px solid #94a3b8}
.es-dor{background:linear-gradient(145deg,#fef3c7,#f59e0b);border:2px solid #d97706;box-shadow:0 0 8px rgba(251,191,36,.2)}
.es-cam{background:linear-gradient(145deg,#065f46,#10b981,#84cc16);border:2px solid #10b981}
.es-arc{background:linear-gradient(145deg,#4c1d95,#8b5cf6,#c084fc);border:2px solid #8b5cf6;box-shadow:0 0 8px rgba(139,92,246,.2)}
.es-mar{background:linear-gradient(145deg,#0c4a6e,#0ea5e9,#22d3ee);border:2px solid #06b6d4}
.es-abi{background:linear-gradient(145deg,#0f172a,#1e3a5f,#0ea5e9);border:2px solid #0284c7}
.es-cri{background:linear-gradient(145deg,#ec4899,#f0abfc,#e879f9);border:2px solid #d946ef;box-shadow:0 0 8px rgba(217,70,239,.2)}
.es-gem{background:linear-gradient(145deg,#f43f5e,#a855f7,#3b82f6);border:2px solid #a855f7;animation:eG 2s ease-in-out infinite}
.es-mag{background:linear-gradient(145deg,#7c2d12,#ea580c,#facc15);border:2px solid #f97316}
.es-inf{background:linear-gradient(145deg,#7f1d1d,#dc2626,#f97316);border:2px solid #ef4444;animation:eI 1.5s ease-in-out infinite}
.es-div{background:linear-gradient(145deg,#fef9c3,#fde68a,#fff);border:2px solid #fbbf24;animation:eG 2s ease-in-out infinite}
.es-anc{background:linear-gradient(145deg,#92400e,#d97706,#fbbf24);border:2px solid #b45309;animation:eG 2.5s ease-in-out infinite}
.es-cos{background:linear-gradient(145deg,#1e1b4b,#7c3aed,#06b6d4);border:2px solid #8b5cf6;animation:eC 2.5s ease-in-out infinite}
.es-est{background:linear-gradient(145deg,#1e1b4b,#7c3aed,#ec4899);border:2px solid #a855f7;animation:eI 2s ease-in-out infinite}
.es-umb{background:linear-gradient(145deg,#0f0f23,#312e81,#000);border:2px solid #6366f1;animation:eV 3s ease-in-out infinite}
.es-abs{background:conic-gradient(from 0deg,#f43f5e,#a855f7,#3b82f6,#10b981,#fbbf24,#f43f5e);border:2px solid #f472b6;animation:eA 1.8s ease-in-out infinite}
@keyframes eC{0%,100%{box-shadow:0 0 8px rgba(139,92,246,.2)}50%{box-shadow:0 0 20px rgba(6,182,212,.4)}}
@keyframes eV{0%,100%{box-shadow:0 0 8px rgba(107,2,168,.25)}50%{box-shadow:0 0 22px rgba(168,85,247,.5)}}
@keyframes eG{0%,100%{box-shadow:0 0 10px rgba(253,224,71,.3)}50%{box-shadow:0 0 25px rgba(251,191,36,.6)}}
@keyframes eI{0%,100%{box-shadow:0 0 10px rgba(239,68,68,.3)}50%{box-shadow:0 0 25px rgba(249,115,22,.6)}}
@keyframes eA{0%,100%{box-shadow:0 0 12px rgba(244,114,182,.3);filter:hue-rotate(0deg)}50%{box-shadow:0 0 30px rgba(244,114,182,.7);filter:hue-rotate(60deg)}}
.egg-n{display:block;font-size:8px;font-weight:800}.egg-p{display:block;font-size:9px;font-weight:900;color:#10b981;margin-top:1px}
.btn{width:100%;padding:10px;font-family:inherit;font-size:12px;font-weight:900;letter-spacing:.5px;border:none;border-radius:12px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;position:relative;overflow:hidden}
.btn:active{transform:scale(.97)}
.btn-buy{background:linear-gradient(135deg,var(--wa,#fbbf24),var(--wa2,#d97706));color:#1a1a1a;box-shadow:0 4px 15px var(--wsh,rgba(251,191,36,.3));margin-bottom:4px}
.btn-buy.can{animation:bp 2s ease-in-out infinite}
.btn-buy.no{opacity:.3;filter:saturate(.2);animation:none;cursor:not-allowed}
@keyframes bp{0%,100%{box-shadow:0 4px 15px var(--wsh,rgba(251,191,36,.3));transform:scale(1)}50%{box-shadow:0 6px 25px var(--wsh,rgba(251,191,36,.6));transform:scale(1.01)}}
.btn-auto{background:rgba(16,185,129,.08);border:1.5px solid rgba(16,185,129,.15);color:#10b981;margin-bottom:4px;box-shadow:none;font-size:10px;padding:8px}
.btn-auto.can{background:rgba(16,185,129,.12);animation:aP 2.5s ease-in-out infinite}
.btn-auto.on{background:linear-gradient(135deg,#10b981,#059669);color:#fff;border-color:transparent;box-shadow:0 4px 15px rgba(16,185,129,.3)}
.btn-auto.no{opacity:.3;filter:saturate(.2);animation:none;color:#64748b;cursor:not-allowed}
@keyframes aP{0%,100%{box-shadow:0 0 8px rgba(16,185,129,.12)}50%{box-shadow:0 0 20px rgba(16,185,129,.3)}}
.btn-rb{background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;box-shadow:0 4px 15px rgba(124,58,237,.3);margin-bottom:6px;font-size:10px;padding:8px}
.btn-rb:disabled{background:rgba(100,116,139,.12);color:#64748b;box-shadow:none;cursor:not-allowed;opacity:.4}
.btn-rb.yes{background:linear-gradient(135deg,#f43f5e,#e11d48)!important;box-shadow:0 4px 20px rgba(244,63,94,.5)!important;animation:rbp .5s ease-in-out infinite!important;opacity:1!important}
@keyframes rbp{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}

/* ===== ICONO DE MASCOTA ===== */
.pi{width:34px;height:34px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:14px;color:#fff;flex-shrink:0;position:relative;background-image:radial-gradient(circle at 35% 30%,rgba(255,255,255,.45) 0%,rgba(255,255,255,.08) 35%,transparent 60%),radial-gradient(circle at 65% 70%,rgba(0,0,0,.3) 0%,transparent 50%);box-shadow:0 2px 8px rgba(0,0,0,.4),inset 0 -2px 4px rgba(0,0,0,.2);transition:transform .2s}
.pi::after{content:'';position:absolute;top:10%;left:20%;width:30%;height:24%;background:radial-gradient(ellipse,rgba(255,255,255,.5),transparent);border-radius:50%;transform:rotate(-15deg);pointer-events:none}
.pi.rare{box-shadow:0 2px 8px rgba(0,0,0,.4),0 0 8px rgba(56,189,248,.3),inset 0 -2px 4px rgba(0,0,0,.2)}
.pi.epic{box-shadow:0 2px 8px rgba(0,0,0,.4),0 0 12px rgba(192,132,252,.35),inset 0 -2px 4px rgba(0,0,0,.2)}
.pi.god{box-shadow:0 2px 8px rgba(0,0,0,.4),0 0 16px rgba(251,191,36,.4),inset 0 -2px 4px rgba(0,0,0,.2);animation:piG 2s infinite}
.pi.legendary{box-shadow:0 2px 8px rgba(0,0,0,.4),0 0 18px rgba(248,113,113,.45),inset 0 -2px 4px rgba(0,0,0,.2);animation:piR 2s infinite}
.pi.mythic{box-shadow:0 2px 8px rgba(0,0,0,.4),0 0 20px rgba(244,114,182,.5),inset 0 -2px 4px rgba(0,0,0,.2);animation:piP 1.5s infinite}
.pi.secret{box-shadow:0 2px 8px rgba(0,0,0,.4),0 0 22px rgba(34,211,238,.5),inset 0 -2px 4px rgba(0,0,0,.2);animation:piC 1.5s infinite}
.pi.og{box-shadow:0 2px 8px rgba(0,0,0,.4),0 0 26px rgba(251,191,36,.6),inset 0 -2px 4px rgba(0,0,0,.2);animation:piO 1s infinite}
@keyframes piG{0%,100%{filter:brightness(1)}50%{filter:brightness(1.2)}}
@keyframes piR{0%,100%{filter:brightness(1)}50%{filter:brightness(1.25)}}
@keyframes piP{0%,100%{filter:brightness(1) saturate(1)}50%{filter:brightness(1.3) saturate(1.3)}}
@keyframes piC{0%,100%{filter:brightness(1) hue-rotate(0deg)}50%{filter:brightness(1.3) hue-rotate(20deg)}}
@keyframes piO{0%,100%{filter:brightness(1) hue-rotate(0deg)}50%{filter:brightness(1.4) hue-rotate(30deg)}}

/* ===== REVEAL DRAMATICO ===== */
.reveal-wrap{position:relative;width:130px;height:130px;margin:0 auto 12px;display:none}
.reveal-bg{position:absolute;inset:-20px;border-radius:50%;opacity:0;animation:revBg .8s ease-out .2s forwards}
@keyframes revBg{0%{opacity:0;transform:scale(0)}50%{opacity:.3}100%{opacity:.15;transform:scale(1)}}
.reveal-ring{position:absolute;inset:-10px;border-radius:50%;border:2px solid;opacity:0}
.reveal-ring.r1{animation:ringOut 1.2s ease-out .3s forwards}
.reveal-ring.r2{animation:ringOut 1.2s ease-out .5s forwards}
.reveal-ring.r3{animation:ringOut 1.2s ease-out .7s forwards}
@keyframes ringOut{0%{opacity:.8;transform:scale(.5)}60%{opacity:.4}100%{opacity:0;transform:scale(1.8)}}
.reveal-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;border-radius:50%;background-image:radial-gradient(circle at 35% 30%,rgba(255,255,255,.5) 0%,rgba(255,255,255,.1) 35%,transparent 60%),radial-gradient(circle at 65% 70%,rgba(0,0,0,.3) 0%,transparent 50%);box-shadow:0 5px 25px rgba(0,0,0,.5),inset 0 -4px 8px rgba(0,0,0,.2);animation:revIcon .6s cubic-bezier(.175,.885,.32,1.275) .4s both}
.reveal-icon::after{content:'';position:absolute;top:10%;left:20%;width:30%;height:24%;background:radial-gradient(ellipse,rgba(255,255,255,.55),transparent);border-radius:50%;transform:rotate(-15deg);pointer-events:none}
.reveal-icon.god{box-shadow:0 5px 25px rgba(0,0,0,.5),0 0 30px rgba(251,191,36,.5),inset 0 -4px 8px rgba(0,0,0,.2);animation:revIcon .6s cubic-bezier(.175,.885,.32,1.275) .4s both,piG 2s infinite 1s}
.reveal-icon.legendary{box-shadow:0 5px 25px rgba(0,0,0,.5),0 0 35px rgba(248,113,113,.5),inset 0 -4px 8px rgba(0,0,0,.2);animation:revIcon .6s cubic-bezier(.175,.885,.32,1.275) .4s both,piR 2s infinite 1s}
.reveal-icon.mythic{box-shadow:0 5px 25px rgba(0,0,0,.5),0 0 40px rgba(244,114,182,.6),inset 0 -4px 8px rgba(0,0,0,.2);animation:revIcon .6s cubic-bezier(.175,.885,.32,1.275) .4s both,piP 1.5s infinite 1s}
.reveal-icon.secret{box-shadow:0 5px 25px rgba(0,0,0,.5),0 0 45px rgba(34,211,238,.6),inset 0 -4px 8px rgba(0,0,0,.2);animation:revIcon .6s cubic-bezier(.175,.885,.32,1.275) .4s both,piC 1.5s infinite 1s}
.reveal-icon.og{box-shadow:0 5px 25px rgba(0,0,0,.5),0 0 50px rgba(251,191,36,.7),inset 0 -4px 8px rgba(0,0,0,.2);animation:revIcon .6s cubic-bezier(.175,.885,.32,1.275) .4s both,piO 1s infinite 1s}
@keyframes revIcon{0%{transform:scale(0) rotate(-270deg);opacity:0}60%{transform:scale(1.15) rotate(10deg);opacity:1}80%{transform:scale(.95) rotate(-3deg)}100%{transform:scale(1) rotate(0);opacity:1}}
.reveal-icon i{font-size:48px;color:#fff;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3))}

.plist{flex:1;overflow-y:auto;padding-right:3px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent}
.plist::-webkit-scrollbar{width:3px}.plist::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
.empty{text-align:center;padding:24px 12px;color:#64748b}.empty i{font-size:24px;margin-bottom:6px;display:block;opacity:.3}.empty p{font-size:11px;font-weight:600}
.pc{display:flex;align-items:center;justify-content:space-between;padding:7px 8px;margin-bottom:3px;border-radius:10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);transition:all .2s;position:relative;overflow:hidden}
.pc:hover{background:rgba(255,255,255,.06);transform:translateX(2px)}
.pc-l{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.pc-t{min-width:0}.pc-n{display:block;font-size:10px;font-weight:800;color:#f1f5f9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc-m{display:block;font-size:7px;font-weight:700;color:#7a8ba8;margin-top:1px}
.pc-r{display:flex;align-items:center;gap:4px;flex-shrink:0}
.pc-e{font-size:9px;font-weight:900;color:#10b981;white-space:nowrap}
.pc-a{display:flex;gap:3px}
.ab{width:22px;height:22px;border:none;border-radius:6px;cursor:pointer;font-size:8px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ab:hover{transform:scale(1.15)}
.ab-u{background:rgba(16,185,129,.1);color:#10b981;border:1px solid rgba(16,185,129,.12)}
.ab-s{background:rgba(244,63,94,.1);color:#f43f5e;border:1px solid rgba(244,63,94,.12)}
.pc.common{border-left:3px solid #9ca3af}.pc.rare{border-left:3px solid #38bdf8;background:rgba(56,189,248,.03)}.pc.epic{border-left:3px solid #c084fc;background:rgba(192,132,252,.03)}.pc.god{border-left:3px solid #fbbf24;background:rgba(251,191,36,.04)}.pc.legendary{border-left:3px solid #f87171;background:rgba(248,113,113,.04)}.pc.mythic{border-left:3px solid #f472b6;background:rgba(244,114,182,.04)}.pc.secret{border-left:3px solid #22d3ee;background:rgba(34,211,238,.04)}.pc.og{border-left:3px solid #fbbf24;background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.15)}
.pc.og::before,.pc.secret::before,.pc.mythic::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);animation:shm 2.5s infinite}
@keyframes shm{0%{left:-100%}100%{left:100%}}
.wmap{flex:1;overflow-y:auto;padding-right:3px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent}
.wmap::-webkit-scrollbar{width:3px}.wmap::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
.wcard{position:relative;padding:14px 12px;margin-bottom:8px;border-radius:16px;background:rgba(255,255,255,.03);border:1.5px solid rgba(255,255,255,.06);cursor:pointer;transition:all .3s;overflow:hidden}
.wcard:hover{transform:translateY(-3px);border-color:rgba(255,255,255,.15)}
.wcard.active{border-color:var(--wa,#10b981);box-shadow:0 0 30px var(--wsh,rgba(16,185,129,.2))}
.wcard.locked{opacity:.55;filter:saturate(.5)}.wcard.locked:hover{transform:none;opacity:.7}
.wcard-hd{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.wcard-icon{font-size:32px;filter:drop-shadow(0 0 8px currentColor)}
.wcard-info{flex:1;min-width:0}
.wcard-name{font-family:'Russo One',sans-serif;font-size:13px;color:#f1f5f9;margin-bottom:2px}
.wcard-desc{font-size:8px;font-weight:600;color:#7a8ba8;line-height:1.3}
.wcard-stats{display:flex;gap:8px;margin-top:6px}
.wcard-st{font-size:8px;font-weight:700;color:#64748b}.wcard-st span{color:var(--wa,#10b981);font-weight:900}
.wcard-bonus{position:absolute;top:10px;right:10px;font-size:9px;font-weight:900;padding:3px 10px;border-radius:8px;background:rgba(16,185,129,.1);color:#10b981;border:1px solid rgba(16,185,129,.15)}
.wcard-buy{display:flex;align-items:center;justify-content:center;gap:5px;margin-top:8px;padding:7px 10px;border-radius:9px;font-size:10px;font-weight:900;cursor:pointer;transition:all .2s}
.wcard-buy.can{background:rgba(16,185,129,.1);color:#10b981;border:1px solid rgba(16,185,129,.18)}
.wcard-buy.can:hover{background:rgba(16,185,129,.2);transform:scale(1.02)}
.wcard-buy.no{background:rgba(244,63,94,.05);color:#f43f5e;border:1px solid rgba(244,63,94,.08)}
.idx-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;padding:0 2px}
.idx-hd span:first-child{font-size:11px;font-weight:800;color:#7a8ba8}.idx-hd span:last-child{font-size:13px;font-weight:900;color:#fbbf24}
.bar{height:6px;border-radius:3px;background:rgba(255,255,255,.04);margin-bottom:8px;overflow:hidden}
.bar-f{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--wa,#10b981),#fbbf24);transition:width .4s}
.igrid{flex:1;overflow-y:auto;padding-right:3px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent}
.ii{display:flex;align-items:center;gap:6px;padding:4px 7px;margin-bottom:2px;border-radius:6px;border-left:3px solid;background:rgba(255,255,255,.02)}
.ii.off{opacity:.15}.ii .ic{width:20px;text-align:center;flex-shrink:0}.ii .in{font-size:9px;font-weight:700;color:#f1f5f9;flex:1}.ii .ir{font-size:6px;font-weight:800;padding:1px 4px;border-radius:3px;text-transform:uppercase;letter-spacing:.3px}

function roll(egg){var w=WEIGHTS[egg];if(!w)return PETS[0];var keys=Object.keys(w),total=0;for(var i=0;i<keys.length;i++)total+=w[keys[i]];var r=Math.random()*total,chosen=keys[0];for(var i=0;i<keys.length;i++){r-=w[keys[i]];if(r<=0){chosen=keys[i];break}}var pool=[];for(var i=0;i<PETS.length;i++){if(PETS[i].r===chosen&&PETS[i].eg.indexOf(egg)!==-1)pool.push(PETS[i])}if(!pool.length)return PETS[0];return pool[Math.floor(Math.random()*pool.length)]}

function genCrack(prog){var sx=.15+Math.random()*.7,sy=.1+Math.random()*.8,a=Math.random()*Math.PI*2,segs=[],branches=[],cx=sx,cy=sy;var numS=3+Math.floor(Math.random()*(2+prog*4)),sLen=.04+prog*.1;for(var j=0;j<numS;j++){a+=(Math.random()-.5)*1.6;cx+=Math.cos(a)*sLen;cy+=Math.sin(a)*sLen;cx=Math.max(.03,Math.min(.97,cx));cy=Math.max(.03,Math.min(.97,cy));segs.push({x:cx,y:cy});if(Math.random()<.3+prog*.5){var ba=a+(Math.random()>.5?1:-1)*(.5+Math.random()*.9),bl=sLen*(.25+Math.random()*.5)*(.5+prog*.5),bx=cx+Math.cos(ba)*bl,by=cy+Math.sin(ba)*bl;bx=Math.max(.03,Math.min(.97,bx));by=Math.max(.03,Math.min(.97,by));branches.push({fx:cx,fy:cy,tx:bx,ty:by})}}return{sx:sx,sy:sy,segs:segs,branches:branches,thick:prog>.4}}

function drawFullCracks(){if(!crackCtx)return;var w=CRW,h=CRH;crackCtx.save();for(var i=0;i<50;i++){var x1=Math.random()*w,y1=Math.random()*h,a=Math.random()*Math.PI*2,cx2=x1,cy2=y1,len=25+Math.random()*70;crackCtx.beginPath();crackCtx.moveTo(x1,y1);for(var s=0;s<2+Math.floor(Math.random()*3);s++){a+=(Math.random()-.5)*1.4;cx2+=Math.cos(a)*len/3;cy2+=Math.sin(a)*len/3;crackCtx.lineTo(cx2,cy2)}crackCtx.strokeStyle='rgba(255,240,180,0.92)';crackCtx.lineWidth=1.5+Math.random()*2.5;crackCtx.shadowBlur=18;crackCtx.shadowColor='rgba(255,200,50,1)';crackCtx.lineCap='round';crackCtx.stroke()}crackCtx.fillStyle='rgba(255,255,200,0.15)';crackCtx.fillRect(0,0,w,h);crackCtx.restore()}

var bgCtx,bgW,bgH,bgP=[],habCtx,habW,habH,habPets=[],habF=0,hatchCtx,hatchP=[];
function initBg(){var c=document.getElementById('bgCanvas');bgCtx=c.getContext('2d');function rs(){c.width=innerWidth;c.height=innerHeight;bgW=c.width;bgH=c.height}rs();addEventListener('resize',rs);for(var i=0;i<60;i++)bgP.push(mkBgP())}
function mkBgP(){var w=getWorld();return{x:Math.random()*bgW,y:Math.random()*bgH,vx:(Math.random()-.5)*.5,vy:(Math.random()-.5)*.3-.1,size:Math.random()*3+1,alpha:Math.random()*.4+.1,color:w.color,life:Math.random()*200+100,maxLife:300,type:w.particles}}
function drawBg(){if(!bgCtx)return;var w=getWorld();bgCtx.clearRect(0,0,bgW,bgH);var grd=bgCtx.createRadialGradient(bgW/2,bgH/2,0,bgW/2,bgH/2,bgW*.7);grd.addColorStop(0,w.color+'18');grd.addColorStop(.5,'#060e1a');grd.addColorStop(1,'#030810');bgCtx.fillStyle=grd;bgCtx.fillRect(0,0,bgW,bgH);for(var i=0;i<bgP.length;i++){var p=bgP[i];p.x+=p.vx;p.y+=p.vy;p.life--;if(p.life<=0||p.x<-10||p.x>bgW+10||p.y<-10||p.y>bgH+10){bgP[i]=mkBgP();bgP[i].y=bgH+5;bgP[i].life=bgP[i].maxLife;continue}var a=p.alpha*(p.life/p.maxLife);bgCtx.globalAlpha=a;bgCtx.fillStyle=p.color;bgCtx.beginPath();if(p.type==='bubbles'){bgCtx.strokeStyle=p.color;bgCtx.lineWidth=.5;bgCtx.arc(p.x,p.y,p.size*1.5,0,Math.PI*2);bgCtx.stroke()}else if(p.type==='embers'){bgCtx.arc(p.x,p.y,p.size,0,Math.PI*2);bgCtx.fill();bgCtx.globalAlpha=a*.3;bgCtx.beginPath();bgCtx.arc(p.x,p.y,p.size*3,0,Math.PI*2);bgCtx.fill()}else if(p.type==='stars'){var tw=Math.sin(p.life*.1)*.3+.7;bgCtx.globalAlpha=a*tw;bgCtx.fillStyle='#fff';bgCtx.beginPath();bgCtx.arc(p.x,p.y,p.size*.7,0,Math.PI*2);bgCtx.fill()}else if(p.type==='wisps'){bgCtx.arc(p.x+Math.sin(p.life*.08)*8,p.y,p.size*1.5,0,Math.PI*2);bgCtx.fill()}else{bgCtx.ellipse(p.x,p.y,p.size*2,p.size,Math.sin(p.life*.05)*.5,0,Math.PI*2);bgCtx.fill()}}bgCtx.globalAlpha=1;requestAnimationFrame(drawBg)}
function initHab(){var c=document.getElementById('habCanvas');var r=c.parentElement.getBoundingClientRect();c.width=r.width*2;c.height=r.height*2;habCtx=c.getContext('2d');habCtx.scale(2,2);habW=r.width;habH=r.height;refHabPets()}
function refHabPets(){habPets=[];var s=G.pets.slice().sort(function(a,b){return petEarn(b)-petEarn(a)}).slice(0,10);for(var i=0;i<s.length;i++){habPets.push({col:s[i].c,rare:s[i].r,x:Math.random()*(habW-30)+15,y:0,vx:(Math.random()-.5)*1.5,targetY:30+Math.random()*(habH-60),bob:Math.random()*Math.PI*2,sz:RORD[s[i].r]>=7?20:RORD[s[i].r]>=5?17:15})}}
function drawHab(){if(!habCtx)return;habF++;habCtx.clearRect(0,0,habW,habH);var g=habCtx.createLinearGradient(0,0,0,habH);g.addColorStop(0,'#0a1a0f');g.addColorStop(1,'#1a3a20');habCtx.fillStyle=g;habCtx.fillRect(0,0,habW,habH);for(var i=0;i<habPets.length;i++){var p=habPets[i];p.y+=(p.targetY-p.y)*.03;p.x+=p.vx;if(p.x<15||p.x>habW-15)p.vx*=-1;p.bob+=.04;var by=p.y+Math.sin(p.bob)*3;if(RORD[p.rare]>=5){habCtx.globalAlpha=.12;habCtx.fillStyle=RCOL[p.rare];habCtx.beginPath();habCtx.arc(p.x,by,p.sz*1.2,0,Math.PI*2);habCtx.fill()}habCtx.globalAlpha=1;habCtx.fillStyle=p.col;habCtx.beginPath();habCtx.arc(p.x,by,p.sz*.5,0,Math.PI*2);habCtx.fill();habCtx.fillStyle='rgba(255,255,255,0.45)';habCtx.beginPath();habCtx.arc(p.x-p.sz*.15,by-p.sz*.15,p.sz*.2,0,Math.PI*2);habCtx.fill()}habCtx.globalAlpha=1;requestAnimationFrame(drawHab)}
function spawnHatchP(rarity){var c=document.getElementById('hatchCanvas');var r=c.parentElement.getBoundingClientRect();c.width=r.width*2;c.height=r.height*2;hatchCtx=c.getContext('2d');hatchCtx.scale(2,2);var w=r.width,h=r.height,col=RCOL[rarity]||'#fff';var count=RORD[rarity]>=5?100:40;hatchP=[];for(var i=0;i<count;i++){var angle=Math.random()*Math.PI*2,spd=Math.random()*8+2;hatchP.push({x:w/2,y:h/2,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,size:Math.random()*5+1,color:col,life:Math.random()*50+30,maxLife:80,gravity:.06})}animHatch(w,h)}
function animHatch(w,h){if(!hatchCtx||!hatchP.length)return;hatchCtx.clearRect(0,0,w,h);var alive=false;for(var i=0;i<hatchP.length;i++){var p=hatchP[i];if(p.life<=0)continue;alive=true;p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.life--;p.vx*=.98;var a=p.life/p.maxLife;hatchCtx.globalAlpha=a;hatchCtx.fillStyle=p.color;hatchCtx.beginPath();hatchCtx.arc(p.x,p.y,Math.max(.5,p.size*a),0,Math.PI*2);hatchCtx.fill()}hatchCtx.globalAlpha=1;if(alive)requestAnimationFrame(function(){animHatch(w,h)})}

function applyTheme(){var w=getWorld(),r=document.documentElement;r.style.setProperty('--wa',w.color);r.style.setProperty('--wa2',w.color2);r.style.setProperty('--wabg',w.color+'18');r.style.setProperty('--wbd',w.color+'30');r.style.setProperty('--wsh',w.color+'40');r.style.setProperty('--wg',w.color+'20');document.getElementById('worldBadge').textContent=w.name.split(' ')[0].toUpperCase();document.getElementById('habLabel').textContent='Habitat - '+w.name;document.getElementById('sWB').textContent='x'+w.bonus.toFixed(1);document.getElementById('worldBadge').style.color=w.color}

var SK='PetSimUltra_v31';
function save(){try{localStorage.setItem(SK,JSON.stringify({money:G.money,rb:G.rb,mult:G.mult,pets:G.pets,disc:G.disc,pr:G.pr,unlockedWorlds:G.unlockedWorlds,tot:G.tot,te:G.te,mut:G.mut,nid:G.nid,pname:G.pname,autoOpen:G.autoOpen,autoOn:G.autoOn,world:G.world}))}catch(e){}}
function load(){var raw=null;try{raw=localStorage.getItem(SK)}catch(e){return}if(!raw)return;try{var d=JSON.parse(raw);if(!d)return;G.money=d.money||10;G.displayMoney=G.money;G.rb=d.rb||0;G.mult=d.mult||1;G.mut=!!d.mut;G.tot=d.tot||0;G.te=d.te||0;G.nid=d.nid||1;G.pname=d.pname||'Mi Base';G.autoOpen=!!d.autoOpen;G.autoOn=!!d.autoOn;G.world=d.world||'bosque';G.unlockedWorlds=d.unlockedWorlds||['bosque'];if(d.pr)G.pr=d.pr;G.disc=d.disc||[];G.pets=[];if(d.pets){for(var i=0;i<d.pets.length;i++){var p=d.pets[i];if(!p)continue;G.pets.push({ic:p.ic||'fa-solid fa-paw',n:p.n,r:p.r,be:p.be||p.e||1,lv:p.lv||1,id:p.id||G.nid++,c:p.c||'#888',eg:p.eg||[]})}}}catch(e){}}
function resetGame(){try{localStorage.removeItem(SK)}catch(e){}G={money:10,displayMoney:10,rb:0,mult:1,pets:[],disc:[],pr:{basico:10,dorado:500,campestre:2000,arcano:20000,marino:50000,abisal:4e5,cristalino:2e6,gema:15e6,magmatico:80e6,infernal:5e8,divino:5e9,ancestral:3e10,cosmico:3e11,estelar:2e12,umbral:2e13,absoluto:2e14},unlockedWorlds:['bosque'],tot:0,te:0,mut:false,nid:1,pname:'Mi Base',autoOpen:false,autoOn:false,world:'bosque'};selEgg='basico';rbConf=false;applyTheme();refHabPets();updateUI();toast('Reiniciado','inf')}

// Acciones
function openEgg(silent){var cost=G.pr[selEgg];if(G.money<cost){if(!silent){snd.err();toast('Sin dinero','err')}if(G.autoOn){G.autoOn=false;updateUI()}return false}G.money-=cost;var scales={basico:1.15,dorado:1.2,campestre:1.12,arcano:1.22,marino:1.18,abisal:1.25,cristalino:1.2,gema:1.28,magmatico:1.22,infernal:1.3,divino:1.25,ancestral:1.32,cosmico:1.28,estelar:1.35,umbral:1.3,absoluto:1.4};G.pr[selEgg]=Math.floor(G.pr[selEgg]*(scales[selEgg]||1.15));var tpl=roll(selEgg);var np={ic:tpl.ic,n:tpl.n,r:tpl.r,be:tpl.e,lv:1,id:G.nid++,c:tpl.c,eg:tpl.eg};G.pets.push(np);G.tot++;if(G.disc.indexOf(tpl.n)===-1)G.disc.push(tpl.n);save();updateUI();refHabPets();if(!silent){snd.hatch(tpl.r);showHatch(np)}return true}

function showHatch(pet){hatchSt={pet:pet,clicks:0,revealed:false,bursting:false};var ov=document.getElementById('overlay'),e3d=document.getElementById('oegg3d'),e3dB=document.getElementById('egg3dBody');ov.style.display='flex';ov.style.cursor='pointer';e3d.style.display='block';e3dB.style.background=E3DG[selEgg]||E3DG.basico;e3d.className='egg-3d-container';document.getElementById('egg3d').className='egg-3d';document.getElementById('oReveal').style.display='none';document.getElementById('tapHint').style.display='block';document.getElementById('tapProgress').style.display='flex';document.getElementById('oclose').style.display='none';document.getElementById('oclose').classList.remove('visible');document.getElementById('oname').textContent='';document.getElementById('orar').textContent='';document.getElementById('orar').style.color='';document.getElementById('oinfo').textContent='';initCrackCanvas();updateTapProgress()}

function hatchClick(){if(hatchSt.revealed||hatchSt.bursting)return;hatchSt.clicks++;var n=hatchSt.clicks,max=CLICKS_NEEDED,prog=n/max;snd.crack(n,max);if(navigator.vibrate)navigator.vibrate(30);addCanvasCracks(prog);var e3d=document.getElementById('oegg3d');e3d.classList.remove('egg-squish');void e3d.offsetWidth;e3d.classList.add('egg-squish');setTimeout(function(){e3d.classList.remove('egg-squish')},150);e3d.className='egg-3d-container';if(prog<.25)e3d.classList.add('egg-shake-1');else if(prog<.5)e3d.classList.add('egg-shake-2');else if(prog<.75)e3d.classList.add('egg-shake-3');else e3d.classList.add('egg-shake-4');e3d.classList.remove('egg-glow-1','egg-glow-2','egg-glow-3','egg-glow-4');if(prog>=.75)e3d.classList.add('egg-glow-4');else if(prog>=.5)e3d.classList.add('egg-glow-3');else if(prog>=.25)e3d.classList.add('egg-glow-2');else e3d.classList.add('egg-glow-1');var flash=document.createElement('div');flash.className='click-flash';document.getElementById('overlay').appendChild(flash);setTimeout(function(){if(flash.parentNode)flash.parentNode.removeChild(flash)},200);if(prog>=.5){var game=document.getElementById('game');game.classList.remove('screen-shake');void game.offsetWidth;game.classList.add('screen-shake');setTimeout(function(){game.classList.remove('screen-shake')},200)}updateTapProgress();if(n>=max)hatchBurst()}

function updateTapProgress(){var html='';for(var i=0;i<CLICKS_NEEDED;i++){html+='<span class="pip'+(i<hatchSt.clicks?' filled':'')+(i===hatchSt.clicks-1?' just':'')+'"></span>'}document.getElementById('tapProgress').innerHTML=html}

function hatchBurst(){hatchSt.bursting=true;var e3d=document.getElementById('oegg3d'),ov=document.getElementById('overlay');document.getElementById('tapHint').style.display='none';document.getElementById('tapProgress').style.display='none';ov.style.cursor='default';drawFullCracks();e3d.className='egg-3d-container egg-burst';snd.burst();spawnHatchP(hatchSt.pet.r);if(navigator.vibrate)navigator.vibrate([50,30,80]);setTimeout(function(){e3d.style.display='none';var p=hatchSt.pet,rCol=RCOL[p.r]||'#fff';// Reveal dramatico
var rv=document.getElementById('oReveal');rv.style.display='block';// Fondo glow
var bg=document.getElementById('oRevBg');bg.style.background='radial-gradient(circle,'+rCol+'80,transparent)';// Anillos
['oRing1','oRing2','oRing3'].forEach(function(id){var ring=document.getElementById(id);ring.style.borderColor=rCol});// Icono
var icon=document.getElementById('oRevIcon');icon.className='reveal-icon '+p.r;icon.style.backgroundColor=p.c;document.getElementById('oRevI').className=p.ic;document.getElementById('oname').textContent=p.n;document.getElementById('orar').textContent=RNAME[p.r]||'';document.getElementById('orar').style.color=rCol;document.getElementById('oinfo').textContent='+$'+fmt(petEarn(p))+'/s';setTimeout(function(){hatchSt.revealed=true;hatchSt.bursting=false;var cb=document.getElementById('oclose');cb.style.display='inline-block';cb.classList.add('visible')},800)},500)}

function closeHatch(){if(!hatchSt.revealed)return;document.getElementById('overlay').style.display='none';document.getElementById('oegg3d').style.display='none';document.getElementById('oegg3d').className='egg-3d-container';document.getElementById('egg3d').className='egg-3d';document.getElementById('oReveal').style.display='none';document.getElementById('oclose').style.display='none';document.getElementById('oclose').classList.remove('visible');hatchP=[];hatchSt.revealed=false}

function doUpgrade(id){var pet=null;for(var i=0;i<G.pets.length;i++){if(G.pets[i].id===id){pet=G.pets[i];break}}if(!pet||pet.lv>=99)return;var c=upCost(pet);if(G.money<c){snd.err();toast('Sin dinero','err');return}G.money-=c;pet.lv++;toast(pet.n+' Nv.'+pet.lv,'ok');save();updateUI()}
function doSell(id){var idx=-1;for(var i=0;i<G.pets.length;i++){if(G.pets[i].id===id){idx=i;break}}if(idx===-1)return;var pet=G.pets[idx],val=Math.floor(petEarn(pet)*10);G.money+=val;G.pets.splice(idx,1);toast(pet.n+' $'+fmt(val),'inf');save();updateUI();refHabPets()}
function doRb(){var cost=rbCost();if(rbConf){clearTimeout(rbTmr);rbConf=false;G.rb++;G.mult*=1.8;G.money=10;G.displayMoney=10;G.pets=[];G.pr={basico:10,dorado:500,campestre:2000,arcano:20000,marino:50000,abisal:4e5,cristalino:2e6,gema:15e6,magmatico:80e6,infernal:5e8,divino:5e9,ancestral:3e10,cosmico:3e11,estelar:2e12,umbral:2e13,absoluto:2e14};snd.hatch('og');toast('REBIRTH '+G.rb+' x'+G.mult.toFixed(1),'rwd');save();updateUI();refHabPets()}else{if(G.money<cost){snd.err();toast('Necesitas $'+fmt(cost),'err');return}rbConf=true;var btn=document.getElementById('btnRb');btn.innerHTML='<i class="fas fa-exclamation-triangle"></i> CONFIRMAR?';btn.classList.add('yes');btn.disabled=false;snd.click();rbTmr=setTimeout(function(){rbConf=false;updateUI()},3000)}}
function handleAuto(){snd.click();if(!G.autoOpen){if(G.money<1e10){snd.err();toast('Necesitas $10B','err');return}G.money-=1e10;G.autoOpen=true;G.autoOn=true;toast('Auto activado!','rwd');save();updateUI()}else{G.autoOn=!G.autoOn;toast('Auto: '+(G.autoOn?'ON':'OFF'),'inf');save();updateUI()}}
function buyWorld(wid){var w=null;for(var i=0;i<WORLDS.length;i++)if(WORLDS[i].id===wid){w=WORLDS[i];break}if(!w)return;if(isWorldUnlocked(wid)){setWorld(wid);return}if(G.money<w.cost){snd.err();toast('Necesitas $'+fmt(w.cost),'err');return}G.money-=w.cost;G.unlockedWorlds.push(wid);snd.world();selEgg=w.eggs[0];setWorld(wid);save();updateUI();toast('Desbloqueado: '+w.name,'rwd')}
function setWorld(wid){if(wid===G.world)return;if(!isWorldUnlocked(wid)){snd.err();toast('Bloqueado','err');return}G.world=wid;var w=getWorld();if(w.eggs.indexOf(selEgg)===-1)selEgg=w.eggs[0];bgP=[];for(var i=0;i<60;i++)bgP.push(mkBgP());applyTheme();refHabPets();document.getElementById('game').classList.add('world-flash');setTimeout(function(){document.getElementById('game').classList.remove('world-flash')},500);save();updateUI();toast('Mundo: '+w.name,'rwd')}

// Render
function renderEggs(){var w=getWorld(),html='';for(var i=0;i<w.eggs.length;i++){var eid=w.eggs[i];html+='<button class="egg'+(eid===selEgg?' on':'')+'" data-e="'+eid+'"><div class="egg-shape '+(ESCLS[eid]||'es-bas')+'"></div><span class="egg-n">'+(ENAMES[eid]||eid)+'</span><span class="egg-p">$'+fmt(G.pr[eid])+'</span></button>'}document.getElementById('navEggs').innerHTML=html}
function renderWorlds(){var html='';for(var i=0;i<WORLDS.length;i++){var w=WORLDS[i],u=isWorldUnlocked(w.id),a=w.id===G.world;html+='<div class="wcard'+(a?' active':'')+(!u?' locked':'')+'" data-wid="'+w.id+'"><div class="wcard-hd"><span class="wcard-icon" style="color:'+w.color+'">'+w.icon+'</span><div class="wcard-info"><div class="wcard-name">'+w.name+'</div><div class="wcard-desc">'+w.desc+'</div></div></div><div class="wcard-stats"><span class="wcard-st">Bonus: <span>x'+w.bonus.toFixed(1)+'</span></span><span class="wcard-st">Coste: <span>$'+fmt(w.cost)+'</span></span></div>'+(a?'<div class="wcard-bonus">ACTIVO</div>':'')+'<div class="wcard-buy '+(u?'can':(G.money>=w.cost?'can':'no'))+'" data-buywid="'+w.id+'">'+(u?(a?'Ir alli':'Desbloqueado'):'Comprar $'+fmt(w.cost))+'</div></div>'}document.getElementById('worldMap').innerHTML=html}

function updateUI(){var diff=G.money-G.displayMoney;if(Math.abs(diff)<1)G.displayMoney=G.money;else G.displayMoney+=diff*.15;document.getElementById('sMoney').textContent='$'+fmt(Math.round(G.displayMoney));document.getElementById('sInc').textContent='$'+fmt(totInc())+'/s';document.getElementById('sPets').textContent=G.pets.length;var bb=document.getElementById('btnBuy');if(G.money>=G.pr[selEgg]){bb.classList.add('can');bb.classList.remove('no')}else{bb.classList.remove('can');bb.classList.add('no')}var ba=document.getElementById('btnAuto');if(!G.autoOpen){ba.innerHTML='<i class="fas fa-robot"></i> AUTO ($10B)';if(G.money>=1e10){ba.classList.add('can');ba.classList.remove('no','on')}else{ba.classList.add('no');ba.classList.remove('can','on')}}else{if(G.autoOn){ba.innerHTML='<i class="fas fa-robot"></i> AUTO: ON';ba.classList.add('on');ba.classList.remove('no','can')}else{ba.innerHTML='<i class="fas fa-robot"></i> AUTO: OFF';ba.classList.add('can');ba.classList.remove('on','no')}}if(!rbConf){var rb=document.getElementById('btnRb');rb.innerHTML='<i class="fas fa-bolt"></i> REBIRTH ($'+fmt(rbCost())+')';rb.disabled=G.money<rbCost();rb.classList.remove('yes')}renderPets();renderEggs();if(activeTab==='worlds')renderWorlds();if(activeTab==='rank')renderRank()}

function renderPets(){var el=document.getElementById('petList');if(!G.pets.length){el.innerHTML='<div class="empty"><i class="fas fa-egg"></i><p>Abre tu primer huevo</p></div>';return}var s=G.pets.slice().sort(function(a,b){var rd=(RORD[b.r]||0)-(RORD[a.r]||0);return rd!==0?rd:petEarn(b)-petEarn(a)});var h='';for(var i=0;i<s.length;i++){var p=s[i],earn=petEarn(p),uc=p.lv<99?upCost(p):0;h+='<div class="pc '+p.r+'"><div class="pc-l">'+piHTML(p)+'<div class="pc-t"><span class="pc-n">'+p.n+'</span><span class="pc-m">Nv.'+p.lv+' '+(RNAME[p.r]||'')+(uc?' · $'+fmt(uc):'')+'</span></div></div><div class="pc-r"><span class="pc-e">$'+fmt(earn)+'/s</span><div class="pc-a">';if(p.lv<99)h+='<button class="ab ab-u" data-act="up" data-id="'+p.id+'"><i class="fas fa-arrow-up"></i></button>';h+='<button class="ab ab-s" data-act="sell" data-id="'+p.id+'"><i class="fas fa-coins"></i></button></div></div></div>'}el.innerHTML=h}

function renderIdx(){var pct=Math.round((G.disc.length/PETS.length)*100);document.getElementById('idxPct').textContent=pct+'%';document.getElementById('idxBar').style.width=pct+'%';var s=PETS.slice().sort(function(a,b){return(RORD[a.r]||0)-(RORD[b.r]||0)});var h='';for(var i=0;i<s.length;i++){var p=s[i],d=G.disc.indexOf(p.n)!==-1;h+='<div class="ii '+p.r+(d?'':' off')+'"><span class="ic">'+(d?piSmall(p):'<div style="width:22px;height:22px;border-radius:50%;background:#333;display:inline-flex;align-items:center;justify-content:center"><i class="fas fa-question" style="font-size:9px;color:#555"></i></div>')+'</span><span class="in">'+(d?p.n:'???')+'</span><span class="ir '+p.r+'">'+(RNAME[p.r]||'')+'</span></div>'}document.getElementById('idxList').innerHTML=h}

function renderRank(){var myEarn=Math.floor(totInc());document.getElementById('rkPos').textContent='#1';document.getElementById('rkMyEarn').textContent='$'+fmt(myEarn)+'/s';document.getElementById('rkList').innerHTML='<div class="rk-i me"><div class="rk-pos p1">1</div><div class="rk-body"><div class="rk-top"><span class="rk-n">'+esc(G.pname)+' <span class="rk-you">TU</span></span><span class="rk-rb">RB '+G.rb+'</span></div><div class="rk-bot"><span class="rk-pc">'+G.pets.length+' pets</span><span class="rk-earn">$'+fmt(myEarn)+'/s</span></div></div></div>'}

function setTab(t){snd.click();activeTab=t;var panels=document.querySelectorAll('.panel'),btns=document.querySelectorAll('.tab');for(var i=0;i<panels.length;i++)panels[i].classList.remove('on');for(var i=0;i<btns.length;i++)btns[i].classList.remove('on');var map={game:'pGame',worlds:'pWorlds',index:'pIndex',rank:'pRank'};var pel=document.getElementById(map[t]);if(pel)pel.classList.add('on');var bel=document.querySelector('.tab[data-t="'+t+'"]');if(bel)bel.classList.add('on');if(t==='index')renderIdx();if(t==='rank')renderRank();if(t==='worlds')renderWorlds()}

function init(){
load();
var cw=getWorld();if(cw.eggs.indexOf(selEgg)===-1)selEgg=cw.eggs[0];
document.getElementById('rkName').value=G.pname;
initBg();drawBg();
setTimeout(function(){initHab();drawHab()},100);
addEventListener('resize',function(){setTimeout(initHab,200)});
applyTheme();

document.getElementById('btnMute').addEventListener('click',function(){G.mut=!G.mut;this.innerHTML=G.mut?'<i class="fas fa-volume-xmark"></i>':'<i class="fas fa-volume-high"></i>';save()});
document.getElementById('btnReset').addEventListener('click',function(){showConfirm('⚠️','Reiniciar','Perderas todo.',resetGame)});
document.getElementById('navTabs').addEventListener('click',function(ev){var btn=ev.target.closest('.tab');if(btn)setTab(btn.dataset.t)});
document.getElementById('navEggs').addEventListener('click',function(ev){var btn=ev.target.closest('.egg');if(btn){snd.click();selEgg=btn.dataset.e;updateUI()}});
document.getElementById('worldMap').addEventListener('click',function(ev){var buyBtn=ev.target.closest('[data-buywid]');if(buyBtn){buyWorld(buyBtn.dataset.buywid);return}var card=ev.target.closest('.wcard');if(card&&isWorldUnlocked(card.dataset.wid))setWorld(card.dataset.wid)});
document.getElementById('btnBuy').addEventListener('click',function(){openEgg(false)});
document.getElementById('btnAuto').addEventListener('click',handleAuto);
document.getElementById('btnRb').addEventListener('click',doRb);
document.getElementById('overlay').addEventListener('click',function(e){if(e.target.id==='oclose'||e.target.closest('#oclose'))return;hatchClick()});
document.getElementById('oclose').addEventListener('click',function(e){e.stopPropagation();closeHatch()});
document.getElementById('petList').addEventListener('click',function(ev){var btn=ev.target.closest('[data-act]');if(!btn)return;var act=btn.dataset.act,id=parseInt(btn.dataset.id,10);if(act==='up')doUpgrade(id);else if(act==='sell')doSell(id)});
document.getElementById('rkName').addEventListener('input',function(){G.pname=this.value.trim().slice(0,14)||'Mi Base';save()});
document.getElementById('confirmYes').addEventListener('click',function(){hideConfirm();if(confirmCallback)confirmCallback()});
document.getElementById('confirmNo').addEventListener('click',hideConfirm);

updateUI();

setInterval(function(){
var inc=totInc();
if(inc>0){G.money+=inc;G.te+=inc;if(inc>=10&&Math.random()<.15)floatM(inc)}
if(G.autoOn&&G.money>=G.pr[selEgg])openEgg(true);
updateUI();
},1000);

setInterval(save,8000);

function renderLoop(){var diff=G.money-G.displayMoney;if(Math.abs(diff)>.5){G.displayMoney+=diff*.15;document.getElementById('sMoney').textContent='$'+fmt(Math.round(G.displayMoney))}requestAnimationFrame(renderLoop)}
requestAnimationFrame(renderLoop);
}

document.addEventListener('DOMContentLoaded',init);
document.addEventListener('click',function(){snd.go()},{once:true});
document.addEventListener('touchstart',function(){snd.go()},{once:true});
</script>
</body>
</html>
