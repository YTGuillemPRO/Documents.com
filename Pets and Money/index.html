function initBgCanvas(){var c=document.getElementById('bgCanvas');bgCtx=c.getContext('2d');function rs(){c.width=window.innerWidth;c.height=window.innerHeight;bgW=c.width;bgH=c.height;}rs();window.addEventListener('resize',rs);for(var i=0;i<60;i++)bgParticles.push(mkBgP());}
function mkBgP(){var w=getWorld();return{x:Math.random()*bgW,y:Math.random()*bgH,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.3-0.1,size:Math.random()*3+1,alpha:Math.random()*0.4+0.1,color:w.color,life:Math.random()*200+100,maxLife:300,type:w.particles};}
function drawBg(){if(!bgCtx)return;var w=getWorld();bgCtx.clearRect(0,0,bgW,bgH);var grd=bgCtx.createRadialGradient(bgW/2,bgH/2,0,bgW/2,bgH/2,bgW*0.7);grd.addColorStop(0,w.color+'18');grd.addColorStop(0.5,'#060e1a');grd.addColorStop(1,'#030810');bgCtx.fillStyle=grd;bgCtx.fillRect(0,0,bgW,bgH);for(var i=0;i<bgParticles.length;i++){var p=bgParticles[i];p.x+=p.vx;p.y+=p.vy;p.life--;if(p.life<=0||p.x<-10||p.x>bgW+10||p.y<-10||p.y>bgH+10){bgParticles[i]=mkBgP();bgParticles[i].y=bgH+5;bgParticles[i].life=bgParticles[i].maxLife;continue;}var a=p.alpha*(p.life/p.maxLife);bgCtx.globalAlpha=a;if(p.type==='leaves'){bgCtx.fillStyle=p.color;bgCtx.beginPath();bgCtx.ellipse(p.x,p.y,p.size*2,p.size,Math.sin(p.life*0.05)*0.5,0,Math.PI*2);bgCtx.fill();}else if(p.type==='bubbles'){bgCtx.strokeStyle=p.color;bgCtx.lineWidth=0.5;bgCtx.beginPath();bgCtx.arc(p.x,p.y,p.size*1.5,0,Math.PI*2);bgCtx.stroke();}else if(p.type==='embers'){bgCtx.fillStyle=p.color;bgCtx.beginPath();bgCtx.arc(p.x,p.y,p.size,0,Math.PI*2);bgCtx.fill();bgCtx.globalAlpha=a*0.3;bgCtx.beginPath();bgCtx.arc(p.x,p.y,p.size*3,0,Math.PI*2);bgCtx.fill();}else if(p.type==='stars'){var tw=Math.sin(p.life*0.1)*0.3+0.7;bgCtx.globalAlpha=a*tw;bgCtx.fillStyle='#fff';bgCtx.beginPath();bgCtx.arc(p.x,p.y,p.size*0.7,0,Math.PI*2);bgCtx.fill();}else if(p.type==='wisps'){bgCtx.fillStyle=p.color;bgCtx.beginPath();bgCtx.arc(p.x+Math.sin(p.life*0.08)*8,p.y,p.size*1.5,0,Math.PI*2);bgCtx.fill();}}bgCtx.globalAlpha=1;requestAnimationFrame(drawBg);}

function refreshHabPets(){habPets=[];var s=G.pets.slice().sort(function(a,b){return petEarn(b)-petEarn(a);}).slice(0,10);for(var i=0;i<s.length;i++){habPets.push({emoji:s[i].i,x:Math.random()*(habW-30)+15,y:0,vx:(Math.random()-0.5)*1.5,targetY:30+Math.random()*(habH-60),bob:Math.random()*Math.PI*2,size:RORD[s[i].r]>=7?20:RORD[s[i].r]>=5?17:15,rare:s[i].r});}}
function drawHabitat(){if(!habCtx)return;habFrame++;var w=getWorld();habCtx.clearRect(0,0,habW,habH);var g=habCtx.createLinearGradient(0,0,0,habH);g.addColorStop(0,'#0a1a0f');g.addColorStop(1,'#1a3a20');habCtx.fillStyle=g;habCtx.fillRect(0,0,habW,habH);var gy=habH*0.75;habCtx.strokeStyle=w.color+'25';habCtx.lineWidth=1;habCtx.beginPath();habCtx.moveTo(0,gy);for(var x=0;x<=habW;x+=5)habCtx.lineTo(x,gy+Math.sin((x+habFrame*0.5)*0.05)*3);habCtx.stroke();for(var i=0;i<habPets.length;i++){var p=habPets[i];p.y+=(p.targetY-p.y)*0.03;p.x+=p.vx;if(p.x<15||p.x>habW-15)p.vx*=-1;p.bob+=0.04;var by=p.y+Math.sin(p.bob)*3;if(RORD[p.rare]>=5){habCtx.globalAlpha=0.12;habCtx.fillStyle=RCOL[p.rare];habCtx.beginPath();habCtx.arc(p.x,by,p.size*1.2,0,Math.PI*2);habCtx.fill();}habCtx.globalAlpha=1;habCtx.font=p.size+'px serif';habCtx.textAlign='center';habCtx.textBaseline='middle';habCtx.fillText(p.emoji,p.x,by);}habCtx.globalAlpha=1;requestAnimationFrame(drawHabitat);}
function spawnHatchParticles(rarity){var c=document.getElementById('hatchCanvas');var r=c.parentElement.getBoundingClientRect();c.width=r.width*2;c.height=r.height*2;hatchCtx=c.getContext('2d');hatchCtx.scale(2,2);var w=r.width,h=r.height,col=RCOL[rarity]||'#fff';var count=RORD[rarity]>=5?100:40;hatchParticles=[];for(var i=0;i<count;i++){var angle=Math.random()*Math.PI*2,spd=Math.random()*8+2;hatchParticles.push({x:w/2,y:h/2,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,size:Math.random()*5+1,color:col,life:Math.random()*50+30,maxLife:80,gravity:0.06});}animHatch(w,h);}
function animHatch(w,h){if(!hatchCtx||!hatchParticles.length)return;hatchCtx.clearRect(0,0,w,h);var alive=false;for(var i=0;i<hatchParticles.length;i++){var p=hatchParticles[i];if(p.life<=0)continue;alive=true;p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.life--;p.vx*=0.98;var a=p.life/p.maxLife;hatchCtx.globalAlpha=a;hatchCtx.fillStyle=p.color;hatchCtx.beginPath();hatchCtx.arc(p.x,p.y,Math.max(0.5,p.size*a),0,Math.PI*2);hatchCtx.fill();}hatchCtx.globalAlpha=1;if(alive)requestAnimationFrame(function(){animHatch(w,h);});}

function save(){try{localStorage.setItem(SAVE_KEY,JSON.stringify({money:G.money,rb:G.rb,mult:G.mult,pets:G.pets,disc:G.disc,pr:G.pr,tot:G.tot,te:G.te,mut:G.mut,nid:G.nid,pname:G.pname,autoOpen:G.autoOpen,autoOn:G.autoOn,playerId:G.playerId,fbId:G.fbId,world:G.world}));}catch(e){}}
function load(){var raw=null;try{raw=localStorage.getItem(SAVE_KEY);}catch(e){return;}if(!raw)return;try{var d=JSON.parse(raw);if(!d)return;G.money=d.money||10;G.displayMoney=G.money;G.rb=d.rb||0;G.mult=d.mult||1;G.mut=!!d.mut;G.tot=d.tot||0;G.te=d.te||0;G.nid=d.nid||1;G.pname=d.pname||'Mi Base';G.autoOpen=!!d.autoOpen;G.autoOn=!!d.autoOn;G.playerId=d.playerId||'';G.fbId=d.fbId||'';G.world=d.world||'bosque';if(d.pr)G.pr=d.pr;G.disc=d.disc||[];G.pets=[];if(d.pets){for(var i=0;i<d.pets.length;i++){var p=d.pets[i];if(!p)continue;G.pets.push({i:p.i,n:p.n,r:p.r,be:p.be||p.e||1,lv:p.lv||1,id:p.id||G.nid++});}}}catch(e){}}
function resetGame(){try{localStorage.removeItem(SAVE_KEY);}catch(e){}var oldPid=G.playerId;G={money:10,displayMoney:10,rb:0,mult:1,pets:[],disc:[],pr:{basic:10,golden:500,cosmic:5000,void:50000,divine:250000,infernal:1000000,natural:25,marino:8000,magmatico:100000,estelar:2000000,umbral:10000000},tot:0,te:0,mut:false,nid:1,pname:'Mi Base',autoOpen:false,autoOn:false,playerId:oldPid,fbId:oldPid,world:'bosque'};selEgg='basic';rbConf=false;applyWorldTheme();refreshHabPets();updateUI();toast('Reiniciado','inf');}

function petEarn(p){return(p.be||1)*(1+0.2*((p.lv||1)-1))*(G.mult||1)*(getWorld().bonus||1);}
function totInc(){var s=0;for(var i=0;i<G.pets.length;i++)s+=petEarn(G.pets[i]);return s;}
function rbCost(){return Math.floor(500000*Math.pow(2,G.rb));}
function upCost(p){return Math.floor((p.be||1)*25*(p.lv||1));}
function roll(egg){var w=WEIGHTS[egg];if(!w)return PETS[0];var keys=Object.keys(w),total=0;for(var i=0;i<keys.length;i++)total+=w[keys[i]];var r=Math.random()*total,chosen=keys[0];for(var i=0;i<keys.length;i++){r-=w[keys[i]];if(r<=0){chosen=keys[i];break;}}var pool=[];for(var i=0;i<PETS.length;i++){if(PETS[i].r===chosen&&PETS[i].eg.indexOf(egg)!==-1)pool.push(PETS[i]);}if(!pool.length)return PETS[0];return pool[Math.floor(Math.random()*pool.length)];}

function openEgg(silent){var cost=G.pr[selEgg];if(G.money<cost){if(!silent){snd.err();toast('Sin dinero','err');}if(G.autoOn){G.autoOn=false;updateUI();}return false;}G.money-=cost;var scales={basic:1.15,golden:1.2,cosmic:1.25,void:1.28,divine:1.3,infernal:1.35,natural:1.12,marino:1.22,magmatico:1.28,estelar:1.32,umbral:1.38};G.pr[selEgg]=Math.floor(G.pr[selEgg]*(scales[selEgg]||1.15));var tpl=roll(selEgg);var np={i:tpl.i,n:tpl.n,r:tpl.r,be:tpl.e,lv:1,id:G.nid++};G.pets.push(np);G.tot++;if(G.disc.indexOf(tpl.n)===-1)G.disc.push(tpl.n);save();updateUI();refreshHabPets();if(!silent){snd.go();showHatch(np);}return true;}

function showHatch(pet){hatchState={pet:pet,clicks:0,clicksNeeded:CLICKS_NEEDED[pet.r]||3,revealed:false,bursting:false};var ov=document.getElementById('overlay'),e3d=document.getElementById('oegg3d'),e3dBody=document.getElementById('egg3dBody');ov.style.display='flex';ov.style.cursor='pointer';e3d.style.display='block';e3dBody.style.background=EGG_3D_GRAD[selEgg]||EGG_3D_GRAD.basic;e3d.className='egg-3d-container';document.getElementById('egg3d').className='egg-3d';document.getElementById('crackContainer').innerHTML='';document.getElementById('oicon').style.display='none';document.getElementById('tapHint').style.display='block';document.getElementById('tapProgress').style.display='flex';document.getElementById('oclose').style.display='none';document.getElementById('oclose').classList.remove('visible');document.getElementById('oname').textContent='';document.getElementById('orar').textContent='';document.getElementById('orar').style.color='';document.getElementById('oinfo').textContent='';updateTapProgress();snd.hatch(pet.r);}

function hatchClick(){if(hatchState.revealed||hatchState.bursting)return;hatchState.clicks++;var n=hatchState.clicks,max=hatchState.clicksNeeded,progress=n/max;snd.crack(n,max);if(navigator.vibrate)navigator.vibrate(30);addCrackLines(progress);var e3d=document.getElementById('oegg3d');e3d.classList.remove('egg-squish');void e3d.offsetWidth;e3d.classList.add('egg-squish');setTimeout(function(){e3d.classList.remove('egg-squish');},150);e3d.className='egg-3d-container';if(progress<0.25)e3d.classList.add('egg-shake-1');else if(progress<0.5)e3d.classList.add('egg-shake-2');else if(progress<0.75)e3d.classList.add('egg-shake-3');else e3d.classList.add('egg-shake-4');e3d.classList.remove('egg-glow-1','egg-glow-2','egg-glow-3','egg-glow-4');if(progress>=0.75)e3d.classList.add('egg-glow-4');else if(progress>=0.5)e3d.classList.add('egg-glow-3');else if(progress>=0.25)e3d.classList.add('egg-glow-2');else e3d.classList.add('egg-glow-1');var flash=document.createElement('div');flash.className='click-flash';document.getElementById('overlay').appendChild(flash);setTimeout(function(){if(flash.parentNode)flash.parentNode.removeChild(flash);},200);if(progress>=0.5){var game=document.getElementById('game');game.classList.remove('screen-shake');void game.offsetWidth;game.classList.add('screen-shake');setTimeout(function(){game.classList.remove('screen-shake');},200);}updateTapProgress();if(n>=max)hatchBurst();}

function addCrackLines(progress){var container=document.getElementById('crackContainer');var count=progress>=0.7?3:progress>=0.4?2:1;for(var i=0;i<count;i++){var line=document.createElement('div');line.className='crack-line'+(progress>=0.6?' thick':'');line.style.top=(15+Math.random()*65)+'%';line.style.left=(5+Math.random()*85)+'%';line.style.width=(8+Math.random()*22)+'px';line.style.transform='rotate('+(Math.random()*360)+'deg)';container.appendChild(line);}}
function updateTapProgress(){var html='';for(var i=0;i<hatchState.clicksNeeded;i++){html+='<span class="pip'+(i<hatchState.clicks?' filled':'')+(i===hatchState.clicks-1?' just':'')+'"></span>';}document.getElementById('tapProgress').innerHTML=html;}

function hatchBurst(){hatchState.bursting=true;var e3d=document.getElementById('oegg3d'),ov=document.getElementById('overlay');document.getElementById('tapHint').style.display='none';document.getElementById('tapProgress').style.display='none';ov.style.cursor='default';e3d.className='egg-3d-container egg-burst';snd.burst();spawnHatchParticles(hatchState.pet.r);if(navigator.vibrate)navigator.vibrate([50,30,80]);setTimeout(function(){e3d.style.display='none';var ico=document.getElementById('oicon');ico.style.display='block';ico.textContent=hatchState.pet.i;ico.style.color=RCOL[hatchState.pet.r]||'#fff';ico.style.animation='iconReveal .6s cubic-bezier(.175,.885,.32,1.275) forwards';document.getElementById('oname').textContent=hatchState.pet.n;document.getElementById('orar').textContent=RNAME[hatchState.pet.r]||hatchState.pet.r;document.getElementById('orar').style.color=RCOL[hatchState.pet.r]||'#fff';document.getElementById('oinfo').textContent='+$'+fmt(petEarn(hatchState.pet))+'/s';setTimeout(function(){hatchState.revealed=true;hatchState.bursting=false;var cb=document.getElementById('oclose');cb.style.display='inline-block';cb.classList.add('visible');},600);},500);}

function closeHatch(){if(!hatchState.revealed)return;document.getElementById('overlay').style.display='none';document.getElementById('oegg3d').style.display='none';document.getElementById('oegg3d').className='egg-3d-container';document.getElementById('egg3d').className='egg-3d';document.getElementById('crackContainer').innerHTML='';document.getElementById('oicon').style.display='none';document.getElementById('oicon').style.animation='';document.getElementById('oclose').style.display='none';document.getElementById('oclose').classList.remove('visible');document.getElementById('tapProgress').style.display='flex';hatchParticles=[];hatchState.revealed=false;}

function doUpgrade(id){var pet=null;for(var i=0;i<G.pets.length;i++){if(G.pets[i].id===id){pet=G.pets[i];break;}}if(!pet||pet.lv>=99)return;var c=upCost(pet);if(G.money<c){snd.err();toast('Sin dinero','err');return;}G.money-=c;pet.lv++;toast(pet.n+' Nv.'+pet.lv,'ok');save();updateUI();}
function doSell(id){var idx=-1;for(var i=0;i<G.pets.length;i++){if(G.pets[i].id===id){idx=i;break;}}if(idx===-1)return;var pet=G.pets[idx],val=Math.floor(petEarn(pet)*10);G.money+=val;G.pets.splice(idx,1);toast(pet.n+' $'+fmt(val),'inf');save();updateUI();refreshHabPets();}
function doRb(){var cost=rbCost();if(rbConf){clearTimeout(rbTmr);rbConf=false;G.rb++;G.mult*=1.8;G.money=10;G.displayMoney=10;G.pets=[];G.pr={basic:10,golden:500,cosmic:5000,void:50000,divine:250000,infernal:1000000,natural:25,marino:8000,magmatico:100000,estelar:2000000,umbral:10000000};snd.hatch('og');toast('REBIRTH '+G.rb+' x'+G.mult.toFixed(1),'rwd');save();updateUI();refreshHabPets();}else{if(G.money<cost){snd.err();toast('Necesitas $'+fmt(cost),'err');return;}rbConf=true;var btn=document.getElementById('btnRb');btn.innerHTML='<i class="fas fa-exclamation-triangle"></i> CONFIRMAR?';btn.classList.add('yes');btn.disabled=false;snd.click();rbTmr=setTimeout(function(){rbConf=false;updateUI();},3000);}}
function handleAuto(){snd.click();if(!G.autoOpen){if(G.money<1e9){snd.err();toast('Necesitas $1.0B','err');return;}G.money-=1e9;G.autoOpen=true;G.autoOn=true;toast('Auto activado!','rwd');save();updateUI();}else{G.autoOn=!G.autoOn;toast('Auto: '+(G.autoOn?'ON':'OFF'),'inf');save();updateUI();}}

function ensurePlayerId(){if(!G.playerId||G.playerId.trim().length<3){G.playerId='p_'+Math.random().toString(36).substr(2,6);}G.playerId=G.playerId.replace(/[^a-zA-Z0-9_]/g,'_').substring(0,20);G.fbId=G.playerId;save();}
function copyPlayerId(){if(navigator.clipboard){navigator.clipboard.writeText(G.playerId).then(function(){toast('ID copiado','ok');});}else{toast('Error','err');}}

var RANK_PREFIX='rank_';
async function pushRank(){if(!G.playerId)return;try{await window.storage.set(RANK_PREFIX+G.playerId,JSON.stringify({name:G.pname,earn:Math.floor(totInc()),rb:G.rb,pets:G.pets.length,ts:Date.now(),playerId:G.playerId}),true);}catch(e){}}
async function fetchRank(){if(rankFetching)return;rankFetching=true;setRankStatus('loading','Cargando...');try{var kr=await window.storage.list(RANK_PREFIX,true);if(!kr||!Array.isArray(kr.keys)){rankCache=[];setRankStatus('ok','0');rankFetching=false;return;}var nc=[];for(var i=0;i<kr.keys.length;i++){try{var r=await window.storage.get(kr.keys[i],true);if(r&&r.value){var d=JSON.parse(r.value);if(d&&d.playerId)nc.push({id:d.playerId,name:d.name||'???',earn:d.earn||0,rb:d.rb||0,pets:d.pets||0,isMe:d.playerId===G.playerId});}}catch(e){}}nc.sort(function(a,b){return b.earn-a.earn;});rankCache=nc;setRankStatus('ok',rankCache.length+' jugadores');if(activeTab==='rank')renderRank();}catch(e){setRankStatus('err','Error');}rankFetching=false;}
function setRankStatus(type,msg){var el=document.getElementById('rkStatus');if(!el)return;el.className='rk-status '+type;el.innerHTML=(type==='loading'?'<span class="rk-spinner"></span>':'<i class="fas fa-circle-check"></i>')+' <span>'+msg+'</span>';}
function renderRank(){var myEarn=Math.floor(totInc()),entries=rankCache.slice(),found=false;for(var i=0;i<entries.length;i++){if(entries[i].id===G.playerId){entries[i].isMe=true;found=true;}else entries[i].isMe=false;}if(!found&&G.playerId)entries.push({name:G.pname,earn:myEarn,rb:G.rb,pets:G.pets.length,isMe:true,id:G.playerId});entries.sort(function(a,b){return b.earn-a.earn;});var myPos=-1;for(var i=0;i<entries.length;i++){if(entries[i].isMe){myPos=i+1;break;}}document.getElementById('rkPos').textContent='#'+(myPos>0?myPos:'--');document.getElementById('rkMyEarn').textContent='$'+fmt(myEarn)+'/s';var html='';var top=entries.slice(0,20);for(var i=0;i<top.length;i++){var e=top[i],pos=i+1;html+='<div class="rk-i'+(e.isMe?' me':'')+'"><div class="rk-pos'+(pos<=3?' p'+pos:'')+'">'+pos+'</div><div class="rk-body"><div class="rk-top"><span class="rk-n">'+esc(e.name)+(e.isMe?' <span class="rk-you">TU</span>':'')+'</span><span class="rk-rb">RB '+e.rb+'</span></div><div class="rk-bot"><span class="rk-pc">'+e.pets+' pets</span><span class="rk-earn">$'+fmt(e.earn)+'/s</span></div></div></div>';}document.getElementById('rkList').innerHTML=html;}

function showAdminPanel(){isAdmin=true;fetchRank();document.getElementById('adminOverlay').classList.add('show');toast('Admin','adm');}
function hideAdminPanel(){document.getElementById('adminOverlay').classList.remove('show');}
function renderAdminPanel(){var entries=rankCache.slice().sort(function(a,b){return b.earn-a.earn;});var tp=0;for(var i=0;i<entries.length;i++)tp+=entries[i].pets;document.getElementById('adminTotalPlayers').textContent=entries.length;document.getElementById('adminTopEarn').textContent=entries.length?'$'+fmt(entries[0].earn)+'/s':'$0';document.getElementById('adminTotalPets').textContent=tp;var html='';if(!entries.length)html='<div class="admin-empty">Sin jugadores</div>';for(var i=0;i<entries.length;i++){var e=entries[i];html+='<div class="admin-player"><span class="admin-pos">'+(i+1)+'</span><div class="admin-player-info"><span class="admin-player-name">'+esc(e.name)+'</span><span class="admin-player-sub">RB '+e.rb+' · '+e.pets+'</span></div><span class="admin-player-earn">$'+fmt(e.earn)+'/s</span>'+(e.isMe?'<span style="width:20px"></span>':'<button class="admin-del" data-pid="'+esc(e.id)+'"><i class="fas fa-trash-can"></i></button>')+'</div>';}document.getElementById('adminList').innerHTML=html;document.querySelectorAll('.admin-del').forEach(function(btn){btn.onclick=function(){var pid=this.dataset.pid;showConfirm('🗑️','Eliminar','Eliminar del ranking?',function(){adminDeletePlayer(pid);});};});}
async function adminDeletePlayer(pid){try{await window.storage.delete(RANK_PREFIX+pid,true);toast('Eliminado','ok');await fetchRank();renderAdminPanel();}catch(e){toast('Error','err');}}
async function adminClearAll(){try{var kr=await window.storage.list(RANK_PREFIX,true);if(kr&&kr.keys){for(var i=0;i<kr.keys.length;i++){try{await window.storage.delete(kr.keys[i],true);}catch(e){}}}rankCache=[];toast('Limpio','ok');renderRank();renderAdminPanel();}catch(e){toast('Error','err');}}
function handleTitleClick(){titleClickCount++;clearTimeout(titleClickTimer);titleClickTimer=setTimeout(function(){titleClickCount=0;},1500);if(titleClickCount>=5){titleClickCount=0;var pwd=prompt('Admin pass:');if(pwd===ADMIN_PASS)showAdminPanel();else{snd.err();toast('No','err');}}}

function renderEggs(){var w=getWorld(),html='';for(var i=0;i<w.eggs.length;i++){var eid=w.eggs[i];html+='<button class="egg'+(eid===selEgg?' on':'')+'" data-e="'+eid+'"><div class="egg-shape '+(EGG_STYLES[eid]||'egg-b')+'"></div><span class="egg-n">'+(EGG_NAMES[eid]||eid)+'</span><span class="egg-p">$'+fmt(G.pr[eid])+'</span></button>';}document.getElementById('navEggs').innerHTML=html;}
function renderWorlds(){var html='';for(var i=0;i<WORLDS.length;i++){var w=WORLDS[i],u=isWorldUnlocked(w),a=w.id===G.world,lt=getWorldUnlockText(w);var ph='';if(a){for(var j=0;j<4;j++)ph+='<div class="wparticle" style="left:'+Math.random()*90+'%;bottom:'+Math.random()*30+'%;width:'+(3+Math.random()*4)+'px;height:'+(3+Math.random()*4)+'px;background:'+w.color+';animation-duration:'+(2+Math.random()*3)+'s;animation-delay:'+Math.random()*2+'s;"></div>';}html+='<div class="wcard'+(a?' active':'')+(!u?' locked':'')+'" data-wid="'+w.id+'"><div class="wcard-particles">'+ph+'</div><div class="wcard-hd"><span class="wcard-icon" style="color:'+w.color+'">'+w.icon+'</span><div class="wcard-info"><div class="wcard-name">'+w.name+'</div><div class="wcard-desc">'+w.desc+'</div>'+(lt?'<div class="wcard-lock">'+lt+'</div>':'')+'</div></div><div class="wcard-stats"><span class="wcard-st">Bonus: <span>x'+w.bonus.toFixed(1)+'</span></span></div>'+(a?'<div class="wcard-bonus">ACTIVO</div>':'')+'</div>';}document.getElementById('worldMap').innerHTML=html;}

function updateUI(){var diff=G.money-G.displayMoney;if(Math.abs(diff)<1)G.displayMoney=G.money;else G.displayMoney+=diff*0.15;document.getElementById('sMoney').textContent='$'+fmt(Math.round(G.displayMoney));document.getElementById('sInc').textContent='$'+fmt(totInc())+'/s';document.getElementById('sPets').textContent=G.pets.length;var bb=document.getElementById('btnBuy');if(G.money>=G.pr[selEgg]){bb.classList.add('can');bb.classList.remove('no');}else{bb.classList.remove('can');bb.classList.add('no');}var ba=document.getElementById('btnAuto');if(!G.autoOpen){ba.innerHTML='<i class="fas fa-robot"></i> AUTO ($1.0B)';if(G.money>=1e9){ba.classList.add('can');ba.classList.remove('no','on');}else{ba.classList.add('no');ba.classList.remove('can','on');}}else{if(G.autoOn){ba.innerHTML='<i class="fas fa-robot"></i> AUTO: ON';ba.classList.add('on');ba.classList.remove('no','can');}else{ba.innerHTML='<i class="fas fa-robot"></i> AUTO: OFF';ba.classList.add('can');ba.classList.remove('on','no');}}if(!rbConf){var rb=document.getElementById('btnRb');rb.innerHTML='<i class="fas fa-bolt"></i> REBIRTH ($'+fmt(rbCost())+')';rb.disabled=G.money<rbCost();rb.classList.remove('yes');}renderPets();renderEggs();if(activeTab==='worlds')renderWorlds();if(activeTab==='rank')renderRank();}
function renderPets(){var el=document.getElementById('petList');if(!G.pets.length){el.innerHTML='<div class="empty"><i class="fas fa-egg"></i><p>Abre tu primer huevo</p></div>';return;}var s=G.pets.slice().sort(function(a,b){var rd=(RORD[b.r]||0)-(RORD[a.r]||0);return rd!==0?rd:petEarn(b)-petEarn(a);});var h='';for(var i=0;i<s.length;i++){var p=s[i],earn=petEarn(p),uc=p.lv<99?upCost(p):0;h+='<div class="pc '+p.r+'"><div class="pc-l"><span class="pc-i">'+p.i+'</span><div class="pc-t"><span class="pc-n">'+p.n+'</span><span class="pc-m">Nv.'+p.lv+' '+(RNAME[p.r]||'')+(uc?' · $'+fmt(uc):'')+'</span></div></div><div class="pc-r"><span class="pc-e">$'+fmt(earn)+'/s</span><div class="pc-a">';if(p.lv<99)h+='<button class="ab ab-u" data-act="up" data-id="'+p.id+'"><i class="fas fa-arrow-up"></i></button>';h+='<button class="ab ab-s" data-act="sell" data-id="'+p.id+'"><i class="fas fa-coins"></i></button></div></div></div>';}el.innerHTML=h;}
function renderIdx(){var pct=Math.round((G.disc.length/PETS.length)*100);document.getElementById('idxPct').textContent=pct+'%';document.getElementById('idxBar').style.width=pct+'%';var s=PETS.slice().sort(function(a,b){return(RORD[a.r]||0)-(RORD[b.r]||0);});var h='';for(var i=0;i<s.length;i++){var p=s[i],d=G.disc.indexOf(p.n)!==-1;h+='<div class="ii '+p.r+(d?'':' off')+'"><span class="ic">'+(d?p.i:'?')+'</span><span class="in">'+(d?p.n:'???')+'</span><span class="ir '+p.r+'">'+(RNAME[p.r]||'')+'</span></div>';}document.getElementById('idxList').innerHTML=h;}

function setTab(t){snd.click();activeTab=t;var panels=document.querySelectorAll('.panel'),btns=document.querySelectorAll('.tab');for(var i=0;i<panels.length;i++)panels[i].classList.remove('on');for(var i=0;i<btns.length;i++)btns[i].classList.remove('on');var map={game:'pGame',worlds:'pWorlds',index:'pIndex',rank:'pRank'};var pel=document.getElementById(map[t]);if(pel)pel.classList.add('on');var bel=document.querySelector('.tab[data-t="'+t+'"]');if(bel)bel.classList.add('on');if(t==='index')renderIdx();if(t==='rank'){renderRank();document.getElementById('rkPlayerId').value=G.playerId;fetchRank();}if(t==='worlds')renderWorlds();}

function renderLoop(){var diff=G.money-G.displayMoney;if(Math.abs(diff)>0.5){G.displayMoney+=diff*0.15;document.getElementById('sMoney').textContent='$'+fmt(Math.round(G.displayMoney));}requestAnimationFrame(renderLoop);}

function init(){
  try{
    load();ensurePlayerId();
    document.getElementById('rkName').value=G.pname;
    document.getElementById('rkPlayerId').value=G.playerId;

    initBgCanvas();drawBg();
    setTimeout(function(){initHabCanvas();drawHabitat();},100);
    window.addEventListener('resize',function(){setTimeout(initHabCanvas,200);});
    applyWorldTheme();

    // Inputs
    document.getElementById('rkName').addEventListener('input',function(){G.pname=this.value.trim().slice(0,14)||'Mi Base';save();});
    document.getElementById('rkPlayerId').addEventListener('input',function(){var n=this.value.replace(/[^a-zA-Z0-9_]/g,'_').substring(0,20);this.value=n;G.playerId=n;G.fbId=n;save();});
    document.getElementById('btnCopyId').addEventListener('click',function(e){e.stopPropagation();copyPlayerId();});

    // Header buttons
    var mb=document.getElementById('btnMute');
    mb.innerHTML=G.mut?'<i class="fas fa-volume-xmark"></i>':'<i class="fas fa-volume-high"></i>';
    mb.onclick=function(){G.mut=!G.mut;this.innerHTML=G.mut?'<i class="fas fa-volume-xmark"></i>':'<i class="fas fa-volume-high"></i>';save();};
    document.getElementById('btnReset').onclick=function(){showConfirm('⚠️','Reiniciar','Perderas todo.',resetGame);};
    document.getElementById('gameTitle').addEventListener('click',handleTitleClick);

    // Navigation
    document.getElementById('navTabs').addEventListener('click',function(ev){var btn=ev.target.closest('.tab');if(btn)setTab(btn.dataset.t);});
    document.getElementById('navEggs').addEventListener('click',function(ev){var btn=ev.target.closest('.egg');if(btn)setEgg(btn.dataset.e);});
    document.getElementById('worldMap').addEventListener('click',function(ev){var card=ev.target.closest('.wcard');if(card)setWorld(card.dataset.wid);});

    // MAIN GAME BUTTONS
    document.getElementById('btnBuy').addEventListener('click',function(){openEgg(false);});
    document.getElementById('btnAuto').addEventListener('click',handleAuto);
    document.getElementById('btnRb').addEventListener('click',doRb);

    // INTERACTIVE HATCH CLICK
    document.getElementById('overlay').addEventListener('click',function(e){
      if(e.target.id==='oclose'||e.target.closest('#oclose'))return;
      hatchClick();
    });
    document.getElementById('oclose').addEventListener('click',function(e){
      e.stopPropagation();
      closeHatch();
    });

    // Pet list actions
    document.getElementById('petList').addEventListener('click',function(ev){
      var btn=ev.target.closest('[data-act]');if(!btn)return;
      var act=btn.dataset.act,id=parseInt(btn.dataset.id,10);
      if(act==='up')doUpgrade(id);else if(act==='sell')doSell(id);
    });

    // Admin
    document.getElementById('adminClose').onclick=hideAdminPanel;
    document.getElementById('adminRefresh').onclick=function(){rankLastFetch=Date.now();fetchRank().then(renderAdminPanel);};
    document.getElementById('adminClearAll').onclick=function(){showConfirm('🗑️','Limpiar TODO','Eliminar todo?',adminClearAll);};

    // Confirm
    document.getElementById('confirmYes').onclick=function(){hideConfirm();if(confirmCallback)confirmCallback();};
    document.getElementById('confirmNo').onclick=hideConfirm;

    fetchRank();updateUI();

    // Game Loop
    var tickN=0;
    setInterval(function(){
      var inc=totInc();
      if(inc>0){G.money+=inc;G.te+=inc;if(inc>=10&&Math.random()<0.15)floatM(inc);}
      if(G.autoOn&&G.money>=G.pr[selEgg])openEgg(true);
      tickN++;
      if(tickN%60===0)pushRank();
      if(tickN%90===0){rankLastFetch=Date.now();fetchRank();}
      updateUI();
    },1000);

    setTimeout(function(){pushRank();},5000);
    setInterval(save,8000);
    requestAnimationFrame(renderLoop);

  }catch(e){console.error('Init error:',e);}
}

document.addEventListener('DOMContentLoaded',init);
document.addEventListener('click',function(){snd.go();},{once:true});
document.addEventListener('touchstart',function(){snd.go();},{once:true});
</script>
</body>
</html>
