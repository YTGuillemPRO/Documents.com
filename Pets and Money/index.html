<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pet Simulator Ultra</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Plus Jakarta Sans',sans-serif;
  height:100vh;overflow:hidden;
  background:#060e1a;
  display:flex;justify-content:center;align-items:center;
  user-select:none;
}
body::before,body::after{
  content:'';position:fixed;border-radius:50%;pointer-events:none;filter:blur(80px);
}
body::before{
  width:500px;height:500px;top:-150px;left:-100px;
  background:rgba(16,185,129,0.12);
  animation:drift1 18s ease-in-out infinite;
}
body::after{
  width:400px;height:400px;bottom:-100px;right:-80px;
  background:rgba(251,191,36,0.1);
  animation:drift2 22s ease-in-out infinite;
}
@keyframes drift1{0%,100%{transform:translate(0,0)}50%{transform:translate(80px,60px)}}
@keyframes drift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-60px,-80px)}}

#game{
  position:relative;z-index:1;
  width:390px;height:86vh;max-height:760px;
  background:rgba(10,20,40,0.92);
  border:1.5px solid rgba(255,255,255,0.07);
  border-radius:26px;
  box-shadow:0 30px 70px rgba(0,0,0,0.6);
  padding:20px 18px 16px;
  display:flex;flex-direction:column;overflow:hidden;
}

header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
h1{
  font-family:'Russo One',sans-serif;font-size:17px;letter-spacing:0.5px;
  background:linear-gradient(135deg,#fbbf24,#f59e0b,#fde68a);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.hdr-btns{display:flex;gap:6px}
.hdr-btn{
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);
  color:#7a8ba8;width:32px;height:32px;border-radius:10px;
  cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.hdr-btn:hover{background:rgba(255,255,255,0.12);color:#f1f5f9}

.stats{display:flex;gap:5px;margin-bottom:10px}
.st{
  flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);
  border-radius:12px;padding:7px 4px;text-align:center;
}
.st i{font-size:11px;margin-bottom:2px;display:block}
.st-money i{color:#10b981}.st-inc i{color:#fbbf24}.st-pets i{color:#c084fc}
.st-v{display:block;font-size:13px;font-weight:900;color:#f1f5f9}
.st-l{display:block;font-size:7px;font-weight:700;color:#7a8ba8;text-transform:uppercase;letter-spacing:.5px;margin-top:1px}

.tabs{display:flex;gap:3px;margin-bottom:10px}
.tab{
  flex:1;padding:7px 2px;font-family:inherit;font-size:9.5px;font-weight:800;
  letter-spacing:.3px;border:1.5px solid rgba(255,255,255,0.07);border-radius:10px;
  cursor:pointer;background:rgba(255,255,255,0.04);color:#7a8ba8;transition:all .2s;
}
.tab.on{background:linear-gradient(135deg,#059669,#10b981);border-color:transparent;color:#fff;box-shadow:0 4px 14px rgba(16,185,129,0.3)}
.tab:not(.on):hover{background:rgba(255,255,255,0.08);color:#f1f5f9}

.panel{display:none;flex:1;overflow:hidden;flex-direction:column}
.panel.on{display:flex}

.eggs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.egg{
  flex:1 1 30%;min-width:0;padding:7px 2px 5px;border-radius:12px;border:2px solid rgba(255,255,255,0.07);
  background:rgba(255,255,255,0.03);cursor:pointer;text-align:center;transition:all .2s;color:#f1f5f9;
}
.egg.on{border-color:#fbbf24;background:rgba(251,191,36,0.07);box-shadow:0 0 12px rgba(251,191,36,0.12)}
.egg:hover{transform:scale(1.03)}
.egg-shape{width:26px;height:34px;border-radius:50% 50% 42% 42%;margin:0 auto 4px}
.egg-b{background:linear-gradient(145deg,#f8fafc,#cbd5e1);border:2px solid #94a3b8}
.egg-g{background:linear-gradient(145deg,#fef3c7,#f59e0b);border:2px solid #d97706;box-shadow:0 0 8px rgba(251,191,36,0.15)}
.egg-c{background:linear-gradient(145deg,#1e1b4b,#7c3aed,#06b6d4);border:2px solid #8b5cf6;box-shadow:0 0 10px rgba(139,92,246,0.2);animation:eggGlow 2.5s ease-in-out infinite}
.egg-v{background:linear-gradient(145deg,#1a1a2e,#4a044e,#0f0f23);border:2px solid #6b21a8;box-shadow:0 0 10px rgba(107,2,168,0.25);animation:eggV 3s ease-in-out infinite}
.egg-d{background:linear-gradient(145deg,#fef9c3,#fde68a,#fff);border:2px solid #fbbf24;box-shadow:0 0 12px rgba(253,224,71,0.3);animation:eggD 2s ease-in-out infinite}
.egg-i{background:linear-gradient(145deg,#7f1d1d,#dc2626,#f97316);border:2px solid #ef4444;box-shadow:0 0 12px rgba(239,68,68,0.3);animation:eggI 1.5s ease-in-out infinite}
@keyframes eggGlow{0%,100%{box-shadow:0 0 10px rgba(139,92,246,0.2)}50%{box-shadow:0 0 18px rgba(6,182,212,0.3)}}
@keyframes eggV{0%,100%{box-shadow:0 0 10px rgba(107,2,168,0.25)}50%{box-shadow:0 0 20px rgba(168,85,247,0.4)}}
@keyframes eggD{0%,100%{box-shadow:0 0 12px rgba(253,224,71,0.3)}50%{box-shadow:0 0 22px rgba(251,191,36,0.5)}}
@keyframes eggI{0%,100%{box-shadow:0 0 12px rgba(239,68,68,0.3)}50%{box-shadow:0 0 22px rgba(249,115,22,0.5)}}
.egg-n{display:block;font-size:9px;font-weight:800}
.egg-p{display:block;font-size:10px;font-weight:900;color:#10b981;margin-top:1px}

.btn{
  width:100%;padding:11px;font-family:inherit;font-size:13px;font-weight:900;
  letter-spacing:.4px;border:none;border-radius:12px;cursor:pointer;
  transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px;
}
.btn:active{transform:scale(0.97)}
.btn-buy{background:linear-gradient(135deg,#fbbf24,#d97706);color:#1a1a1a;box-shadow:0 4px 14px rgba(251,191,36,0.3);margin-bottom:5px}
.btn-buy.can{animation:bpulse 2s ease-in-out infinite}
.btn-buy.no{opacity:.4;filter:saturate(0.4);animation:none}
@keyframes bpulse{0%,100%{box-shadow:0 4px 14px rgba(251,191,36,0.3)}50%{box-shadow:0 4px 22px rgba(251,191,36,0.55)}}

.btn-auto{background:rgba(16,185,129,0.1);border:1.5px solid rgba(16,185,129,0.2);color:#10b981;margin-bottom:5px;box-shadow:none;font-size:11px;padding:9px}
.btn-auto.can{background:rgba(16,185,129,0.15);animation:autoPulse 2.5s ease-in-out infinite}
.btn-auto.on{background:linear-gradient(135deg,#10b981,#059669);color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(16,185,129,0.3)}
.btn-auto.no{opacity:.4;filter:saturate(0.4);animation:none;color:#64748b}
@keyframes autoPulse{0%,100%{box-shadow:0 0 10px rgba(16,185,129,0.15)}50%{box-shadow:0 0 20px rgba(16,185,129,0.3)}}

.btn-rb{background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;box-shadow:0 4px 14px rgba(124,58,237,0.3);margin-bottom:8px;font-size:11px;padding:9px}
.btn-rb:disabled{background:rgba(100,116,139,0.15);color:#64748b;box-shadow:none;cursor:not-allowed;opacity:.5}
.btn-rb.yes{background:linear-gradient(135deg,#f43f5e,#e11d48)!important;box-shadow:0 4px 18px rgba(244,63,94,0.4)!important;animation:rbpulse .5s ease-in-out infinite!important;opacity:1!important}
@keyframes rbpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}

.plist{flex:1;overflow-y:auto;padding-right:4px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.12) transparent}
.plist::-webkit-scrollbar{width:3px}
.plist::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:3px}
.empty{text-align:center;padding:30px 15px;color:#64748b}
.empty i{font-size:28px;margin-bottom:8px;display:block;opacity:.4}
.empty p{font-size:12px;font-weight:600}

.pc{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 9px;margin-bottom:4px;border-radius:10px;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);
  transition:all .15s;
}
.pc:hover{background:rgba(255,255,255,0.07)}
.pc-l{display:flex;align-items:center;gap:7px;flex:1;min-width:0}
.pc-i{font-size:20px;flex-shrink:0}
.pc-t{min-width:0}
.pc-n{display:block;font-size:11px;font-weight:800;color:#f1f5f9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc-m{display:block;font-size:8px;font-weight:700;color:#7a8ba8;margin-top:1px}
.pc-r{display:flex;align-items:center;gap:5px;flex-shrink:0}
.pc-e{font-size:10px;font-weight:900;color:#10b981;white-space:nowrap}
.pc-a{display:flex;gap:3px}
.ab{
  width:24px;height:24px;border:none;border-radius:6px;cursor:pointer;font-size:9px;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.ab:hover{transform:scale(1.15)}
.ab-u{background:rgba(16,185,129,0.12);color:#10b981;border:1px solid rgba(16,185,129,0.15)}
.ab-s{background:rgba(244,63,94,0.12);color:#f43f5e;border:1px solid rgba(244,63,94,0.15)}

.pc.common{border-left:3px solid #9ca3af}
.pc.rare{border-left:3px solid #38bdf8;background:rgba(56,189,248,0.04)}
.pc.epic{border-left:3px solid #c084fc;background:rgba(192,132,252,0.04)}
.pc.god{border-left:3px solid #fbbf24;background:rgba(251,191,36,0.04)}
.pc.legendary{border-left:3px solid #f87171;background:rgba(248,113,113,0.04)}
.pc.mythic{border-left:3px solid #f472b6;background:rgba(244,114,182,0.04)}
.pc.secret{border-left:3px solid #22d3ee;background:rgba(34,211,238,0.04)}
.pc.og{border-left:3px solid #fbbf24;background:rgba(251,191,36,0.06);border:1.5px solid rgba(251,191,36,0.25);box-shadow:0 0 12px rgba(251,191,36,0.08)}

.idx-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;padding:0 2px}
.idx-hd span:first-child{font-size:12px;font-weight:800;color:#7a8ba8}
.idx-hd span:last-child{font-size:14px;font-weight:900;color:#fbbf24}
.bar{height:6px;border-radius:3px;background:rgba(255,255,255,0.05);margin-bottom:10px;overflow:hidden}
.bar-f{height:100%;border-radius:3px;background:linear-gradient(90deg,#10b981,#fbbf24);transition:width .4s}
.igrid{flex:1;overflow-y:auto;padding-right:4px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.12) transparent}
.igrid::-webkit-scrollbar{width:3px}
.igrid::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:3px}
.ii{display:flex;align-items:center;gap:7px;padding:5px 9px;margin-bottom:3px;border-radius:7px;border-left:3px solid;background:rgba(255,255,255,0.03)}
.ii.off{opacity:.25}
.ii .ic{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.ii .in{font-size:10px;font-weight:700;color:#f1f5f9;flex:1}
.ii .ir{font-size:7px;font-weight:800;padding:2px 5px;border-radius:4px;text-transform:uppercase;letter-spacing:.3px}
.ir.common{color:#9ca3af;background:rgba(156,163,175,0.1)}.ir.rare{color:#38bdf8;background:rgba(56,189,248,0.1)}
.ir.epic{color:#c084fc;background:rgba(192,132,252,0.1)}.ir.god{color:#fbbf24;background:rgba(251,191,36,0.1)}
.ir.legendary{color:#f87171;background:rgba(248,113,113,0.1)}.ir.mythic{color:#f472b6;background:rgba(244,114,182,0.1)}
.ir.secret{color:#22d3ee;background:rgba(34,211,238,0.1)}.ir.og{color:#fbbf24;background:rgba(251,191,36,0.12)}
.ii.common{border-left-color:#9ca3af}.ii.rare{border-left-color:#38bdf8}.ii.epic{border-left-color:#c084fc}
.ii.god{border-left-color:#fbbf24}.ii.legendary{border-left-color:#f87171}.ii.mythic{border-left-color:#f472b6}
.ii.secret{border-left-color:#22d3ee}.ii.og{border-left-color:#fbbf24}

/* RANKING MEJORADO */
.rk-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding:0 2px;flex-wrap:wrap;gap:6px}
.rk-name-wrap{display:flex;align-items:center;gap:5px;flex:1;min-width:0}
.rk-name-wrap i{color:#fbbf24;font-size:12px;flex-shrink:0}
.rk-name-input{
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
  border-radius:7px;padding:4px 7px;color:#f1f5f9;font-family:inherit;
  font-size:11px;font-weight:700;width:100%;max-width:110px;outline:none;
  transition:border-color .2s;
}
.rk-name-input:focus{border-color:rgba(251,191,36,0.4)}

/* Panel de Player ID */
.rk-id-panel{
  display:flex;align-items:center;gap:4px;margin-bottom:8px;
  padding:6px 8px;border-radius:8px;
  background:rgba(139,92,246,0.08);border:1px solid rgba(139,92,246,0.2);
}
.rk-id-label{
  font-size:7px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;
  color:#a78bfa;white-space:nowrap;
}
.rk-id-input{
  flex:1;background:rgba(0,0,0,0.3);border:1px solid rgba(139,92,246,0.3);
  border-radius:5px;padding:3px 6px;color:#c4b5fd;font-family:'Courier New',monospace;
  font-size:9px;font-weight:600;outline:none;min-width:0;
}
.rk-id-input:focus{border-color:#8b5cf6}
.rk-id-copy{
  background:rgba(139,92,246,0.15);border:1px solid rgba(139,92,246,0.3);
  color:#a78bfa;width:24px;height:24px;border-radius:5px;
  cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;
}
.rk-id-copy:hover{background:rgba(139,92,246,0.3);color:#fff}
.rk-id-hint{
  font-size:7px;color:#64748b;font-weight:600;margin-top:2px;
}

.rk-live{display:flex;align-items:center;gap:4px;font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;flex-shrink:0}
.rk-live-dot{width:5px;height:5px;border-radius:50%;animation:livePulse 1.5s ease-in-out infinite}
.rk-live-dot.on{background:#10b981}
.rk-live-dot.off{background:#f43f5e;animation:none}
.rk-live-txt{color:#64748b}
.rk-live-txt.on{color:#10b981}
@keyframes livePulse{0%,100%{opacity:1;box-shadow:0 0 4px currentColor}50%{opacity:.4;box-shadow:none}}

.rk-my{display:flex;align-items:center;justify-content:center;gap:5px;padding:7px;margin-bottom:8px;border-radius:10px;background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.12)}
.rk-my-l{font-size:9px;font-weight:700;color:#7a8ba8}
.rk-my-v{font-size:14px;font-weight:900;color:#10b981}
.rk-my-e{font-size:10px;font-weight:800;color:#fbbf24;margin-left:auto}

.rk-list{flex:1;overflow-y:auto;padding-right:4px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.12) transparent}
.rk-list::-webkit-scrollbar{width:3px}
.rk-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:3px}
.rk-i{display:flex;align-items:center;gap:8px;padding:8px 9px;margin-bottom:4px;border-radius:10px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);transition:all .15s}
.rk-i:hover{background:rgba(255,255,255,0.06)}
.rk-i.me{background:rgba(16,185,129,0.06);border:1.5px solid rgba(16,185,129,0.2);box-shadow:0 0 12px rgba(16,185,129,0.08)}
.rk-pos{width:26px;height:26px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#64748b;background:rgba(255,255,255,0.05)}
.rk-pos.p1{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#1a1a1a;box-shadow:0 2px 6px rgba(251,191,36,0.3)}
.rk-pos.p2{background:linear-gradient(135deg,#cbd5e1,#94a3b8);color:#1a1a1a;box-shadow:0 2px 6px rgba(148,163,184,0.2)}
.rk-pos.p3{background:linear-gradient(135deg,#d97706,#92400e);color:#fef3c7;box-shadow:0 2px 6px rgba(217,119,6,0.2)}
.rk-body{flex:1;min-width:0}
.rk-top{display:flex;align-items:center;justify-content:space-between;gap:4px;margin-bottom:2px}
.rk-n{font-size:11px;font-weight:800;color:#f1f5f9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.rk-you{font-size:7px;font-weight:900;padding:1px 4px;border-radius:3px;background:rgba(16,185,129,0.15);color:#10b981;letter-spacing:.2px;flex-shrink:0}
.rk-rb{font-size:7px;font-weight:800;padding:2px 5px;border-radius:3px;background:rgba(124,58,237,0.12);color:#a78bfa;flex-shrink:0}
.rk-bot{display:flex;align-items:center;justify-content:space-between}
.rk-pc{font-size:8px;font-weight:600;color:#64748b}
.rk-earn{font-size:11px;font-weight:900;color:#10b981;white-space:nowrap}

#overlay{position:absolute;inset:0;background:rgba(4,10,22,0.97);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;border-radius:26px}
#obox{background:rgba(12,24,48,0.95);border:1.5px solid rgba(255,255,255,0.08);border-radius:24px;padding:28px 22px;width:270px;text-align:center;color:#f1f5f9}
#oegg{width:80px;height:105px;border-radius:50% 50% 42% 42%;margin:0 auto 14px}
#oicon{font-size:56px;display:none;margin:0 auto 8px;filter:drop-shadow(0 0 14px currentColor)}
#oname{font-family:'Russo One',sans-serif;font-size:17px;color:#fbbf24;margin-bottom:3px}
#orar{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
#oinfo{font-size:12px;font-weight:700;color:#7a8ba8}
#oclose{margin-top:16px;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.08);color:#f1f5f9;padding:8px 24px;border-radius:9px;cursor:pointer;font-family:inherit;font-size:11px;font-weight:800;letter-spacing:.4px;transition:all .2s}
#oclose:hover{background:rgba(255,255,255,0.12)}

@keyframes shake{0%,100%{transform:rotate(0)}15%{transform:rotate(-16deg) scale(1.04)}30%{transform:rotate(14deg) scale(1.04)}45%{transform:rotate(-10deg)}60%{transform:rotate(8deg)}75%{transform:rotate(-5deg)}}
@keyframes brk{0%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.4}100%{transform:scale(1.8);opacity:0}}
@keyframes rev{0%{transform:scale(0) rotate(-180deg);opacity:0}60%{transform:scale(1.15) rotate(8deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}
.shk{animation:shake .35s infinite ease-in-out}
.brk{animation:brk .5s forwards ease-out}
.rev{animation:rev .5s forwards ease-out}

#toasts{position:absolute;bottom:14px;left:14px;right:14px;z-index:200;display:flex;flex-direction:column-reverse;gap:4px;pointer-events:none}
.toast{padding:8px 10px;border-radius:9px;font-size:10px;font-weight:700;color:#fff;animation:tin .25s ease,tout .25s ease 2.5s forwards;pointer-events:auto}
.t-ok{background:rgba(16,185,129,0.88)}.t-err{background:rgba(244,63,94,0.88)}
.t-inf{background:rgba(56,189,248,0.88)}.t-rwd{background:rgba(251,191,36,0.92);color:#1a1a1a}
@keyframes tin{from{transform:translateY(14px);opacity:0}to{transform: translateY(0);opacity:1}}
@keyframes tout{from{opacity:1}to{opacity:0;transform:translateY(-6px)}}

.fm{position:absolute;font-size:12px;font-weight:900;color:#10b981;pointer-events:none;animation:fup 1s ease-out forwards;z-index:50;text-shadow:0 2px 6px rgba(0,0,0,0.5)}
@keyframes fup{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-35px)}}

@media(max-height:680px){
  #game{height:95vh;padding:10px 12px 8px;border-radius:18px}

var snd = {
  cx:null,
  go:function(){
    try{
      if(!this.cx) this.cx=new(window.AudioContext||window.webkitAudioContext)();
      if(this.cx.state==='suspended') this.cx.resume();
    }catch(e){}
  },
  t:function(f,d,tp,v){
    if(!this.cx||G.mut) return;
    try{
      var o=this.cx.createOscillator(), g=this.cx.createGain();
      o.type=tp||'sine';
      o.frequency.setValueAtTime(f,this.cx.currentTime);
      g.gain.setValueAtTime(v||0.1,this.cx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,this.cx.currentTime+d);
      o.connect(g);
      g.connect(this.cx.destination);
      o.start();
      o.stop(this.cx.currentTime+d);
    }catch(e){}
  },
  hatch:function(r){
    this.go();
    var x=RKEYS.indexOf(r), s=this;
    if(x<=1){ this.t(523,0.12); setTimeout(function(){ s.t(659,0.15)},80); }
    else if(x===2){ this.t(523,0.1); setTimeout(function(){ s.t(659,0.1)},70); setTimeout(function(){ s.t(784,0.2)},140); }

// ==================== FUNCIONES UTILITARIAS ====================
function fmt(n){
  if(n===undefined||n===null||isNaN(n)||!isFinite(n)) return '0';
  n=Number(n);
  if(n>=1e12) return (n/1e12).toFixed(1)+'T';
  if(n>=1e9) return (n/1e9).toFixed(1)+'B';
  if(n>=1e6) return (n/1e6).toFixed(1)+'M';
  if(n>=1e3) return (n/1e3).toFixed(1)+'K';
  return Math.floor(n).toLocaleString();
}

function esc(s){
  var d=document.createElement('div');
  d.textContent=s;
  return d.innerHTML;
}

function toast(msg,type){
  var c=document.getElementById('toasts');
  var t=document.createElement('div');
  t.className='toast t-'+(type||'inf');
  t.textContent=msg;
  c.appendChild(t);
  setTimeout(function(){
    if(t.parentNode) t.parentNode.removeChild(t);
  },3000);
}

function floatM(amt){
  var el=document.createElement('div');
  el.className='fm';
  el.textContent='+$'+fmt(amt);
  el.style.left=(Math.random()*140+100)+'px';
  el.style.top='65px';
  document.getElementById('game').appendChild(el);
  setTimeout(function(){
    if(el.parentNode) el.parentNode.removeChild(el);
  },1100);
}

// ==================== SISTEMA DE GUARDADO ====================
var SAVE_KEY='PetSimUltra_v12';

function save(){
  try{
    localStorage.setItem(SAVE_KEY,JSON.stringify({
      money:G.money,
      rb:G.rb,
      mult:G.mult,
      pets:G.pets,
      disc:G.disc,
      pr:G.pr,
      tot:G.tot,
      te:G.te,
      mut:G.mut,
      nid:G.nid,
      pname:G.pname,
      autoOpen:G.autoOpen,
      autoOn:G.autoOn,
      playerId:G.playerId,
      fbId:G.fbId
    }));
  }catch(e){}
}

function load(){
  // Limpiar versiones antiguas
  for(var v=0;v<=11;v++){
    try{ localStorage.removeItem('PetSimUltra'+(v>1?'_v'+v:'')); }catch(e){}
  }
  
  var raw=null;
  try{ raw=localStorage.getItem(SAVE_KEY); }catch(e){ return; }
  if(!raw) return;
  
  try{
    var d=JSON.parse(raw);
    if(!d || typeof d.money!=='number') return;
    
    G.money = (isNaN(d.money)||!isFinite(d.money)) ? 10 : d.money;
    G.rb = (typeof d.rb==='number'&&isFinite(d.rb)) ? Math.max(0,d.rb) : 0;
    G.mult = (typeof d.mult==='number'&&isFinite(d.mult)&&d.mult>=1) ? d.mult : 1;
    G.mut = !!d.mut;
    G.tot = Math.max(0, d.tot||0);
    G.te = Math.max(0, d.te||0);
    G.nid = Math.max(1, d.nid||1);
    G.pname = (typeof d.pname==='string'&&d.pname.length) ? d.pname.slice(0,14) : 'Mi Base';
    G.autoOpen = !!d.autoOpen;
    G.autoOn = !!d.autoOn;
    G.playerId = (typeof d.playerId==='string') ? d.playerId : '';
    G.fbId = (typeof d.fbId==='string') ? d.fbId : '';
    
    if(d.pr && typeof d.pr.basic==='number'){
      G.pr=d.pr;
      if(!G.pr.void) G.pr.void=50000;
      if(!G.pr.divine) G.pr.divine=250000;
      if(!G.pr.infernal) G.pr.infernal=1000000;
    }
    
    G.disc = Array.isArray(d.disc) ? d.disc : [];
    G.pets = [];
    
    if(Array.isArray(d.pets)){
      for(var i=0;i<d.pets.length;i++){
        var p=d.pets[i];
        if(!p || !p.i || !p.n || !p.r) continue;
        var be = (typeof p.be==='number'&&isFinite(p.be)&&p.be>0) ? p.be : (p.e||1);
        var lv = (typeof p.lv==='number'&&p.lv>=1) ? Math.min(99,Math.floor(p.lv)) : 1;
        var id = (typeof p.id==='number'&&p.id>0) ? Math.floor(p.id) : G.nid++;
        G.pets.push({i:p.i,n:p.n,r:p.r,be:be,lv:lv,id:id});
      }
    }
  }catch(e){}
}

function resetGame(){
  try{ localStorage.removeItem(SAVE_KEY); }catch(e){}
  var oldFb=G.fbId, oldPid=G.playerId;
  G={
    money:10,rb:0,mult:1,pets:[],disc:[],
    pr:{basic:10,golden:500,cosmic:5000,void:50000,divine:250000,infernal:1000000},
    tot:0,te:0,mut:false,nid:1,pname:'Mi Base',
    autoOpen:false,autoOn:false,playerId:oldPid,fbId:oldFb
  };
  selEgg='basic';
  rbConf=false;
  if(rbTmr) clearTimeout(rbTmr);
  document.getElementById('rkName').value='Mi Base';
  document.getElementById('rkPlayerId').value=G.playerId;
  updateUI();
  toast('Juego reiniciado','inf');
}

// ==================== LÓGICA DEL JUEGO ====================
function petEarn(p){
  return (p.be||1)*(1+0.2*((p.lv||1)-1))*(G.mult||1);
}

function totInc(){
  var s=0;
  for(var i=0;i<G.pets.length;i++) s+=petEarn(G.pets[i]);
  return s;
}

function rbCost(){
  return Math.floor(500000*Math.pow(2,G.rb));
}

function upCost(p){
  return Math.floor((p.be||1)*25*(p.lv||1));
}

function roll(egg){
  var w=WEIGHTS[egg];
  if(!w) return PETS[0];
  
  var keys=Object.keys(w), total=0;
  for(var i=0;i<keys.length;i++) total+=w[keys[i]];
  
  var r=Math.random()*total, chosen=keys[0];
  for(var i=0;i<keys.length;i++){
    r-=w[keys[i]];
    if(r<=0){ chosen=keys[i]; break; }
  }
  
  var pool=[];
  for(var i=0;i<PETS.length;i++){
    if(PETS[i].r===chosen && PETS[i].eg.indexOf(egg)!==-1) pool.push(PETS[i]);
  }
  
  if(!pool.length){
    for(var i=0;i<PETS.length;i++){
      if(PETS[i].eg.indexOf(egg)!==-1) return PETS[i];
    }
    return PETS[0];
  }
  
  return pool[Math.floor(Math.random()*pool.length)];
}

function openEgg(silent){
  var cost=G.pr[selEgg];
  if(G.money<cost){
    if(!silent){ snd.err(); toast('Sin dinero suficiente','err'); }
    if(G.autoOn && G.money<cost){ G.autoOn=false; updateUI(); }
    return false;
  }
  
  G.money-=cost;
  var scales={basic:1.15,golden:1.2,cosmic:1.25,void:1.28,divine:1.3,infernal:1.35};
  G.pr[selEgg]=Math.floor(G.pr[selEgg]*(scales[selEgg]||1.15));
  
  var tpl=roll(selEgg);
  var np={i:tpl.i,n:tpl.n,r:tpl.r,be:tpl.e,lv:1,id:G.nid++};
  G.pets.push(np);
  G.tot++;
  if(G.disc.indexOf(tpl.n)===-1) G.disc.push(tpl.n);
  
  save();
  updateUI();
  if(!silent){ snd.go(); showHatch(np); }
  return true;
}

function showHatch(pet){
  var ov=document.getElementById('overlay');
  var egg=document.getElementById('oegg');
  var ico=document.getElementById('oicon');
  
  ov.style.display='flex';
  
  var clsMap={basic:'egg-b',golden:'egg-g',cosmic:'egg-c',void:'egg-v',divine:'egg-d',infernal:'egg-i'};
  egg.className=clsMap[selEgg]||'egg-b';
  egg.style.display='block';
  ico.style.display='none';
  ico.className='';
  
  document.getElementById('oname').textContent='';
  document.getElementById('orar').textContent='';
  document.getElementById('orar').style.color='';
  document.getElementById('oinfo').textContent='';
  
  egg.classList.add('shk');
  snd.hatch(pet.r);
  
  var tier=RKEYS.indexOf(pet.r);
  var dur=tier>=3?2000:1500;
  
  setTimeout(function(){
    egg.classList.remove('shk');
    egg.classList.add('brk');
    
    setTimeout(function(){
      egg.style.display='none';
      egg.classList.remove('brk');
      
      ico.style.display='block';
      ico.textContent=pet.i;
      ico.style.color=RCOL[pet.r]||'#fff';
      ico.classList.add('rev');
      
      document.getElementById('oname').textContent=pet.n;
      document.getElementById('orar').textContent=RNAME[pet.r]||pet.r;
      document.getElementById('orar').style.color=RCOL[pet.r]||'#fff';
      document.getElementById('oinfo').textContent='+$'+fmt(petEarn(pet))+'/s';
    },500);
  },dur);
}

function closeHatch(){
  document.getElementById('overlay').style.display='none';
  document.getElementById('oegg').className='';
  document.getElementById('oicon').className='';
  document.getElementById('oicon').style.display='none';
}

function doUpgrade(id){
  var pet=null;
  for(var i=0;i<G.pets.length;i++){
    if(G.pets[i].id===id){ pet=G.pets[i]; break; }
  }
  
  if(!pet || pet.lv>=99) return;
  
  var c=upCost(pet);
  if(G.money<c){ snd.err(); toast('Dinero insuficiente','err'); return; }
  
  G.money-=c;
  pet.lv++;
  snd.up();
  toast(pet.n+' Nivel '+pet.lv,'ok');
  save();
  updateUI();
}

function doSell(id){
  var idx=-1;
  for(var i=0;i<G.pets.length;i++){
    if(G.pets[i].id===id){ idx=i; break; }
  }
  
  if(idx===-1) return;
  
  var pet=G.pets[idx];
  var val=Math.floor(petEarn(pet)*10);
  
  G.money+=val;
  G.pets.splice(idx,1);
  snd.sell();
  toast(pet.n+' vendido $'+fmt(val),'inf');
  save();
  updateUI();
}

function doRb(){
  snd.go();
  var cost=rbCost();
  
  if(rbConf){
    clearTimeout(rbTmr);
    rbConf=false;
    G.rb++;
    G.mult*=1.8;
    G.money=10;
    G.pets=[];
    G.pr={basic:10,golden:500,cosmic:5000,void:50000,divine:250000,infernal:1000000};
    snd.hatch('og');
    toast('REBIRTH '+G.rb+' — x'+G.mult.toFixed(1),'rwd');
    save();
    updateUI();
  } else {
    if(G.money<cost){ snd.err(); toast('Necesitas $'+fmt(cost),'err'); return; }
    
    rbConf=true;
    var btn=document.getElementById('btnRb');
    btn.innerHTML='<i class="fas fa-exclamation-triangle"></i> CONFIRMAR?';
    btn.classList.add('yes');
    btn.disabled=false;
    snd.click();
    
    rbTmr=setTimeout(function(){
      rbConf=false;
      updateUI();
    },3000);
  }
}

function handleAuto(){
  snd.click();
  
  if(!G.autoOpen){
    if(G.money<1e9){ snd.err(); toast('Necesitas $1.0B','err'); return; }
    
    G.money-=1e9;
    G.autoOpen=true;
    G.autoOn=true;
    toast('Auto Apertura activada!','rwd');
    save();
    updateUI();
  } else {
    G.autoOn=!G.autoOn;
    toast('Auto: '+(G.autoOn?'ON':'OFF'),'inf');
    save();
    updateUI();
  }
}

// ==================== PLAYER ID GLOBAL ====================
function ensurePlayerId(){
  if(!G.playerId || G.playerId.trim().length < 3){
    G.playerId = 'player_' + Math.random().toString(36).substr(2,6) + Date.now().toString(36).substr(-4);
  }
  G.playerId = G.playerId.replace(/[^a-zA-Z0-9_]/g, '_').substring(0,20);
  G.fbId = G.playerId;
  save();
  return G.playerId;
}

function copyPlayerId(){
  var idInput = document.getElementById('rkPlayerId');
  var idText = idInput.value || G.playerId;
  
  if(idText && navigator.clipboard){
    navigator.clipboard.writeText(idText).then(function(){
      toast('ID copiado: ' + idText, 'ok');
      var btn = document.getElementById('btnCopyId');
      btn.innerHTML = '<i class="fas fa-check"></i>';
      setTimeout(function(){ btn.innerHTML = '<i class="fas fa-copy"></i>'; }, 1500);
    }).catch(function(){
      toast('Error al copiar', 'err');
    });
  } else {
    idInput.select();
    document.execCommand('copy');
    toast('ID copiado: ' + idText, 'ok');
  }
}

// ==================== FIREBASE ====================
function initFirebase(){
  if(!firebaseConfig.databaseURL || firebaseConfig.databaseURL.indexOf('TU_PROYECTO')!==-1){
    fbOk=false;
    setLive(false);
    return;
  }
  
  try{
    firebase.initializeApp(firebaseConfig);
    fbDb=firebase.database();
    fbOk=true;
    setLive(true);
    
    ensurePlayerId();
    
    fbDb.ref('rankings').orderByChild('earn').limitToLast(100).on('value',function(snap){
      var data=snap.val()||{};
      rankCache=[];
      var keys=Object.keys(data);
      
      for(var i=0;i<keys.length;i++){
        var d=data[keys[i]];
        rankCache.push({
          id:keys[i],
          name:(typeof d.name==='string')?d.name:'???',
          earn:typeof d.earn==='number'?d.earn:0,
          rb:typeof d.rb==='number'?d.rb:0,
          pets:typeof d.pets==='number'?d.pets:0,
          isMe:(keys[i]===G.fbId)
        });
      }
      
      rankCache.sort(function(a,b){ return b.earn-a.earn; });
      if(activeTab==='rank') renderRank();
    });
    
    toast('Ranking global conectado','ok');
  }catch(e){
    fbOk=false;
    setLive(false);
  }
}

function setLive(on){
  document.getElementById('rkDot').className='rk-live-dot '+(on?'on':'off');
  var t=document.getElementById('rkTxt');
  t.className='rk-live-txt'+(on?' on':'');
  t.textContent=on?'En vivo':'Sin conexion';
}

function pushRank(){
  if(!fbOk || !fbDb || !G.fbId) return;
  
  fbDb.ref('rankings/'+G.fbId).set({
    name: G.pname || 'Mi Base',
    earn: Math.floor(totInc()),
    rb: G.rb,
    pets: G.pets.length,
    ts: firebase.database.ServerValue.TIMESTAMP,
    playerId: G.playerId
  });
}

function renderRank(){
  var myEarn=Math.floor(totInc());
  var entries=rankCache.slice();
  var found=false;
  
  for(var i=0;i<entries.length;i++){
    if(entries[i].id===G.fbId){
      entries[i].isMe=true;
      found=true;
    } else {
      entries[i].isMe=false;
    }
  }
  
  if(!found && G.fbId){
    entries.push({
      name:G.pname||'Mi Base',
      earn:myEarn,
      rb:G.rb,
      pets:G.pets.length,
      isMe:true,
      id:G.fbId
    });
  }
  
  entries.sort(function(a,b){ return b.earn-a.earn; });

  var myPos=-1;
  for(var i=0;i<entries.length;i++){
    if(entries[i].isMe){ myPos=i+1; break; }
  }
  
  document.getElementById('rkPos').textContent='#'+(myPos>0?myPos:'--');
  document.getElementById('rkMyEarn').textContent='$'+fmt(myEarn)+'/s';

  var html='';
  if(!entries.length){
    html+='<div class="empty"><i class="fas fa-trophy"></i><p>Sin jugadores todavia</p></div>';
  }
  
  var top=entries.slice(0,20);
  for(var i=0;i<top.length;i++){
    var e=top[i], pos=i+1, posC=pos<=3?' p'+pos:'', meC=e.isMe?' me':'';
    html+='<div class="rk-i'+meC+'">'+
      '<div class="rk-pos'+posC+'">'+pos+'</div>'+
      '<div class="rk-body">'+
        '<div class="rk-top">'+
          '<span class="rk-n">'+esc(e.name)+(e.isMe?' <span class="rk-you">TU</span>':'')+'</span>'+
          '<span class="rk-rb">RB '+e.rb+'</span>'+
        '</div>'+
        '<div class="rk-bot">'+
          '<span class="rk-pc">'+e.pets+' mascotas</span>'+
          '<span class="rk-earn">$'+fmt(e.earn)+'/s</span>'+
        '</div>'+
      '</div>'+
    '</div>';
  }
  
  document.getElementById('rkList').innerHTML=html;
}

// ==================== RENDERIZADO DE UI ====================
function updateUI(){
  // Actualizar stats principales
  document.getElementById('sMoney').textContent='$'+fmt(G.money);
  document.getElementById('sInc').textContent='$'+fmt(totInc())+'/s';
  document.getElementById('sPets').textContent=G.pets.length;
  
  // Actualizar precios de huevos
  var eggIds={basic:'pB',golden:'pG',cosmic:'pC',void:'pV',divine:'pD',infernal:'pI'};
  for(var k in eggIds){
    var el=document.getElementById(eggIds[k]);
    if(el) el.textContent='$'+fmt(G.pr[k]);
  }
  
  // Botón comprar huevo
  var bb=document.getElementById('btnBuy');
  if(G.money>=G.pr[selEgg]){
    bb.classList.add('can');
    bb.classList.remove('no');
  } else {
    bb.classList.remove('can');
    bb.classList.add('no');
  }
  
  // Botón auto apertura
  var ba=document.getElementById('btnAuto');
  if(!G.autoOpen){
    ba.innerHTML='<i class="fas fa-robot"></i> AUTO APERTURA ($1.0B)';
    if(G.money>=1e9){
      ba.classList.add('can');
      ba.classList.remove('no','on');
    } else {
      ba.classList.add('no');
      ba.classList.remove('can','on');
    }
  } else {
    if(G.autoOn){
      ba.innerHTML='<i class="fas fa-robot"></i> AUTO: ON';
      ba.classList.add('on');
      ba.classList.remove('no','can');
    } else {
      ba.innerHTML='<i class="fas fa-robot"></i> AUTO: OFF';
      ba.classList.add('can');
      ba.classList.remove('on','no');
    }
  }
  
  // Botón rebirth
  if(!rbConf){
    var rb=document.getElementById('btnRb');
    rb.innerHTML='<i class="fas fa-bolt"></i> REBIRTH ($'+fmt(rbCost())+')';
    rb.disabled=G.money<rbCost();
    rb.classList.remove('yes');
  }
  
  renderPets();
  if(activeTab==='rank') renderRank();
}

function renderPets(){
  var el=document.getElementById('petList');
  
  if(!G.pets.length){
    el.innerHTML='<div class="empty"><i class="fas fa-egg"></i><p>Abre tu primer huevo para empezar</p></div>';
    return;
  }
  
  var sorted=G.pets.slice().sort(function(a,b){
    var rd=(RORD[b.r]||0)-(RORD[a.r]||0);
    return rd!==0 ? rd : petEarn(b)-petEarn(a);
  });
  
  var h='';
  for(var i=0;i<sorted.length;i++){
    var p=sorted[i];
    var earn=petEarn(p);
    var uc=p.lv<99 ? upCost(p) : 0;
    
    h+='<div class="pc '+p.r+'">'+
      '<div class="pc-l">'+
        '<span class="pc-i">'+p.i+'</span>'+
        '<div class="pc-t">'+
          '<span class="pc-n">'+p.n+'</span>'+
          '<span class="pc-m">Nvl.'+p.lv+' · '+(RNAME[p.r]||p.r)+(uc?' · Up $'+fmt(uc):'')+'</span>'+
        '</div>'+
      '</div>'+
      '<div class="pc-r">'+
        '<span class="pc-e">$'+fmt(earn)+'/s</span>'+
        '<div class="pc-a">';
        
    if(p.lv<99){
      h+='<button class="ab ab-u" data-act="up" data-id="'+p.id+'"><i class="fas fa-arrow-up"></i></button>';
    }
    
    h+='<button class="ab ab-s" data-act="sell" data-id="'+p.id+'"><i class="fas fa-coins"></i></button>'+
      '</div>'+
    '</div>'+
  '</div>';
  }
  
  el.innerHTML=h;
}

function renderIdx(){
  var pct=Math.round((G.disc.length/PETS.length)*100);
  document.getElementById('idxPct').textContent=pct+'%';
  document.getElementById('idxBar').style.width=pct+'%';
  
  var sorted=PETS.slice().sort(function(a,b){ return (RORD[a.r]||0)-(RORD[b.r]||0); });
  
  var h='';
  for(var i=0;i<sorted.length;i++){
    var p=sorted[i];
    var d=G.disc.indexOf(p.n)!==-1;
    h+='<div class="ii '+p.r+(d?'':' off')+'">'+
      '<span class="ic">'+(d?p.i:'?')+'</span>'+
      '<span class="in">'+(d?p.n:'???')+'</span>'+
      '<span class="ir '+p.r+'">'+(RNAME[p.r]||p.p)+'</span>'+
    '</div>';
  }
  
  document.getElementById('idxList').innerHTML=h;
}

// ==================== NAVEGACIÓN ====================
function setTab(t){
  snd.click();
  activeTab=t;
  
  var panels=document.querySelectorAll('.panel');
  var btns=document.querySelectorAll('.tab');
  
  for(var i=0;i<panels.length;i++) panels[i].classList.remove('on');
  for(var i=0;i<btns.length;i++) btns[i].classList.remove('on');
  
  var map={game:'pGame',index:'pIndex',rank:'pRank'};
  var pel=document.getElementById(map[t]);
  if(pel) pel.classList.add('on');
  
  var bel=document.querySelector('.tab[data-t="'+t+'"]');
  if(bel) bel.classList.add('on');
  
  if(t==='index') renderIdx();
  if(t==='rank'){
    renderRank();
    document.getElementById('rkPlayerId').value=G.playerId;
  }
}

function setEgg(e){
  snd.click();
  selEgg=e;
  
  var btns=document.querySelectorAll('.egg');
  for(var i=0;i<btns.length;i++) btns[i].classList.remove('on');
  
  var bel=document.querySelector('.egg[data-e="'+e+'"]');
  if(bel) bel.classList.add('on');
  
  updateUI();
}

// ==================== INICIALIZACIÓN ====================
function init(){
  try{
    load();
    ensurePlayerId();
    
    // Configurar input de nombre
    var nameInput=document.getElementById('rkName');
    nameInput.value=G.pname||'Mi Base';
    
    // Configurar input de Player ID
    var idInput=document.getElementById('rkPlayerId');
    idInput.value=G.playerId;
    
    // Event listeners - NOMBRE
    nameInput.addEventListener('input',function(){
      G.pname=this.value.trim().slice(0,14)||'Mi Base';
      save();
      if(activeTab==='rank') renderRank();
    });
    nameInput.addEventListener('click',function(e){ e.stopPropagation(); });
    
    // Event listeners - PLAYER ID
    idInput.addEventListener('input',function(){
      var newId=this.value.replace(/[^a-zA-Z0-9_]/g, '_').substring(0,20);
      this.value=newId;
      G.playerId=newId;
      G.fbId=newId;
      save();
    });
    idInput.addEventListener('click',function(e){ e.stopPropagation(); });
    
    // Botón copiar ID
    document.getElementById('btnCopyId').addEventListener('click',function(e){
      e.stopPropagation();
      copyPlayerId();
    });
    
    // Botón mute
    var mb=document.getElementById('btnMute');
    mb.innerHTML=G.mut?'<i class="fas fa-volume-xmark"></i>':'<i class="fas fa-volume-high"></i>';
    mb.onclick=function(){
      G.mut=!G.mut;
      this.innerHTML=G.mut?'<i class="fas fa-volume-xmark"></i>':'<i class="fas fa-volume-high"></i>';
      save();
    };
    
    // Botón reset
    document.getElementById('btnReset').onclick=function(){
      if(confirm('Reiniciar todo el progreso?\n\nTu Player ID se conservara para mantener tu ranking global.')){
        resetGame();
      }
    };
    
    // Tabs de navegación
    document.getElementById('navTabs').onclick=function(ev){
      var btn=ev.target.closest('.tab');
      if(btn) setTab(btn.getAttribute('data-t'));
    };
    
    // Selección de huevos
    document.getElementById('navEggs').onclick=function(ev){
      var btn=ev.target.closest('.egg');
      if(btn) setEgg(btn.getAttribute('data-e'));
    };
    
    // Botón COMPRAR HUEVO
    document.getElementById('btnBuy').onclick=function(){
      openEgg(false);
    };
    
    // Botón AUTO APERTURA
    document.getElementById('btnAuto').onclick=handleAuto;
    
    // Botón REBIRTH
    document.getElementById('btnRb').onclick=doRb;
    
    // Botón CERRAR OVERLAY
    document.getElementById('oclose').onclick=closeHatch;
    
    // *** CORREGIDO: Acciones de mascotas (upgrade/sell) ***
    document.getElementById('petList').onclick=function(ev){
      var btn=ev.target.closest('[data-act]');
      if(!btn) return;
      
      // CORRECCIÓN AQUÍ: Obtener atributos correctamente
      var action = btn.getAttribute('data-act');  // 'up' o 'sell'
      var petId = parseInt(btn.getAttribute('data-id'), 10);
      
      console.log('Acción:', action, 'ID mascota:', petId); // Debug
      
      if(action === 'up'){
        doUpgrade(petId);
      } else if(action === 'sell'){
        doSell(petId);
      }
    };
    
    // Inicializar Firebase
    initFirebase();
    updateUI();
    
    // Loop principal del juego
    var tickN=0;
    setInterval(function(){
      var inc=totInc();
      if(inc>0){
        G.money+=inc;
        G.te+=inc;
        if(inc>=10 && Math.random()<0.15) floatM(inc);
      }
      
      if(G.autoOn && G.money>=G.pr[selEgg]){
        openEgg(true);
      }
      
      tickN++;
      if(tickN%15===0) pushRank();
      
      updateUI();
    },1000);
    
    // Auto-guardado cada 8 segundos
    setInterval(save,8000);
    
  }catch(e){
    console.error('Init error:',e);
  }
}

// Iniciar cuando el DOM esté listo
document.addEventListener('DOMContentLoaded',init);

// Habilitar audio al primer click/touch
document.addEventListener('click',function(){ snd.go(); },{once:true});
document.addEventListener('touchstart',function(){ snd.go(); },{once:true});
</script>
