var petsConfig = {
  normal: [
    {icon:'🐭',name:'Raton de Campo',rarity:'common',earnings:2},
    {icon:'🐶',name:'Perro Fiel',rarity:'common',earnings:4},
    {icon:'🐱',name:'Gato Curioso',rarity:'common',earnings:5},
    {icon:'🐰',name:'Conejo',rarity:'common',earnings:6},
    {icon:'🐥',name:'Pollito',rarity:'common',earnings:8},
    {icon:'🦆',name:'Pato Real',rarity:'common',earnings:10},
    {icon:'🐷',name:'Cerdo Feliz',rarity:'common',earnings:7},
    {icon:'🦊',name:'Zorro Astuto',rarity:'rare',earnings:18},
    {icon:'🐻',name:'Oso Pardo',rarity:'rare',earnings:22},
    {icon:'🐼',name:'Panda Gigante',rarity:'rare',earnings:28},
    {icon:'🐨',name:'Koala Dormilon',rarity:'rare',earnings:32},
    {icon:'🦙',name:'Llama Dorada',rarity:'rare',earnings:38},
    {icon:'🐯',name:'Tigre Bengal',rarity:'epic',earnings:55},
    {icon:'🦁',name:'Leon Rey',rarity:'epic',earnings:70},
    {icon:'🐺',name:'Lobo Alpha',rarity:'epic',earnings:85},
    {icon:'🐲',name:'Dragon Joven',rarity:'god',earnings:130}
  ],
  special: [
    {icon:'🦅',name:'Aguila Real',rarity:'rare',earnings:40},
    {icon:'🐺',name:'Lobo Fantasma',rarity:'rare',earnings:48},
    {icon:'🦁',name:'Leon Dorado',rarity:'epic',earnings:100},
    {icon:'🐯',name:'Tigre Blanco',rarity:'epic',earnings:120},
    {icon:'🦄',name:'Unicornio Mistico',rarity:'god',earnings:160},
    {icon:'🐲',name:'Dragon Ancestral',rarity:'god',earnings:220},
    {icon:'⚡',name:'Trueno Divino',rarity:'god',earnings:300},
    {icon:'🐲',name:'Dragon Fenix',rarity:'legendary',earnings:420},
    {icon:'🦅',name:'Halcon de Fuego',rarity:'legendary',earnings:560},
    {icon:'🐍',name:'Hidra Legendaria',rarity:'legendary',earnings:700},
    {icon:'🔥',name:'Fenix Menor',rarity:'mythic',earnings:1000},
    {icon:'🔥',name:'Fenix Primordial',rarity:'mythic',earnings:1500},
    {icon:'🔱',name:'Poseidon',rarity:'mythic',earnings:2000},
    {icon:'⚡',name:'Zeus',rarity:'mythic',earnings:2600},
    {icon:'👾',name:'Glitch',rarity:'secret',earnings:3500},
    {icon:'🌌',name:'Galaxia',rarity:'secret',earnings:5000},
    {icon:'💎',name:'Diamante Infinito',rarity:'secret',earnings:7000},
    {icon:'👁️',name:'Illuminati',rarity:'secret',earnings:9000},
    {icon:'🦖',name:'T-Rex OG',rarity:'og',earnings:15000},
    {icon:'👑',name:'EL REY OG',rarity:'og',earnings:25000}
  ]
};

var state = {
  money: 10, rb: 0, mult: 1.0,
  pets: [], discovered: [],
  priceN: 10, priceS: 500,
  totalOwned: 0, totalEarned: 0
};

var isSpecial = false;

/* --- Guardado robusto --- */
function save() {
  try { localStorage.setItem('PetSimUltra', JSON.stringify(state)); } catch(e) {}
}

function load() {
  try {
    var raw = localStorage.getItem('PetSimUltra');
    if (!raw) return;
    var d = JSON.parse(raw);
    if (!d || typeof d.money !== 'number') return;
    state.money = isFinite(d.money) ? d.money : 10;
    state.rb = d.rb || 0;
    state.mult = (d.mult && isFinite(d.mult) && d.mult >= 1) ? d.mult : 1;
    state.pets = Array.isArray(d.pets) ? d.pets : [];
    state.discovered = Array.isArray(d.discovered) ? d.discovered : [];
    state.priceN = d.priceN || 10;
    state.priceS = d.priceS || 500;
    state.totalOwned = d.totalOwned || state.pets.length;
    state.totalEarned = d.totalEarned || 0;
    /* Migrar mascotas viejas sin nivel */
    for (var i = 0; i < state.pets.length; i++) {
      if (!state.pets[i].level) state.pets[i].level = 1;
      if (!state.pets[i].baseE) state.pets[i].baseE = state.pets[i].earnings || 1;
    }
  } catch(e) {}
}

/* --- Formato compacto --- */
function fmt(n) {
  if (!isFinite(n)) return '0';
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return Math.floor(n).toString();
}

/* --- Toasts en vez de alert --- */
function toast(msg, tipo) {
  var c = document.getElementById('toastBox');
  if (!c) {
    c = document.createElement('div');
    c.id = 'toastBox';
    c.style.cssText = 'position:absolute;bottom:16px;left:16px;right:16px;z-index:999;display:flex;flex-direction:column-reverse;gap:6px;pointer-events:none';
    document.getElementById('game').appendChild(c);
  }
  var t = document.createElement('div');
  var bg = tipo === 'error' ? 'rgba(239,68,68,0.9)' : tipo === 'reward' ? 'rgba(251,191,36,0.95)' : 'rgba(16,185,129,0.9)';
  var col = tipo === 'reward' ? '#1a1a1a' : '#fff';
  t.style.cssText = 'padding:10px 14px;border-radius:12px;font-size:12px;font-weight:700;color:' + col + ';background:' + bg + ';backdrop-filter:blur(8px);animation:toastAnim 3s ease forwards;pointer-events:auto';
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(function() { if (t.parentNode) t.remove(); }, 3100);
}

/* Inyectar animacion de toast si no existe */
(function() {
  var s = document.createElement('style');
  s.textContent = '@keyframes toastAnim{0%{opacity:0;transform:translateY(16px)}8%{opacity:1;transform:translateY(0)}85%{opacity:1}100%{opacity:0;transform:translateY(-8px)}}';
  document.head.appendChild(s);
})();

/* --- Calculos --- */
function petEarn(p) {
  return (p.baseE || 1) * (1 + 0.25 * ((p.level || 1) - 1)) * state.mult;
}

function totalIncome() {
  var s = 0;
  for (var i = 0; i < state.pets.length; i++) s += petEarn(state.pets[i]);
  return s;
}

function rbCost() { return Math.floor(500000 * Math.pow(2, state.rb)); }

function upCost(p) { return Math.floor((p.baseE || 1) * 30 * (p.level || 1)); }

/* --- Logros --- */
var LOGROS = [
  {id:'p1',n:'Primera Mascota',d:'Abre un huevo',r:500,c:function(){return state.totalOwned>=1}},
  {id:'p10',n:'Coleccionista',d:'10 mascotas en total',r:3000,c:function(){return state.totalOwned>=10}},
  {id:'rare',n:'Primera Rareza',d:'Obten un Raro',r:1500,c:function(){return state.discovered.some(function(n){var p=findPet(n);return p&&p.rarity==='rare'})}},
  {id:'epic',n:'Poder Emergente',d:'Obten un Epico',r:5000,c:function(){return state.discovered.some(function(n){var p=findPet(n);return p&&p.rarity==='epic'})}},
  {id:'god',n:'Tocado por los Dioses',d:'Obten un Dios',r:10000,c:function(){return state.discovered.some(function(n){var p=findPet(n);return p&&p.rarity==='god'})}},
  {id:'leg',n:'Leyenda Viviente',d:'Obten un Legendario',r:50000,c:function(){return state.discovered.some(function(n){var p=findPet(n);return p&&p.rarity==='legendary'})}},
  {id:'myth',n:'Mitico',d:'Obten un Mitico',r:100000,c:function(){return state.discovered.some(function(n){var p=findPet(n);return p&&p.rarity==='mythic'})}},
  {id:'sec',n:'Secreto Descubierto',d:'Obten un Secreto',r:500000,c:function(){return state.discovered.some(function(n){var p=findPet(n);return p&&p.rarity==='secret'})}},
  {id:'og',n:'OG Status',d:'Obten un OG',r:1000000,c:function(){return state.discovered.some(function(n){var p=findPet(n);return p&&p.rarity==='og'})}},
  {id:'rb1',n:'Renacimiento',d:'Primer Rebirth',r:10000,c:function(){return state.rb>=1}},
  {id:'rb5',n:'Veterano',d:'5 Rebirths',r:200000,c:function(){return state.rb>=5}},
  {id:'idx',n:'Completista',d:'Descubre todas',r:5000000,c:function(){return state.discovered.length>=allPets().length}},
  {id:'m100k',n:'Rico',d:'Gana $100K total',r:8000,c:function(){return state.totalEarned>=100000}},
  {id:'m1m',n:'Millonario',d:'Gana $1M total',r:80000,c:function(){return state.totalEarned>=1000000}}
];

function findPet(name) {
  var all = petsConfig.normal.concat(petsConfig.special);
  for (var i = 0; i < all.length; i++) { if (all[i].name === name) return all[i]; }
  return null;
}

function allPets() { return petsConfig.normal.concat(petsConfig.special); }

function checkLogros() {
  for (var i = 0; i < LOGROS.length; i++) {
    var l = LOGROS[i];
    if (state.discovered.indexOf('logro_' + l.id) === -1 && l.c()) {
      state.discovered.push('logro_' + l.id);
      state.money += l.r;
      state.totalEarned += l.r;
      toast('Logro: ' + l.n + ' +$' + fmt(l.r), 'reward');
    }
  }
}

/* --- UI --- */
function updateUI() {
  document.getElementById('money').textContent = fmt(state.money);
  document.getElementById('priceN').textContent = fmt(state.priceN);
  document.getElementById('priceS').textContent = fmt(state.priceS);

  var cost = rbCost();
  var rbBtn = document.getElementById('rebirthBtn');
  rbBtn.textContent = '⚡ REBIRTH ($' + fmt(cost) + ')';
  rbBtn.disabled = state.money < cost;

  renderPets();
}

function setEgg(special) {
  isSpecial = special;
  document.getElementById('normalBtn').classList.toggle('active', !special);
  document.getElementById('specialBtn').classList.toggle('active', special);
}

function switchTab(tab) {
  document.getElementById('tabPets').style.display = tab === 'pets' ? 'flex' : 'none';
  document.getElementById('tabIndex').style.display = tab === 'index' ? 'block' : 'none';
  document.getElementById('tabPetsBtn').classList.toggle('active', tab === 'pets');
  document.getElementById('tabIndexBtn').classList.toggle('active', tab === 'index');
  if (tab === 'index') renderIndex();
}

/* --- Abrir huevo --- */
function openEgg() {
  var cost = isSpecial ? state.priceS : state.priceN;
  if (state.money < cost) { toast('Sin dinero suficiente', 'error'); return; }

  state.money -= cost;
  if (isSpecial) state.priceS = Math.floor(state.priceS * 1.2);
  else state.priceN = Math.floor(state.priceN * 1.12);

  var pool = isSpecial ? petsConfig.special : petsConfig.normal;
  var tpl = pool[Math.floor(Math.random() * pool.length)];

  var newPet = {
    icon: tpl.icon, name: tpl.name, rarity: tpl.rarity,
    baseE: tpl.earnings, level: 1
  };
  state.pets.push(newPet);
  state.totalOwned++;

  var all = allPets();
  var isDisc = false;
  for (var i = 0; i < state.discovered.length; i++) {
    if (state.discovered[i] === tpl.name) { isDisc = true; break; }
  }
  if (!isDisc) state.discovered.push(tpl.name);

  checkLogros();
  save();
  updateUI();
  playHatch(newPet);
}

function playHatch(pet) {
  var overlay = document.getElementById('hatchOverlay');
  var egg = document.getElementById('hatchEgg');
  var icon = document.getElementById('hatchedPetIcon');

  overlay.style.display = 'flex';
  egg.style.display = 'block';
  icon.style.display = 'none';
  egg.className = 'shaking';

  setTimeout(function() {
    egg.className = 'breaking';
    setTimeout(function() {
      egg.style.display = 'none';
      icon.style.display = 'block';
      icon.textContent = pet.icon;
      document.getElementById('hatchedPetName').textContent = pet.name;
      document.getElementById('hatchedPetInfo').textContent =
        pet.rarity.toUpperCase() + ' | +$' + fmt(petEarn(pet)) + '/s';
    }, 600);
  }, 1500);
}

/* --- Renderizar mascotas --- */
function renderPets() {
  var list = document.getElementById('petList');
  if (state.pets.length === 0) {
    list.innerHTML = '<div class="no-pets">Abre tu primer huevo para ver tus pets aqui</div>';
    return;
  }

  var ro = {common:0,rare:1,epic:2,god:3,legendary:4,mythic:5,secret:6,og:7};
  var sorted = state.pets.slice().sort(function(a, b) {
    return (ro[b.rarity]||0) - (ro[a.rarity]||0);
  });

  var html = '';
  for (var i = 0; i < sorted.length; i++) {
    var p = sorted[i];
    var idx = state.pets.indexOf(p);
    var earn = petEarn(p);
    var uc = p.level < 50 ? upCost(p) : null;
    html += '<div class="pet ' + p.rarity + '">' +
      '<span>' + p.icon + ' ' + p.name +
        ' <small style="opacity:.6">Nvl.' + p.level + '</small></span>' +
      '<span>$' + fmt(earn) + '/s ' +
        (uc ? '<button class="sellBtn" style="background:rgba(16,185,129,0.8)" onclick="upgradePet(' + idx + ')">↑</button> ' : '') +
        '<button class="sellBtn" onclick="sellPet(' + idx + ')">V</button>' +
      '</span></div>';
  }
  list.innerHTML = html;
}

/* --- Mejorar mascota --- */
function upgradePet(idx) {
  if (idx < 0 || idx >= state.pets.length) return;
  var p = state.pets[idx];
  if (p.level >= 50) return;
  var cost = upCost(p);
  if (state.money < cost) { toast('Dinero insuficiente', 'error'); return; }
  state.money -= cost;
  p.level++;
  toast(p.name + ' Nivel ' + p.level, 'success');
  save(); updateUI();
}

/* --- Vender mascota --- */
function sellPet(idx) {
  if (idx < 0 || idx >= state.pets.length) return;
  var p = state.pets[idx];
  var val = Math.floor(petEarn(p) * 12);
  state.money += val;
  state.pets.splice(idx, 1);
  toast(p.name + ' vendido +$' + fmt(val), 'success');
  save(); updateUI();
}

/* --- Rebirth --- */
function doRebirth() {
  var cost = rbCost();
  if (state.money < cost) { toast('Necesitas $' + fmt(cost), 'error'); return; }
  state.rb++;
  state.mult *= 1.8;
  state.money = 10;
  state.pets = [];
  state.priceN = 10;
  state.priceS = 500;
  toast('REBIRTH ' + state.rb + ' — x' + state.mult.toFixed(1) + ' ganancias', 'reward');
  checkLogros();
  save(); updateUI();
}

/* --- Index --- */
function renderIndex() {
  var idxL = document.getElementById('indexList');
  var all = allPets();
  var ro = {common:0,rare:1,epic:2,god:3,legendary:4,mythic:5,secret:6,og:7};
  all = all.slice().sort(function(a,b){return (ro[a.rarity]||0)-(ro[b.rarity]||0)});

  var html = '';
  for (var i = 0; i < all.length; i++) {
    var p = all[i];
    var disc = state.discovered.indexOf(p.name) !== -1;
    html += '<div class="pet ' + p.rarity + '" style="opacity:' + (disc ? '1' : '0.35') + '">' +
      '<span>' + (disc ? p.icon : '???') + ' ' + p.name + '</span>' +
      '<span>' + p.rarity.toUpperCase() + '</span></div>';
  }
  idxL.innerHTML = html;
}

/* --- Cerrar hatch --- */
document.getElementById('closeHatchBtn').onclick = function() {
  document.getElementById('hatchOverlay').style.display = 'none';
  document.getElementById('hatchEgg').className = '';
};

/* --- Tick de ingresos cada segundo --- */
setInterval(function() {
  var inc = totalIncome();
  if (inc > 0) {
    state.money += inc;
    state.totalEarned += inc;
    checkLogros();
    updateUI();
  }
}, 1000);

/* --- Auto-guardado --- */
setInterval(save, 8000);

/* --- Inicio --- */
load();
updateUI();
</script>
