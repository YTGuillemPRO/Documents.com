<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Dash - Ultimate Edition</title>
    <style>
        :root {
            --neon-cyan: #00ffff;
            --neon-pink: #ff00ff;
            --neon-yellow: #ffff00;
            --bg-dark: #05050f;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #0d0d2b 0%, #000000 100%);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center;
            touch-action: none; -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none; user-select: none;
        }

        #game-container {
            position: relative; width: 100vw; height: 56.25vw;
            max-height: 100vh; max-width: 177.78vh;
            background-color: var(--bg-dark); overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.15);
            border: 2px solid rgba(0, 255, 255, 0.2);
            border-radius: 8px;
            transform-origin: center center;
            transition: transform 0.05s ease-out;
        }

        canvas { display: block; width: 100%; height: 100%; }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(5, 5, 15, 0.92); color: white; z-index: 10;
            padding: 20px; box-sizing: border-box;
        }

        .hidden { display: none !important; }

        h1 {
            color: var(--neon-cyan);
            text-shadow: 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-cyan);
            font-size: 3.5rem; margin: 0 0 30px 0; letter-spacing: 8px;
            text-align: center; animation: titlePulse 2s infinite alternate;
        }

        @keyframes titlePulse {
            0% { text-shadow: 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-cyan); transform: scale(1); }
            100% { text-shadow: 0 0 30px #ffffff, 0 0 60px var(--neon-cyan); transform: scale(1.02); }
        }

        h2 {
            color: var(--neon-yellow); text-shadow: 0 0 20px var(--neon-yellow);
            font-size: 2.5rem; margin: 0 0 30px 0; text-align: center;
        }

        .btn {
            background: rgba(0, 0, 0, 0.6); color: white;
            border: 2px solid var(--neon-cyan); padding: 12px 20px;
            font-size: 1rem; cursor: pointer; margin: 5px;
            text-transform: uppercase; font-weight: bold; letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2); border-radius: 8px;
            transition: all 0.2s;
        }

        .btn:hover { background: rgba(0, 255, 255, 0.1); box-shadow: 0 0 20px rgba(0, 255, 255, 0.4); transform: translateY(-2px); }
        .btn:active { transform: scale(0.95) translateY(0); background: var(--neon-cyan); color: #000; }
        .btn-audio { border-color: var(--neon-pink); box-shadow: 0 0 10px rgba(255, 0, 255, 0.2); }
        .btn-audio:hover { background: rgba(255, 0, 255, 0.1); box-shadow: 0 0 20px rgba(255, 0, 255, 0.4); }
        .btn-audio:active { background: var(--neon-pink); }
        .btn-danger { border-color: #ff4444; box-shadow: 0 0 10px rgba(255,68,68,0.2); }
        .btn-danger:active { background: #ff4444; }

        #lobby-screen { justify-content: flex-start; padding-top: 30px; background: rgba(5, 5, 15, 0.95); overflow-y: auto; }
        .lobby-bg-shapes { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: -1; }
        .lobby-shape { position: absolute; background: rgba(0, 255, 255, 0.03); border: 1px solid rgba(0, 255, 255, 0.05); transform: rotate(45deg); }
        .l-s1 { width: 200px; height: 200px; top: 10%; left: -50px; animation: floatShape 15s infinite linear; }
        .l-s2 { width: 300px; height: 300px; bottom: -100px; right: -50px; animation: floatShape 20s infinite linear reverse; background: rgba(255, 0, 255, 0.03); border-color: rgba(255, 0, 255, 0.05);}
        @keyframes floatShape { 0% { transform: rotate(0deg) translateY(0); } 50% { transform: rotate(180deg) translateY(-30px); } 100% { transform: rotate(360deg) translateY(0); } }

        .level-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; width: 90%; max-width: 900px; margin-bottom: 30px; }
        .level-card {
            background: rgba(255, 255, 255, 0.03); border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 15px 20px; border-radius: 12px; cursor: pointer; transition: all 0.3s;
            position: relative; display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .level-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.5), 0 0 20px rgba(0, 255, 255, 0.2); background: rgba(0, 255, 255, 0.05); }
        .level-icon { font-size: 2.5rem; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .level-info { display: flex; flex-direction: column; }
        .level-name { font-size: 1.2rem; font-weight: bold; color: white; letter-spacing: 1px; }
        .level-diff { font-size: 0.9rem; color: #aaa; margin-top: 4px; font-weight: bold; }
        
        /* Colores de dificultad para las tarjetas */
        .level-card:nth-child(1) { border-color: #00ffff44; } .level-card:nth-child(1):hover { border-color: #00ffff; }
        .level-card:nth-child(2) { border-color: #00ff0044; } .level-card:nth-child(2):hover { border-color: #00ff00; }
        .level-card:nth-child(3) { border-color: #ffff0044; } .level-card:nth-child(3):hover { border-color: #ffff00; }
        .level-card:nth-child(4) { border-color: #ff880044; } .level-card:nth-child(4):hover { border-color: #ff8800; }
        .level-card:nth-child(5) { border-color: #ff000044; } .level-card:nth-child(5):hover { border-color: #ff0000; }
        
        .level-card:nth-child(1) .level-diff { color: #00ffff; }
        .level-card:nth-child(2) .level-diff { color: #00ff00; }
        .level-card:nth-child(3) .level-diff { color: #ffff00; }
        .level-card:nth-child(4) .level-diff { color: #ff8800; }
        .level-card:nth-child(5) .level-diff { color: #ff0000; }

        #ui-game { position: absolute; top: 0; left: 0; width: 100%; padding: 15px 20px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; z-index: 5; pointer-events: none; }
        #ui-game > * { pointer-events: auto; }
        #attempts-display { color: rgba(255, 255, 255, 0.9); font-size: 1.5rem; font-weight: bold; text-shadow: 2px 2px 4px black; flex-grow: 1; }
        #progress-container { width: 40%; height: 14px; background: rgba(255,255,255,0.1); border-radius: 7px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); margin: 0 15px; box-shadow: inset 0 0 5px rgba(0,0,0,0.5); }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #00ffff, #0088ff); box-shadow: 0 0 10px #00ffff; transition: width 0.1s linear; border-radius: 7px; }
        #level-name-display { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 3.5rem; color: white; font-weight: bold; letter-spacing: 5px; text-shadow: 0 0 30px white; opacity: 0; transition: opacity 0.5s; pointer-events: none; z-index: 6; }
        #mode-indicator { position: absolute; top: 45px; left: 20px; color: var(--neon-yellow); font-size: 1.2rem; font-weight: bold; z-index: 6; pointer-events: none; text-shadow: 0 0 10px var(--neon-yellow); background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 5px; }
    </style>
</head>

<div id="game-container">
    <canvas id="gameCanvas" width="800" height="450"></canvas>
    <div id="level-name-display"></div>
    <div id="mode-indicator"></div>
    <div id="ui-game" class="hidden">
        <div id="attempts-display">Intento: 1</div>
        <div id="progress-container"><div id="progress-bar"></div></div>
        <button id="btn-quit" class="btn btn-danger" style="padding: 8px 15px; font-size: 0.9rem;">✕ Salir</button>
    </div>
    
    <div id="lobby-screen" class="overlay">

        <h1>NEON DASH</h1>
        <div class="level-grid" id="level-grid"></div>
        <button id="btn-audio-lobby" class="btn btn-audio">Activar Audio</button>
    </div>

    <div id="win-screen" class="overlay hidden">
        <h2>¡NIVEL COMPLETADO!</h2>
        <div style="display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 350px;">
            <button id="btn-next" class="btn" style="width: 100%; font-size: 1.2rem; margin-bottom: 10px;">Siguiente Nivel ➔</button>
            <button id="btn-lobby" class="btn" style="width: 100%; border-color: #aaa; box-shadow: none;">Volver al Lobby</button>
        </div>
    </div>
</div>

    // --- AUDIO SYSTEM ---
    let audioCtx = null; let audioUnlocked = false; let musicInterval = null; let step = 0;

    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        audioUnlocked = true;
        document.getElementById('btn-audio-lobby').innerText = "Audio ON";
        document.getElementById('btn-audio-lobby').style.borderColor = '#00ffff';
    }

    function playNote(freq, type, time, duration, volume) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = type; osc.frequency.value = freq;
        gain.gain.setValueAtTime(volume, time); gain.gain.exponentialRampToValueAtTime(0.01, time + duration);
        osc.start(time); osc.stop(time + duration);
    }

    function playNoise(time, duration, volume, hpfFreq) {
        if(!audioCtx) return;
        const bufferSize = audioCtx.sampleRate * duration; const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0); for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        const source = audioCtx.createBufferSource(); source.buffer = buffer; const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(volume, time); gain.gain.exponentialRampToValueAtTime(0.01, time + duration);
        source.connect(gain);
        if(hpfFreq) { const filter = audioCtx.createBiquadFilter(); filter.type = "highpass"; filter.frequency.value = hpfFreq; gain.connect(filter); filter.connect(audioCtx.destination); }
        else { gain.connect(audioCtx.destination); }
        source.start(time);
    }

    function musicStep() {
        if (!audioUnlocked || audioCtx.state !== 'running' || gameState !== 'PLAYING') return;
        const t = audioCtx.currentTime; const stepDur = 60 / LEVELS[currentLevelIdx].bpm / 4;
        if (step % 4 === 0) {
            playNote(150, 'sine', t, 0.15, 1.0);
            container.style.transform = 'scale(1.03)'; setTimeout(() => container.style.transform = 'scale(1)', 60);
        }
        if (step % 16 === 4 || step % 16 === 12) playNoise(t, 0.15, 0.6, 2000);
        if (step % 2 === 0) playNoise(t, 0.05, 0.3, 9000);
        const patternPos = step % 32; const lvl = LEVELS[currentLevelIdx];
        if (lvl.melody[patternPos] > 0) playNote(lvl.melody[patternPos], 'square', t, stepDur*1.5, 0.25);
        if (lvl.bass[patternPos] > 0) playNote(lvl.bass[patternPos], 'sawtooth', t, stepDur*2, 0.4);
        beatPulse = 1.0; step++;
    }

    function startMusic() { if (musicInterval) clearInterval(musicInterval); step = 0; const intervalMs = 60000 / LEVELS[currentLevelIdx].bpm / 4; musicInterval = setInterval(musicStep, intervalMs); }
    function stopMusic() { if (musicInterval) clearInterval(musicInterval); musicInterval = null; }
    function playJumpSFX() { if (!audioUnlocked) return; const t = audioCtx.currentTime; playNote(500, 'sine', t, 0.1, 0.4); playNote(800, 'sine', t + 0.05, 0.1, 0.3); }
    function playDeathSFX() { if (!audioUnlocked) return; const t = audioCtx.currentTime; playNoise(t, 0.4, 0.8, 1000); playNote(150, 'sawtooth', t, 0.4, 0.5); }
    function playWinSFX() { if(!audioUnlocked) return; const t = audioCtx.currentTime; [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => playNote(f, 'square', t + i*0.15, 0.3, 0.4)); }
    function playPortalSFX() { if(!audioUnlocked) return; const t = audioCtx.currentTime; playNote(1200, 'sine', t, 0.1, 0.3); playNote(1800, 'sine', t + 0.1, 0.2, 0.3); }

    // --- GAME ENGINE ---
    const player = { 
        x: 100, y: groundY - 40, w: 40, h: 40, 
        vy: 0, speed: 6, gravity: 0.8, jumpForce: -12.5, ufoJumpForce: -9.5,
        grounded: false, rotation: 0, targetRotation: 0, mode: 'cube', trail: []
    };
    
    let obstacles = []; let particles = []; let screenShake = { x: 0, y: 0, intensity: 0 };

    function buildLevel() {
        obstacles = []; cameraX = 0; portalParticles = [];
        player.speed = LEVELS[currentLevelIdx].speed;
        levelLength = LEVELS[currentLevelIdx].build(1000); 
        
        bgMountains = [];
        for(let layer=0; layer<3; layer++) {
            let points = []; let segments = 30; let layerW = W * 4; let segW = layerW / segments; let maxH = 50 + layer * 40;
            for(let i=0; i<=segments; i++) points.push({ x: i * segW, y: groundY - (Math.random() * maxH + 20*layer) });
            bgMountains.push({ points: points, speed: 0.1 + layer * 0.15, color: layer, width: layerW });
        }
        
        dustParticles = [];
        for(let i=0; i<30; i++) dustParticles.push({ x: Math.random()*W*2, y: Math.random()*groundY, size: Math.random()*2+1, speedX: Math.random()*1+0.5, speedY: Math.random()*0.5-0.25, alpha: Math.random()*0.5 });
        
        speedLines = [];
        for(let i=0; i<5; i++) speedLines.push({ y: Math.random()*groundY, length: Math.random()*100+50, speed: Math.random()*10+15, alpha: 0 });
    }

    class Particle {
        constructor(x, y, color, sizeMin, sizeMax, speedX, speedY, life, gravity, shape) {
            this.x = x; this.y = y; this.color = color; this.size = Math.random() * (sizeMax - sizeMin) + sizeMin;
            this.vx = (Math.random() - 0.5) * speedX; this.vy = (Math.random() - 0.5) * speedY;
            this.life = life; this.maxLife = life; this.gravity = gravity || 0.2; this.shape = shape || 'square';
        }
        update() { this.x += this.vx; this.y += this.vy; this.vy += this.gravity; this.life--; }
        draw() { 
            const alpha = this.life / this.maxLife; 
            ctx.globalAlpha = alpha; ctx.fillStyle = this.color;
            if(this.shape === 'circle') { ctx.beginPath(); ctx.arc(this.x, this.y, this.size/2, 0, Math.PI*2); ctx.fill(); }
            else { ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size); }
            ctx.globalAlpha = 1; 
        }
    }

    function spawnTrail() { 
        if(gameState !== 'PLAYING') return;
        const color = player.mode === 'ship' ? '#ff8800' : `hsl(${LEVELS[currentLevelIdx].hue}, 100%, 50%)`;
        particles.push(new Particle(player.x+10, player.y+player.h/2, color, 2, 5, 2, 2, 10, 0, 'circle')); 
        player.trail.push({ x: player.x + cameraX, y: player.y + player.h/2, mode: player.mode, rot: player.rotation });
        if(player.trail.length > 15) player.trail.shift();
    }
    function spawnJumpParticles() { for(let i=0; i<8; i++) particles.push(new Particle(player.x+player.w/2, player.y+player.h, '#ffffff', 2, 6, 8, 4, 20, 0.5, 'circle')); }
    function spawnDeathParticles() { 
        screenShake.intensity = 25; flashAlpha = 1.5; 
        shockwave = { active: true, x: player.x + player.w/2, y: player.y + player.h/2, radius: 0, alpha: 1 };
        for(let i=0; i<60; i++) particles.push(new Particle(player.x+player.w/2, player.y+player.h/2, i%2===0?'#ff00ff':'#00ffff', 4, 18, 18, 18, 45, 0.3, 'square')); 
    }

    function resetGame() {
        player.y = groundY - player.h; player.vy = 0; player.grounded = true;
        player.rotation = 0; player.targetRotation = 0; player.mode = 'cube'; player.trail = [];
        particles = []; jumpBuffer = false; isHolding = false; screenShake = {x:0,y:0,intensity:0}; flashAlpha = 0;
        shockwave.active = false; modeIndicator.innerText = "Cube";
        buildLevel();
    }

    function startLevel(idx) {
        currentLevelIdx = idx; attempts = 1; attemptsDisplay.innerText = `Intento: 1`;
        resetGame(); gameState = 'PLAYING';
        lobbyScreen.classList.add('hidden'); winScreen.classList.add('hidden'); uiGame.classList.remove('hidden');
        if(audioUnlocked) startMusic();
        levelNameDisplay.innerText = LEVELS[idx].name; levelNameDisplay.style.opacity = 1;
        setTimeout(() => { levelNameDisplay.style.opacity = 0; }, 2000);
    }

    function playerDie() { gameState = 'DEAD'; stopMusic(); playDeathSFX(); spawnDeathParticles(); attempts++; attemptsDisplay.innerText = `Intento: ${attempts}`; setTimeout(() => startLevel(currentLevelIdx), 1000); }
    function playerWin() { gameState = 'WON'; stopMusic(); playWinSFX(); winScreen.classList.remove('hidden'); uiGame.classList.add('hidden'); document.getElementById('btn-next').classList.toggle('hidden', currentLevelIdx + 1 >= LEVELS.length); }
    function goToLobby() { gameState = 'MENU'; stopMusic(); winScreen.classList.add('hidden'); uiGame.classList.add('hidden'); lobbyScreen.classList.remove('hidden'); renderLobby(); }

    function handleInput() {
        if (gameState !== 'PLAYING') return;
        if (player.mode === 'cube' && player.grounded) executeJump(); 
        else if (player.mode === 'ufo') executeJump(); 
        else if (player.mode === 'cube' && !player.grounded) jumpBuffer = true;
    }

    function executeJump() { 
        if (player.mode === 'cube') { player.vy = player.jumpForce; player.grounded = false; player.targetRotation += Math.PI / 2; spawnJumpParticles(); }
        else if (player.mode === 'ufo') { player.vy = player.ufoJumpForce; spawnJumpParticles(); }
        playJumpSFX(); jumpBuffer = false; 
    }

    function checkOverlap(r1, r2) { return r1.x < r2.x + r2.w && r1.x + r1.w > r2.x && r1.y < r2.y + r2.h && r1.y + r1.h > r2.y; }

    function update() {
        beatPulse *= 0.85; flashAlpha *= 0.85;
        if(shockwave.active) { shockwave.radius += 12; shockwave.alpha -= 0.04; if(shockwave.alpha <= 0) shockwave.active = false; }
        if (screenShake.intensity > 0) { screenShake.x = (Math.random() - 0.5) * screenShake.intensity; screenShake.y = (Math.random() - 0.5) * screenShake.intensity; screenShake.intensity *= 0.85; if (screenShake.intensity < 0.5) screenShake.intensity = 0; }
        
        particles.forEach(p => p.update()); particles = particles.filter(p => p.life > 0);
        portalParticles.forEach(p => { p.y -= p.speed; p.x += Math.sin(p.y * 0.1) * 0.5; p.life--; });
        portalParticles = portalParticles.filter(p => p.life > 0);
        
        dustParticles.forEach(p => { p.x -= p.speedX; if(p.x < -10) { p.x = W + 10; p.y = Math.random()*groundY; }});
        speedLines.forEach(l => { l.y -= l.speed; l.alpha = Math.random()*0.3; if(l.y < -l.length) { l.y = groundY; l.length = Math.random()*100+50; }});
        
        if (gameState !== 'PLAYING') return;

        cameraX += player.speed;

        if (player.mode === 'ship') {
            if (isHolding) { player.vy -= 1.1; if (player.vy < -10) player.vy = -10; }
            else { player.vy += player.gravity; if (player.vy > 12) player.vy = 12; }
            player.y += player.vy; player.rotation = player.vy * 0.03; player.grounded = false;
        } else if (player.mode === 'ufo') {
            player.vy += player.gravity; if (player.vy > 12) player.vy = 12;
            player.y += player.vy; player.rotation = player.vy * 0.02; player.grounded = false;
        } else { 
            player.vy += player.gravity; if (player.vy > 18) player.vy = 18; player.y += player.vy;
            if (!player.grounded) player.rotation += (player.targetRotation - player.rotation) * 0.3;
        }

        if (player.y + player.h >= groundY) { player.y = groundY - player.h; player.vy = 0; player.grounded = true; if (player.mode === 'cube') player.rotation = player.targetRotation; if (jumpBuffer && player.mode === 'cube') executeJump(); }
        if (player.y < 0) { player.y = 0; player.vy = 1; } 

        spawnTrail();

        const pWorldX = player.x + cameraX; const pRect = { x: pWorldX, y: player.y, w: player.w, h: player.h };
        for (let i = 0; i < obstacles.length; i++) {
            const obs = obstacles[i];
            if (obs.x > pWorldX + W || obs.x < pWorldX - obs.w) continue;

            if (obs.type === 'spike') {
                const spikeRect = { x: obs.x + obs.w*0.25, y: obs.y + obs.h*0.5, w: obs.w*0.5, h: obs.h*0.5 };
                if (checkOverlap(pRect, spikeRect)) { playerDie(); return; }
            } else if (obs.type === 'block') {
                if (checkOverlap(pRect, obs)) {
                    const prevBottom = (player.y - player.vy) + player.h;
                    const prevTop = player.y - player.vy;
                    if (player.vy >= 0 && prevBottom <= obs.y + 12) { 
                        player.y = obs.y - player.h; player.vy = 0; player.grounded = true; 
                        if (player.mode === 'cube') player.rotation = player.targetRotation; 
                        if (jumpBuffer && player.mode === 'cube') executeJump();
                    } else if (player.vy < 0 && prevTop >= obs.y + obs.h - 6) { 
                        player.y = obs.y + obs.h; player.vy = 1; 
                    } else { playerDie(); return; }
                }
            } else if (obs.type === 'portal') {
                if (checkOverlap(pRect, obs)) {
                    if(player.mode !== obs.mode) {
                        player.mode = obs.mode; player.vy = -2; 
                        modeIndicator.innerText = player.mode.charAt(0).toUpperCase() + player.mode.slice(1);
                        playPortalSFX(); obs.type = 'used_portal'; 
                    }
                }
            }
        }
        progressBar.style.width = `${Math.min(cameraX / levelLength, 1) * 100}%`;
        if (cameraX >= levelLength) playerWin();
    }

    function drawPlayer() {
        if (gameState === 'DEAD') return;
        const hue = LEVELS[currentLevelIdx].hue;
        
        for(let i=0; i<player.trail.length; i++) {
            let t = player.trail[i]; let alpha = (i / player.trail.length) * 0.3; let screenX = t.x - cameraX;
            ctx.save(); ctx.globalAlpha = alpha; ctx.translate(screenX, t.y); ctx.rotate(t.rot);
            ctx.fillStyle = `hsl(${hue}, 100%, 50%)`; ctx.fillRect(-player.w/2, -player.h/2, player.w, player.h); ctx.restore();
        }

        ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.ellipse(player.x + player.w/2, groundY + 5, player.w/2, 6, 0, 0, Math.PI*2); ctx.fill();

        ctx.save(); ctx.translate(player.x + player.w/2, player.y + player.h/2); ctx.rotate(player.rotation);
        let pulseScale = 1 + beatPulse * 0.2; ctx.scale(pulseScale, pulseScale);
        let auraGrad = ctx.createRadialGradient(0, 0, player.w/2, 0, 0, player.w);
        auraGrad.addColorStop(0, `hsla(${hue}, 100%, 50%, 0.3)`); auraGrad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = auraGrad; ctx.fillRect(-player.w, -player.h, player.w*2, player.h*2);

        ctx.shadowBlur = 25; ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
        let grad = ctx.createLinearGradient(-player.w/2, -player.h/2, player.w/2, player.h/2);
        grad.addColorStop(0, `hsl(${hue}, 100%, 70%)`); grad.addColorStop(1, `hsl(${hue}, 80%, 30%)`);
        ctx.fillStyle = grad;

        if (player.mode === 'cube') {
            ctx.fillRect(-player.w/2, -player.h/2, player.w, player.h);
            ctx.shadowBlur = 0; ctx.strokeStyle = `hsl(${hue}, 100%, 80%)`; ctx.lineWidth = 2; ctx.strokeRect(-player.w/2, -player.h/2, player.w, player.h);
            ctx.fillStyle = `hsla(${hue}, 100%, 90%, 0.9)`; ctx.fillRect(-8, -8, 16, 16);
            ctx.fillStyle = `hsl(${hue}, 80%, 30%)`; ctx.fillRect(-4, -4, 8, 8);
        } else if (player.mode === 'ship') {
            ctx.beginPath(); ctx.moveTo(20, 0); ctx.lineTo(-20, -18); ctx.lineTo(-10, 0); ctx.lineTo(-20, 18); ctx.closePath(); ctx.fill();
            ctx.shadowBlur = 0; ctx.strokeStyle = `hsl(${hue}, 100%, 80%)`; ctx.lineWidth = 2; ctx.stroke();
            ctx.fillStyle = `hsla(${hue}, 100%, 90%, 0.9)`; ctx.fillRect(-5, -4, 10, 8);
        } else if (player.mode === 'ufo') {
            ctx.beginPath(); ctx.arc(0, -5, 18, Math.PI, 0); ctx.closePath(); ctx.fill();
            ctx.fillRect(-22, -5, 44, 10); 
            ctx.shadowBlur = 0; ctx.strokeStyle = `hsl(${hue}, 100%, 80%)`; ctx.lineWidth = 2; ctx.stroke();
            ctx.fillStyle = `hsla(${hue}, 100%, 90%, 0.9)`; ctx.beginPath(); ctx.arc(0, -5, 10, Math.PI, 0); ctx.closePath(); ctx.fill();
        }
        ctx.restore();
    }

    function draw() {
        const hue = LEVELS[currentLevelIdx].hue;
        ctx.clearRect(0, 0, W, H); ctx.save(); ctx.translate(screenShake.x, screenShake.y);
        
        let skyGrad = ctx.createLinearGradient(0, 0, 0, H);
        skyGrad.addColorStop(0, `hsl(${hue}, 60%, 5%)`); skyGrad.addColorStop(1, `hsl(${hue}, 70%, 12%)`);
        ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, W, H);

        ctx.fillStyle = `hsl(${hue}, 100%, 80%)`;
        dustParticles.forEach(p => { ctx.globalAlpha = p.alpha; ctx.fillRect(p.x, p.y, p.size, p.size); }); ctx.globalAlpha = 1;

        bgMountains.forEach(layer => {
            let offset = -(cameraX * layer.speed) % layer.width;
            ctx.fillStyle = `hsla(${hue}, 50%, ${5 + layer.color * 4}%, 0.8)`;
            ctx.beginPath(); ctx.moveTo(offset, H); layer.points.forEach(p => ctx.lineTo(p.x + offset, p.y)); ctx.lineTo(offset + layer.width, H);
            ctx.moveTo(offset + layer.width, H); layer.points.forEach(p => ctx.lineTo(p.x + offset + layer.width, p.y)); ctx.lineTo(offset + layer.width*2, H);
            ctx.closePath(); ctx.fill();
        });

        ctx.strokeStyle = `hsla(${hue}, 100%, 80%, 0.1)`; ctx.lineWidth = 1;
        speedLines.forEach(l => { ctx.globalAlpha = l.alpha; ctx.beginPath(); ctx.moveTo(W, l.y); ctx.lineTo(W - l.length, l.y); ctx.stroke(); }); ctx.globalAlpha = 1;

        let size = 40; let offsetX = -(cameraX % size);
        for(let x = offsetX; x < W; x += size) { for(let y = groundY; y < H; y += size) { let col = Math.floor((x - offsetX) / size); let row = Math.floor((y - groundY) / size); ctx.fillStyle = (col + row) % 2 === 0 ? `hsl(${hue}, 50%, 15%)` : `hsl(${hue}, 50%, 10%)`; ctx.fillRect(x, y, size, size); } }
        ctx.strokeStyle = `hsl(${hue}, 100%, 50%)`; ctx.lineWidth = 3 + beatPulse * 8; ctx.shadowBlur = 15 + beatPulse * 30; ctx.shadowColor = ctx.strokeStyle;
        ctx.beginPath(); ctx.moveTo(0, groundY); ctx.lineTo(W, groundY); ctx.stroke(); ctx.shadowBlur = 0;

        for (let obs of obstacles) {
            const screenX = obs.x - cameraX;
            if (screenX > -obs.w*2 && screenX < W + obs.w*2) {
                ctx.save();
                if (obs.type === 'block') {
                    ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(screenX + 4, groundY + 2, obs.w, 6);
                    let bGrad = ctx.createLinearGradient(screenX, obs.y, screenX, obs.y + obs.h);
                    bGrad.addColorStop(0, `hsl(${hue}, 60%, 35%)`); bGrad.addColorStop(0.5, `hsl(${hue}, 60%, 20%)`); bGrad.addColorStop(1, `hsl(${hue}, 60%, 10%)`);
                    ctx.fillStyle = bGrad; ctx.shadowBlur = 8; ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
                    ctx.fillRect(screenX, obs.y, obs.w, obs.h); ctx.shadowBlur = 0;
                    ctx.strokeStyle = `hsl(${hue}, 100%, 50%)`; ctx.lineWidth = 2; ctx.strokeRect(screenX, obs.y, obs.w, obs.h);
                    // 3D Top Face Highlight
                    ctx.fillStyle = `hsla(${hue}, 80%, 60%, 0.4)`;
                    ctx.beginPath(); ctx.moveTo(screenX, obs.y); ctx.lineTo(screenX+obs.w, obs.y); ctx.lineTo(screenX+obs.w-4, obs.y+4); ctx.lineTo(screenX+4, obs.y+4); ctx.closePath(); ctx.fill();
                    ctx.strokeStyle = `hsla(${hue}, 100%, 50%, 0.2)`; ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.moveTo(screenX, obs.y); ctx.lineTo(screenX + obs.w, obs.y + obs.h); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(screenX + obs.w, obs.y); ctx.lineTo(screenX, obs.y + obs.h); ctx.stroke();
                } else if (obs.type === 'spike') {
                    ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.ellipse(screenX + obs.w/2, groundY + 2, obs.w/2.5, 4, 0, 0, Math.PI*2); ctx.fill();
                    let sGrad = ctx.createLinearGradient(screenX + obs.w/2, obs.y, screenX + obs.w/2, obs.y + obs.h);
                    sGrad.addColorStop(0, `hsl(${hue}, 100%, 80%)`); sGrad.addColorStop(1, `hsl(${hue}, 100%, 30%)`);
                    ctx.fillStyle = sGrad; ctx.shadowBlur = 15; ctx.shadowColor = `hsl(${hue}, 100%, 70%)`;
                    ctx.beginPath(); ctx.moveTo(screenX + obs.w / 2, obs.y); ctx.lineTo(screenX + obs.w, obs.y + obs.h); ctx.lineTo(screenX, obs.y + obs.h);
                    ctx.closePath(); ctx.fill(); ctx.strokeStyle = `hsl(${hue}, 100%, 90%)`; ctx.lineWidth = 2; ctx.stroke();
                } else if (obs.type === 'portal') {
                    let portalColor = obs.mode === 'ship' ? '#ff00ff' : obs.mode === 'ufo' ? '#00ff00' : '#00ffff';
                    let t = Date.now() / 1000;
                    
                    // Generar partículas de portal
                    if(Math.random() > 0.7) portalParticles.push({ x: screenX + obs.w/2 + (Math.random()-0.5)*30, y: groundY, speed: Math.random()*2+1, life: 40, color: portalColor });

                    // Pilar de energía inestable
                    ctx.strokeStyle = portalColor; ctx.lineWidth = 4; ctx.shadowBlur = 30; ctx.shadowColor = portalColor;
                    ctx.beginPath();
                    for(let y=0; y<=groundY; y+=5) { let xOff = Math.sin(y * 0.05 + t * 5) * 10; ctx.lineTo(screenX + obs.w/2 + xOff, y); }
                    ctx.stroke();

                    // Anillo central giratorio
                    ctx.lineWidth = 3;
                    ctx.beginPath(); ctx.ellipse(screenX + obs.w/2, groundY/2, 25, 15 + Math.sin(t*4)*5, t*2, 0, Math.PI*2); ctx.stroke();

                    // Icono del modo adentro
                    ctx.shadowBlur = 15; ctx.fillStyle = portalColor;
                    if (obs.mode === 'cube') { ctx.fillRect(screenX + obs.w/2 - 8, groundY/2 - 8, 16, 16); }
                    else if (obs.mode === 'ship') { ctx.beginPath(); ctx.moveTo(screenX + obs.w/2 + 10, groundY/2); ctx.lineTo(screenX + obs.w/2 - 10, groundY/2 - 10); ctx.lineTo(screenX + obs.w/2 - 5, groundY/2); ctx.lineTo(screenX + obs.w/2 - 10, groundY/2 + 10); ctx.closePath(); ctx.fill(); }
                    else if (obs.mode === 'ufo') { ctx.beginPath(); ctx.arc(screenX + obs.w/2, groundY/2 - 3, 10, Math.PI, 0); ctx.closePath(); ctx.fill(); ctx.fillRect(screenX + obs.w/2 - 12, groundY/2 - 3, 24, 6); }
                }
                ctx.restore();
            }
        }

        // Dibujar partículas de portal
        portalParticles.forEach(p => { ctx.globalAlpha = p.life / 40; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 4, 4); });
        ctx.globalAlpha = 1;

        drawPlayer();
        
        if(shockwave.active) { ctx.strokeStyle = `rgba(255, 255, 255, ${shockwave.alpha})`; ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(shockwave.x, shockwave.y, shockwave.radius, 0, Math.PI*2); ctx.stroke(); }

        // Aberración Cromática al morir
        if(flashAlpha > 0.1) {
            ctx.globalCompositeOperation = 'lighter';
            ctx.fillStyle = `rgba(255, 0, 0, ${flashAlpha * 0.4})`; ctx.fillRect(-15, -10, W+20, H+20);
            ctx.fillStyle = `rgba(0, 255, 255, ${flashAlpha * 0.4})`; ctx.fillRect(15, 0, W+20, H+20);
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = `rgba(255, 255, 255, ${flashAlpha})`; ctx.fillRect(-100, -100, W+200, H+200);
        }

        let radGrad = ctx.createRadialGradient(W/2, H/2, W*0.3, W/2, H/2, W*0.75);
        radGrad.addColorStop(0, 'rgba(0,0,0,0)'); radGrad.addColorStop(1, 'rgba(0,0,0,0.7)');
        ctx.fillStyle = radGrad; ctx.fillRect(0,0,W,H);

        ctx.restore();
        particles.forEach(p => p.draw());
    }

    function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

    function renderLobby() {
        levelGrid.innerHTML = '';
        LEVELS.forEach((lvl, idx) => {
            const card = document.createElement('div');
            card.className = 'level-card';
            card.innerHTML = `<div class="level-icon">${lvl.icon}</div><div class="level-info"><div class="level-name">${lvl.name}</div><div class="level-diff">${lvl.diff}</div></div>`;
            card.onclick = () => startLevel(idx);
            levelGrid.appendChild(card);
        });
    }

    window.addEventListener('keydown', e => { if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); if (!isHolding) handleInput(); isHolding = true; } if(e.code === 'Escape' && gameState === 'PLAYING') goToLobby(); });
    window.addEventListener('keyup', e => { if (e.code === 'Space' || e.code === 'ArrowUp') isHolding = false; });

    document.addEventListener('mousedown', e => { if (e.target.tagName !== 'BUTTON' && !e.target.closest('.level-card')) { if (!isHolding && gameState === 'PLAYING') handleInput(); isHolding = true; } });
    document.addEventListener('mouseup', e => { isHolding = false; });
    
    document.addEventListener('touchstart', e => { if (e.target.tagName !== 'BUTTON' && !e.target.closest('.level-card')) { e.preventDefault(); if (!isHolding && gameState === 'PLAYING') handleInput(); isHolding = true; } }, { passive: false });
    document.addEventListener('touchend', e => { isHolding = false; });

    document.getElementById('btn-audio-lobby').addEventListener('click', initAudio);
    document.getElementById('btn-quit').addEventListener('click', goToLobby);
    document.getElementById('btn-lobby').addEventListener('click', goToLobby);
    document.getElementById('btn-next').addEventListener('click', () => { if(currentLevelIdx + 1 < LEVELS.length) startLevel(currentLevelIdx + 1); else goToLobby(); });

    renderLobby(); gameLoop();
</script>
</body>
</html>
