<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Neon Dash 3.2 - Fixed</title>
<style>
html,body{margin:0;padding:0;overflow:hidden;background:#000;font-family:Arial, Helvetica, sans-serif;}
canvas{display:block;background:#000;}
#ui{position:fixed;inset:0;display:flex;justify-content:center;align-items:center;z-index:10;}
.screen{display:none;flex-direction:column;align-items:center;gap:20px;color:#0ff;font-size:32px;text-shadow:0 0 15px #0ff;text-align:center;padding:20px;}
.screen.active{display:flex;}
button{padding:14px 32px;font-size:20px;border:none;border-radius:10px;background:#f06;color:white;cursor:pointer;box-shadow:0 0 20px #f06;margin:5px;transition:transform 0.2s;}
button:hover{transform:scale(1.05);}
#progress{position:fixed;top:0;left:0;width:100%;height:14px;background:#111;z-index:15;}
#bar{height:100%;width:0%;background:linear-gradient(90deg,#60f,#0ff,#f06);transition:width 0.1s;}
#levelButtons{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:400px;}
#levelButtons button{min-width:50px;}
#instructions{color:#aaa;font-size:16px;margin-top:10px;}
h1{margin:0;font-size:42px;background:linear-gradient(90deg,#60f,#0ff,#f06);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
</style>
</head>
<body>

<div id="progress"><div id="bar"></div></div>

<div id="ui">
  <div id="start" class="screen active">
    <h1>✨ NEON DASH 3.2 ✨</h1>
    <button onclick="show('levels')">🎮 JUGAR</button>
    <button onclick="show('mapmaker')">🗺️ MAP MAKER</button>
    <div id="instructions">Presiona ESPACIO o CLICK para saltar</div>
  </div>

  <div id="levels" class="screen">
    <div style="font-size:28px;">Selecciona Nivel</div>
    <div id="levelButtons"></div>
    <button onclick="show('start')" style="background:#333;">← Volver</button>
  </div>

  <div id="over" class="screen">
    <div id="overText" style="font-size:36px;"></div>
    <button onclick="show('levels')">🔄 Reintentar</button>
    <button onclick="show('start')" style="background:#333;">🏠 Menú Principal</button>
  </div>

  <div id="mapmaker" class="screen">
    <div style="font-size:24px;">Map Maker</div>
    <div style="color:#aaa;font-size:14px;">Click para colocar objetos</div>
    <div style="margin:15px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
      <button onclick="currentPlace='block'" style="background:#0ff;color:#000;">⬛ Bloque</button>
      <button onclick="currentPlace='spike'" style="background:#f06;">▲ Spike</button>
      <button onclick="currentPlace='ufo'" style="background:#a0f;">🛸 UFO</button>
      <button onclick="clearMap()" style="background:#666;">🗑️ Limpiar</button>
    </div>
    <button onclick="saveMap()">💾 Guardar Mapa</button>
    <button onclick="exitMapMaker()" style="background:#333;">← Volver</button>
  </div>
  
  <div id="win" class="screen">
    <div style="font-size:48px;">🎉 ¡NIVEL COMPLETADO! 🎉</div>
    <div id="winLevel" style="font-size:28px;color:#ff0;"></div>
    <button onclick="nextLevel()" id="nextBtn">➡️ Siguiente Nivel</button>
    <button onclick="show('levels')" style="background:#333;">📋 Seleccionar Nivel</button>
  </div>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

/* ===== RESIZE ===== */
function resize(){
  canvas.width=innerWidth;
  canvas.height=innerHeight;
  // Recalcular floor cada vez que se redimensiona
  if(typeof getFloor === 'function') getFloor();
}
addEventListener("resize",resize);
resize();

/* ===== UI ===== */
const screens={start:document.getElementById("start"),levels:document.getElementById("levels"),over:document.getElementById("over"),mapmaker:document.getElementById("mapmaker"),win:document.getElementById("win")};
function show(name){
  Object.values(screens).forEach(s=>s.classList.remove("active"));
  if(name) screens[name].classList.add("active");
}

/* ===== GAME STATE ===== */
let state="menu";
let level=1;
let distance=0;
const levelLength=12000; // Reducido para que sea completable

let player;
let spikes=[];
let blocks=[];
let ufos=[];
let invincible=false; // Invencibilidad temporal al iniciar
let invincibleTimer=0;

/* ===== FLOOR DINÁMICO ===== */
function getFloor(){
  return canvas.height * 0.65;
}

/* ===== NIVELES MEJORADOS ===== */
// Los obstáculos ahora están más espaciados y diseñados para ser superables
const levelsData = {
  1:{speed:5,color:"#0ff",
     spikes:[{x:800,y:0,h:40},{x:1400,y:0,h:40},{x:2200,y:0,h:40},{x:3200,y:0,h:40},{x:4500,y:0,h:40}],
     blocks:[{x:1000,y:0,w:100,h:25},{x:1800,y:0,w:120,h:25},{x:2800,y:0,w:100,h:25},{x:3800,y:0,w:150,h:25},{x:5000,y:0,w:100,h:25}],
     ufos:[{x:2500,y:0,w:55,h:22,used:false},{x:4200,y:0,w:55,h:22,used:false}]},
     
  2:{speed:5.5,color:"#f0f",
     spikes:[{x:700,y:0,h:45},{x:1300,y:0,h:45},{x:2000,y:0,h:45},{x:2900,y:0,h:45},{x:3900,y:0,h:45},{x:5000,y:0,h:45}],
     blocks:[{x:900,y:0,w:90,h:25},{x:1600,y:0,w:110,h:25},{x:2400,y:0,w:90,h:25},{x:3400,y:0,w:130,h:25},{x:4500,y:0,w:90,h:25}],
     ufos:[{x:2100,y:0,w:55,h:22,used:false},{x:3600,y:0,w:55,h:22,used:false}]},
     
  3:{speed:6,color:"#ff0",
     spikes:[{x:600,y:0,h:45},{x:1200,y:0,h:45},{x:1900,y:0,h:45},{x:2700,y:0,h:45},{x:3700,y:0,h:45},{x:4800,y:0,h:45}],
     blocks:[{x:800,y:0,w:85,h:25},{x:1500,y:0,w:105,h:25},{x:2300,y:0,w:85,h:25},{x:3200,y:0,w:125,h:25},{x:4300,y:0,w:85,h:25}],
     ufos:[{x:2000,y:0,w:55,h:22,used:false},{x:3500,y:0,w:55,h:22,used:false}]},
     
  4:{speed:6.5,color:"#0f0",
     spikes:[{x:550,y:0,h:50},{x:1150,y:0,h:50},{x:1850,y:0,h:50},{x:2650,y:0,h:50},{x:3550,y:0,h:50},{x:4650,y:0,h:50}],
     blocks:[{x:750,y:0,w:80,h:25},{x:1450,y:0,w:100,h:25},{x:2250,y:0,w:80,h:25},{x:3150,y:0,w:120,h:25},{x:4250,y:0,w:80,h:25}],
     ufos:[{x:1950,y:0,w:55,h:22,used:false},{x:3400,y:0,w:55,h:22,used:false}]},
     
  5:{speed:7,color:"#f80",
     spikes:[{x:500,y:0,h:50},{x:1100,y:0,h:50},{x:1800,y:0,h:50},{x:2600,y:0,h:50},{x:3500,y:0,h:50},{x:4600,y:0,h:50},{x:5500,y:0,h:50}],
     blocks:[{x:700,y:0,w:75,h:25},{x:1400,y:0,w:95,h:25},{x:2200,y:0,w:75,h:25},{x:3100,y:0,w:115,h:25},{x:4200,y:0,w:75,h:25},{x:5200,y:0,w:95,h:25}],
     ufos:[{x:1900,y:0,w:55,h:22,used:false},{x:3300,y:0,w:55,h:22,used:false},{x:4800,y:0,w:55,h:22,used:false}]},
     
  6:{speed:7.5,color:"#f0f",
     spikes:[{x:500,y:0,h:50},{x:1100,y:0,h:50},{x:1750,y:0,h:50},{x:2500,y:0,h:50},{x:3400,y:0,h:50},{x:4500,y:0,h:50},{x:5500,y:0,h:50}],
     blocks:[{x:700,y:0,w:75,h:25},{x:1350,y:0,w:95,h:25},{x:2100,y:0,w:75,h:25},{x:2950,y:0,w:110,h:25},{x:3950,y:0,w:75,h:25},{x:5000,y:0,w:95,h:25}],
     ufos:[{x:1850,y:0,w:55,h:22,used:false},{x:3200,y:0,w:55,h:22,used:false},{x:4750,y:0,w:55,h:22,used:false}]},
     
  7:{speed:8,color:"#0ff",
     spikes:[{x:450,y:0,h:55},{x:1050,y:0,h:55},{x:1700,y:0,h:55},{x:2450,y:0,h:55},{x:3350,y:0,h:55},{x:4450,y:0,h:55},{x:5450,y:0,h:55}],
     blocks:[{x:650,y:0,w:70,h:25},{x:1300,y:0,w:90,h:25},{x:2050,y:0,w:70,h:25},{x:2900,y:0,w:105,h:25},{x:3900,y:0,w:70,h:25},{x:4950,y:0,w:90,h:25}],
     ufos:[{x:1800,y:0,w:55,h:22,used:false},{x:3150,y:0,w:55,h:22,used:false},{x:4700,y:0,w:55,h:22,used:false}]},
     
  8:{speed:8.5,color:"#ff0",
     spikes:[{x:400,y:0,h:55},{x:1000,y:0,h:55},{x:1650,y:0,h:55},{x:2400,y:0,h:55},{x:3300,y:0,h:55},{x:4400,y:0,h:55},{x:5400,y:0,h:55}],
     blocks:[{x:600,y:0,w:65,h:25},{x:1250,y:0,w:85,h:25},{x:2000,y:0,w:65,h:25},{x:2850,y:0,w:100,h:25},{x:3850,y:0,w:65,h:25},{x:4900,y:0,w:85,h:25}],
     ufos:[{x:1750,y:0,w:55,h:22,used:false},{x:3100,y:0,w:55,h:22,used:false},{x:4650,y:0,w:55,h:22,used:false}]},
     
  9:{speed:9,color:"#f06",
     spikes:[{x:400,y:0,h:55},{x:950,y:0,h:55},{x:1600,y:0,h:55},{x:2350,y:0,h:55},{x:3250,y:0,h:55},{x:4350,y:0,h:55},{x:5350,y:0,h:55}],
     blocks:[{x:550,y:0,w:60,h:25},{x:1200,y:0,w:80,h:25},{x:1950,y:0,w:60,h:25},{x:2800,y:0,w:95,h:25},{x:3800,y:0,w:60,h:25},{x:4850,y:0,w:80,h:25}],
     ufos:[{x:1700,y:0,w:55,h:22,used:false},{x:3050,y:0,w:55,h:22,used:false},{x:4600,y:0,w:55,h:22,used:false}]},
     
  10:{speed:9.5,color:"#fff",
      spikes:[{x:350,y:0,h:60},{x:900,y:0,h:60},{x:1550,y:0,h:60},{x:2300,y:0,h:60},{x:3200,y:0,h:60},{x:4300,y:0,h:60},{x:5300,y:0,h:60},{x:6000,y:0,h:60}],
      blocks:[{x:500,y:0,w:55,h:25},{x:1150,y:0,w:75,h:25},{x:1900,y:0,w:55,h:25},{x:2750,y:0,w:90,h:25},{x:3750,y:0,w:55,h:25},{x:4800,y:0,w:75,h:25},{x:5650,y:0,w:55,h:25}],
      ufos:[{x:1650,y:0,w:55,h:22,used:false},{x:3000,y:0,w:55,h:22,used:false},{x:4550,y:0,w:55,h:22,used:false},{x:5800,y:0,w:55,h:22,used:false}]}
};

/* ===== GENERAR BOTONES DE NIVELES ===== */
const levelButtons=document.getElementById("levelButtons");
for(let i=1;i<=10;i++){
  const btn=document.createElement("button");
  btn.innerText=i;
  btn.style.background = `linear-gradient(135deg, ${levelsData[i].color}, #333)`;
  btn.onclick=()=>startLevel(i);
  levelButtons.appendChild(btn);
}

/* ===== INICIAR NIVEL ===== */
function startLevel(lvl){
  level=lvl; 
  distance=0;
  show(null);
  document.getElementById("bar").style.width="0%";
  
  // Calcular floor actual
  const currentFloor = getFloor();
  
  // Crear jugador en posición segura
  player={
    x: canvas.width * 0.15,
    y: currentFloor - 35,
    size: 30,
    dy: 0,
    grounded: false,
    rot: 0
  };
  
  // Cargar obstáculos y ajustar sus posiciones Y relativas al floor actual
  spikes = levelsData[lvl].spikes.map(s => ({
    x: s.x + 300, // Desplazar para dar espacio al inicio
    y: currentFloor,
    h: s.h
  }));
  
  blocks = levelsData[lvl].blocks.map(b => ({
    x: b.x + 300,
    y: currentFloor - b.h,
    w: b.w,
    h: b.h
  }));
  
  ufos = levelsData[lvl].ufos.map(u => ({
    x: u.x + 300,
    y: currentFloor - 80,
    w: u.w,
    h: u.h,
    used: false
  }));
  
  // Invencibilidad temporal al iniciar (1.5 segundos)
  invincible = true;
  invincibleTimer = 90; // ~1.5 segundos a 60fps
  
  state="play";
  
  if(gameLoopId) cancelAnimationFrame(gameLoopId);
  gameLoopId = requestAnimationFrame(loop);
}

let gameLoopId = null;

/* ===== LOOP PRINCIPAL ===== */
const GRAVITY=0.8;
const JUMP=-15;

function loop(){
  if(state!=="play") return;
  
  ctx.clearRect(0,0,canvas.width,canvas.height);
  
  const currentFloor = getFloor();
  
  // Dibujar fondo
  ctx.fillStyle="#0a0a0a";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  
  // Dibujar piso con efecto neon
  const gradient = ctx.createLinearGradient(0,currentFloor,0,canvas.height);
  gradient.addColorStop(0, "#1a1a2e");
  gradient.addColorStop(1, "#0a0a0a");
  ctx.fillStyle=gradient;
  ctx.fillRect(0,currentFloor,canvas.width,canvas.height-currentFloor);
  
  // Línea del piso brillante
  ctx.strokeStyle=levelsData[level].color;
  ctx.lineWidth=3;
  ctx.shadowColor=levelsData[level].color;
  ctx.shadowBlur=15;
  ctx.beginPath();
  ctx.moveTo(0,currentFloor);
  ctx.lineTo(canvas.width,currentFloor);
  ctx.stroke();
  ctx.shadowBlur=0;
  
  /* Física del jugador */
  player.dy += GRAVITY;
  player.y += player.dy;
  player.rot += 0.08;
  
  // Colisión con el piso
  if(player.y + player.size >= currentFloor){
    player.y = currentFloor - player.size;
    player.dy = 0;
    player.grounded = true;
  } else {
    player.grounded = false;
  }
  
  // Actualizar invencibilidad
  if(invincible){
    invincibleTimer--;
    if(invincibleTimer <= 0){
      invincible = false;
    }
  }
  
  const speed = levelsData[level].speed;
  
  // Mover obstáculos
  spikes.forEach(s => s.x -= speed);
  blocks.forEach(b => b.x -= speed);
  ufos.forEach(u => u.x -= speed);
  distance += speed;
  
  /* ===== DIBUJAR OBSTÁCULOS ===== */
  
  // Spikes (triángulos)
  ctx.fillStyle = levelsData[level].color;
  ctx.shadowColor = levelsData[level].color;
  ctx.shadowBlur = 12;
  spikes.forEach(s => {
    if(s.x > -60 && s.x < canvas.width + 60){ // Solo dibujar si es visible
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(s.x + 25, s.y - s.h);
      ctx.lineTo(s.x + 50, s.y);
      ctx.closePath();
      ctx.fill();
    }
  });
  ctx.shadowBlur = 0;
  
  // Blocks (plataformas)
  ctx.fillStyle = "#0ff";
  ctx.shadowColor = "#0ff";
  ctx.shadowBlur = 8;
  blocks.forEach(b => {
    if(b.x > -b.w && b.x < canvas.width + b.w){
      ctx.fillRect(b.x, b.y, b.w, b.h);
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 2;
      ctx.strokeRect(b.x, b.y, b.w, b.h);
    }
  });
  ctx.shadowBlur = 0;
  
  // UFOs (impulsores)
  ufos.forEach(u => {
    if(u.x > -u.w && u.x < canvas.width + u.w){
      ctx.fillStyle = u.used ? "#444" : "#f0f";
      ctx.shadowColor = u.used ? "#000" : "#f0f";
      ctx.shadowBlur = u.used ? 0 : 15;
      ctx.fillRect(u.x, u.y, u.w, u.h);
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 2;
      ctx.strokeRect(u.x, u.y, u.w, u.h);
      
      // Icono de UFO si no usado
      if(!u.used){
        ctx.fillStyle = "#fff";
        ctx.font = "14px Arial";
        ctx.textAlign = "center";
        ctx.fillText("↑", u.x + u.w/2, u.y + u.h/2 + 5);
      }
    }
  });
  ctx.shadowBlur = 0;
  
  /* ===== DIBUJAR JUGADOR ===== */
  ctx.save();
  ctx.translate(player.x + player.size/2, player.y + player.size/2);
  ctx.rotate(player.rot);
  
  // Efecto de parpadeo cuando es invencible
  if(invincible && Math.floor(invincibleTimer / 5) % 2 === 0){
    ctx.globalAlpha = 0.5;
  }
  
  ctx.fillStyle = levelsData[level].color;
  ctx.shadowColor = levelsData[level].color;
  ctx.shadowBlur = 20;
  ctx.fillRect(-player.size/2, -player.size/2, player.size, player.size);
  
  // Ojos del cubo
  ctx.fillStyle = "#000";
  ctx.shadowBlur = 0;
  ctx.fillRect(-8, -8, 6, 6);
  ctx.fillRect(2, -8, 6, 6);
  
  ctx.restore();
  
  /* ===== COLISIONES ===== */
  
  // Colisión con spikes (sino es invencible)
  if(!invincible){
    for(let s of spikes){
      const spikeCenterX = s.x + 25;
      const spikeTopY = s.y - s.h;
      
      // Hitbox más precisa y justa
      if(player.x + player.size > spikeCenterX - 12 &&
         player.x < spikeCenterX + 12 &&
         player.y + player.size > spikeTopY + 5 &&
         player.y < spikeTopY + s.h){
        end(false);
        return;
      }
    }
  }
  
  // Colisión con blocks (plataformas)
  blocks.forEach(b => {
    if(player.x + player.size > b.x + 5 &&
       player.x < b.x + b.w - 5 &&
       player.y + player.size > b.y &&
       player.y < b.y + b.h &&
       player.dy >= 0){ // Solo si está cayendo
      player.y = b.y - player.size;
      player.dy = 0;
      player.grounded = true;
    }
  });
  
  // Colisión con UFOs
  ufos.forEach(u => {
    if(!u.used &&
       player.x + player.size > u.x &&
       player.x < u.x + u.w &&
       player.y + player.size > u.y &&
       player.y < u.y + u.h){
      player.dy = JUMP * 1.3; // Super salto
      u.used = true;
      
      // Efecto visual
      ctx.save();
      ctx.fillStyle = "#fff";
      ctx.font = "20px Arial";
      ctx.fillText("💫", u.x, u.y - 10);
      ctx.restore();
    }
  });
  
  /* ===== CONDICIÓN DE VICTORIA ===== */
  if(distance >= levelLength){
    end(true);
    return;
  }
  
  /* ===== ACTUALIZAR UI ===== */
  document.getElementById("bar").style.width = Math.min((distance / levelLength) * 100, 100) + "%";
  
  gameLoopId = requestAnimationFrame(loop);
}

/* ===== INPUT ===== */
addEventListener("keydown", e => {
  if(e.code === "Space" && state === "play"){
    e.preventDefault();
    jump();
  }
});

canvas.addEventListener("click", e => {
  if(state === "play") jump();
});

canvas.addEventListener("touchstart", e => {
  if(state === "play"){
    e.preventDefault();
    jump();
  }
}, {passive: false});

function jump(){
  if(player && player.grounded){
    player.dy = JUMP;
    player.grounded = false;
  }
}

/* ===== FIN DEL NIVEL ===== */
function end(win){
  state = "menu";
  if(gameLoopId) cancelAnimationFrame(gameLoopId);
  
  if(win){
    document.getElementById("winLevel").innerText = `¡Completaste el Nivel ${level}!`;
    document.getElementById("nextBtn").style.display = level < 10 ? "inline-block" : "none";
    show("win");
  } else {
    document.getElementById("overText").innerHTML = `💥 Game Over<br><span style="font-size:20px;color:#aaa;">Nivel ${level}</span>`;
    show("over");
  }
}

function nextLevel(){
  if(level < 10){
    startLevel(level + 1);
  } else {
    alert("¡Felicidades! ¡Completaste todos los niveles!");
    show("start");
  }
}

/* ===== MAP MAKER ===== */
let mapEditor=[];
let currentPlace="block";

function enterMapMaker(){
  state="mapmaker";
  mapEditor=[];
  show("mapmaker");
  renderMapEditor();
  mapMakerLoop();
}

function exitMapMaker(){
  state="menu";
  show("start");
}

// Sobrescribir la función show original para manejar map maker
const originalShow = show;
show = function(name){
  if(name === 'mapmaker'){
    enterMapMaker();
  } else {
    originalShow(name);
  }
};

canvas.addEventListener("mousedown", e => {
  if(state !== "mapmaker") return;
  
  const rect = {
    x: e.clientX,
    y: e.clientY,
    type: currentPlace
  };
  mapEditor.push(rect);
  renderMapEditor();
});

function clearMap(){
  mapEditor=[];
  renderMapEditor();
}

function renderMapEditor(){
  if(state !== "mapmaker") return;
  
  ctx.clearRect(0,0,canvas.width,canvas.height);
  
  // Fondo del editor
  ctx.fillStyle = "#111";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  
  // Piso de referencia
  const editorFloor = getFloor();
  ctx.strokeStyle = "#333";
  ctx.lineWidth = 2;
  ctx.setLineDash([10, 10]);
  ctx.beginPath();
  ctx.moveTo(0, editorFloor);
  ctx.lineTo(canvas.width, editorFloor);
  ctx.stroke();
  ctx.setLineDash([]);
  
  // Dibujar objetos
  mapEditor.forEach(obj => {
    if(obj.type === "block"){
      ctx.fillStyle = "#0ff";
      ctx.shadowColor = "#0ff";
      ctx.shadowBlur = 10;
      ctx.fillRect(obj.x, obj.y, 80, 20);
      ctx.strokeStyle = "#fff";
      ctx.strokeRect(obj.x, obj.y, 80, 20);
    }
    if(obj.type === "spike"){
      ctx.fillStyle = "#f06";
      ctx.shadowColor = "#f06";
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.moveTo(obj.x, obj.y);
      ctx.lineTo(obj.x + 25, obj.y - 40);
      ctx.lineTo(obj.x + 50, obj.y);
      ctx.closePath();
      ctx.fill();
    }
    if(obj.type === "ufo"){
      ctx.fillStyle = "#a0f";
      ctx.shadowColor = "#a0f";
      ctx.shadowBlur = 10;
      ctx.fillRect(obj.x, obj.y, 50, 20);
      ctx.strokeStyle = "#fff";
      ctx.strokeRect(obj.x, obj.y, 50, 20);
    }
  });
  ctx.shadowBlur = 0;
  
  // Instrucciones
  ctx.fillStyle = "#888";
  ctx.font = "16px Arial";
  ctx.textAlign = "center";
  ctx.fillText(`Objetos: ${mapEditor.length} | Tipo: ${currentPlace}`, canvas.width/2, 30);
}

function saveMap(){
  console.log("Mapa guardado:", JSON.stringify(mapEditor));
  alert(`¡Mapa guardado!\n${mapEditor.length} objetos.\nRevisa la consola (F12) para ver los datos.`);
}

let mapMakerRAF = null;
function mapMakerLoop(){
  if(state === "mapmaker"){
    renderMapEditor();
    mapMakerRAF = requestAnimationFrame(mapMakerLoop);
  }
}
